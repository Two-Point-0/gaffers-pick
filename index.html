<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Gaffer's Pick · Stadium Predictor</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@300;400;600;700;800;900&family=Barlow:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --lime:#c8f400;--gold:#ffd700;--red:#e63946;
  --bg:#060b10;--border:rgba(255,255,255,.07);
  --text:#e8edf2;--sub:rgba(232,237,242,.48);
  --hd:'Bebas Neue',cursive;--cd:'Barlow Condensed',sans-serif;--bd:'Barlow',sans-serif;
  --seat:#0d2a14;--seat-on:#c8f400;
  --nav-h:68px;--hdr-h:44px;--gw-h:38px;
}
html,body{width:100%;height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:var(--bd)}
#root{width:100%;height:100%}
::-webkit-scrollbar{width:3px;height:3px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:rgba(200,244,0,.2);border-radius:3px}

@keyframes sLeft{from{transform:translateX(0)}to{transform:translateX(-100%)}}
@keyframes sRight{from{transform:translateX(0)}to{transform:translateX(100%)}}
@keyframes cLeft{from{transform:translateX(-100%)}to{transform:translateX(0)}}
@keyframes cRight{from{transform:translateX(100%)}to{transform:translateX(0)}}
@keyframes adH{from{transform:translateX(0)}to{transform:translateX(-50%)}}
@keyframes adHR{from{transform:translateX(-50%)}to{transform:translateX(0)}}
@keyframes adV{from{transform:translateY(0)}to{transform:translateY(-50%)}}
@keyframes adVR{from{transform:translateY(-50%)}to{transform:translateY(0)}}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes pulse{0%,100%{opacity:.55}50%{opacity:1}}
@keyframes glow{0%,100%{box-shadow:0 0 5px rgba(200,244,0,.15)}50%{box-shadow:0 0 16px rgba(200,244,0,.45)}}
@keyframes hdrPulse{0%,100%{text-shadow:0 0 20px rgba(200,244,0,.1)}50%{text-shadow:0 0 40px rgba(200,244,0,.4)}}
@keyframes ptsUp{0%{opacity:1;transform:translateY(0) scale(1)}100%{opacity:0;transform:translateY(-28px) scale(1.3)}}
@keyframes toastIn{from{opacity:0;transform:translate(-50%,10px)}to{opacity:1;transform:translate(-50%,0)}}
@keyframes toastOut{to{opacity:0;transform:translate(-50%,-6px)}}
@keyframes gwSlide{from{opacity:0;transform:translateX(20px)}to{opacity:1;transform:translateX(0)}}
@keyframes ballAnim{0%{left:25%;top:50%}12%{left:42%;top:32%}24%{left:58%;top:44%}36%{left:72%;top:28%}48%{left:85%;top:52%}60%{left:70%;top:68%}72%{left:50%;top:58%}84%{left:34%;top:38%}100%{left:25%;top:50%}}
@keyframes rainbowScore{0%{color:var(--lime)}50%{color:var(--gold)}100%{color:var(--lime)}}
@keyframes gwBarFill{from{width:0}to{width:var(--fw)}}

/* ══ LAYOUT ══ */
.app{display:grid;grid-template-rows:var(--hdr-h) var(--gw-h) 1fr var(--nav-h);height:100vh;overflow:hidden}

/* ══ HEADER ══ */
.hdr{
  background:linear-gradient(180deg,#03060c,#060f1c);
  border-bottom:1px solid rgba(200,244,0,.1);
  display:flex;align-items:center;padding:0 12px;gap:8px;
  position:relative;z-index:300;
}
.brand{font-family:var(--hd);font-size:clamp(1.2rem,2.8vw,1.8rem);letter-spacing:5px;
  background:linear-gradient(90deg,rgba(255,255,255,.65),var(--lime),rgba(255,255,255,.85),var(--lime));
  background-size:200%;-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  animation:hdrPulse 3s ease infinite;flex:1;text-align:center}
.pts-pill{display:flex;align-items:center;gap:4px;padding:3px 10px;border-radius:40px;
  background:rgba(255,215,0,.08);border:1px solid rgba(255,215,0,.28)}
.pts-v{font-family:var(--hd);font-size:.9rem;color:var(--gold)}
.pts-l{font-family:var(--cd);font-size:.45rem;color:rgba(255,215,0,.5);letter-spacing:1px}
.s-tag{font-family:var(--cd);font-size:.46rem;letter-spacing:3px;color:rgba(200,244,0,.35);flex-shrink:0}
.pts-pop{position:absolute;left:58px;top:50%;transform:translateY(-50%);
  font-family:var(--hd);font-size:1.3rem;color:var(--lime);
  animation:ptsUp 1.1s ease forwards;pointer-events:none;z-index:9999}

/* ══ GW SCROLL BAR ══ */
.gwbar{
  background:linear-gradient(90deg,#04080f,#07111e,#04080f);
  border-bottom:1px solid rgba(200,244,0,.08);
  display:flex;align-items:center;gap:0;
  overflow-x:auto;overflow-y:hidden;
  scrollbar-width:none;position:relative;z-index:290;
  scroll-behavior:smooth;
}
.gwbar::-webkit-scrollbar{display:none}
.gw-item{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  flex-shrink:0;padding:3px 8px;cursor:pointer;border-bottom:2px solid transparent;
  transition:all .2s;min-width:clamp(52px,8vw,80px);gap:1px;
}
.gw-item.act{border-bottom-color:var(--lime)}
.gw-item:hover{background:rgba(200,244,0,.04)}
.gw-num{font-family:var(--hd);font-size:clamp(.7rem,1.3vw,.9rem);
  color:var(--sub);letter-spacing:1px}
.gw-item.act .gw-num{color:var(--lime)}
.gw-pts{font-family:var(--cd);font-size:clamp(.36rem,.62vw,.5rem);font-weight:700;
  letter-spacing:.8px}
.gw-pts.hi{color:var(--gold)}.gw-pts.mid{color:var(--lime)}.gw-pts.lo{color:rgba(255,255,255,.3)}
.gw-bar-wrap{width:100%;height:2px;background:rgba(255,255,255,.05);border-radius:2px;overflow:hidden;margin-top:1px}
.gw-bar-fill{height:100%;border-radius:2px;background:linear-gradient(90deg,var(--lime),#90ff00);
  --fw:0%;animation:gwBarFill .6s ease .1s forwards}
.gw-sep{width:1px;height:18px;background:rgba(255,255,255,.06);flex-shrink:0;align-self:center}
.live-pill{display:inline-flex;align-items:center;gap:2px;padding:1px 5px;border-radius:8px;
  background:rgba(230,57,70,.15);border:1px solid rgba(230,57,70,.35);
  font-family:var(--cd);font-size:.42rem;font-weight:700;color:var(--red);letter-spacing:.8px}
.live-dot{width:4px;height:4px;border-radius:50%;background:var(--red);animation:pulse 1s infinite}

/* ══ STADIUM GRID ══ */
.stadium{
  display:grid;
  grid-template-columns: clamp(110px,16vw,200px) clamp(18px,3vw,40px) 1fr clamp(18px,3vw,40px) clamp(110px,16vw,200px);
  overflow:hidden;position:relative;
}

/* ══ SIDE PANELS ══ */
.side-panel{
  display:flex;flex-direction:column;overflow:hidden;
  background:linear-gradient(180deg,#03070f,#060e18);
  transition:opacity .35s;
}
.side-panel.hide{opacity:0;pointer-events:none}
.side-panel.l{border-right:1px solid rgba(200,244,0,.07)}
.side-panel.r{border-left:1px solid rgba(200,244,0,.07)}

/* Top strip of side panels (always visible = account / predictions) */
.sp-top{
  flex-shrink:0;overflow-y:auto;overflow-x:hidden;
  padding:6px 8px;
  border-bottom:1px solid rgba(200,244,0,.08);
  max-height:42%;
}
/* Bottom strip (only visible when roof is open = stats / results) */
.sp-bot{
  flex:1;overflow-y:auto;overflow-x:hidden;
  padding:6px 8px;
  transition:opacity .4s,transform .4s;
}
.sp-bot.hide-bot{opacity:0;pointer-events:none;transform:translateY(8px)}

/* ══ STAND COLUMNS ══ */
.stand{display:flex;flex-direction:column;overflow:hidden;
  background:linear-gradient(90deg,#040911,#070f1c)}
.stand.r{background:linear-gradient(270deg,#040911,#070f1c)}
.stand-seats{flex:1;display:flex;flex-direction:column;justify-content:center;gap:1px;padding:1px;overflow:hidden}
.stand-row{display:flex;gap:1px;justify-content:center}
.vs{width:clamp(3px,.6vw,5.5px);height:clamp(2.5px,.45vw,4.5px);border-radius:1px;
  background:var(--seat);flex-shrink:0;transition:background .3s}
.vs.on{background:var(--seat-on)}
.adv-wrap{width:clamp(10px,1.6vw,20px);background:#000;overflow:hidden;flex-shrink:0}
.adv-inner{display:flex;flex-direction:column;height:200%}
.adv-inner.go{animation:adV 16s linear infinite}
.adv-inner.rev{animation:adVR 16s linear infinite}
.adv-blk{display:flex;align-items:center;justify-content:center;flex-shrink:0;
  min-height:clamp(22px,3.5vw,48px)}
.adv-txt{font-family:var(--cd);font-size:clamp(.28rem,.44vw,.4rem);font-weight:900;
  letter-spacing:2px;text-transform:uppercase;writing-mode:vertical-rl;white-space:nowrap}

/* ══ PITCH COLUMN ══ */
.pitch-col{display:flex;flex-direction:column;position:relative;overflow:hidden}
.adh-wrap{flex-shrink:0;background:#000;overflow:hidden;height:clamp(15px,1.9vw,24px)}
.adh-inner{display:flex;height:100%;width:200%}
.adh-inner.go{animation:adH 17s linear infinite}
.adh-inner.rev{animation:adHR 19s linear infinite}
.adh-blk{display:flex;align-items:center;justify-content:center;height:100%;
  padding:0 clamp(7px,1.3vw,16px);flex-shrink:0}
.adh-txt{font-family:var(--cd);font-size:clamp(.38rem,.66vw,.54rem);font-weight:900;
  letter-spacing:2px;text-transform:uppercase;white-space:nowrap}
.seat-strip{padding:1px 0;flex-shrink:0}
.srow{display:flex;gap:1px;padding:0 2px}
.hs{width:clamp(4px,.72vw,7px);height:clamp(3px,.52vw,5px);border-radius:1px 1px 0 0;
  background:var(--seat);flex-shrink:0;transition:background .35s}
.hs.on{background:var(--seat-on)}

/* ══ COURT / FIELD ══ */
.court{flex:1;position:relative;overflow:hidden}

/* Football */
.court.football{background:repeating-linear-gradient(180deg,#1d7a30 0,#1d7a30 38px,#198228 38px,#198228 76px)}
/* Basketball */
.court.basketball{background:linear-gradient(180deg,#c8500a,#a8400a)}
/* American Football */
.court.american{background:repeating-linear-gradient(90deg,#2e7d32 0,#2e7d32 58px,#256726 58px,#256726 116px)}
/* Baseball */
.court.baseball{background:radial-gradient(ellipse 85% 85% at 50% 100%,#6b8f3c 0%,#4a6b2a 60%,#8b5e3c 60%,#7a4f30 100%)}
/* Tennis */
.court.tennis{background:linear-gradient(180deg,#2e8b57,#236b43)}
/* Rugby */
.court.rugby{background:repeating-linear-gradient(180deg,#1d7a30 0,#1d7a30 40px,#198228 40px,#198228 80px)}
/* Cricket */
.court.cricket{background:radial-gradient(ellipse 100% 80% at 50% 50%,#4a7c2f 0%,#3a6422 100%)}
/* Ice Hockey */
.court.hockey{background:linear-gradient(180deg,#cce8f4,#b8d8e8)}
/* Golf */
.court.golf{background:radial-gradient(ellipse 100% 80% at 50% 100%,#2e7d32 0%,#1b5e20 100%)}

.court::after{content:'';position:absolute;inset:0;z-index:2;pointer-events:none;
  background:radial-gradient(ellipse 85% 75% at 50% 50%,transparent 25%,rgba(0,0,0,.48) 100%)}

/* Court SVGs */
.court-svg{position:absolute;inset:0;width:100%;height:100%;z-index:3;pointer-events:none}

/* Formation / players */
.formation{position:absolute;inset:0;z-index:10;display:flex;flex-direction:column;
  align-items:center;justify-content:space-around;padding:3% 5%}
.f-row{display:flex;justify-content:center;gap:clamp(5px,1.5vw,20px);width:100%}
.pdot-wrap{display:flex;flex-direction:column;align-items:center;gap:1px;cursor:pointer}
.pdot{width:clamp(18px,3.2vw,32px);height:clamp(18px,3.2vw,32px);border-radius:50%;
  display:flex;align-items:center;justify-content:center;border:2px solid rgba(255,255,255,.28);
  font-family:var(--cd);font-size:clamp(.38rem,.7vw,.6rem);font-weight:900;
  transition:transform .18s;cursor:pointer}
.pdot:hover{transform:scale(1.18)}
.pdot.hm{background:linear-gradient(145deg,#3D195B,#2a0f3e);color:#fff}
.pdot.aw{background:linear-gradient(145deg,#c22e1c,#8a1f12);color:#fff}
.pdot.nba-hm{background:linear-gradient(145deg,#17408B,#0d2a5c);color:#fff}
.pdot.nba-aw{background:linear-gradient(145deg,#C9082A,#8a0520);color:#fff}
.pdot.nfl-hm{background:linear-gradient(145deg,#013369,#011f40);color:#fff}
.pdot.nfl-aw{background:linear-gradient(145deg,#D50A0A,#8a0507);color:#fff}
.pdot.yellow{border-color:var(--gold)!important;box-shadow:0 0 8px rgba(255,215,0,.6)}
.p-nm{font-family:var(--cd);font-size:clamp(.28rem,.5vw,.44rem);font-weight:700;
  color:#fff;text-shadow:0 1px 3px rgba(0,0,0,.9);background:rgba(0,0,0,.65);
  padding:1px 3px;border-radius:2px;text-align:center;white-space:nowrap;max-width:42px;overflow:hidden;text-overflow:ellipsis}
.p-rat{font-family:var(--hd);font-size:clamp(.28rem,.52vw,.44rem);
  padding:1px 3px;border-radius:2px;margin-top:1px;display:block;text-align:center}
.r9{background:rgba(200,244,0,.92);color:#000}
.r8{background:rgba(46,204,113,.88);color:#000}
.r7{background:rgba(255,215,0,.88);color:#000}
.r6{background:rgba(255,165,0,.85);color:#000}
.r5{background:rgba(230,57,70,.85);color:#fff}

/* Ball */
.sim-ball{position:absolute;width:clamp(9px,1.6vw,16px);height:clamp(9px,1.6vw,16px);
  border-radius:50%;background:radial-gradient(circle at 35% 35%,#fff,#ccc);
  border:1.5px solid rgba(0,0,0,.4);z-index:20;transition:left 1.4s ease,top 1.4s ease;
  box-shadow:0 2px 8px rgba(0,0,0,.7);pointer-events:none}

/* Stats HUD */
.stats-hud{position:absolute;top:5px;left:50%;transform:translateX(-50%);
  z-index:25;background:rgba(0,0,0,.85);border:1px solid rgba(200,244,0,.18);
  border-radius:8px;padding:4px 8px;min-width:clamp(130px,20vw,190px);pointer-events:none}
.hud-score{display:flex;align-items:center;justify-content:center;gap:8px;margin-bottom:3px}
.hud-team{font-family:var(--cd);font-size:clamp(.5rem,.88vw,.7rem);font-weight:700}
.hud-num{font-family:var(--hd);font-size:clamp(.9rem,1.6vw,1.3rem);
  color:var(--lime);padding:0 5px}
.hud-time{font-family:var(--cd);font-size:clamp(.38rem,.6vw,.5rem);text-align:center;
  letter-spacing:1px;margin-bottom:2px}
.stat-bar-row{display:flex;align-items:center;gap:3px;margin-bottom:2px}
.sb-val{font-family:var(--hd);font-size:clamp(.36rem,.6vw,.5rem);min-width:14px}
.sb-val.h{color:var(--lime);text-align:right}
.sb-val.a{color:#f54029;text-align:left}
.sb-lbl{font-family:var(--cd);font-size:clamp(.3rem,.5vw,.42rem);color:var(--sub);
  min-width:32px;text-align:center}
.sb-track{flex:1;height:2.5px;background:rgba(255,255,255,.08);border-radius:3px;overflow:hidden}
.sb-fill{height:100%;border-radius:3px}
.sb-fill.h{background:var(--lime)}
.sb-fill.a{background:#f54029;float:right}

/* Events */
.ev-feed{position:absolute;bottom:6px;left:50%;transform:translateX(-50%);
  z-index:25;display:flex;flex-direction:column;gap:2px;align-items:center;
  pointer-events:none;width:78%}
.ev-item{font-family:var(--cd);font-size:clamp(.42rem,.7vw,.58rem);font-weight:700;
  padding:2px 9px;border-radius:18px;background:rgba(0,0,0,.9);
  border:1px solid rgba(200,244,0,.3);color:var(--lime);
  animation:fadeUp .25s ease;white-space:nowrap;letter-spacing:.8px}
.ev-item.goal{border-color:var(--gold);color:var(--gold)}
.ev-item.card{border-color:var(--red);color:var(--red)}

/* Player tooltip */
.p-tip{position:fixed;z-index:9999;background:rgba(0,0,0,.96);
  border:1px solid rgba(200,244,0,.28);border-radius:7px;padding:7px 11px;
  min-width:120px;pointer-events:none;animation:fadeUp .12s ease}
.pt-n{font-family:var(--hd);font-size:.85rem;color:var(--lime)}
.pt-r{font-family:var(--cd);font-size:.5rem;color:var(--sub);margin-bottom:3px}
.pt-row{display:flex;justify-content:space-between;font-family:var(--cd);
  font-size:.54rem;padding:2px 0;border-bottom:1px solid rgba(255,255,255,.05)}
.pt-row:last-child{border:none}
.pt-k{color:var(--sub)}.pt-v{color:var(--lime);font-weight:700}

/* ══ ROOF ══ */
.roof{position:absolute;inset:0;z-index:50;display:flex;pointer-events:none}
.roof-l,.roof-r{
  width:50%;height:100%;will-change:transform;
  display:flex;flex-direction:column;overflow:hidden;pointer-events:all}
.roof-l{background:linear-gradient(135deg,#040b14,#0a1825);
  border-right:2px solid rgba(200,244,0,.1)}
.roof-r{background:linear-gradient(225deg,#040b14,#0a1825);
  border-left:2px solid rgba(200,244,0,.1)}
.roof.opening .roof-l{animation:sLeft .6s cubic-bezier(.77,0,.18,1) forwards}
.roof.opening .roof-r{animation:sRight .6s cubic-bezier(.77,0,.18,1) forwards}
.roof.closing .roof-l{animation:cLeft .5s cubic-bezier(.77,0,.18,1) forwards}
.roof.closing .roof-r{animation:cRight .5s cubic-bezier(.77,0,.18,1) forwards}
.roof.closed .roof-l,.roof.closed .roof-r{transform:translateX(0)}
.roof.opened .roof-l{transform:translateX(-100%)}
.roof.opened .roof-r{transform:translateX(100%)}

/* Roof top strip (always visible = account | predictions) */
.roof-top{flex-shrink:0;overflow-y:auto;overflow-x:hidden;padding:5px 8px;
  border-bottom:1px solid rgba(200,244,0,.1);max-height:44%}
/* Roof seat strip */
.roof-seats{flex-shrink:0;background:#040c16;padding:1px 0;
  border-bottom:1px solid rgba(200,244,0,.05)}
.roof-seats.bot{border-bottom:none;border-top:1px solid rgba(200,244,0,.05)}
/* Roof bottom panel (ads + stats/results — only when open, slides with panel) */
.roof-bot{flex:1;display:flex;flex-direction:column;overflow:hidden}
/* Ads INSIDE roof — only visible when roof is open (they slide with it) */
.roof-ad{height:clamp(14px,1.8vw,22px);background:#000;overflow:hidden;flex-shrink:0}
.roof-ad .adh-inner{font-size:clamp(.34rem,.56vw,.48rem)}
.roof-panel{flex:1;overflow-y:auto;overflow-x:hidden;padding:6px 8px;
  background:linear-gradient(180deg,rgba(5,10,20,.96),rgba(8,16,28,.94))}

/* Roof toggle */
.roof-tog{
  position:absolute;bottom:7px;left:50%;transform:translateX(-50%);
  z-index:60;display:flex;align-items:center;gap:5px;
  padding:4px 13px;border-radius:40px;
  background:rgba(0,0,0,.82);border:1.5px solid rgba(200,244,0,.38);
  color:var(--lime);font-family:var(--cd);font-size:.6rem;font-weight:700;
  letter-spacing:1.5px;cursor:pointer;backdrop-filter:blur(8px);pointer-events:all;
  transition:all .18s;
}
.roof-tog:hover{background:rgba(200,244,0,.12)}

/* ══ NAV ══ */
.nav{background:linear-gradient(0deg,#030810,#07111e);border-top:1px solid rgba(200,244,0,.1);
  display:grid;grid-template-columns:1fr 1fr 1fr 1fr 1fr;z-index:300}
.nb{display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:1px;cursor:pointer;border:none;background:transparent;
  border-top:2px solid transparent;padding:3px 4px;color:var(--text);position:relative;overflow:hidden}
.nb.act,.nb:hover{border-top-color:var(--lime)}
.nb .ni{font-size:clamp(.78rem,1.6vw,1rem);filter:grayscale(1)opacity(.4);transition:filter .18s}
.nb.act .ni,.nb:hover .ni{filter:grayscale(0)opacity(1)}
.nb .nl{font-family:var(--cd);font-size:clamp(.3rem,.56vw,.46rem);font-weight:700;
  letter-spacing:.7px;text-transform:uppercase;color:var(--sub);white-space:nowrap;max-width:50px;overflow:hidden;text-overflow:ellipsis}
.nb.act .nl{color:var(--lime)}
.nb .ns{font-family:var(--cd);font-size:clamp(.25rem,.44vw,.38rem);color:rgba(200,244,0,.35)}
.ctr-nb{display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:1px;cursor:pointer;border:none;border-top:2px solid var(--lime);
  background:radial-gradient(circle at 40% 35%,rgba(200,244,0,.18),rgba(0,0,0,.5));
  padding:3px 4px;color:var(--text)}
.ctr-ball{font-size:clamp(1.1rem,2.1vw,1.45rem);display:block;line-height:1.1}
.ctr-lbl{font-family:var(--cd);font-size:clamp(.3rem,.56vw,.46rem);font-weight:900;
  letter-spacing:1.5px;text-transform:uppercase;color:var(--lime)}

/* ══ POPUP ══ */
.pop-bg{position:fixed;inset:0;z-index:1999}
.pop{position:fixed;bottom:calc(var(--nav-h) + 3px);

// Generate matches for a league
function genMatches(leagueId, sport) {
  const league = Object.values(ALL_LEAGUES).flat().find(l=>l.id===leagueId);
  if(!league) return [];
  const teams = league.teams;
  const pairings = [];
  for(let i=0;i<Math.min(teams.length,8);i+=2){
    const h=teams[i],a=teams[i+1]||teams[0];
    const statuses=['live','live','finished','upcoming'];
    const st=statuses[Math.floor(i/2)] || 'finished';
    const sh=st==='upcoming'?0:Math.floor(Math.random()*4);
    const sa=st==='upcoming'?0:Math.floor(Math.random()*3);
    const mn=st==='live'?20+Math.floor(Math.random()*60):st==='finished'?90:0;
    pairings.push({
      id:`${leagueId}_${i}`,h,a,
      status:st,min:mn,
      score:{h:sh,a:sa},
      stats:{
        h:{poss:45+Math.round(Math.random()*20),shots:5+Math.floor(Math.random()*12),corners:2+Math.floor(Math.random()*7)},
        a:{poss:0,shots:3+Math.floor(Math.random()*8),corners:1+Math.floor(Math.random()*5)},
      },
      events:st!=='upcoming'?[
        {min:15+Math.floor(Math.random()*30),type:'goal',team:'h',text:`⚽ GOAL! ${h.split(' ').pop()} 22'`},
        sh>sa?{min:55+Math.floor(Math.random()*20),type:'goal',team:'h',text:`⚽ GOAL! ${h.split(' ').pop()} 58'`}:
              {min:45+Math.floor(Math.random()*20),type:'goal',team:'a',text:`⚽ GOAL! ${a.split(' ').pop()} 47'`},
      ]:[]
    });
  }
  // Fix poss
  pairings.forEach(m=>{m.stats.a.poss=100-m.stats.h.poss;});
  return pairings;
}

// ══════════════════════════════════════════════
// POINTS CALC
// ══════════════════════════════════════════════
function calcPts(ph,pa,ah,aa,modeId='full11'){
  ph=+ph;pa=+pa;ah=+ah;aa=+aa;
  if(isNaN(ph)||isNaN(pa)||isNaN(ah)||isNaN(aa))return 0;
  const m=MODES.find(x=>x.id===modeId)||MODES[4];
  if(ph===ah&&pa===aa)return m.pts.exact;
  const pr=Math.sign(ph-pa),ar=Math.sign(ah-aa);
  if(pr===ar){
    if(Math.abs(ph-ah)<=1&&Math.abs(pa-aa)<=1)return m.pts.close;
    return m.pts.result;
  }
  if(Math.abs((ph-pa)-(ah-aa))<=1)return m.pts.near;
  return 0;
}
function ptsFB(pts,modeId='full11'){
  if(pts===null)return null;
  const m=MODES.find(x=>x.id===modeId)||MODES[4];
  if(pts===m.pts.exact)return{t:'🎯 EXACT!',cls:'g'};
  if(pts===m.pts.close)return{t:'✅ Result+Score',cls:'l'};
  if(pts===m.pts.result)return{t:'🟡 Correct Result',cls:'l'};
  if(pts===m.pts.near)return{t:'🔶 Near Miss',cls:'l'};
  return{t:'❌ Miss',cls:'r'};
}

      <div style={{position:'absolute',bottom:'2%',left:0,right:0,zIndex:12,display:'flex',flexDirection:'column',gap:'clamp(2px,.6vw,8px)',alignItems:'center',padding:'0 3%'}}>
        {[...lineups.home].reverse().map((row,ri)=>(
          <div key={ri} style={{display:'flex',justifyContent:'center',gap:'clamp(4px,1.4vw,18px)',width:'100%'}}>
            {row.players.map((p,pi)=>(
              <div key={pi} className="pdot-wrap"
                onMouseEnter={e=>{setHovered(p);setTipPos({x:e.clientX,y:e.clientY});}}
                onMouseLeave={()=>setHovered(null)}>
                <div className={`pdot ${dotClass(true)}${p.card==='yellow'?' yellow':''}`}>
                  {p.goals>0?'⚽':p.pos.slice(0,2)}
                </div>
                <div className="p-nm">{p.name.split(' ').pop()}</div>
                {(isDone||isLive)&&<span className={`p-rat ${ratClass(p.rat)}`}>{p.rat}</span>}
              </div>
            ))}
          </div>
        ))}
      </div>
      {/* Away (top) */}
      <div style={{position:'absolute',top:'2%',left:0,right:0,zIndex:12,display:'flex',flexDirection:'column',gap:'clamp(2px,.6vw,8px)',alignItems:'center',padding:'0 3%'}}>
        {lineups.away.map((row,ri)=>(
          <div key={ri} style={{display:'flex',justifyContent:'center',gap:'clamp(4px,1.4vw,18px)',width:'100%'}}>
            {row.players.map((p,pi)=>(
              <div key={pi} className="pdot-wrap"
                onMouseEnter={e=>{setHovered(p);setTipPos({x:e.clientX,y:e.clientY});}}
                onMouseLeave={()=>setHovered(null)}>
                <div className={`pdot ${dotClass(false)}`}>
                  {p.goals>0?'⚽':p.pos.slice(0,2)}
                </div>
                <div className="p-nm">{p.name.split(' ').pop()}</div>
                {(isDone||isLive)&&<span className={`p-rat ${ratClass(p.rat)}`}>{p.rat}</span>}
              </div>
            ))}
          </div>
        ))}
      </div>
      {/* Ball */}
      {isLive&&<div className="sim-ball" style={{left:`${ball.x}%`,top:`${ball.y}%`,transform:'translate(-50%,-50%)'}}/>}
      {/* Events */}
      <div className="ev-feed">
        {[...match.events.slice(-2),...evts].slice(0,3).map((ev,i)=>(
          <div key={ev.id||ev.min||i} className={`ev-item${ev.type==='goal'?' goal':ev.type==='card'?' card':''}`}>
            {ev.text||ev.txt}
          </div>
        ))}
      </div>
      {/* Player tooltip */}
      {hovered&&(
        <div className="p-tip" style={{left:tipPos.x+10,top:Math.min(tipPos.y-60,window.innerHeight-160)}}>
          <div className="pt-n">{hovered.name}</div>
          <div className="pt-r">{hovered.pos}</div>
          <div className="pt-row"><span className="pt-k">Rating</span><span className="pt-v">{hovered.rat}</span></div>
          <div className="pt-row"><span className="pt-k">Goals</span><span className="pt-v">{hovered.goals}</span></div>
          <div className="pt-row"><span className="pt-k">Assists</span><span className="pt-v">{hovered.assists}</span></div>
        </div>
      )}
    </div>
  );
};

const Popup=({items,selected,onSelect,onClose,anchorRef})=>{
  const style={};
  if(anchorRef?.current){const r=anchorRef.current.getBoundingClientRect();style.left=r.left;style.width=Math.max(r.width,155);}
  return <>
    <div className="pop-bg" onClick={onClose}/>
    <div className="pop" style={style}>
      {items.map(it=>(
        <div key={it.id} className={`pop-item${selected===it.id?' sel':''}`} onClick={()=>{onSelect(it.id);onClose();}}>
          <span style={{fontSize:'.85rem',width:18,textAlign:'center',flexShrink:0}}>{it.icon}</span>
          <div><div>{it.lbl}</div>{it.sub&&<span className="pop-sub">{it.sub}</span>}</div>
          {selected===it.id&&<span style={{marginLeft:'auto',color:'var(--lime)'}}>✓</span>}
        </div>
      ))}
    </div>
  </>;
};

// RIGHT PANEL — TOP: Predictions / BOT: Results
// ══════════════════════════════════════════════
const RightPanelTop=({matches,preds,locked,onPred,onLock,onSelect,selMatch,selMode})=>(
  <div>
    <div className="sec-hd"><i className="fas fa-crosshairs"/> Your Predictions</div>
    {matches.map(m=>{
      const k=`match_${m.id}`;
      const p=preds[k]||{h:'',a:''};
      const isl=locked[k];
      const isLive=m.status==='live';
      const isAct=selMatch===m.id;
      const pts=(m.status==='finished'||isLive)&&p.h!==''&&p.a!==''?calcPts(+p.h,+p.a,m.score.h,m.score.a,selMode):null;
      const fb=ptsFB(pts,selMode);
      return (
        <div key={m.id} className={`match-pred${isAct?' act':''}`} onClick={()=>onSelect(m.id)}>
          <div className="mp-header">
            <span className={`mp-time${isLive?' live':''}`}>
              {isLive?`${m.min}'`:m.status==='finished'?'FT':'vs'}
            </span>
            {isLive&&<div className="live-pill"><div className="live-dot"/>LIVE</div>}
            {m.status==='upcoming'&&<span style={{fontFamily:'Barlow Condensed',fontSize:'.44rem',color:'rgba(255,255,255,.3)'}}>UPCOMING</span>}
            {m.status==='finished'&&<span style={{fontFamily:'Barlow Condensed',fontSize:'.44rem',color:'rgba(200,244,0,.4)'}}>FT</span>}
          </div>
          <div className="mp-teams">
            <span className="mp-tnm">{m.h}</span>
            <span className={`mp-score${isLive?' live':''}`}>{m.score.h}–{m.score.a}</span>
            <span className="mp-tnm aw">{m.a}</span>
          </div>
          <div className="pred-row">
            <div style={{display:'flex',alignItems:'center',gap:3}}>
              <span className="pred-lbl">PRED:</span>
              <div className="pred-inps">
                <input className="sinp" type="number" min="0" max="30" value={p.h} disabled={isl}
                  onClick={e=>e.stopPropagation()} onChange={e=>{e.stopPropagation();onPred(k,{...p,h:e.target.value});}} placeholder="–"/>
                <span className="ssep">:</span>
                <input className="sinp" type="number" min="0" max="30" value={p.a} disabled={isl}
                  onClick={e=>e.stopPropagation()} onChange={e=>{e.stopPropagation();onPred(k,{...p,a:e.target.value});}} placeholder="–"/>
              </div>
            </div>
            <div style={{display:'flex',alignItems:'center',gap:4}}>
              {pts!==null&&fb&&<span className={`pts-badge ${fb.cls}`}>+{pts}pts</span>}
              <button className={`lbtn ${isl?'on':'off'}`} onClick={e=>{e.stopPropagation();onLock(k,m);}}>{isl?'🔒':'🔓'}</button>
            </div>
          </div>
          {fb&&<div style={{fontFamily:'Barlow Condensed',fontSize:'.44rem',textAlign:'center',marginTop:2,color:'rgba(255,255,255,.4)'}}>{fb.t}</div>}
        </div>
      );
    })}
  </div>
);
const RightPanelBot=({matches,preds,selMode,selLeague})=>{
  const leagueObj=Object.values(ALL_LEAGUES).flat().find(l=>l.id===selLeague)||{lbl:'League',icon:'🏆'};
  const done=matches.filter(m=>m.status==='finished'||m.status==='live');
  return (
    <div>
      <div className="sec-hd">{leagueObj.icon} Actual Results</div>
      {done.length===0&&<div style={{fontFamily:'Barlow Condensed',fontSize:'.58rem',color:'rgba(255,255,255,.3)',textAlign:'center',padding:'10px'}}>No results yet</div>}
      {done.map(m=>{
        const k=`match_${m.id}`;
        const p=preds[k];
        const pts=p&&p.h!==''&&p.a!==''?calcPts(+p.h,+p.a,m.score.h,m.score.a,selMode):null;
        const fb=ptsFB(pts,selMode);
        return (
          <div key={m.id} className="result-card">
            <div className="rc-head">
              <span className="rc-lg">{leagueObj.lbl}</span>
              <span className="rc-ft">{m.status==='live'?`🔴 ${m.min}'`:'✅ FT'}</span>
            </div>
            <div className="rc-teams">
              <span className="rc-tnm">{m.h}</span>
              <span className="rc-score">{m.score.h}–{m.score.a}</span>
              <span className="rc-tnm aw">{m.a}</span>
            </div>
            {p&&p.h!==''&&<div className={`rc-pred ${pts===0?'miss':pts&&pts>=(MODES.find(mm=>mm.id===selMode)?.pts.close||14)?'hit':'close'}`}>
              Your pred: {p.h}–{p.a} {fb?`· ${fb.t}`:''} {pts!==null?`+${pts}pts`:''}
            </div>}
          </div>
        );
      })}
    </div>
  );
};

// APP
// ══════════════════════════════════════════════
function App(){
  const [roofState,setRoofState]=useState('opened');
  const [selSport,setSelSport]=useState('football');
  const [selLeague,setSelLeague]=useState('epl');
  const [selMode,setSelMode]=useState('full11');
  const [selMini,setSelMini]=useState('pub');
  const [openPop,setOpenPop]=useState(null);
  const [selMatch,setSelMatch]=useState(null);
  const [preds,setPreds]=useState({});
  const [locked,setLocked]=useState({});
  const [pts,setPts]=useState(134);
  const [toasts,setToasts]=useState([]);
  const [ptsAnim,setPtsAnim]=useState(null);
  const [selGW,setSelGW]=useState(32);
  const [matches,setMatches]=useState(()=>genMatches('epl','football'));
  const gwRef=useRef(null);
  const sportRef=useRef(null);
  const leagueRef=useRef(null);
  const modeRef=useRef(null);
  const miniRef=useRef(null);

  // Live score ticking
  useEffect(()=>{
    const t=setInterval(()=>{
      setMatches(ms=>ms.map(m=>{
        if(m.status!=='live')return m;
        const newMin=Math.min(90,m.min+1);
        let ns={...m.score};
        if(Math.random()<.022){ns={...ns,[Math.random()<.55?'h':'a']:ns[Math.random()<.55?'h':'a']+(1)};}
        return{...m,min:newMin,score:ns,status:newMin>=90?'finished':m.status};
      }));
    },1500);
    return()=>clearInterval(t);
  },[]);

  // Scroll GW bar to active
  useEffect(()=>{
    if(gwRef.current){
      const el=gwRef.current.querySelector('.gw-item.act');
      if(el)el.scrollIntoView({behavior:'smooth',inline:'center',block:'nearest'});
    }
  },[selGW]);

  const toggleRoof=()=>{
    if(roofState==='closed'||roofState==='closing'){setRoofState('opening');setTimeout(()=>setRoofState('opened'),620);}
    else{setRoofState('closing');setTimeout(()=>setRoofState('closed'),520);}
  };
  const roofOpen=roofState==='opened'||roofState==='opening';

  const addToast=(msg,col='var(--lime)')=>{
    const id=Date.now()+Math.random();
    setToasts(t=>[...t,{id,msg,col}]);
    setTimeout(()=>setToasts(t=>t.filter(x=>x.id!==id)),2500);
  };

  const handlePred=(k,v)=>setPreds(p=>({...p,[k]:v}));
  const handleLock=(k,match)=>{
    if(locked[k]){setLocked(l=>({...l,[k]:false}));addToast('🔓 Unlocked','var(--gold)');return;}
    const p2=preds[k];
    if(!p2||p2.h===''||p2.a===''){addToast('⚠️ Enter a score first!','#ff6b35');return;}
    setLocked(l=>({...l,[k]:true}));
    if(match.status!=='upcoming'){
      const earned=calcPts(+p2.h,+p2.a,match.score.h,match.score.a,selMode);
      if(earned>0){setPts(p=>p+earned);setPtsAnim(earned);setTimeout(()=>setPtsAnim(null),1200);addToast(`${ptsFB(earned,selMode)?.t} +${earned} pts`);}
      else addToast('🔒 Locked – 0 pts','var(--red)');
    } else addToast('🔒 Prediction locked!');
  };

  const handleSelectMatch=(id)=>setSelMatch(p=>p===id?null:id);

  const handleLeagueChange=(id)=>{
    setSelLeague(id);
    setMatches(genMatches(id,selSport));
    setSelMatch(null);
    setLocked({});setPreds({});
    addToast(`League: ${Object.values(ALL_LEAGUES).flat().find(l=>l.id===id)?.lbl||id}`);
  };
  const handleSportChange=(id)=>{
    setSelSport(id);
    const lgs=ALL_LEAGUES[id]||[];
    const firstLg=lgs[0]?.id||'epl';
    setSelLeague(firstLg);
    setMatches(genMatches(firstLg,id));
    setSelMatch(null);setLocked({});setPreds({});
    addToast(`Sport: ${SPORTS.find(s=>s.id===id)?.lbl||id}`);
  };

  const leagues=ALL_LEAGUES[selSport]||[];
  const curSport=SPORTS.find(s=>s.id===selSport)||SPORTS[0];
  const curLeague=leagues.find(l=>l.id===selLeague)||leagues[0]||{lbl:'League',icon:'🏆'};
  const curMode=MODES.find(m=>m.id===selMode)||MODES[4];
  const curMini=MINI_LEAGUES.find(m=>m.id===selMini)||MINI_LEAGUES[0];
  const selMatchObj=selMatch?matches.find(m=>m.id===selMatch):null;
  const seatCols=Math.min(40,Math.floor((window.innerWidth*.44)/9));
  const courtType=curSport.court||'football';

  return (
    <div className="app">
      {/* HEADER */}
      <div className="hdr">
        <div className="pts-pill">
          <span className="pts-v">{pts}</span>
          <span className="pts-l">PTS</span>
        </div>
        {ptsAnim&&<div className="pts-pop">+{ptsAnim}</div>}
        <div className="brand">⚽ Gaffer's Pick</div>
        <div className="s-tag">2025/26</div>
      </div>

      {/* GW SCROLL BAR */}
      <div className="gwbar" ref={gwRef}>
        {GW_DATA.map((gw,i)=>{
          const maxPts=72,pct=gw.pts?Math.round((gw.pts/maxPts)*100):0;
          const cls=gw.pts>=60?'hi':gw.pts>=40?'mid':'lo';
          return (
            <React.Fragment key={gw.gw}>
              <div className={`gw-item${selGW===gw.gw?' act':''}`} onClick={()=>{setSelGW(gw.gw);if(gw.status!=='future')addToast(`GW${gw.gw}: +${gw.pts||0}pts`);}}>
                {gw.status==='live'&&<div className="live-pill" style={{marginBottom:1}}><div className="live-dot"/>LIVE</div>}
                <span className="gw-num">GW{gw.gw}</span>
                {gw.pts!==null&&<span className={`gw-pts ${cls}`}>+{gw.pts}</span>}
                {gw.pts===null&&<span className="gw-pts lo">—</span>}
                {gw.pts!==null&&<div className="gw-bar-wrap"><div className="gw-bar-fill" style={{'--fw':`${pct}%`,width:`${pct}%`}}/></div>}
              </div>
              {i<GW_DATA.length-1&&<div className="gw-sep"/>}
            </React.Fragment>
          );
        })}
      </div>

      {/* STADIUM */}
      <div className="stadium">

        {/* LEFT SIDE PANEL */}
        <div className={`side-panel l${!roofOpen?' hide':''}`}>
          {/* TOP: Account info (always shown when panel visible) */}
          <div className="sp-top">
            <LeftPanelTop pts={pts} gw={selGW}/>
          </div>
          {/* BOT: League stats (shown when roof open) */}
          <div className={`sp-bot${!roofOpen?' hide-bot':''}`}>
            <LeftPanelBot selLeague={selLeague} selSport={selSport} selMode={selMode}/>
          </div>
        </div>

        {/* LEFT STAND */}
        <div className="stand" style={{display:'flex',flexDirection:'row'}}>
          <div style={{flex:1,display:'flex',flexDirection:'column',overflow:'hidden'}}>
            <AdBoardH ads={ADS_H.slice(0,6)}/>
            <StandSeats rows={18} cols={8} litRate={.4}/>
            <AdBoardH ads={ADS_H.slice(4,10)} reverse={true}/>
          </div>
          <AdBoardV ads={ADS_V}/>
        </div>

        {/* PITCH / COURT */}
        <div className="pitch-col">
          <AdBoardH ads={ADS_H}/>
          <div className="seat-strip">
            <SeatRowH cols={seatCols} litRate={.44} wave={true}/>
            <SeatRowH cols={seatCols} litRate={.38} wave={true}/>
          </div>
          <div className={`court ${courtType}`} style={{position:'relative',overflow:'hidden'}}>
            <CourtView match={selMatchObj} sport={selSport} roofOpen={roofOpen}/>

            {/* ROOF */}
            <div className={`roof ${roofState}`}>
              {/* LEFT ROOF PANEL */}
              <div className="roof-l">
                {/* TOP: Account (visible when closed) */}
                <div className="roof-top">
                  <LeftPanelTop pts={pts} gw={selGW}/>
                </div>
                <div className="roof-seats">
                  <SeatRowH cols={Math.floor(seatCols/2)} litRate={.42}/>
                </div>
                {/* BOT: Stats (ads + content, visible when open/slides with panel) */}
                <div className="roof-bot">
                  <AdBoardH ads={ADS_H} reverse={false}/>
                  <div className="roof-panel">
                    <LeftPanelBot selLeague={selLeague} selSport={selSport} selMode={selMode}/>
                  </div>
                  <AdBoardH ads={ADS_H.slice(5)} reverse={true}/>
                </div>
                <div className="roof-seats bot">
                  <SeatRowH cols={Math.floor(seatCols/2)} litRate={.36}/>
                </div>
              </div>

              {/* RIGHT ROOF PANEL */}
              <div className="roof-r">
                {/* TOP: Predictions (visible when closed) */}
                <div className="roof-top">
                  <RightPanelTop matches={matches} preds={preds} locked={locked}
                    onPred={handlePred} onLock={handleLock}
                    onSelect={handleSelectMatch} selMatch={selMatch} selMode={selMode}/>
                </div>
                <div className="roof-seats">
                  <SeatRowH cols={Math.floor(seatCols/2)} litRate={.42}/>
                </div>
                {/* BOT: Results (ads + content, visible when open) */}
                <div className="roof-bot">
                  <AdBoardH ads={[...ADS_H].reverse()} reverse={true}/>
                  <div className="roof-panel">
                    <RightPanelBot matches={matches} preds={preds} selMode={selMode} selLeague={selLeague}/>
                  </div>
                  <AdBoardH ads={ADS_H.slice(3)} reverse={false}/>
                </div>
                <div className="roof-seats bot">
                  <SeatRowH cols={Math.floor(seatCols/2)} litRate={.36}/>
                </div>
              </div>

              <button className="roof-tog" onClick={toggleRoof}>
                <i className={`fas fa-${roofOpen?'chevron-down':'chevron-up'}`}/>
                {roofOpen?'Close · View Court':'Open · Stats & Picks'}
              </button>
            </div>
          </div>
          <div className="seat-strip">
            <SeatRowH cols={seatCols} litRate={.4}/>
            <SeatRowH cols={seatCols} litRate={.36}/>
          </div>
          <AdBoardH ads={[...ADS_H].reverse()} reverse={true}/>
        </div>

        {/* RIGHT STAND */}
        <div className="stand r" style={{display:'flex',flexDirection:'row'}}>
          <AdBoardV ads={ADS_V} reverse={true}/>
          <div style={{flex:1,display:'flex',flexDirection:'column',overflow:'hidden'}}>
            <AdBoardH ads={ADS_H.slice(3,9)} reverse={true}/>
            <StandSeats rows={18} cols={8} litRate={.4}/>
            <AdBoardH ads={ADS_H.slice(0,6)}/>
          </div>
        </div>

        {/* RIGHT SIDE PANEL */}
        <div className={`side-panel r${!roofOpen?' hide':''}`}>
          <div className="sp-top">
            <RightPanelTop matches={matches} preds={preds} locked={locked}
              onPred={handlePred} onLock={handleLock}
              onSelect={handleSelectMatch} selMatch={selMatch} selMode={selMode}/>
          </div>
          <div className={`sp-bot${!roofOpen?' hide-bot':''}`}>
            <RightPanelBot matches={matches} preds={preds} selMode={selMode} selLeague={selLeague}/>
          </div>
        </div>
      </div>

      {/* NAV */}
      <div className="nav">
        <button ref={sportRef} className={`nb${openPop==='sport'?' act':''}`}
          onClick={()=>setOpenPop(o=>o==='sport'?null:'sport')}>
          <span className="ni">{curSport.ball}</span>
          <span className="nl">{curSport.lbl}</span>
          <span className="ns">Sport ▲</span>
        </button>
        <button ref={leagueRef} className={`nb${openPop==='league'?' act':''}`}
          onClick={()=>setOpenPop(o=>o==='league'?null:'league')}>
          <span className="ni">{curLeague.icon}</span>
          <span className="nl">{curLeague.lbl}</span>
          <span className="ns">League ▲</span>
        </button>
        <button className="ctr-nb" onClick={toggleRoof}>
          <span className="ctr-ball">{curSport.ball}</span>
          <span className="ctr-lbl">{roofOpen?'▼ Court':'▲ Stats'}</span>
        </button>
        <button ref={modeRef} className={`nb${openPop==='mode'?' act':''}`}
          onClick={()=>setOpenPop(o=>o==='mode'?null:'mode')}>
          <span className="ni">{curMode.icon}</span>
          <span className="nl">{curMode.lbl}</span>
          <span className="ns">Mode ▲</span>
        </button>
        <button ref={miniRef} className={`nb${openPop==='mini'?' act':''}`}
          onClick={()=>setOpenPop(o=>o==='mini'?null:'mini')}>
          <span className="ni">{curMini.icon}</span>
          <span className="nl">{curMini.lbl}</span>
          <span className="ns">Mini-L ▲</span>
        </button>
      </div>

      {/* POPUPS */}
      {openPop==='sport'&&<Popup items={SPORTS} selected={selSport} onSelect={handleSportChange} onClose={()=>setOpenPop(null)} anchorRef={sportRef}/>}
      {openPop==='league'&&<Popup items={leagues} selected={selLeague} onSelect={handleLeagueChange} onClose={()=>setOpenPop(null)} anchorRef={leagueRef}/>}
      {openPop==='mode'&&<Popup items={MODES.map(m=>({id:m.id,icon:m.icon,lbl:m.lbl,sub:m.desc}))} selected={selMode} onSelect={id=>{setSelMode(id);addToast(`Mode: ${MODES.find(m=>m.id===id)?.lbl}`);}} onClose={()=>setOpenPop(null)} anchorRef={modeRef}/>}
      {openPop==='mini'&&<Popup items={MINI_LEAGUES.map(m=>({id:m.id,icon:m.icon,lbl:m.lbl,sub:m.sub}))} selected={selMini} onSelect={id=>{setSelMini(id);addToast(MINI_LEAGUES.find(m=>m.id===id)?.lbl||id);}} onClose={()=>setOpenPop(null)} anchorRef={miniRef}/>}

      {/* TOASTS */}
      {toasts.map(t=>(
        <div key={t.id} className="toast" style={{background:'linear-gradient(90deg,#050d14,#0a1c0e)',border:`1.5px solid ${t.col}`,color:t.col}}>{t.msg}</div>
      ))}
    </div>
  );
}

const rootEl=document.getElementById('root');
if(rootEl){try{ReactDOM.createRoot(rootEl).render(<App/>);}catch(e){console.error(e);rootEl.innerHTML='<div style="color:#c8f400;padding:2rem;text-align:center">Error. See console.</div>';}}
</script>
</body>
</html>
