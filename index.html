<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>The Gaffer's Pick | Pitch · 6 Leagues · Major Awards</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@400;600;700&family=Barlow:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; }

    /* ----- FOOTBALL PITCH BACKGROUND ----- */
    body {
      background: linear-gradient(145deg, #1a6d2f 0%, #0f4a1f 100%);
      font-family: 'Barlow', sans-serif;
      min-height: 100vh;
      position: relative;
      overflow-x: hidden;
    }
    /* white line patterns */
    body::before {
      content: '';
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background-image: 
        repeating-linear-gradient(90deg, rgba(255,255,255,0.3) 0px, rgba(255,255,255,0.3) 2px, transparent 2px, transparent 40px),
        repeating-linear-gradient(0deg, rgba(255,255,255,0.2) 0px, rgba(255,255,255,0.2) 2px, transparent 2px, transparent 40px);
      pointer-events: none;
      z-index: 0;
    }
    /* center circle */
    body::after {
      content: '';
      position: fixed;
      top: 50%;
      left: 50%;
      width: 280px;
      height: 280px;
      border: 3px solid rgba(255,255,255,0.5);
      border-radius: 50%;
      transform: translate(-50%, -50%);
      pointer-events: none;
      z-index: 0;
    }
    .half-line {
      position: fixed;
      top: 0;
      bottom: 0;
      left: 50%;
      width: 3px;
      background: rgba(255,255,255,0.4);
      transform: translateX(-50%);
      pointer-events: none;
      z-index: 0;
    }
    /* main overlay */
    .pitch-overlay {
      position: relative;
      z-index: 2;
      background: rgba(0, 0, 0, 0.4);
      backdrop-filter: blur(1.5px);
      min-height: 100vh;
      padding-bottom: 3rem;
    }

    /* NAV */
    nav {
      background: rgba(0, 20, 5, 0.85);
      backdrop-filter: blur(12px);
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0 2rem;
      height: 70px;
      border-bottom: 2px solid #b5f028;
      flex-wrap: wrap;
    }
    .logo-text { font-family: 'Bebas Neue', sans-serif; font-size: 2rem; background: linear-gradient(135deg, #b5f028, #e0ff80); -webkit-background-clip: text; background-clip: text; color: transparent; }
    .card-stack { background: #0a2a12aa; padding: 6px 16px; border-radius: 40px; display: flex; gap: 12px; font-weight: bold; }
    .yellow-badge { color: #f5d742; }
    .red-badge { color: #e34d4d; }
    .gw-badge { background: #b5f028; color: #0a2a12; padding: 5px 18px; border-radius: 40px; font-weight: bold; }
    .btn-login { background: transparent; border: 1.5px solid #b5f028; color: #b5f028; border-radius: 40px; padding: 6px 24px; cursor: pointer; transition: 0.2s; }

    /* SCROLLABLE GW STRIP */
    .gw-strip { background: rgba(0,0,0,0.7); padding: 10px 0; overflow-x: auto; white-space: nowrap; border-top: 1px solid #b5f028; border-bottom: 1px solid #b5f028; }
    .gw-container { display: inline-flex; gap: 8px; padding: 0 1rem; }
    .gw-btn { background: #1f3a24; border: 1px solid #5a8f6a; color: #ddd; font-family: 'Barlow Condensed'; font-weight: bold; padding: 6px 14px; border-radius: 40px; cursor: pointer; font-size: 0.8rem; }
    .gw-btn.active-gw { background: #b5f028; color: #0a2a12; border-color: #b5f028; box-shadow: 0 0 8px #b5f028; }

    /* LEAGUE BADGES ROW (small, highlight on select) */
    .league-strip {
      display: flex;
      justify-content: center;
      gap: 20px;
      flex-wrap: wrap;
      padding: 1.5rem 1rem 0.5rem;
    }
    .league-badge-card {
      background: rgba(0, 0, 0, 0.5);
      backdrop-filter: blur(4px);
      border-radius: 20px;
      padding: 8px 12px;
      text-align: center;
      cursor: pointer;
      transition: 0.2s;
      border: 1px solid #3e6b48;
      min-width: 100px;
    }
    .league-badge-card.active-league {
      border: 2px solid #b5f028;
      background: rgba(181, 240, 40, 0.2);
      box-shadow: 0 0 12px #b5f028;
      transform: scale(1.02);
    }
    .league-badge-img {
      width: 48px;
      height: 48px;
      object-fit: contain;
      filter: drop-shadow(0 2px 2px black);
    }
    .league-name-sm { font-size: 0.7rem; font-weight: bold; margin-top: 4px; color: #e0f0e0; }

    /* CHAMPION PICKER & POINTS (below badges) */
    .champion-panel {
      background: rgba(0, 0, 0, 0.5);
      backdrop-filter: blur(8px);
      border-radius: 28px;
      margin: 0 1rem 1rem;
      padding: 1rem;
      display: flex;
      flex-wrap: wrap;
      justify-content: space-around;
      gap: 16px;
    }
    .champion-card {
      background: #0f2a1acc;
      border-radius: 20px;
      padding: 10px;
      min-width: 150px;
      flex: 1;
      text-align: center;
      border: 1px solid #5a8f6a;
    }
    .champion-card select { background: #0a2a12; color: white; border-radius: 30px; padding: 6px; margin-top: 6px; width: 90%; border: 1px solid #b5f028; }
    .champion-card .pts-info { font-size: 0.8rem; margin-top: 6px; color: #b5f028; }
    .lock-champ-btn { background: none; border: 1px solid #b5f028; border-radius: 30px; padding: 4px 12px; margin-top: 6px; cursor: pointer; font-size: 0.7rem; }
    .lock-champ-btn.locked { background: #b5f028; color: black; }

    /* MAJOR AWARDS SECTION */
    .awards-section {
      background: rgba(0, 0, 0, 0.6);
      border-radius: 28px;
      margin: 1rem;
      padding: 1rem;
    }
    .awards-title { font-family: 'Bebas Neue'; letter-spacing: 2px; margin-bottom: 12px; color: #ffd966; }
    .awards-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 16px;
      justify-content: center;
    }
    .award-card {
      background: #1a3a28aa;
      border-radius: 24px;
      padding: 12px;
      flex: 1;
      min-width: 180px;
      text-align: center;
      border: 1px solid gold;
    }
    .award-card select { background: #0a2a12; border-radius: 40px; padding: 6px; margin: 8px 0; width: 90%; color: white; }
    .award-points { font-size: 0.8rem; color: #f5c542; }
    .lock-award-btn { background: none; border: 1px solid #ffcc44; border-radius: 30px; padding: 4px 12px; cursor: pointer; margin-top: 6px; }

    /* TAB AND MATCH GRID */
    .tab-bar { display: flex; gap: 4px; padding: 0 2rem; border-bottom: 1px solid #3e6b48; margin-top: 1rem; }
    .tab { padding: 8px 20px; font-family: 'Barlow Condensed'; font-weight: 700; cursor: pointer; color: #c0e0c0; }
    .tab.active { color: #b5f028; border-bottom: 2px solid #b5f028; }
    .matches-grid { display: flex; flex-direction: column; gap: 12px; padding: 1rem 2rem; }
    .match-card { background: rgba(10, 30, 18, 0.85); border-radius: 20px; display: grid; grid-template-columns: 1fr auto 1fr auto; align-items: center; gap: 1rem; padding: 1rem; border: 1px solid #4a7c58; }
    .score-input { width: 60px; height: 48px; background: #0a2a12; border-radius: 16px; text-align: center; font-size: 1.6rem; color: #b5f028; border: 1px solid #6e9f7a; }
    .btn-submit { background: linear-gradient(95deg, #b5f028, #9fda1a); border: none; font-family: 'Bebas Neue'; padding: 10px 24px; border-radius: 60px; cursor: pointer; }
    .card-log { background: #0e2a18cc; border-radius: 24px; padding: 1rem; margin: 1rem; }

    @media (max-width: 800px) {
      .match-card { grid-template-columns: 1fr; gap: 0.5rem; }
      .champion-card { min-width: 130px; }
    }
  </style>
</head>
<body>
<div class="half-line"></div>
<div class="pitch-overlay">
<nav>
  <div><div class="logo-text"><i class="fas fa-futbol"></i> The Gaffer's Pick</div><div>PITCH · 6 LEAGUES · MAJOR AWARDS</div></div>
  <div style="display:flex; gap:1rem; align-items:center">
    <div class="card-stack"><i class="fas fa-square" style="color:#f5d742"></i> <span id="yellowCount">0</span> | <i class="fas fa-square" style="color:#e34d4d"></i> <span id="redCount">0</span></div>
    <div class="gw-badge" id="globalGWbadge">GW 1</div>
    <button class="btn-login" onclick="openModal()">Sign In</button>
  </div>
</nav>

<!-- Scrollable Gameweek 1-38 -->
<div class="gw-strip" id="gwStrip"><div class="gw-container" id="gwContainer"></div></div>

<!-- LEAGUE BADGES (small, highlight when selected) -->
<div class="league-strip" id="leagueStrip"></div>

<!-- CHAMPION PICKER & POINTS DEDUCTION (directly below each league) -->
<div class="champion-panel" id="championPanel"></div>

<!-- MAJOR AWARDS SECTION (Ballon d'Or, UCL, Euro/WC) -->
<div class="awards-section">
  <div class="awards-title"><i class="fas fa-star-of-life"></i> MAJOR FOOTBALL AWARDS · PREDICT & EARN BONUS</div>
  <div class="awards-grid" id="awardsGrid"></div>
</div>

<!-- TABS -->
<div class="tab-bar">
  <div class="tab active" data-tab="predict">⚡ Predictions</div>
  <div class="tab" data-tab="cards">🃏 Discipline</div>
  <div class="tab" data-tab="leaderboard">📊 Leaderboard</div>
</div>

<div id="panel-predict" class="panel"></div>
<div id="panel-cards" class="panel" style="display:none"></div>
<div id="panel-leaderboard" class="panel" style="display:none"></div>

<div class="modal-overlay" id="modalOverlay" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.8); backdrop-filter:blur(6px); align-items:center; justify-content:center; z-index:200;">
  <div style="background:#0f2a1a; padding:2rem; border-radius:32px; width:90%; max-width:400px; border:1px solid #b5f028;"><h2>Welcome Gaffer</h2><input type="text" id="demoUser" placeholder="Username" style="width:100%; margin:1rem 0; padding:12px; background:#0a1812; border:1px solid #3e6b48; color:white; border-radius:40px;"><button onclick="fakeLogin()" class="btn-submit" style="width:100%">Enter Pitch</button><button onclick="closeModal()" style="margin-top:1rem; background:none; border:none; color:#8aa;">Close</button></div>
</div>
</div>

<script>
  // ---------- 6 LEAGUES (including World Cup) ----------
  const leaguesData = {
    epl: { name: "Premier League", badge: "https://upload.wikimedia.org/wikipedia/en/thumb/f/f2/Premier_League_Logo.svg/120px-Premier_League_Logo.svg.png", fullName: "Premier League", teams: ["Arsenal","Man City","Liverpool","Chelsea","Tottenham"] },
    liga: { name: "La Liga", badge: "https://upload.wikimedia.org/wikipedia/commons/thumb/0/0f/LaLiga_logo.svg/120px-LaLiga_logo.svg.png", fullName: "La Liga", teams: ["Real Madrid","Barcelona","Atletico","Athletic","Real Betis"] },
    serie: { name: "Serie A", badge: "https://upload.wikimedia.org/wikipedia/commons/thumb/e/e7/Serie_A_logo_2022.svg/120px-Serie_A_logo_2022.svg.png", fullName: "Serie A", teams: ["Inter Milan","Juventus","AC Milan","Napoli","Lazio"] },
    bundes: { name: "Bundesliga", badge: "https://upload.wikimedia.org/wikipedia/commons/thumb/d/df/Bundesliga_logo.svg/120px-Bundesliga_logo.svg.png", fullName: "Bundesliga", teams: ["Bayern","Dortmund","Leverkusen","Leipzig","Stuttgart"] },
    ligue: { name: "Ligue 1", badge: "https://upload.wikimedia.org/wikipedia/commons/thumb/c/c3/Ligue_1_Uber_Eats_logo.svg/120px-Ligue_1_Uber_Eats_logo.svg.png", fullName: "Ligue 1", teams: ["PSG","Monaco","Marseille","Lyon","Lens"] },
    worldcup: { name: "World Cup", badge: "https://upload.wikimedia.org/wikipedia/en/thumb/6/6a/FIFA_World_Cup_Logo_2026.png/120px-FIFA_World_Cup_Logo_2026.png", fullName: "FIFA World Cup", teams: ["Brazil","Argentina","France","Germany","Spain","England"] }
  };

  let currentLeague = "epl";
  let currentGW = 1;
  let leagueScores = { epl: 0, liga: 0, serie: 0, bundes: 0, ligue: 0, worldcup: 0 };
  let championPicks = { epl: "", liga: "", serie: "", bundes: "", ligue: "", worldcup: "" };
  let lockState = {}; // { league: { locked, lockGW } }
  let penaltyPoints = { epl: 0, liga: 0, serie: 0, bundes: 0, ligue: 0, worldcup: 0 };

  // Major awards state
  const awardsList = [
    { id: "ballon", name: "Ballon d'Or", options: ["Messi","Ronaldo","Haaland","Mbappé","Vinicius"], points: 150, locked: false, lockGW: null, pick: "" },
    { id: "ucl", name: "UCL Winner", options: ["Real Madrid","Man City","Bayern","PSG","Inter"], points: 120, locked: false, lockGW: null, pick: "" },
    { id: "euro", name: "Euro / World Cup Winner", options: ["France","Spain","Germany","England","Italy"], points: 100, locked: false, lockGW: null, pick: "" }
  ];

  // match data for all leagues and GWs (1-38)
  let matchesDB = {};
  function initMatches() {
    const baseMatches = {
      epl: [{ home:"Arsenal", away:"Man City" },{ home:"Liverpool", away:"Chelsea" },{ home:"Man Utd", away:"Tottenham" },{ home:"Newcastle", away:"Aston Villa" },{ home:"Brighton", away:"West Ham" }],
      liga: [{ home:"Real Madrid", away:"Barcelona" },{ home:"Atletico", away:"Sevilla" },{ home:"Athletic", away:"Villarreal" },{ home:"Real Betis", away:"Real Soc." },{ home:"Valencia", away:"Osasuna" }],
      serie: [{ home:"Inter Milan", away:"Juventus" },{ home:"AC Milan", away:"Napoli" },{ home:"Lazio", away:"Roma" },{ home:"Atalanta", away:"Fiorentina" },{ home:"Torino", away:"Bologna" }],
      bundes: [{ home:"Bayern", away:"Dortmund" },{ home:"Leverkusen", away:"Leipzig" },{ home:"Stuttgart", away:"Gladbach" },{ home:"Frankfurt", away:"Freiburg" },{ home:"Wolfsburg", away:"Hoffenheim" }],
      ligue: [{ home:"PSG", away:"Monaco" },{ home:"Marseille", away:"Lyon" },{ home:"Lens", away:"Rennes" },{ home:"Lille", away:"Nice" },{ home:"Nantes", away:"Strasbourg" }],
      worldcup: [{ home:"Brazil", away:"Argentina" },{ home:"France", away:"Spain" },{ home:"Germany", away:"England" },{ home:"Portugal", away:"Netherlands" },{ home:"Belgium", away:"Croatia" }]
    };
    for(let l of Object.keys(leaguesData)) {
      matchesDB[l] = {};
      for(let gw=1; gw<=38; gw++) matchesDB[l][gw] = baseMatches[l].map(m => ({ ...m, hPred: "", aPred: "" }));
    }
  }
  initMatches();

  // ----- CARDS & SUSPENSION -----
  let userCards = { yellows: 0, reds: 0, cardHistory: [] };
  let isSuspended = false;
  function giveYellowCard(reason) { if(isSuspended) return; userCards.yellows++; userCards.cardHistory.push({ gw: currentGW, reason, type:"yellow" }); showToast(`🟡 YELLOW! ${reason}`, "#f5d742"); updateCardUI(); let recent = userCards.cardHistory.filter(c=>c.type==="yellow" && (currentGW-c.gw)<=3).length; if(recent>=2 && userCards.reds===0) giveRedCard("2 yellows in 3 GWs"); }
  function giveRedCard(reason) { if(userCards.reds>0) return; userCards.reds++; userCards.cardHistory.push({ gw: currentGW, reason, type:"red" }); let deduction = 20; for(let k of Object.keys(leagueScores)) leagueScores[k] = Math.max(0, leagueScores[k]-deduction/6); updateScoreDisplay(); isSuspended=true; showToast(`🔴 RED! -20pts. Suspended next GW. ${reason}`, "#e34d4d"); updateCardUI(); userCards.yellows=0; }
  function updateCardUI() { document.getElementById("yellowCount").innerText = userCards.yellows; document.getElementById("redCount").innerText = userCards.reds; }
  function checkRiskyPrediction(h,a) { let margin = Math.abs(parseInt(h||0)-parseInt(a||0)); if(margin>=4) giveYellowCard(`Risky margin ${h}-${a}`); }
  function showToast(msg, color="#b5f028") { let t=document.createElement("div"); t.innerText=msg; t.style.position="fixed"; t.style.bottom="20px"; t.style.left="50%"; t.style.transform="translateX(-50%)"; t.style.background=color; t.style.color="#0a2a12"; t.style.padding="8px 20px"; t.style.borderRadius="60px"; t.style.zIndex="999"; t.style.fontWeight="bold"; document.body.appendChild(t); setTimeout(()=>t.remove(),2500); }

  // update match prediction
  function updateMatchPred(league, idx, type, val) {
    if(isSuspended) { showToast("Suspended! No changes this GW."); return; }
    if(type==='home') matchesDB[league][currentGW][idx].hPred = val;
    else matchesDB[league][currentGW][idx].aPred = val;
    let m = matchesDB[league][currentGW][idx];
    if(m.hPred && m.aPred) checkRiskyPrediction(m.hPred, m.aPred);
  }
  function submitPredictions() { if(isSuspended) { showToast("Suspended!"); return; } showToast(`✅ GW${currentGW} predictions locked!`); clearSuspension(); }
  function clearSuspension() { if(isSuspended) { isSuspended=false; showToast("Suspension ended."); } }

  // render league badges (small)
  function renderLeagueStrip() {
    const container = document.getElementById("leagueStrip");
    container.innerHTML = "";
    for(let [key, league] of Object.entries(leaguesData)) {
      let div = document.createElement("div");
      div.className = `league-badge-card ${currentLeague===key ? 'active-league' : ''}`;
      div.onclick = () => { currentLeague = key; renderLeagueStrip(); renderChampionPanel(); renderPredictionsPanel(); };
      div.innerHTML = `<img src="${league.badge}" class="league-badge-img" onerror="this.src='https://via.placeholder.com/48'"><div class="league-name-sm">${league.name}</div>`;
      container.appendChild(div);
    }
  }

  // champion picker and points deduction below badges
  function renderChampionPanel() {
    const panel = document.getElementById("championPanel");
    panel.innerHTML = "";
    for(let [key, league] of Object.entries(leaguesData)) {
      let lock = lockState[key] || { locked: false, lockGW: null };
      let card = document.createElement("div");
      card.className = "champion-card";
      card.innerHTML = `
        <div><strong>${league.fullName}</strong></div>
        <select id="champSelect-${key}" ${lock.locked ? 'disabled' : ''} onchange="updateChampionPick('${key}', this.value)">
          <option value="">— Pick Winner —</option>
          ${league.teams.map(t => `<option ${championPicks[key]===t ? 'selected' : ''}>${t}</option>`).join('')}
        </select>
        <div class="pts-info">🏆 Points: 100 | Current: ${Math.round(leagueScores[key])}</div>
        <button class="lock-champ-btn ${lock.locked ? 'locked' : ''}" onclick="toggleLeagueLock('${key}')">${lock.locked ? '🔒 Locked' : '🔓 Unlock'}</button>
        ${penaltyPoints[key] ? `<div style="font-size:0.7rem; color:#ffaa66;">⚠️ Penalty -${penaltyPoints[key]}</div>` : ''}
      `;
      panel.appendChild(card);
    }
  }

  window.updateChampionPick = (leagueId, val) => {
    if(lockState[leagueId]?.locked) { showToast("Locked! Unlock first."); return; }
    championPicks[leagueId] = val;
    renderChampionPanel();
  };
  function toggleLeagueLock(leagueId) {
    let lock = lockState[leagueId];
    if(!lock) lockState[leagueId] = { locked: false, lockGW: null };
    lock = lockState[leagueId];
    if(!lock.locked) {
      if(!championPicks[leagueId]) { showToast("Pick a champion first!"); return; }
      lock.locked = true; lock.lockGW = currentGW;
      showToast(`🔒 ${leaguesData[leagueId].fullName} locked at GW${currentGW}`);
    } else {
      let weeks = currentGW - (lock.lockGW || currentGW);
      let penalty = weeks * 2;
      if(penalty>0) {
        penaltyPoints[leagueId] += penalty;
        leagueScores[leagueId] = Math.max(0, leagueScores[leagueId] - penalty);
        giveYellowCard(`Unlocked ${leaguesData[leagueId].fullName} after ${weeks} GWs (-${penalty} pts)`);
        updateScoreDisplay();
      }
      lock.locked = false; lock.lockGW = null;
    }
    renderChampionPanel();
  }

  // Major Awards rendering
  function renderAwards() {
    const container = document.getElementById("awardsGrid");
    container.innerHTML = "";
    awardsList.forEach(award => {
      let card = document.createElement("div");
      card.className = "award-card";
      card.innerHTML = `
        <h3><i class="fas fa-trophy"></i> ${award.name}</h3>
        <select id="award-${award.id}" ${award.locked ? 'disabled' : ''} onchange="updateAwardPick('${award.id}', this.value)">
          <option value="">— Predict —</option>
          ${award.options.map(opt => `<option ${award.pick===opt ? 'selected' : ''}>${opt}</option>`).join('')}
        </select>
        <div class="award-points">🏅 Bonus: ${award.points} pts (correct) | Penalty if wrong: -${Math.floor(award.points*0.3)}</div>
        <button class="lock-award-btn" onclick="toggleAwardLock('${award.id}')">${award.locked ? '🔒 Locked' : '🔓 Unlock'}</button>
      `;
      container.appendChild(card);
    });
  }
  window.updateAwardPick = (id, val) => {
    let award = awardsList.find(a=>a.id===id);
    if(award.locked) { showToast("Award prediction locked! Unlock to change."); return; }
    award.pick = val;
    renderAwards();
  };
  function toggleAwardLock(id) {
    let award = awardsList.find(a=>a.id===id);
    if(!award.locked) {
      if(!award.pick) { showToast("Select a prediction before locking!"); return; }
      award.locked = true; award.lockGW = currentGW;
      showToast(`🔒 ${award.name} prediction locked at GW${currentGW}`);
    } else {
      let weeks = currentGW - (award.lockGW || currentGW);
      let penalty = weeks * 3;
      if(penalty>0) {
        let totalPenalty = Math.min(50, penalty);
        for(let k of Object.keys(leagueScores)) leagueScores[k] = Math.max(0, leagueScores[k] - totalPenalty/6);
        giveYellowCard(`Unlocked ${award.name} after ${weeks} GWs (-${totalPenalty.toFixed(0)} pts)`);
        updateScoreDisplay();
      }
      award.locked = false; award.lockGW = null;
    }
    renderAwards();
  }

  // predictions panel for selected league
  function renderPredictionsPanel() {
    if(isSuspended) { document.getElementById("panel-predict").innerHTML = `<div style="padding:2rem; text-align:center; background:#1f3a2a; border-radius:28px;"><i class="fas fa-ban"></i><h2>SUSPENDED GW ${currentGW}</h2></div>`; return; }
    let matches = matchesDB[currentLeague][currentGW];
    if(!matches) return;
    let html = `<div class="matches-grid">`;
    matches.forEach((m, idx) => {
      html += `<div class="match-card"><div><i class="fas fa-shield-alt"></i> ${m.home}</div><div>VS</div><div>${m.away} <i class="fas fa-futbol"></i></div><div><input class="score-input" type="number" id="h_${idx}" value="${m.hPred}" placeholder="0" onchange="updateMatchPred('${currentLeague}',${idx},'home',this.value)"> : <input class="score-input" type="number" id="a_${idx}" value="${m.aPred}" placeholder="0" onchange="updateMatchPred('${currentLeague}',${idx},'away',this.value)"></div></div>`;
    });
    html += `<div style="display:flex; justify-content:flex-end; margin-top:1rem"><button class="btn-submit" onclick="submitPredictions()">📋 LOCK GW${currentGW} PREDICTIONS</button></div></div>`;
    document.getElementById("panel-predict").innerHTML = html;
  }

  function renderCardsPanel() {
    let historyHtml = `<div class="card-log"><h3>🃏 Discipline Record</h3>`;
    if(userCards.cardHistory.length===0) historyHtml += `<p>✅ No cards this season.</p>`;
    else userCards.cardHistory.slice().reverse().forEach(c => {
      historyHtml += `<div><i class="fas fa-${c.type==='yellow'?'square':'circle'}" style="color:${c.type==='yellow'?'#f5d742':'#e34d4d'}"></i> GW ${c.gw}: ${c.reason} (${c.type.toUpperCase()})</div>`;
    });
    historyHtml += `<p style="margin-top:1rem">⚠️ Yellow: 4+ goal margin OR unlock champion. Red: 2 yellows in 3 GWs → -20pts & suspension.</p></div>`;
    document.getElementById("panel-cards").innerHTML = historyHtml;
  }
  function renderLeaderboard() {
    let total = Object.values(leagueScores).reduce((a,b)=>a+b,0);
    document.getElementById("panel-leaderboard").innerHTML = `<div style="padding:2rem; background:rgba(0,0,0,0.5); border-radius:24px;"><h2>🏆 LEADERBOARD</h2><div>1. ⚡ EliteGaffer - 4,560</div><div>2. 🎯 YOU - ${total.toFixed(0)} pts</div><div><small>Includes league scores + award bonuses (simulated at season end)</small></div></div>`;
  }
  function updateScoreDisplay() { for(let l of Object.keys(leagueScores)) { let el = document.getElementById(`score-${l}`); if(el) el.innerText = Math.round(leagueScores[l]); } }

  // GW strip 1-38
  function buildGWStrip() {
    let container = document.getElementById("gwContainer");
    for(let i=1;i<=38;i++) {
      let btn = document.createElement("button");
      btn.innerText = `GW ${i}`;
      btn.classList.add("gw-btn");
      if(i===currentGW) btn.classList.add("active-gw");
      btn.onclick = () => {
        currentGW = i;
        document.getElementById("globalGWbadge").innerHTML = `GW ${currentGW}`;
        document.querySelectorAll(".gw-btn").forEach(b=>b.classList.remove("active-gw"));
        btn.classList.add("active-gw");
        renderPredictionsPanel();
        renderChampionPanel();
        renderAwards();
        showToast(`Gameweek ${currentGW} loaded`);
      };
      container.appendChild(btn);
    }
  }

  function switchTab(tabId) {
    document.querySelectorAll(".panel").forEach(p=>p.style.display="none");
    document.getElementById(`panel-${tabId}`).style.display="block";
    if(tabId==='predict') renderPredictionsPanel();
    if(tabId==='cards') renderCardsPanel();
    if(tabId==='leaderboard') renderLeaderboard();
  }

  // init locks
  for(let l of Object.keys(leaguesData)) if(!lockState[l]) lockState[l] = { locked: false, lockGW: null };

  function fakeLogin() { closeModal(); showToast("Welcome to the pitch! Predict, lock champions & awards."); }
  function openModal() { document.getElementById("modalOverlay").style.display = "flex"; }
  function closeModal() { document.getElementById("modalOverlay").style.display = "none"; }

  window.updateMatchPred = updateMatchPred;
  buildGWStrip();
  renderLeagueStrip();
  renderChampionPanel();
  renderAwards();
  renderPredictionsPanel();
  renderCardsPanel();
  renderLeaderboard();
  updateCardUI();

  document.querySelectorAll(".tab").forEach(t=>t.addEventListener("click",()=>{
    document.querySelectorAll(".tab").forEach(tt=>tt.classList.remove("active"));
    t.classList.add("active");
    switchTab(t.getAttribute("data-tab"));
  }));
  switchTab("predict");
</script>
</body>
</html>
