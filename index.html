<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>The Gaffer's Pick | Pitch Edition · 38 Gameweeks</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@400;600;700&family=Barlow:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    /* PITCH BACKGROUND – green turf + white lines */
    body {
      background: #1a6d2f;
      background-image: 
        linear-gradient(white 2px, transparent 2px),
        linear-gradient(90deg, white 2px, transparent 2px);
      background-size: 40px 40px;
      font-family: 'Barlow', sans-serif;
      min-height: 100vh;
      position: relative;
    }
    /* center circle effect */
    body::before {
      content: '';
      position: fixed;
      top: 50%;
      left: 50%;
      width: 280px;
      height: 280px;
      border: 4px solid rgba(255,255,255,0.35);
      border-radius: 50%;
      transform: translate(-50%, -50%);
      pointer-events: none;
      z-index: 0;
    }
    body::after {
      content: '';
      position: fixed;
      top: 50%;
      left: 0;
      right: 0;
      height: 4px;
      background: rgba(255,255,255,0.4);
      transform: translateY(-50%);
      pointer-events: none;
    }
    /* main content overlay */
    .pitch-overlay {
      position: relative;
      z-index: 2;
      background: rgba(10, 30, 15, 0.65);
      backdrop-filter: blur(2px);
      min-height: 100vh;
      padding-bottom: 2rem;
    }

    /* NAV */
    nav {
      background: rgba(0, 20, 5, 0.85);
      backdrop-filter: blur(12px);
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0 2rem;
      height: 70px;
      border-bottom: 2px solid #b5f028;
      flex-wrap: wrap;
    }
    .logo-text { font-family: 'Bebas Neue', sans-serif; font-size: 2rem; background: linear-gradient(135deg, #b5f028, #e0ff80); -webkit-background-clip: text; background-clip: text; color: transparent; }
    .card-stack { background: #0a2a12aa; padding: 6px 16px; border-radius: 40px; display: flex; gap: 12px; font-weight: bold; }
    .yellow-badge { color: #f5d742; }
    .red-badge { color: #e34d4d; }
    .gw-badge { background: #b5f028; color: #0a2a12; padding: 5px 18px; border-radius: 40px; font-weight: bold; }
    .btn-login { background: transparent; border: 1.5px solid #b5f028; color: #b5f028; border-radius: 40px; padding: 6px 24px; cursor: pointer; transition: 0.2s; }

    /* SCROLLABLE GAMEWEEK STRIP */
    .gw-strip {
      background: rgba(0, 0, 0, 0.6);
      backdrop-filter: blur(8px);
      padding: 12px 0;
      margin: 1rem 0;
      overflow-x: auto;
      white-space: nowrap;
      scrollbar-width: thin;
      border-top: 1px solid #b5f028;
      border-bottom: 1px solid #b5f028;
    }
    .gw-container {
      display: inline-flex;
      gap: 8px;
      padding: 0 1rem;
    }
    .gw-btn {
      background: #1f3a24;
      border: 1px solid #5a8f6a;
      color: #ddd;
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: bold;
      padding: 8px 16px;
      border-radius: 40px;
      cursor: pointer;
      transition: 0.1s;
      font-size: 0.9rem;
    }
    .gw-btn.active-gw {
      background: #b5f028;
      color: #0a2a12;
      border-color: #b5f028;
      box-shadow: 0 0 8px #b5f028;
    }
    .gw-btn:hover { background: #5f9e6e; color: white; }

    /* LEAGUE BADGES (instead of generic icons) */
    .score-bar {
      display: flex;
      justify-content: center;
      gap: 20px;
      flex-wrap: wrap;
      padding: 1.5rem;
    }
    .score-seg {
      background: rgba(0, 0, 0, 0.55);
      backdrop-filter: blur(4px);
      border-radius: 24px;
      padding: 0.8rem 1rem;
      min-width: 130px;
      text-align: center;
      cursor: pointer;
      transition: 0.2s;
      border: 1px solid #3e6b48;
    }
    .score-seg.active { border: 2px solid #b5f028; box-shadow: 0 0 12px #b5f028; }
    .league-badge {
      width: 48px;
      height: 48px;
      object-fit: contain;
      margin-bottom: 6px;
      filter: drop-shadow(0 2px 4px black);
    }
    .seg-name { font-size: 0.7rem; letter-spacing: 1px; color: #c0e0c0; }
    .seg-score { font-family: 'Bebas Neue', font-size: 1.8rem; color: #b5f028; }

    /* TABS */
    .tab-bar {
      display: flex;
      gap: 4px;
      padding: 0 2rem;
      border-bottom: 1px solid #3e6b48;
    }
    .tab {
      padding: 10px 24px;
      font-family: 'Barlow Condensed', font-weight: 700;
      cursor: pointer;
      color: #c0e0c0;
    }
    .tab.active { color: #b5f028; border-bottom: 2px solid #b5f028; }

    /* MATCH CARDS */
    .matches-grid {
      display: flex;
      flex-direction: column;
      gap: 12px;
      padding: 1rem 2rem;
    }
    .match-card {
      background: rgba(10, 30, 18, 0.8);
      backdrop-filter: blur(8px);
      border-radius: 20px;
      display: grid;
      grid-template-columns: 1fr auto 1fr auto;
      align-items: center;
      gap: 1rem;
      padding: 1rem 1.5rem;
      border: 1px solid #4a7c58;
    }
    .score-input {
      width: 60px;
      height: 48px;
      background: #0a2a12;
      border-radius: 16px;
      text-align: center;
      font-size: 1.6rem;
      color: #b5f028;
      border: 1px solid #6e9f7a;
    }
    .btn-submit {
      background: linear-gradient(95deg, #b5f028, #9fda1a);
      border: none;
      font-family: 'Bebas Neue';
      padding: 12px 28px;
      border-radius: 60px;
      font-weight: bold;
      cursor: pointer;
    }
    /* champion rows */
    .league-winner-row {
      display: grid;
      grid-template-columns: 60px 1fr 150px 110px;
      gap: 12px;
      background: rgba(0, 0, 0, 0.5);
      border-radius: 20px;
      padding: 0.8rem;
      margin-bottom: 8px;
      align-items: center;
    }
    .lock-btn { background: none; border: 1px solid #8aa; border-radius: 40px; padding: 6px 12px; cursor: pointer; }
    .lock-btn.locked { background: #b5f028; color: black; border-color: #b5f028; }
    .card-log { background: #0e2a18cc; border-radius: 24px; padding: 1rem; margin-top: 1rem; }
    @media (max-width: 750px) {
      .match-card { grid-template-columns: 1fr; gap: 0.5rem; }
      .league-winner-row { grid-template-columns: 40px 1fr 100px 80px; }
    }
  </style>
</head>
<body>
<div class="pitch-overlay">
<nav>
  <div><div class="logo-text"><i class="fas fa-futbol"></i> The Gaffer's Pick</div><div>PITCH · CARDS · 38 GW</div></div>
  <div style="display:flex; gap:1rem; align-items:center">
    <div class="card-stack"><i class="fas fa-square" style="color:#f5d742"></i> <span id="yellowCount">0</span> | <i class="fas fa-square" style="color:#e34d4d"></i> <span id="redCount">0</span></div>
    <div class="gw-badge" id="globalGWbadge">GW 1</div>
    <button class="btn-login" onclick="openModal()">Sign In</button>
  </div>
</nav>

<!-- SCROLLABLE GAMEWEEK TIMELINE 1-38 -->
<div class="gw-strip" id="gwStrip">
  <div class="gw-container" id="gwContainer"></div>
</div>

<div class="score-bar" id="scoreBar"></div>

<div class="tab-bar">
  <div class="tab active" data-tab="predict">⚡ Predictions</div>
  <div class="tab" data-tab="chips">🏆 Champions & Locks</div>
  <div class="tab" data-tab="cards">🃏 Discipline</div>
  <div class="tab" data-tab="leaderboard">📊 Leaderboard</div>
</div>

<div id="panel-predict" class="panel"></div>
<div id="panel-chips" class="panel" style="display:none"></div>
<div id="panel-cards" class="panel" style="display:none"></div>
<div id="panel-leaderboard" class="panel" style="display:none"></div>

<div class="modal-overlay" id="modalOverlay" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.8); backdrop-filter:blur(6px); align-items:center; justify-content:center; z-index:200;">
  <div style="background:#0f2a1a; padding:2rem; border-radius:32px; width:90%; max-width:400px; border:1px solid #b5f028;"><h2>Welcome Gaffer</h2><input type="text" id="demoUser" placeholder="Username" style="width:100%; margin:1rem 0; padding:12px; background:#0a1812; border:1px solid #3e6b48; color:white; border-radius:40px;"><button onclick="fakeLogin()" class="btn-submit" style="width:100%">Enter Pitch</button><button onclick="closeModal()" style="margin-top:1rem; background:none; border:none; color:#8aa;">Close</button></div>
</div>
</div>

<script>
  // ---------- OFFICIAL LEAGUE BADGES (high-res placeholders with official look) ----------
  const leagueBadges = {
    epl: "https://upload.wikimedia.org/wikipedia/en/thumb/f/f2/Premier_League_Logo.svg/120px-Premier_League_Logo.svg.png",
    liga: "https://upload.wikimedia.org/wikipedia/commons/thumb/0/0f/LaLiga_logo.svg/120px-LaLiga_logo.svg.png",
    serie: "https://upload.wikimedia.org/wikipedia/commons/thumb/e/e7/Serie_A_logo_2022.svg/120px-Serie_A_logo_2022.svg.png",
    bundes: "https://upload.wikimedia.org/wikipedia/commons/thumb/d/df/Bundesliga_logo.svg/120px-Bundesliga_logo.svg.png",
    ligue: "https://upload.wikimedia.org/wikipedia/commons/thumb/c/c3/Ligue_1_Uber_Eats_logo.svg/120px-Ligue_1_Uber_Eats_logo.svg.png"
  };

  const leaguesData = {
    epl: { name: "Premier League", badge: leagueBadges.epl, fullName: "Premier League", teams: ["Arsenal","Man City","Liverpool","Chelsea","Tottenham"] },
    liga: { name: "La Liga", badge: leagueBadges.liga, fullName: "La Liga", teams: ["Real Madrid","Barcelona","Atletico","Athletic","Real Betis"] },
    serie: { name: "Serie A", badge: leagueBadges.serie, fullName: "Serie A", teams: ["Inter Milan","Juventus","AC Milan","Napoli","Lazio"] },
    bundes: { name: "Bundesliga", badge: leagueBadges.bundes, fullName: "Bundesliga", teams: ["Bayern","Dortmund","Leverkusen","Leipzig","Stuttgart"] },
    ligue: { name: "Ligue 1", badge: leagueBadges.ligue, fullName: "Ligue 1", teams: ["PSG","Monaco","Marseille","Lyon","Lens"] }
  };

  let currentLeague = "epl";
  let currentGW = 1;       // 1..38
  let leagueScores = { epl: 0, liga: 0, serie: 0, bundes: 0, ligue: 0 };
  let championPicks = { epl: "", liga: "", serie: "", bundes: "", ligue: "" };
  let lockState = {};       // each: { locked, lockGW }
  let penaltyPoints = { epl: 0, liga: 0, serie: 0, bundes: 0, ligue: 0 };
  
  // matches per league – store predictions per gameweek (dynamic)
  let matchesDB = {};  // will init for all GWs
  function initMatchesDB() {
    const baseMatches = {
      epl: [{ home:"Arsenal", away:"Man City" },{ home:"Liverpool", away:"Chelsea" },{ home:"Man Utd", away:"Tottenham" },{ home:"Newcastle", away:"Aston Villa" },{ home:"Brighton", away:"West Ham" }],
      liga: [{ home:"Real Madrid", away:"Barcelona" },{ home:"Atletico", away:"Sevilla" },{ home:"Athletic", away:"Villarreal" },{ home:"Real Betis", away:"Real Soc." },{ home:"Valencia", away:"Osasuna" }],
      serie: [{ home:"Inter Milan", away:"Juventus" },{ home:"AC Milan", away:"Napoli" },{ home:"Lazio", away:"Roma" },{ home:"Atalanta", away:"Fiorentina" },{ home:"Torino", away:"Bologna" }],
      bundes: [{ home:"Bayern", away:"Dortmund" },{ home:"Leverkusen", away:"Leipzig" },{ home:"Stuttgart", away:"Gladbach" },{ home:"Frankfurt", away:"Freiburg" },{ home:"Wolfsburg", away:"Hoffenheim" }],
      ligue: [{ home:"PSG", away:"Monaco" },{ home:"Marseille", away:"Lyon" },{ home:"Lens", away:"Rennes" },{ home:"Lille", away:"Nice" },{ home:"Nantes", away:"Strasbourg" }]
    };
    for(let league of Object.keys(leaguesData)) {
      matchesDB[league] = {};
      for(let gw = 1; gw <= 38; gw++) {
        matchesDB[league][gw] = baseMatches[league].map(m => ({ ...m, hPred: "", aPred: "" }));
      }
    }
  }
  initMatchesDB();

  // ----- CARDS SYSTEM -----
  let userCards = { yellows: 0, reds: 0, cardHistory: [] };
  let isSuspended = false;
  let lastYellowGW = 0;

  function giveYellowCard(reason) {
    if(isSuspended) return;
    userCards.yellows++;
    userCards.cardHistory.push({ gw: currentGW, reason, type: "yellow" });
    showToast(`🟡 YELLOW CARD! ${reason}`, "#f5d742");
    updateCardUI();
    const recentYellows = userCards.cardHistory.filter(c => c.type === "yellow" && (currentGW - c.gw) <= 3).length;
    if(recentYellows >= 2 && userCards.reds === 0) {
      giveRedCard("Two yellow cards in 3 gameweeks");
    }
  }
  function giveRedCard(reason) {
    if(userCards.reds > 0) return;
    userCards.reds++;
    userCards.cardHistory.push({ gw: currentGW, reason, type: "red" });
    // -20 points across all leagues? deduct total from overall? simpler: deduct from each league proportionally? but for demo: subtract 20 from total score representation
    let totalDeduction = 20;
    let keys = Object.keys(leagueScores);
    for(let k of keys) leagueScores[k] = Math.max(0, leagueScores[k] - (totalDeduction/keys.length));
    updateScoreDisplay();
    isSuspended = true;
    showToast(`🔴 RED CARD! -20 points total. Suspended next GW! ${reason}`, "#e34d4d");
    updateCardUI();
    userCards.yellows = 0;
  }
  function updateCardUI() {
    document.getElementById("yellowCount").innerText = userCards.yellows;
    document.getElementById("redCount").innerText = userCards.reds;
  }
  function clearSuspensionAfterGW() {
    if(isSuspended) { isSuspended = false; showToast("✅ Suspension lifted. You can predict again.", "#b5f028"); }
  }
  function checkRiskyPrediction(homeScore, awayScore) {
    const margin = Math.abs(parseInt(homeScore || 0) - parseInt(awayScore || 0));
    if(margin >= 4) giveYellowCard(`Risky margin ${homeScore}-${awayScore}`);
  }

  // helpers
  function showToast(msg, color="#b5f028") {
    let t = document.createElement("div");
    t.innerText = msg;
    t.style.position = "fixed"; t.style.bottom = "20px"; t.style.left = "50%"; t.style.transform = "translateX(-50%)";
    t.style.background = color; t.style.color = "#0a2a12"; t.style.padding = "10px 20px"; t.style.borderRadius = "60px";
    t.style.zIndex = "999"; t.style.fontWeight = "bold"; t.style.backdropFilter = "blur(4px)";
    document.body.appendChild(t); setTimeout(()=>t.remove(), 2500);
  }

  function updateMatchPred(league, idx, type, val) {
    if(isSuspended) { showToast("Suspended! Cannot change predictions this GW."); return; }
    if(type === 'home') matchesDB[league][currentGW][idx].hPred = val;
    else matchesDB[league][currentGW][idx].aPred = val;
    const match = matchesDB[league][currentGW][idx];
    if(match.hPred && match.aPred && match.hPred !== "" && match.aPred !== "") {
      checkRiskyPrediction(match.hPred, match.aPred);
    }
  }

  function submitPredictions() {
    if(isSuspended) { showToast("You are suspended this GW! No predictions allowed."); return; }
    showToast(`✅ Predictions for GW${currentGW} submitted! Points will be calculated after real matches.`);
    clearSuspensionAfterGW();
  }

  // ----- RENDER UI -----
  function renderScoreBar() {
    const bar = document.getElementById("scoreBar");
    bar.innerHTML = "";
    for(let [key, league] of Object.entries(leaguesData)) {
      const seg = document.createElement("div");
      seg.className = `score-seg ${currentLeague === key ? 'active' : ''}`;
      seg.onclick = () => { currentLeague = key; renderScoreBar(); renderPredictionsPanel(); };
      seg.innerHTML = `<img src="${league.badge}" class="league-badge" onerror="this.src='https://via.placeholder.com/48?text=${league.name[0]}'"><div class="seg-name">${league.name}</div><div class="seg-score" id="score-${key}">${Math.round(leagueScores[key])}</div><div style="font-size:0.7rem">/100</div>`;
      bar.appendChild(seg);
    }
  }
  function updateScoreDisplay() {
    for(let l of Object.keys(leagueScores)) {
      let el = document.getElementById(`score-${l}`);
      if(el) el.innerText = Math.round(leagueScores[l]);
    }
  }

  function renderPredictionsPanel() {
    if(isSuspended) {
      document.getElementById("panel-predict").innerHTML = `<div style="padding:2rem; text-align:center; background:#1f3a2a; border-radius:28px; margin:1rem"><i class="fas fa-ban" style="font-size:3rem; color:#e34d4d"></i><h2>🔴 SUSPENDED FOR GW ${currentGW}</h2><p>You received a red card. You'll be back next gameweek.</p></div>`;
      return;
    }
    const matches = matchesDB[currentLeague][currentGW];
    if(!matches) return;
    let html = `<div class="matches-grid">`;
    matches.forEach((m, idx) => {
      html += `<div class="match-card"><div class="team"><i class="fas fa-shield-alt"></i> ${m.home}</div><div class="vs">VS</div><div class="team away">${m.away} <i class="fas fa-futbol"></i></div><div><input class="score-input" type="number" id="h_${idx}" value="${m.hPred}" placeholder="0" onchange="updateMatchPred('${currentLeague}',${idx},'home',this.value)"> : <input class="score-input" type="number" id="a_${idx}" value="${m.aPred}" placeholder="0" onchange="updateMatchPred('${currentLeague}',${idx},'away',this.value)"></div></div>`;
    });
    html += `<div class="submit-row" style="display:flex; justify-content:flex-end; padding:1rem"><button class="btn-submit" onclick="submitPredictions()">📋 LOCK PREDICTIONS (GW${currentGW})</button></div></div>`;
    document.getElementById("panel-predict").innerHTML = html;
  }

  // Champion & Lock panel
  function renderChipsPanel() {
    let rows = "";
    for(let [key, league] of Object.entries(leaguesData)) {
      const lock = lockState[key] || { locked: false, lockGW: null };
      rows += `<div class="league-winner-row"><img src="${league.badge}" width="40" style="object-fit:contain"><div><div><strong>${league.fullName}</strong></div><div id="champLabel-${key}">${championPicks[key] || "❌ No pick"}</div>${penaltyPoints[key] ? `<small style="color:#ffaa66">-${penaltyPoints[key]} pts</small>` : ""}</div><select id="champSelect-${key}" ${lock.locked ? 'disabled' : ''} onchange="updateChampionPick('${key}', this.value)"><option value="">— Select Champion —</option>${league.teams.map(t => `<option ${championPicks[key]===t ? 'selected' : ''}>${t}</option>`).join('')}</select><button class="lock-btn ${lock.locked ? 'locked' : ''}" onclick="toggleLockWithCard('${key}')">${lock.locked ? '🔒 Locked' : '🔓 Unlock'}</button></div>`;
    }
    rows += `<div style="margin-top:1.5rem; background:#0f2a1a; border-radius:20px; padding:1rem;"><h3>⚙️ Gameweek Navigator</h3><p>Current GW: ${currentGW}. Use the timeline above to jump any week. Unlocking champions after many GWs gives heavy penalty + yellow card.</p><button class="btn-submit" onclick="saveChampionSelections()">💾 Save Champion Picks</button></div>`;
    document.getElementById("panel-chips").innerHTML = rows;
  }

  function updateChampionPick(leagueId, val) {
    if(lockState[leagueId]?.locked) { showToast("Champion is locked! Unlock first."); return; }
    championPicks[leagueId] = val;
    document.getElementById(`champLabel-${leagueId}`).innerText = val || "❌ No pick";
  }
  function toggleLockWithCard(leagueId) {
    const lock = lockState[leagueId];
    if(!lock.locked) {
      if(!championPicks[leagueId]) { showToast("Pick a champion before locking!"); return; }
      lock.locked = true;
      lock.lockGW = currentGW;
      showToast(`🔒 ${leaguesData[leagueId].fullName} champion LOCKED at GW${currentGW}.`, "#b5f028");
    } else {
      const weeksPassed = currentGW - (lock.lockGW || currentGW);
      const penalty = weeksPassed * 2;
      if(penalty > 0) {
        penaltyPoints[leagueId] += penalty;
        leagueScores[leagueId] = Math.max(0, leagueScores[leagueId] - penalty);
        updateScoreDisplay();
        giveYellowCard(`Unlocked champion after ${weeksPassed} GWs (penalty -${penalty} pts)`);
      }
      lock.locked = false;
      lock.lockGW = null;
    }
    renderChipsPanel();
  }
  function saveChampionSelections() { showToast("🏆 Champion picks saved! Season-end points will be calculated."); }

  function renderCardsPanel() {
    let historyHtml = `<div class="card-log"><h3><i class="fas fa-id-card"></i> Disciplinary Record</h3>`;
    if(userCards.cardHistory.length === 0) historyHtml += `<p>✨ Clean sheet — no cards this season.</p>`;
    else userCards.cardHistory.slice().reverse().forEach(c => {
      historyHtml += `<div class="card-entry"><i class="fas ${c.type === 'yellow' ? 'fa-square' : 'fa-circle'}" style="color:${c.type === 'yellow' ? '#f5d742' : '#e34d4d'}"></i> <strong>GW ${c.gw}</strong> — ${c.reason} (${c.type.toUpperCase()})</div>`;
    });
    historyHtml += `<div style="margin-top:1rem"><p><i class="fas fa-info-circle"></i> <strong>Card Rules:</strong><br>🟡 Yellow: predicting 4+ goal margin OR unlocking a champion.<br>🔴 Red: 2 yellows in 3 GWs → -20 pts & next GW suspension.</p></div></div>`;
    document.getElementById("panel-cards").innerHTML = historyHtml;
  }
  function renderLeaderboard() {
    let totalPoints = Object.values(leagueScores).reduce((a,b)=>a+b,0);
    document.getElementById("panel-leaderboard").innerHTML = `<div style="padding:2rem; background:rgba(0,0,0,0.5); border-radius:24px;"><h2>🏆 GLOBAL LEADERBOARD (Pitch Edition)</h2><div>1. ⚡ GoalMachine - 4,280</div><div>2. 🛡️ TacticalLord - 4,010</div><div>3. 🎯 YOU (The Gaffer) - ${totalPoints} pts</div><div><small>Penalties from cards & unlocking affect total.</small></div></div>`;
  }

  // Gameweek strip 1-38
  function buildGWStrip() {
    const container = document.getElementById("gwContainer");
    container.innerHTML = "";
    for(let i=1; i<=38; i++) {
      const btn = document.createElement("button");
      btn.innerText = `GW ${i}`;
      btn.classList.add("gw-btn");
      if(i === currentGW) btn.classList.add("active-gw");
      btn.onclick = () => {
        currentGW = i;
        document.getElementById("globalGWbadge").innerHTML = `GW ${currentGW}`;
        document.querySelectorAll(".gw-btn").forEach(b => b.classList.remove("active-gw"));
        btn.classList.add("active-gw");
        // reload all panels
        renderScoreBar();
        renderPredictionsPanel();
        renderChipsPanel();
        renderCardsPanel();
        renderLeaderboard();
        showToast(`Switched to Gameweek ${currentGW}`, "#b5f028");
      };
      container.appendChild(btn);
    }
  }

  function switchTab(tabId) {
    document.querySelectorAll(".panel").forEach(p => p.style.display = "none");
    document.getElementById(`panel-${tabId}`).style.display = "block";
    if(tabId === 'predict') renderPredictionsPanel();
    if(tabId === 'chips') renderChipsPanel();
    if(tabId === 'cards') renderCardsPanel();
    if(tabId === 'leaderboard') renderLeaderboard();
  }

  // init locks
  function initLocks() {
    for(let l of Object.keys(leaguesData)) if(!lockState[l]) lockState[l] = { locked: false, lockGW: null };
  }
  function fakeLogin() { closeModal(); showToast("Welcome to the pitch! Use timeline (GW 1-38) & lock champions."); }
  function openModal() { document.getElementById("modalOverlay").style.display = "flex"; }
  function closeModal() { document.getElementById("modalOverlay").style.display = "none"; }

  // attach global functions
  window.updateMatchPred = updateMatchPred;
  window.updateChampionPick = updateChampionPick;
  window.toggleLockWithCard = toggleLockWithCard;

  // initial render
  initLocks();
  buildGWStrip();
  renderScoreBar();
  renderPredictionsPanel();
  renderChipsPanel();
  renderCardsPanel();
  renderLeaderboard();
  updateCardUI();

  // tab listeners
  document.querySelectorAll(".tab").forEach(tab => {
    tab.addEventListener("click", () => {
      document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
      tab.classList.add("active");
      switchTab(tab.getAttribute("data-tab"));
    });
  });
  switchTab("predict");
</script>
</body>
</html>
