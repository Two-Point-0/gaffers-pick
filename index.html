<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Gaffer's Pick · Stadium Predictor</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Russo+One&family=Barlow+Condensed:wght@300;400;600;700;800;900&family=Barlow:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --lime:#c8f400;--gold:#ffd700;--red:#e63946;--blue:#0066cc;
  --pitch-a:#1d7a30;--pitch-b:#198228;--pitch-c:#165e22;
  --bg:#060b10;--panel:#0a1520;--panel2:#0d1c2e;
  --glass:rgba(10,20,35,.92);--glassl:rgba(10,20,35,.78);
  --border:rgba(255,255,255,.07);--borderl:rgba(200,244,0,.2);
  --text:#e8edf2;--sub:rgba(232,237,242,.48);
  --hd:'Bebas Neue',cursive;--ru:'Russo One',sans-serif;
  --cd:'Barlow Condensed',sans-serif;--bd:'Barlow',sans-serif;
  --seat:#0d2a14;--seat-on:#c8f400;--seat-red:#cc2233;--seat-gold:#ffd700;
  --nav-h:68px;--mode-h:44px;--header-h:56px;
}
html,body{width:100%;height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:var(--bd)}
#root{width:100%;height:100%;display:flex;flex-direction:column}
::-webkit-scrollbar{width:3px;height:3px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:rgba(200,244,0,.2);border-radius:3px}

/* ANIMATIONS */
@keyframes roofSlideLeft{from{transform:translateX(0)}to{transform:translateX(-100%)}}
@keyframes roofSlideRight{from{transform:translateX(0)}to{transform:translateX(100%)}}
@keyframes roofCloseLeft{from{transform:translateX(-100%)}to{transform:translateX(0)}}
@keyframes roofCloseRight{from{transform:translateX(100%)}to{transform:translateX(0)}}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes adScroll{from{transform:translateX(0)}to{transform:translateX(-50%)}}
@keyframes adScrollR{from{transform:translateX(-50%)}to{transform:translateX(0)}}
@keyframes flagFly{0%{opacity:0;transform:translate(0,0) scale(.3)}40%{opacity:1;transform:translate(-70px,-55px) scale(1.2)}100%{opacity:0;transform:translate(-280px,20px) scale(.6)}}
@keyframes scoreGlow{0%,100%{box-shadow:none}50%{box-shadow:0 0 14px rgba(200,244,0,.35)}}
@keyframes pitchLoad{from{opacity:0}to{opacity:1}}
@keyframes toastIn{from{opacity:0;transform:translate(-50%,12px)}to{opacity:1;transform:translate(-50%,0)}}
@keyframes toastOut{to{opacity:0;transform:translate(-50%,-8px)}}
@keyframes headerPulse{0%,100%{text-shadow:0 0 20px rgba(200,244,0,.1)}50%{text-shadow:0 0 40px rgba(200,244,0,.4),0 0 80px rgba(200,244,0,.15)}}

/* LAYOUT */
.app{
  display:grid;
  grid-template-rows: var(--header-h) var(--mode-h) 1fr var(--nav-h);
  height:100vh;
  overflow:hidden;
  background:var(--bg);
}
.header{
  background:linear-gradient(180deg,#040810 0%,#07111e 100%);
  border-bottom:1px solid rgba(200,244,0,.1);
  display:flex;align-items:center;justify-content:center;
  position:relative;z-index:100;padding:0 16px;
}
.header-center{display:flex;flex-direction:column;align-items:center;gap:2px}
.brand{
  font-family:var(--hd);font-size:clamp(1.6rem,4vw,2.4rem);
  letter-spacing:6px;
  background:linear-gradient(90deg,rgba(255,255,255,.7) 0%,var(--lime) 40%,rgba(255,255,255,.9) 70%,var(--lime) 100%);
  background-size:200%;
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  animation:headerPulse 3s ease infinite;
  text-align:center;
}
.brand-sub{
  font-family:var(--cd);font-size:.58rem;letter-spacing:5px;
  color:rgba(200,244,0,.5);text-transform:uppercase;
}
.header-left{position:absolute;left:16px;display:flex;align-items:center;gap:8px;}
.header-right{position:absolute;right:16px;display:flex;align-items:center;gap:8px;}
.hbtn{
  padding:4px 12px;border-radius:40px;font-family:var(--cd);font-size:.65rem;
  font-weight:700;letter-spacing:1.5px;cursor:pointer;border:1px solid;
  transition:all .18s;text-transform:uppercase;
}
.hbtn-d{background:rgba(255,255,255,.04);border-color:var(--border);color:var(--sub)}
.hbtn-d:hover{background:rgba(255,255,255,.09);color:#fff}
.pts-chip{
  display:flex;align-items:center;gap:6px;
  padding:4px 12px;border-radius:40px;
  background:rgba(255,215,0,.08);border:1px solid rgba(255,215,0,.3);
}
.pts-val{font-family:var(--hd);font-size:1.1rem;color:var(--gold);line-height:1}
.pts-lbl{font-family:var(--cd);font-size:.55rem;color:rgba(255,215,0,.6);letter-spacing:1px}

.mode-bar{
  background:rgba(0,0,0,.5);backdrop-filter:blur(10px);
  border-bottom:1px solid rgba(255,255,255,.05);
  display:flex;align-items:center;justify-content:center;gap:5px;
  padding:0 12px;z-index:90;position:relative;
}
.mbtn{
  padding:5px 14px;border-radius:40px;font-family:var(--cd);
  font-size:.7rem;font-weight:700;letter-spacing:1.5px;cursor:pointer;
  border:1.5px solid;transition:all .22s;text-transform:uppercase;
}
.mbtn-off{background:rgba(255,255,255,.03);border-color:rgba(255,255,255,.08);color:var(--sub)}
.mbtn-off:hover{border-color:rgba(200,244,0,.3);color:rgba(200,244,0,.8)}
.mbtn-on{background:rgba(200,244,0,.14);border-color:var(--lime);color:var(--lime);box-shadow:0 0 10px rgba(200,244,0,.12)}
.mode-sep{width:1px;height:16px;background:rgba(255,255,255,.1)}
.gw-ctrl{display:flex;align-items:center;gap:8px;margin-left:10px;border-left:1px solid rgba(255,255,255,.08);padding-left:10px}
.gwbtn{
  width:26px;height:26px;border-radius:50%;
  background:rgba(0,0,0,.5);border:1.5px solid rgba(255,215,0,.4);
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;color:var(--gold);font-size:.7rem;
}
.gwbtn:hover{background:var(--gold);color:#000}
.gw-num{font-family:var(--hd);font-size:1rem;color:var(--lime);letter-spacing:2px;min-width:60px;text-align:center}

/* stadium grid */
.stadium-main{
  position:relative;overflow:hidden;
  display:grid;
  grid-template-columns: clamp(50px,7vw,90px) clamp(60px,8vw,100px) 1fr clamp(60px,8vw,100px) clamp(50px,7vw,90px);
  grid-template-rows: 1fr;
}
.pitch-wrap{
  position:relative;overflow:hidden;
  background:repeating-linear-gradient(180deg,var(--pitch-a) 0,var(--pitch-a) 44px,var(--pitch-b) 44px,var(--pitch-b) 88px);
  animation:pitchLoad .5s ease both;
}
.pitch-wrap::after{content:'';position:absolute;inset:0;z-index:2;pointer-events:none;background:radial-gradient(ellipse 85% 75% at 50% 50%, transparent 25%, rgba(0,0,0,.5) 100%);}
.pitch-svg{position:absolute;inset:0;width:100%;height:100%;opacity:.35;z-index:1;pointer-events:none;}
.formation{position:relative;z-index:10;display:flex;flex-direction:column;align-items:center;padding:clamp(4px,1vw,10px);gap:clamp(3px,1vw,10px);height:100%;justify-content:space-around;}
.frow{display:flex;justify-content:center;gap:clamp(4px,1.2vw,14px);width:100%}

/* roof */
.roof{position:absolute;inset:0;z-index:50;display:flex;pointer-events:none;}
.roof-left,.roof-right{width:50%;height:100%;will-change:transform;display:flex;flex-direction:column;overflow:hidden;pointer-events:all;}
.roof-left{background:linear-gradient(135deg,#050b14,#0b1929);border-right:2px solid rgba(200,244,0,.15);}
.roof-right{background:linear-gradient(225deg,#050b14,#0b1929);border-left:2px solid rgba(200,244,0,.15);}
.roof.opening .roof-left{animation:roofSlideLeft .6s cubic-bezier(.77,0,.18,1) forwards}
.roof.opening .roof-right{animation:roofSlideRight .6s cubic-bezier(.77,0,.18,1) forwards}
.roof.closing .roof-left{animation:roofCloseLeft .5s cubic-bezier(.77,0,.18,1) forwards}
.roof.closing .roof-right{animation:roofCloseRight .5s cubic-bezier(.77,0,.18,1) forwards}
.roof.closed .roof-left,.roof.closed .roof-right{transform:translateX(0)}
.roof.opened .roof-left{transform:translateX(-100%)}
.roof.opened .roof-right{transform:translateX(100%)}
.roof-content{flex:1;display:flex;flex-direction:column;overflow:hidden;}
.roof-panel-inner{flex:1;overflow-y:auto;padding:8px 10px;}
.stand-outer{display:flex;flex-direction:column;background:linear-gradient(90deg,#040911,#070f1c);border-right:2px solid rgba(200,244,0,.06);overflow:hidden;}
.stand-outer.right{background:linear-gradient(270deg,#040911,#070f1c);border-right:none;border-left:2px solid rgba(200,244,0,.06);}
.ostand-seats{flex:1;display:flex;flex-direction:column;justify-content:center;gap:1.5px;padding:4px 2px;}
.ostand-row{display:flex;gap:1.5px;justify-content:center}
.oseat{width:clamp(4px,.7vw,7px);height:clamp(3px,.55vw,5px);border-radius:1px;background:var(--seat);flex-shrink:0;}
.oseat.on{background:var(--seat-on)}
.corner-blk{background:#030810;border:1px solid rgba(200,244,0,.05);overflow:hidden;display:flex;align-items:center;justify-content:center;}
.corner-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:1.5px;padding:4px}
.cgrid-seat{aspect-ratio:1;border-radius:1px;background:var(--seat);transition:background .4s}
.cgrid-seat.on{background:var(--seat-on)}
.adboard{grid-column:1/-1;height:clamp(20px,2.5vw,32px);background:#000;overflow:hidden;}
.adboard-inner{display:flex;height:100%;width:200%;animation:adScroll 20s linear infinite;}
.adboard.bot .adboard-inner{animation:adScrollR 20s linear infinite}
.ad-block{display:flex;align-items:center;justify-content:center;height:100%;padding:0 clamp(8px,2vw,20px);flex-shrink:0;gap:6px;}
.ad-block-txt{font-family:var(--cd);font-size:clamp(.45rem,.8vw,.62rem);font-weight:900;letter-spacing:2px;text-transform:uppercase;white-space:nowrap;}
.ostand-ad{height:clamp(22px,3vw,36px);background:#000;overflow:hidden;position:relative;flex-shrink:0;}
.ostand-ad-inner{display:flex;height:100%;animation:adScroll 18s linear infinite;white-space:nowrap;}
.ostand-ad.rev .ostand-ad-inner{animation:adScrollR 18s linear infinite}
.ad-seg{display:flex;align-items:center;justify-content:center;height:100%;min-width:clamp(50px,6vw,80px);padding:0 4px;flex-shrink:0;}
.ad-seg-txt{font-family:var(--cd);font-size:clamp(.38rem,.6vw,.52rem);font-weight:900;letter-spacing:1.5px;text-transform:uppercase;}
.rsrow{display:flex;gap:1.5px;justify-content:center;margin-bottom:1.5px}
.rseat{width:clamp(5px,.9vw,8px);height:clamp(4px,.7vw,6px);border-radius:1px 1px 0 0;background:var(--seat);flex-shrink:0;transition:background .3s}
.rseat.on{background:var(--seat-on)}
.nav{background:linear-gradient(0deg,#030810,#070f1c);border-top:1px solid rgba(200,244,0,.1);display:flex;align-items:stretch;z-index:100;padding:0 4px;overflow-x:auto;}
.nav-item{flex:1;min-width:clamp(50px,10vw,90px);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;cursor:pointer;transition:all .18s;border-top:2px solid transparent;padding:4px 6px;position:relative;}
.nav-item.active{border-top-color:var(--lime)}
.nav-item .ni{font-size:clamp(.9rem,2vw,1.1rem);filter:grayscale(1) opacity(.4);}
.nav-item.active .ni,.nav-item:hover .ni{filter:grayscale(0) opacity(1)}
.nav-item .nl{font-family:var(--cd);font-size:clamp(.42rem,.7vw,.56rem);font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--sub);text-align:center;}
.nav-item.active .nl{color:var(--lime)}
.nav-item .nbdge{position:absolute;top:5px;right:calc(50% - 14px);background:var(--red);color:#fff;font-family:var(--cd);font-size:.42rem;font-weight:700;padding:1px 4px;border-radius:10px;}
.nav-sep{width:1px;background:rgba(255,255,255,.06);margin:8px 0;flex-shrink:0}
.panel-ttl{font-family:var(--cd);font-size:.66rem;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--lime);margin-bottom:6px;display:flex;align-items:center;gap:5px;border-bottom:1px solid rgba(200,244,0,.12);padding-bottom:5px;}
.spill{background:rgba(0,0,0,.45);border:1px solid var(--border);border-radius:7px;padding:5px 8px;margin-bottom:3px;display:flex;justify-content:space-between;align-items:center;}
.sk{font-family:var(--cd);font-size:.58rem;letter-spacing:.8px;color:var(--sub)}
.sv{font-family:var(--hd);font-size:1rem;color:var(--lime)}
.metric-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:3px;margin-bottom:5px}
.metric-card{background:rgba(0,0,0,.45);border:1px solid var(--border);border-radius:7px;padding:5px 4px;text-align:center;}
.mc-val{font-family:var(--hd);font-size:.95rem;color:var(--lime)}
.mc-lbl{font-family:var(--cd);font-size:.48rem;color:var(--sub);letter-spacing:.8px;text-transform:uppercase}
.pbar-wrap{margin-bottom:5px}
.pbar-lbl{font-family:var(--cd);font-size:.55rem;letter-spacing:1.2px;color:rgba(200,244,0,.55);display:flex;justify-content:space-between;margin-bottom:2px}
.pbar-bg{height:3px;background:rgba(255,255,255,.07);border-radius:3px;overflow:hidden}
.pbar-fill{height:100%;border-radius:3px;background:linear-gradient(90deg,var(--lime),#90ff00);transition:width .6s ease}
.yc-wrap{display:flex;gap:3px;align-items:center}
.ycd{width:11px;height:15px;border-radius:2px;background:rgba(255,215,0,.1);border:1px solid rgba(255,215,0,.2);transition:all .3s}
.ycd.on{background:var(--gold);box-shadow:0 0 4px var(--gold)}
.lb-row{display:flex;align-items:center;gap:5px;padding:4px 6px;border-radius:6px;margin-bottom:2px;cursor:pointer;background:rgba(0,0,0,.3);border:1px solid transparent;}
.lb-row.me{border-color:rgba(200,244,0,.38);background:rgba(200,244,0,.07)}
.lb-pos{font-family:var(--hd);font-size:.85rem;color:var(--sub);min-width:16px}
.lb-pos.t{color:var(--gold)}
.lb-nm{font-family:var(--cd);font-size:.68rem;font-weight:700;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.lb-pts{font-family:var(--hd);font-size:.88rem;color:var(--lime)}
.lb-chg{font-family:var(--cd);font-size:.5rem;min-width:20px;text-align:right}
.lb-chg.up{color:#2ecc71}.lb-chg.dn{color:var(--red)}
.sdiv{height:1px;background:linear-gradient(90deg,transparent,rgba(200,244,0,.12),transparent);margin:6px 0}
.mcard{background:rgba(0,0,0,.4);border:1px solid var(--border);border-radius:8px;padding:7px 8px;margin-bottom:4px;animation:fadeIn .2s ease both;}
.mteams{display:flex;align-items:center;justify-content:space-between;gap:3px;margin-bottom:5px}
.tnm{font-family:var(--cd);font-size:.67rem;font-weight:600;flex:1;display:flex;align-items:center;gap:3px;}
.tnm.aw{justify-content:flex-end}
.tlogo{width:17px;height:17px;object-fit:contain;flex-shrink:0;border-radius:2px;background:#1a1a1a;}
.sinps{display:flex;align-items:center;gap:2px;flex-shrink:0}
.sinp{width:28px;height:26px;border-radius:5px;background:rgba(0,0,0,.6);border:1.5px solid rgba(255,255,255,.15);color:var(--lime);text-align:center;font-family:var(--hd);font-size:.92rem;outline:none;}
.sinp:focus{border-color:var(--lime);animation:scoreGlow .4s ease}
.sinp:disabled{color:#1a1a1a;border-color:#0d0d0d}
.ssep{font-family:var(--hd);font-size:.72rem;color:var(--sub);padding:0 1px}
.mfoot{display:flex;justify-content:space-between;align-items:center;gap:4px}
.ptsbadge{font-family:var(--cd);font-size:.55rem;font-weight:700;padding:2px 7px;border-radius:18px;}
.ptsbadge.def{background:rgba(200,244,0,.08);color:var(--lime);border:1px solid rgba(200,244,0,.2)}
.ptsbadge.gld{background:rgba(255,215,0,.1);color:var(--gold);border:1px solid rgba(255,215,0,.28)}
.ptsbadge.rd{background:rgba(230,57,70,.1);color:var(--red);border:1px solid rgba(230,57,70,.25)}
.lbtn{font-family:var(--cd);font-size:.55rem;padding:2px 8px;border-radius:18px;font-weight:700;cursor:pointer;border:1px solid;}
.lbtn.off{background:rgba(255,255,255,.04);border-color:rgba(255,255,255,.1);color:var(--sub)}
.lbtn.off:hover{border-color:var(--lime);color:var(--lime)}
.lbtn.on{background:rgba(200,244,0,.12);border-color:rgba(200,244,0,.42);color:var(--lime)}
.result-lbl{font-family:var(--cd);font-size:.5rem;text-align:center;color:rgba(255,215,0,.6);margin-bottom:3px;}
.awd-row{display:flex;align-items:center;justify-content:space-between;padding:5px 7px;border-radius:7px;margin-bottom:3px;cursor:pointer;background:rgba(0,0,0,.3);border:1px solid transparent;}
.awd-row.picked{background:rgba(200,244,0,.09);border-color:rgba(200,244,0,.35)}
.awd-nm{font-family:var(--cd);font-size:.7rem;font-weight:700}
.awd-sub{font-size:.55rem;color:rgba(255,255,255,.38)}
.awd-v{font-family:var(--hd);font-size:.88rem;color:var(--lime)}
.subsect-lbl{font-family:var(--cd);font-size:.58rem;letter-spacing:1.5px;color:rgba(200,244,0,.55);text-transform:uppercase;margin-bottom:4px;margin-top:6px;display:flex;align-items:center;gap:4px;}
.chip-grp{display:flex;flex-wrap:wrap;gap:3px;margin-bottom:6px}
.chip{padding:3px 9px;border-radius:18px;font-family:var(--cd);font-size:.6rem;font-weight:700;cursor:pointer;border:1px solid;}
.chip-off{background:rgba(0,0,0,.4);border-color:rgba(255,255,255,.08);color:rgba(255,255,255,.45)}
.chip-on{background:rgba(200,244,0,.14);border-color:rgba(200,244,0,.48);color:var(--lime)}
.pslot{display:flex;flex-direction:column;align-items:center;cursor:pointer;transition:transform .18s;background:rgba(0,0,0,.3);border-radius:14px;padding:4px 6px 5px;border:1px solid rgba(255,255,255,.05);}
.pslot:hover{transform:scale(1.06) translateY(-3px);background:rgba(0,0,0,.5);border-color:rgba(200,244,0,.2)}
.pslot.act{transform:scale(1.09) translateY(-4px);background:rgba(200,244,0,.09);border-color:rgba(200,244,0,.42);box-shadow:0 0 14px rgba(200,244,0,.18);}
.jsw{filter:drop-shadow(0 4px 10px rgba(0,0,0,.8))}
.shorts-slot{margin-top:-4px}
.sbar{display:flex;align-items:center;justify-content:center;gap:3px;margin-top:2px}
.spct{font-family:var(--hd);font-size:clamp(.42rem,.75vw,.6rem);color:var(--lime);}
.slbl{font-family:var(--cd);font-size:clamp(.44rem,.7vw,.58rem);font-weight:700;color:rgba(255,255,255,.88);text-align:center;margin-top:2px;white-space:nowrap;}
.stag{font-family:var(--cd);font-size:clamp(.36rem,.6vw,.5rem);background:rgba(0,0,0,.55);border:1px solid rgba(200,244,0,.22);border-radius:7px;padding:1px 4px;color:var(--lime);margin-top:1px}
.yfl{position:fixed;z-index:9000;pointer-events:none;font-size:1.8rem;animation:flagFly 1.5s ease-out forwards;top:45%;left:52%}
.toast{position:fixed;bottom:calc(var(--nav-h) + 10px);left:50%;transform:translateX(-50%);z-index:8000;padding:6px 18px;border-radius:40px;font-family:var(--cd);font-size:.75rem;letter-spacing:1px;pointer-events:none;white-space:nowrap;animation:toastIn .25s ease,toastOut .35s ease 2.2s forwards;}
.overlay{position:fixed;inset:0;z-index:500;background:rgba(0,0,0,.88);display:flex;align-items:center;justify-content:center;padding:16px;backdrop-filter:blur(6px);animation:fadeIn .2s ease;}
.modal{background:linear-gradient(145deg,#0d1c2e,#060f1a);border:1px solid rgba(200,244,0,.2);border-radius:14px;padding:18px;max-width:420px;width:100%;max-height:85vh;overflow-y:auto;}
.mhdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.mttl{font-family:var(--hd);font-size:1.4rem;letter-spacing:2px;color:var(--lime)}
.cbtn{width:26px;height:26px;border-radius:50%;background:rgba(255,255,255,.05);border:1px solid var(--border);color:var(--sub);cursor:pointer;display:flex;align-items:center;justify-content:center;}
.cbtn:hover{background:rgba(230,57,70,.18);border-color:var(--red);color:var(--red)}
.agrid{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-top:6px}
.acard{background:rgba(0,0,0,.4);border:1px solid var(--border);border-radius:8px;padding:9px;cursor:pointer;transition:all .16s;}
.acard.pk{border-color:var(--lime);background:rgba(200,244,0,.1)}

<script type="text/babel">

  uel:{id:"uel",name:"Europa League",short:"UEL",nation:"UEFA",pos:"MID",num:7,jc:"#F54029",sc:"#c22e1c",nc:"#fff",em:"🥈",cat:"intl", teams:[{h:"Liverpool",a:"Roma",actual:{h:3,a:0}},{h:"Sevilla",a:"Leverkusen",actual:{h:1,a:1}},{h:"Atalanta",a:"Ajax",actual:{h:2,a:2}}]},
  wc:{id:"wc",name:"World Cup 2026",short:"WC26",nation:"World",pos:"MID",num:8,jc:"#1a6e28",sc:"#124e1c",nc:"#c8f400",em:"🌍",cat:"intl", teams:[{h:"England",a:"France",actual:{h:1,a:2}},{h:"Brazil",a:"Argentina",actual:{h:1,a:1}},{h:"Spain",a:"Germany",actual:{h:2,a:1}},{h:"USA",a:"Mexico",actual:{h:1,a:0}}]},

};

const CHAMP_OPTS = {epl:["Liverpool","Man City","Arsenal","Chelsea"], liga:["Real Madrid","Barcelona","Atletico","Sevilla"], serie:["Inter Milan","Juventus","AC Milan","Napoli"], bundes:["Bayern","Leverkusen","Dortmund","RB Leipzig"], ligue:["PSG","Monaco","Marseille","Lyon"]};
const BALLON = [{n:"K. Mbappé",c:"Real Madrid",p:1200},{n:"E. Haaland",c:"Man City",p:1000},{n:"Vinicius Jr",c:"Real Madrid",p:950},{n:"Pedri",c:"Barcelona",p:900},{n:"Rodri",c:"Man City",p:880}];
const KOPA = [{n:"L. Yamal",c:"Barcelona",p:600},{n:"Endrick",c:"R. Madrid",p:550},{n:"W. Zaïre-Emery",c:"PSG",p:500}];
const GB = [{n:"L. Yamal",c:"Barcelona",p:500},{n:"Xavi Simons",c:"Leipzig",p:450},{n:"Mathys Tel",c:"Bayern",p:420}];
const TSCORERS = [{n:"E. Haaland",lg:"EPL",g:28},{n:"K. Mbappé",lg:"LaLiga",g:32},{n:"H. Kane",lg:"Bundesliga",g:26},{n:"V. Osimhen",lg:"SerieA",g:24}];
const TASSISTS = [{n:"K. De Bruyne",lg:"EPL",a:14},{n:"Pedri",lg:"LaLiga",a:16},{n:"J. Bellingham",lg:"LaLiga",a:12},{n:"L. Diaz",lg:"EPL",a:11}];
const LEADERBOARD = [{n:"GafferKing",pts:312,delta:3},{n:"TacticsTom",pts:287,delta:-2},{n:"PredictorPro",pts:264,delta:1},{n:"▶ You",pts:134,delta:2,me:true},{n:"StatsSam",pts:118,delta:-1},{n:"LuckyLeo",pts:97,delta:0}];
const ADS = [{txt:"NIKE · JUST DO IT",col:"#ff4500",bg:"#200000"},{txt:"ADIDAS · IMPOSSIBLE IS NOTHING",col:"#fff",bg:"#111"},{txt:"EA FC 26 · PRE-ORDER NOW",col:"#00d4ff",bg:"#001428"},{txt:"BETWAY · BET RESPONSIBLY",col:"#ffd700",bg:"#0a0a00"},{txt:"HEINEKEN · 0.0%",col:"#00aa44",bg:"#001408"},{txt:"QATAR AIRWAYS · PARTNER",col:"#5c0d3e",bg:"#1a0010"},{txt:"HUBLOT · OFFICIAL TIMEKEEPER",col:"#c8a060",bg:"#0a0800"},{txt:"MASTERCARD · PRICELESS MOMENTS",col:"#eb5c00",bg:"#1a0800"},{txt:"PEPSI · THIRST FOR MORE",col:"#004aad",bg:"#000814"},{txt:"SAMSUNG · GALAXY · OFFICIAL",col:"#1428a0",bg:"#000510"}];
const VERT_ADS = [{txt:"NIKE",col:"#ff4500",bg:"#200800"},{txt:"EA FC",col:"#00d4ff",bg:"#001428"},{txt:"BETWAY",col:"#ffd700",bg:"#0a0a00"},{txt:"ADIDAS",col:"#fff",bg:"#111"},{txt:"HEINEKEN",col:"#00aa44",bg:"#001408"},{txt:"QATAR AIR",col:"#5c0d3e",bg:"#1a0010"},{txt:"HUBLOT",col:"#c8a060",bg:"#0a0800"},{txt:"SAMSUNG",col:"#1428a0",bg:"#000510"}];

function calcPts(ph,pa,ah,aa){ ph=+ph; pa=+pa; ah=+ah; aa=+aa; if(isNaN(ph)||isNaN(pa)||isNaN(ah)||isNaN(aa)) return 0; if(ph===ah&&pa===aa) return 20; const pr=Math.sign(ph-pa), ar=Math.sign(ah-aa); if(pr===ar){ if(Math.abs(ph-ah)<=1&&Math.abs(pa-aa)<=1) return 14; return 10; } if(Math.abs((ph-pa)-(ah-aa))<=1) return 5; return 0; }
function ptsBadgeClass(pts){ if(pts===20) return 'gld'; if(pts===0) return 'rd'; return 'def'; }
function ptsFeedback(pts){ if(pts===null) return null; if(pts===20) return '🎯 EXACT!'; if(pts>=14) return '✅ Result+Score'; if(pts>=10) return '🟡 Correct'; if(pts>=5) return '🔶 Close'; return '❌ Miss'; }

// SVG Components
const FlagSVG = ({nation,w=16,h=11}) => { const c=FLAG_COLS[nation]||["#267a30","#fff","#1f6628"]; const ab=(nation||"??").slice(0,3).toUpperCase(); return <svg viewBox="0 0 18 13" style={{width:w,height:h,borderRadius:2,display:'block',flexShrink:0}}><rect width="18" height="4.3" fill={c[0]}/><rect y="4.3" width="18" height="4.4" fill={c[1]}/><rect y="8.7" width="18" height="4.3" fill={c[2]}/><text x="9" y="9" textAnchor="middle" fontSize="4" fontWeight="700" fill="rgba(0,0,0,.3)" fontFamily="sans-serif">{ab}</text></svg>; };
const JerseySVG = ({c,sc,nc,num,em,w=80}) => { const id=`jsy${num}`; const lg=adj(c,.18); return <svg viewBox="0 0 110 100" style={{width:w,height:'auto',display:'block'}} className="jsw"><defs><linearGradient id={`${id}g`} x1="0%" y1="0%" x2="80%" y2="100%"><stop offset="0%" stopColor={lg}/><stop offset="100%" stopColor={c}/></linearGradient><linearGradient id={`${id}s`} x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stopColor={adj(sc,.15)}/><stop offset="100%" stopColor={sc}/></linearGradient><filter id={`${id}f`}><feDropShadow dx="0" dy="3" stdDeviation="3" floodOpacity=".5"/></filter></defs><path d="M8,28 L0,50 L20,54 L20,32 Z" fill={`url(#${id}s)`} stroke="rgba(255,255,255,.14)" strokeWidth="1"/><path d="M102,28 L110,50 L90,54 L90,32 Z" fill={`url(#${id}s)`} stroke="rgba(255,255,255,.14)" strokeWidth="1"/><path d="M20,10 L8,28 L20,32 L20,88 L90,88 L90,32 L102,28 L90,10 L72,20 Q55,30 38,20 Z" fill={`url(#${id}g)`} stroke="rgba(255,255,255,.18)" strokeWidth="1.2" filter={`url(#${id}f)`}/><path d="M42,12 Q55,24 68,12 Q62,6 55,6 Q48,6 42,12 Z" fill={adj(c,-.12)} stroke="rgba(255,255,255,.1)" strokeWidth=".8"/><rect x="36" y="52" width="38" height="16" rx="3" fill="rgba(255,255,255,.05)" stroke="rgba(255,255,255,.06)" strokeWidth=".7"/>{em?<text x="55" y="46" textAnchor="middle" dominantBaseline="middle" fontSize="22">{em}</text>:<text x="55" y="44" textAnchor="middle" dominantBaseline="middle" fontFamily="'Bebas Neue',sans-serif" fontSize="26" fill={nc} fillOpacity=".88">{num}</text>}</svg>; };
const ShortsSVG = ({c,w=52}) => { const lg=adj(c,.18); return <svg viewBox="0 0 90 52" style={{width:w,height:'auto',display:'block'}} className="shorts-slot"><defs><linearGradient id={`shr${c.replace('#','')}`} x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stopColor={lg}/><stop offset="100%" stopColor={c}/></linearGradient></defs><path d="M9,0 L81,0 L89,52 L51,52 L45,36 L39,52 L1,52 Z" fill={`url(#shr${c.replace('#','')})`} stroke="rgba(255,255,255,.14)" strokeWidth="1"/><line x1="45" y1="0" x2="45" y2="36" stroke="rgba(255,255,255,.09)" strokeWidth="1"/></svg>; };
const PitchSVG = () => <svg className="pitch-svg" viewBox="0 0 800 800" fill="none" stroke="white" strokeWidth="2.5" preserveAspectRatio="none"><rect x="30" y="28" width="740" height="744" rx="4"/><line x1="30" y1="400" x2="770" y2="400"/><circle cx="400" cy="400" r="73"/><circle cx="400" cy="400" r="5" fill="white" stroke="none"/><rect x="184" y="28" width="432" height="152"/><rect x="296" y="28" width="208" height="48"/><rect x="338" y="6" width="124" height="24" strokeWidth="2"/><rect x="184" y="620" width="432" height="152"/><rect x="296" y="724" width="208" height="48"/><rect x="338" y="770" width="124" height="24" strokeWidth="2"/><circle cx="400" cy="120" r="5" fill="white" stroke="none"/><circle cx="400" cy="680" r="5" fill="white" stroke="none"/><path d="M296,176 Q400,228 504,176" strokeDasharray="4 3"/><path d="M296,624 Q400,572 504,624" strokeDasharray="4 3"/></svg>;

// SeatRows, OStandSeats, CornerSeats (simplified but functional)
const SeatRows = ({rows=3,cols=50,litRate=.4,wave=false}) => { const [lit,setLit]=useState(()=>Array(rows*cols).fill(0).map(()=>Math.random()<litRate)); useEffect(()=>{ if(!wave) return; const t=setInterval(()=>{ const idx=Math.floor(Math.random()*rows*cols); setLit(l=>{ const n=[...l]; n[idx]=!n[idx]; return n; }); },300); return()=>clearInterval(t); },[rows,cols,wave]); return <div>{Array(rows).fill(0).map((_,ri)=> <div key={ri} className="rsrow">{Array(cols).fill(0).map((_,ci)=>{ const idx=ri*cols+ci; return <div key={ci} className={`rseat${lit[idx]?' on':''}`}/>; })}</div>)}</div>; };
const OStandSeats = ({rows=18,cols=12,litRate=.38}) => { const [lit,setLit]=useState(()=>Array(rows*cols).fill(0).map(()=>Math.random()<litRate)); useEffect(()=>{ const t=setInterval(()=>{ const idx=Math.floor(Math.random()*rows*cols); setLit(l=>{ const n=[...l]; n[idx]=!n[idx]; return n; }); },500); return()=>clearInterval(t); },[rows,cols]); return <div className="ostand-seats">{Array(rows).fill(0).map((_,ri)=> <div key={ri} className="ostand-row">{Array(cols).fill(0).map((_,ci)=> <div key={ci} className={`oseat${lit[ri*cols+ci]?' on':''}`}/>)}</div>)}</div>; };
const CornerSeats = () => { const N=49; const [lit,setLit]=useState(()=>Array(N).fill(0).map(()=>Math.random()<.3)); useEffect(()=>{ const t=setInterval(()=>{ const i=Math.floor(Math.random()*N); setLit(l=>{ const n=[...l]; n[i]=!n[i]; return n; }); },700); return()=>clearInterval(t); },[]); return <div className="corner-grid">{lit.map((on,i)=> <div key={i} className={`cgrid-seat${on?' on':''}`}/>)}</div>; };
const AdBoard = ({ads,reverse=false,vertical=false}) => { const all=[...ads,...ads]; if(vertical){ return <div className="ostand-ad" style={{height:'100%',width:'100%'}}><div className="ostand-ad-inner" style={{flexDirection:'column',animation:reverse?'adScrollR 20s linear infinite':'adScroll 20s linear infinite',height:'200%'}}>{all.map((a,i)=> <div key={i} className="ad-seg" style={{background:a.bg,minHeight:'clamp(30px,5vw,60px)',width:'100%',flexDirection:'row',padding:'0 6px'}}><span className="ad-seg-txt" style={{color:a.col,transform:'none',fontSize:'clamp(.35rem,.55vw,.5rem)'}}>{a.txt}</span></div>)}</div></div>; } return <div className="adboard"><div className="adboard-inner" style={{animation:reverse?'adScrollR 22s linear infinite':'adScroll 22s linear infinite'}}>{all.map((a,i)=> <div key={i} className="ad-block" style={{background:a.bg,minWidth:'clamp(100px,16vw,200px)'}}><span className="ad-block-txt" style={{color:a.col}}>{a.txt}</span></div>)}</div></div>; };

const PSlot = ({comp:c,active,onClick,vis,pct}) => { if(!vis) return <div style={{width:70}}/>; const sw=window.innerWidth; const sz=sw<400?40:sw<700?54:sw<1000?68:80; return <div className={`pslot${active?' act':''}`} onClick={onClick}><div style={{display:'flex',flexDirection:'column',alignItems:'center',gap:1}}><JerseySVG c={c.jc} sc={c.sc} nc={c.nc} num={c.num} em={c.em} w={sz}/><ShortsSVG c={adj(c.jc,-.1)} w={Math.round(sz*.63)}/></div><div className="sbar"><span className="spct">{pct}</span><FlagSVG nation={c.nation} w={Math.round(sz*.2)} h={Math.round(sz*.13)}/></div><div className="slbl">{c.short}</div><div className="stag">{c.pos} #{c.num}</div></div>; };

const MCard = ({match:m,idx,cid,preds,locked,onPred,onLock,gw}) => { const k=`${cid}_gw${gw}_${idx}`; const p=preds[k]||{h:'',a:''}; const isl=locked[k]; const actual=m.actual; const pts=actual&&p.h!==''&&p.a!==''?calcPts(+p.h,+p.a,actual.h,actual.a):null; return <div className="mcard"><div className="mteams"><div className="tnm"><img className="tlogo" src={clubIcon(m.h)} alt=""/><span>{m.h}</span></div><div className="sinps"><input className="sinp" type="number" min="0" max="20" value={p.h} disabled={isl} onChange={e=>onPred(k,{...p,h:e.target.value})} placeholder="–"/><span className="ssep">:</span><input className="sinp" type="number" min="0" max="20" value={p.a} disabled={isl} onChange={e=>onPred(k,{...p,a:e.target.value})} placeholder="–"/></div><div className="tnm aw"><span>{m.a}</span><img className="tlogo" src={clubIcon(m.a)} alt=""/></div></div>{actual&&<div className="result-lbl">Result: {actual.h}–{actual.a}</div>}<div className="mfoot"><span className={`ptsbadge ${pts!==null?ptsBadgeClass(pts):'def'}`}>{pts!==null?`+${pts} pts`:'20 pts max'}</span>{pts!==null&&<span style={{fontFamily:'Barlow Condensed',fontSize:'.5rem',color:'rgba(255,255,255,.38)'}}>{ptsFeedback(pts)}</span>}<button className={`lbtn ${isl?'on':'off'}`} onClick={()=>onLock(k,cid)}>{isl?'🔒 Locked':'🔓 Lock'}</button></div></div>; };

const LeftPanel = ({pts,gw,yc,preds,locked}) => { const lc=Object.values(locked).filter(Boolean).length; const tot=Object.keys(preds).length; const acc=tot>0?Math.round((pts/Math.max(tot*4,1))*100):0; const rank=pts>250?'Elite Gaffer':pts>150?'Senior Gaffer':pts>80?'Rising Gaffer':'Junior Gaffer'; const gwH=[{g:gw-2,p:47},{g:gw-1,p:63},{g:gw,p:Math.max(pts,12)}].filter(x=>x.g>0); return <div style={{paddingBottom:8}}><div className="panel-ttl"><i className="fas fa-chart-simple"/> My Stats</div><div className="metric-row"><div className="metric-card"><div className="mc-val">{pts}</div><div className="mc-lbl">Points</div></div><div className="metric-card"><div className="mc-val" style={{color:'var(--gold)'}}>{gw}</div><div className="mc-lbl">GW</div></div><div className="metric-card"><div className="mc-val">{acc}%</div><div className="mc-lbl">Acc.</div></div></div><div className="pbar-wrap"><div className="pbar-lbl"><span>Season</span><span>{gw}/38</span></div><div className="pbar-bg"><div className="pbar-fill" style={{width:`${(gw/38)*100}%`}}/></div></div><div className="spill"><span className="sk"><i className="fas fa-lock"/> Locked</span><span className="sv">{lc}</span></div><div className="spill"><span className="sk"><i className="fas fa-futbol"/> Preds</span><span className="sv">{tot}</span></div><div className="sdiv"/><div className="subsect-lbl"><i className="fas fa-square" style={{color:'var(--gold)'}}/> Yellow Cards</div><div className="yc-wrap">{Array(5).fill(0).map((_,i)=><div key={i} className={`ycd${i<yc?' on':''}`}/>)}<span style={{marginLeft:4,fontFamily:'Bebas Neue',fontSize:'.88rem',color:yc>=5?'var(--red)':'var(--gold)'}}>{yc}/5</span></div>{yc>=5&&<div className="susp"><i className="fas fa-ban"/> SUSPENDED – Miss next GW</div>}<div className="sdiv"/><div className="subsect-lbl"><i className="fas fa-history"/> GW History</div>{gwH.map(h=><div key={h.g} className="gwh"><span className="gwh-g">GW{h.g}</span><span className="gwh-v" style={{color:h.p>=50?'#c8f400':h.p>=30?'#ffd700':'rgba(255,255,255,.4)'}}>+{h.p}</span></div>)}<div className="rank-card"><div className="rank-ttl"><i className="fas fa-ranking-star"/> Rank</div><div className="rank-val">{pts>250?'⭐':pts>150?'🔥':pts>80?'📈':'🌱'} {rank}</div></div><div className="sdiv"/><div className="subsect-lbl"><i className="fas fa-trophy"/> Leaderboard</div>{LEADERBOARD.map((p,i)=><div key={p.n} className={`lb-row${p.me?' me':''}`}><span className={`lb-pos${i<3?' t':''}`}>{i+1}</span><span className="lb-nm">{p.n}</span><span className={`lb-chg ${p.delta>0?'up':'dn'}`}>{p.delta>0?'▲':'▼'}{Math.abs(p.delta)}</span><span className="lb-pts">{p.pts}</span></div>)}<div className="sdiv"/><div className="subsect-lbl"><i className="fas fa-bolt"/> Chips</div>{[{n:'Wildcard',used:false,icon:'🃏'},{n:'Free Hit',used:false,icon:'🎯'},{n:'Triple Cap',used:true,icon:'3️⃣'},{n:'Bench Boost',used:false,icon:'⬆️'}].map(chip=><div key={chip.n} className="spill" style={{cursor:'pointer',opacity:chip.used ? 0.45 : 1}}><span className="sk">{chip.icon} {chip.n}</span><span style={{fontFamily:'Barlow Condensed',fontSize:'.58rem',color:chip.used?'var(--red)':'var(--lime)',fontWeight:700}}>{chip.used?'USED':'PLAY'}</span></div>)}</div>; };

const RightPanel = ({ac,preds,locked,onPred,onLock,gw,champPicks,onChamp,tscorer,tassist,onTop,bpick,kpick,gbpick,onAward,pts}) => { if(!ac) return <div style={{display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',height:'100%',gap:8,opacity:.3}}><div style={{fontSize:'2.4rem'}}>⚽</div><div style={{fontFamily:'Barlow Condensed',fontSize:'.75rem',letterSpacing:1}}>Tap a jersey to predict</div></div>; const c=COMPS[ac]; if(c.pos==='FWD-L'){ return <div><div className="panel-ttl"><i className="fas fa-trophy"/> League Champions</div><p style={{fontFamily:'Barlow Condensed',fontSize:'.6rem',color:'rgba(255,255,255,.35)',marginBottom:8}}>Pick the title winner for each league</p>{Object.entries(CHAMP_OPTS).map(([lid,teams])=><div key={lid} style={{marginBottom:9}}><div className="subsect-lbl"><img src={leagueLogo(lid)} style={{width:13,height:13}} alt=""/>{COMPS[lid]?.short} Winner</div><div className="chip-grp">{teams.map(t=><button key={t} className={`chip ${champPicks[lid]===t?'chip-on':'chip-off'}`} onClick={()=>onChamp(lid,t)}>{t}</button>)}</div>{champPicks[lid]&&<div style={{fontFamily:'Barlow Condensed',fontSize:'.55rem',color:'rgba(200,244,0,.6)'}}> ✅ {champPicks[lid]}</div>}</div>)}</div>; } if(c.pos==='FWD-C'){ return <div><div className="panel-ttl"><i className="fas fa-medal"/> Individual Awards</div>{[{title:"Ballon d'Or",data:BALLON,k:'ballon',cur:bpick,icon:"⭐"},{title:"Kopa Trophy",data:KOPA,k:'kopa',cur:kpick,icon:"🥇"},{title:"Golden Boy",data:GB,k:'gb',cur:gbpick,icon:"👑"}].map(s=><div key={s.k} style={{marginBottom:10}}><div className="subsect-lbl">{s.icon} {s.title}</div>{s.data.map(p=><div key={p.n} className={`awd-row${s.cur===p.n?' picked':''}`} onClick={()=>onAward(s.k,p.n)}><div><div className="awd-nm">{p.n}</div><div className="awd-sub">{p.c}</div></div><div style={{display:'flex',alignItems:'center',gap:5}}><span className="awd-v">{p.p}</span>{s.cur===p.n&&<span style={{color:'#c8f400',fontSize:'.62rem'}}>✓</span>}</div></div>)}</div>)}</div>; } if(c.pos==='FWD-R'){ return <div><div className="panel-ttl"><i className="fas fa-chart-line"/> Top Scorers & Assists</div><div className="subsect-lbl"><i className="fas fa-futbol"/> Top Scorer</div>{TSCORERS.map(p=><div key={p.n} className={`awd-row${tscorer===p.n?' picked':''}`} onClick={()=>onTop('s',p.n)}><div><div className="awd-nm">{p.n}</div><div className="awd-sub">{p.lg} · {p.g} goals</div></div><div style={{display:'flex',alignItems:'center',gap:5}}><span className="awd-v">{p.g}g</span>{tscorer===p.n&&<span style={{color:'#c8f400',fontSize:'.62rem'}}>✓</span>}</div></div>)}<div className="sdiv"/><div className="subsect-lbl"><i className="fas fa-hands-helping"/> Top Assists</div>{TASSISTS.map(p=><div key={p.n} className={`awd-row${tassist===p.n?' picked':''}`} onClick={()=>onTop('a',p.n)}><div><div className="awd-nm">{p.n}</div><div className="awd-sub">{p.lg} · {p.a} assists</div></div><div style={{display:'flex',alignItems:'center',gap:5}}><span className="awd-v">{p.a}a</span>{tassist===p.n&&<span style={{color:'#c8f400',fontSize:'.62rem'}}>✓</span>}</div></div>)}</div>; } const totalEarned=c.teams.reduce((sum,m,i)=>{ const k=`${ac}_gw${gw}_${i}`,p=preds[k],a=m.actual; if(p&&a&&p.h!==''&&p.a!=='') return sum+calcPts(+p.h,+p.a,a.h,a.a); return sum; },0); return <div><div className="panel-ttl"><img src={leagueLogo(ac)} style={{width:16,height:16}} alt=""/>{c.name} · GW{gw}</div><div style={{display:'flex',gap:5,flexWrap:'wrap',marginBottom:7}}>{['🎯 Exact=20','✅ Close=14','🟡 Result=10','🔶 Near=5'].map(t=><span key={t} style={{fontFamily:'Barlow Condensed',fontSize:'.5rem',color:'rgba(255,255,255,.3)'}}>{t}</span>)}</div>{c.teams.map((m,i)=><MCard key={i} match={m} idx={i} cid={ac} preds={preds} locked={locked} onPred={onPred} onLock={onLock} gw={gw}/>)}<div style={{textAlign:'right',fontFamily:'Bebas Neue',fontSize:'.95rem',color:'var(--lime)',marginTop:5,paddingTop:5,borderTop:'1px solid rgba(200,244,0,.1)'}}>EARNED THIS GW: +{totalEarned} pts</div><div className="sdiv"/><div className="subsect-lbl"><i className="fas fa-users"/> Head-to-Head</div>{[{n:'GafferKing',p:102},{n:'TacticsTom',p:89}].map(rival=><div key={rival.n} className="spill"><span className="sk">vs {rival.n}</span><div style={{display:'flex',alignItems:'center',gap:6}}><span style={{fontFamily:'Bebas Neue',fontSize:'.9rem',color:pts>rival.p?'var(--lime)':'var(--red)'}}>{pts}</span><span style={{fontFamily:'Barlow Condensed',fontSize:'.55rem',color:'rgba(255,255,255,.3)'}}>vs</span><span style={{fontFamily:'Bebas Neue',fontSize:'.9rem',color:'rgba(255,255,255,.55)'}}>{rival.p}</span></div></div>)}</div>; };

const CompPicker = ({count,sel,onToggle,onClose}) => <div className="overlay" onClick={onClose}><div className="modal" onClick={e=>e.stopPropagation()}><div className="mhdr"><div className="mttl"><i className="fas fa-futbol"/> Pick {count} Comps</div><button className="cbtn" onClick={onClose}>✕</button></div><p style={{fontFamily:'Barlow Condensed',fontSize:'.68rem',color:'rgba(255,255,255,.38)',marginBottom:10}}>Choose {count} competitions — {sel.length}/{count} selected</p><div className="agrid">{ALL_COMPS.map(c=><div key={c.id} className={`acard${sel.includes(c.id)?' pk':''}`} onClick={()=>onToggle(c.id)}><div style={{marginBottom:5}}><JerseySVG c={c.jc} sc={c.sc} nc={c.nc} num={c.num} em={c.em} w={34}/></div><div className="aname">{c.short}</div><div className="aclub">{c.name}</div></div>)}</div>{sel.length===count&&<button className="hbtn hbtn-a" style={{width:'100%',marginTop:12,padding:'9px',textAlign:'center'}} onClick={onClose}><i className="fas fa-check"/> Confirm</button>}</div></div>;

const Formation = ({ac,onSel,preds,locked,mode,enComps,gw}) => { const getAcc=id=>{ const c=COMPS[id]; if(!c||!c.teams.length) return '—'; let earn=0,possible=0; c.teams.forEach((_,i)=>{ const k=`${id}_gw${gw}_${i}`,p=preds[k],a=c.teams[i].actual; if(p&&a&&p.h!==''&&p.a!==''){ possible+=20; earn+=calcPts(+p.h,+p.a,a.h,a.a); } }); return possible>0?`${Math.round((earn/possible)*100)}%`:'—'; }; const vis=id=>mode==='Full 11'||enComps.includes(id); const rows=[[{id:'epl'}],[{id:'liga'},{id:'bundes'},{id:'serie'},{id:'ligue'}],[{id:'ucl'},{id:'uel'},{id:'wc'}],[{id:'champs'},{id:'awards'},{id:'stats'}]]; return <div className="formation"><PitchSVG/>{rows.map((row,ri)=><div key={ri} className="frow">{row.map(({id})=><PSlot key={id} comp={COMPS[id]} active={ac===id} vis={vis(id)} pct={getAcc(id)} onClick={()=>vis(id)&&onSel(id)}/>)}</div>)}</div>; };

function App(){ const [gw,setGw]=useState(32); const [ac,setAc]=useState('epl'); const [mode,setMode]=useState('Full 11'); const [preds,setPreds]=useState({}); const [locked,setLocked]=useState({}); const [yc,setYc]=useState(0); const [pts,setPts]=useState(134); const [flags,setFlags]=useState([]); const [toasts,setToasts]=useState([]); const [champPicks,setChampPicks]=useState({}); const [tscorer,setTscorer]=useState(null); const [tassist,setTassist]=useState(null); const [bpick,setBpick]=useState(null); const [kpick,setKpick]=useState(null); const [gbpick,setGbpick]=useState(null); const [enComps,setEnComps]=useState(['epl','ucl']); const [showPicker,setShowPicker]=useState(false); const [roofState,setRoofState]=useState('closed'); const [navTab,setNavTab]=useState('clubs'); const fid=useRef(0); const addToast=(msg,color='var(--lime)')=>{ const id=Date.now()+Math.random(); setToasts(t=>[...t,{id,msg,color}]); setTimeout(()=>setToasts(t=>t.filter(x=>x.id!==id)),2700); }; const fireFlag=useCallback(()=>{ const id=++fid.current; setFlags(f=>[...f,{id}]); setTimeout(()=>setFlags(f=>f.filter(x=>x.id!==id)),1600); },[]); const toggleRoof=()=>{ if(roofState==='closed'||roofState==='closing'){ setRoofState('opening'); setTimeout(()=>setRoofState('opened'),620); }else{ setRoofState('closing'); setTimeout(()=>setRoofState('closed'),520); } }; const handlePred=(k,v)=>{ setPreds(p=>({...p,[k]:v})); }; const handleLock=(k,cid)=>{ if(locked[k]){ if(yc>=5){ addToast('⛔ Suspended – Cannot unlock!','var(--red)'); return; } fireFlag(); setYc(c=>Math.min(5,c+1)); setLocked(l=>({...l,[k]:false})); const ded=Math.min(25,5*Math.max(1,gw-27)); setPts(p=>Math.max(0,p-ded)); addToast(`🟨 Yellow card! −${ded} pts`,'var(--gold)'); }else{ const p2=preds[k]; if(!p2||p2.h===''||p2.a===''){ addToast('⚠️ Enter a score first!','#ff6b35'); return; } setLocked(l=>({...l,[k]:true})); const c=COMPS[cid]; if(c){ const idx=+k.split('_')[2]; const m=c.teams[idx]; if(m?.actual) setPts(p=>p+calcPts(+p2.h,+p2.a,m.actual.h,m.actual.a)); } addToast('🔒 Prediction locked!'); } }; const handleGW=d=>{ if(d<0&&gw<=1||d>0&&gw>=38) return; setGw(g=>g+d); addToast(d>0?`⏩ GW ${gw+1}`:`⏪ GW ${gw-1}`); }; const handleMode=m=>{ setMode(m); if(m!=='Full 11') setShowPicker(true); addToast(`Mode: ${m}`); }; const handlePickerToggle=id=>{ const max=MODE_CNT[mode]||11; setEnComps(c=>{ if(c.includes(id)) return c.filter(x=>x!==id); if(c.length>=max) return c; return [...c,id]; }); }; const navItems=navTab==='clubs'?NAV_CLUBS:NAV_INTL; const roofOpen=roofState==='opened'||roofState==='opening'; const seatCols=Math.min(50,Math.floor(window.innerWidth/14)); return <div className="app"><div className="header"><div className="header-left"><div className="pts-chip"><div><span className="pts-val">{pts}</span><span className="pts-lbl">PTS</span></div></div></div><div className="header-center"><div className="brand">⚽ Gaffer's Pick</div><div className="brand-sub">Stadium Predictor · Season 2025/26</div></div><div className="header-right"><button className="hbtn hbtn-d"><i className="fas fa-user"/> Account</button></div></div><div className="mode-bar"><span style={{fontFamily:'Barlow Condensed',fontSize:'.58rem',letterSpacing:2,color:'rgba(255,255,255,.3)',textTransform:'uppercase',marginRight:2}}>Mode</span><div className="mode-sep"/>{MODES.map(m=><button key={m} className={`mbtn ${mode===m?'mbtn-on':'mbtn-off'}`} onClick={()=>handleMode(m)}>{m}</button>)}<div className="gw-ctrl"><div className="gwbtn" onClick={()=>handleGW(-1)}><i className="fas fa-chevron-left"/></div><div className="gw-num">GW {gw}</div><div className="gwbtn" onClick={()=>handleGW(1)}><i className="fas fa-chevron-right"/></div></div></div><div className="stadium-main"><div style={{display:'flex',flexDirection:'column',background:'#030810',overflow:'hidden'}}><div className="corner-blk" style={{height:'clamp(30px,5vw,55px)'}}><CornerSeats/></div><OStandSeats rows={20} cols={8} litRate={.38}/><AdBoard ads={VERT_ADS} vertical={true} reverse={false}/><div className="corner-blk" style={{height:'clamp(30px,5vw,55px)'}}><CornerSeats/></div></div><div className="stand-outer"><div style={{height:'clamp(18px,2.5vw,28px)'}}><AdBoard ads={ADS.slice(0,6)} reverse={false}/></div><OStandSeats rows={22} cols={13} litRate={.4}/><div style={{height:'clamp(18px,2.5vw,28px)'}}><AdBoard ads={ADS.slice(4,10)} reverse={true}/></div></div><div style={{display:'flex',flexDirection:'column',position:'relative',overflow:'hidden'}}><AdBoard ads={ADS}/><div style={{background:'#07111e',borderBottom:'2px solid rgba(200,244,0,.08)',padding:'3px 0'}}><SeatRows rows={3} cols={seatCols} litRate={.42} wave={true}/></div><div className="pitch-wrap" style={{flex:1,position:'relative'}}><Formation ac={ac} onSel={id=>{ setAc(id); }} preds={preds} locked={locked} mode={mode} enComps={enComps} gw={gw}/><div className={`roof ${roofState}`}><div className="roof-left"><div className="roof-seats-top"><SeatRows rows={2} cols={Math.floor(seatCols/2)} litRate={.38}/></div><div className="roof-content"><div className="roof-panel-inner" style={{background:'linear-gradient(180deg,rgba(6,11,22,.97),rgba(10,20,35,.95))'}}><LeftPanel pts={pts} gw={gw} yc={yc} preds={preds} locked={locked}/></div></div><div className="roof-seats-bot"><SeatRows rows={2} cols={Math.floor(seatCols/2)} litRate={.35}/></div></div><div className="roof-right"><div className="roof-seats-top"><SeatRows rows={2} cols={Math.floor(seatCols/2)} litRate={.38}/></div><div className="roof-content"><div className="roof-panel-inner" style={{background:'linear-gradient(180deg,rgba(6,11,22,.97),rgba(10,20,35,.95))'}}><RightPanel ac={ac} preds={preds} locked={locked} onPred={handlePred} onLock={handleLock} gw={gw} champPicks={champPicks} onChamp={(l,t)=>{ setChampPicks(p=>({...p,[l]:t})); addToast(`${COMPS[l]?.short}: ${t}`); }} tscorer={tscorer} tassist={tassist} onTop={(type,name)=>{ if(type==='s'){ setTscorer(name); addToast(`Top Scorer: ${name}`); }else{ setTassist(name); addToast(`Top Assists: ${name}`); } }} bpick={bpick} kpick={kpick} gbpick={gbpick} onAward={(type,name)=>{ if(type==='ballon'){ setBpick(name); addToast(`Ballon d'Or: ${name}`); }else if(type==='kopa'){ setKpick(name); addToast(`Kopa: ${name}`); }else{ setGbpick(name); addToast(`Golden Boy: ${name}`); } }} pts={pts}/></div></div><div className="roof-seats-bot"><SeatRows rows={2} cols={Math.floor(seatCols/2)} litRate={.35}/></div></div></div><button className="roof-toggle" onClick={toggleRoof}><i className={`fas fa-${roofOpen?'chevron-down':'chevron-up'}`}/>{roofOpen?'Close Roof · View Pitch':'Open Roof · Stats & Predictions'}</button></div><div style={{background:'#07111e',borderTop:'2px solid rgba(200,244,0,.08)',padding:'3px 0'}}><SeatRows rows={2} cols={seatCols} litRate={.4} wave={false}/></div><AdBoard ads={[...ADS].reverse()} reverse={true}/></div><div className="stand-outer right"><div style={{height:'clamp(18px,2.5vw,28px)'}}><AdBoard ads={ADS.slice(3,9)} reverse={true}/></div><OStandSeats rows={22} cols={13} litRate={.4}/><div style={{height:'clamp(18px,2.5vw,28px)'}}><AdBoard ads={ADS.slice(0,6)} reverse={false}/></div></div><div style={{display:'flex',flexDirection:'column',background:'#030810',overflow:'hidden'}}><div className="corner-blk" style={{height:'clamp(30px,5vw,55px)'}}><CornerSeats/></div><OStandSeats rows={20} cols={8} litRate={.38}/><AdBoard ads={VERT_ADS} vertical={true} reverse={true}/><div className="corner-blk" style={{height:'clamp(30px,5vw,55px)'}}><CornerSeats/></div></div></div><div className="nav"><div style={{display:'flex',flexDirection:'column',justifyContent:'center',gap:2,padding:'2px 4px',borderRight:'1px solid rgba(255,255,255,.07)',marginRight:2}}><button style={{padding:'2px 7px',borderRadius:18,fontFamily:'Barlow Condensed',fontSize:'.52rem',fontWeight:700,cursor:'pointer',border:'1px solid',background:navTab==='clubs'?'rgba(200,244,0,.12)':'rgba(0,0,0,.5)',borderColor:navTab==='clubs'?'rgba(200,244,0,.45)':'rgba(255,255,255,.08)',color:navTab==='clubs'?'var(--lime)':'rgba(255,255,255,.4)'}} onClick={()=>setNavTab('clubs')}>🏆 Clubs</button><button style={{padding:'2px 7px',borderRadius:18,fontFamily:'Barlow Condensed',fontSize:'.52rem',fontWeight:700,cursor:'pointer',border:'1px solid',background:navTab==='intl'?'rgba(200,244,0,.12)':'rgba(0,0,0,.5)',borderColor:navTab==='intl'?'rgba(200,244,0,.45)':'rgba(255,255,255,.08)',color:navTab==='intl'?'var(--lime)':'rgba(255,255,255,.4)'}} onClick={()=>setNavTab('intl')}>🌍 Intl</button></div>{navItems.map((item,i)=><React.Fragment key={item.id}><div className={`nav-item${ac===item.id?' active':''}`} onClick={()=>{ setAc(item.id); if(!roofOpen) toggleRoof(); }}><div className="ni" style={{fontSize:'1rem'}}>{item.icon}</div><div className="nl">{item.lbl}</div>{i===0&&<div className="nbdge">LIVE</div>}</div>{i<navItems.length-1&&<div className="nav-sep"/>}</React.Fragment>)}<div className="nav-sep"/>{[{icon:'🧑‍💼',lbl:'My Team',id:'myteam'},{icon:'🔄',lbl:'Transfers',id:'transfers'},{icon:'📊',lbl:'Stats',id:'mystats'},{icon:'🏅',lbl:'Mini-L',id:'minileague'}].map(item=><div key={item.id} className="nav-item" onClick={()=>addToast(`${item.lbl} – coming soon`)}><div className="ni" style={{fontSize:'1rem'}}>{item.icon}</div><div className="nl">{item.lbl}</div></div>)}</div>{flags.map(f=><div key={f.id} className="yfl">🚩</div>)}{toasts.map(t=><div key={t.id} className="toast" style={{background:'linear-gradient(90deg,#060e14,#0c1e0e)',border:`1.5px solid ${t.color}`,color:t.color}}><i className="fas fa-info-circle"/> {t.msg}</div>)}{showPicker&&mode!=='Full 11'&&<CompPicker count={MODE_CNT[mode]} sel={enComps} onToggle={handlePickerToggle} onClose={()=>setShowPicker(false)}/>}</div>; }

const rootElement = document.getElementById('root');
if(rootElement){
  try {
    const root = ReactDOM.createRoot(rootElement);
    root.render(<App/>);
  } catch(e) {
    console.error(e);
    rootElement.innerHTML = '<div style="color:#c8f400;text-align:center;padding:2rem;">Failed to start app. See console.</div>';
