
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>The Gaffer's Pick | Vertical Pitches · Dynamic Accuracy</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@400;600;700&family=Barlow:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      background: #121212;
      font-family: 'Barlow', sans-serif;
      color: #f0f0f0;
    }
    /* loader */
    .loader {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: #0a0a0a;
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 9999;
      transition: opacity 0.5s;
    }
    .loader i {
      font-size: 4rem;
      color: #b5f028;
      animation: spin 1s linear infinite;
    }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    .loader.hide { opacity: 0; pointer-events: none; }
    .app-wrapper { position: relative; z-index: 2; min-height: 100vh; }

    /* NAV */
    .glass-nav {
      background: rgba(0, 0, 0, 0.85);
      backdrop-filter: blur(16px);
      border-bottom: 1px solid #b5f028;
      padding: 0 2rem;
      height: 70px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .logo-text {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.8rem;
      background: linear-gradient(135deg, #b5f028, #e0ff80);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }
    .season-badge { background: #1f3a24; padding: 4px 12px; border-radius: 40px; font-size: 0.7rem; color: #b5f028; }
    .card-stack { background: rgba(0,0,0,0.7); padding: 5px 16px; border-radius: 40px; display: flex; gap: 12px; font-weight: bold; }
    .gw-badge { background: #b5f028; color: #0a2a12; padding: 5px 18px; border-radius: 40px; font-weight: bold; }
    .btn-outline-lime { background: transparent; border: 1.5px solid #b5f028; color: #b5f028; border-radius: 40px; padding: 6px 24px; cursor: pointer; }

    /* GW strip */
    .gw-strip { background: rgba(0,0,0,0.6); backdrop-filter: blur(8px); padding: 12px 0; overflow-x: auto; border-bottom: 1px solid #b5f028; }
    .gw-container { display: inline-flex; gap: 8px; padding: 0 1rem; }
    .gw-btn { background: #2a2a2a; border: 1px solid #5a9e6a; color: #eee; font-family: 'Barlow Condensed'; font-weight: bold; padding: 6px 18px; border-radius: 40px; cursor: pointer; display: inline-flex; align-items: center; gap: 6px; }
    .gw-btn i { font-size: 0.8rem; color: #b5f028; }
    .gw-btn.active-gw { background: #b5f028; color: #0a2a12; }
    .gw-btn.active-gw i { color: #0a2a12; }

    /* VERTICAL LEAGUE LIST (each league as a row) */
    .leagues-vertical {
      display: flex;
      flex-direction: column;
      gap: 2rem;
      padding: 2rem;
      max-width: 1200px;
      margin: 0 auto;
    }
    .league-row {
      background: rgba(0,0,0,0.3);
      border-radius: 24px;
      padding: 1rem;
    }
    .league-header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 1rem;
    }
    .league-badge-img {
      width: 50px;
      height: 50px;
      object-fit: contain;
      filter: drop-shadow(0 2px 4px black);
    }
    .league-name { font-family: 'Bebas Neue', font-size: 1.8rem; letter-spacing: 1px; }
    .league-points { font-size: 1.2rem; font-weight: bold; color: #b5f028; margin-left: auto; }

    /* MINIATURE PITCH CONTAINER (no text inside, pure pitch) */
    .mini-pitch {
      position: relative;
      background: linear-gradient(145deg, #2d8c3a, #1a5e2a);
      border-radius: 16px;
      height: 140px;
      margin-bottom: 1rem;
      border: 2px solid white;
      box-shadow: 0 0 0 2px rgba(0,0,0,0.2), inset 0 0 0 2px rgba(255,255,255,0.2);
      overflow: hidden;
      cursor: pointer;
      transition: 0.2s;
    }
    .mini-pitch.active-pitch {
      border: 2px solid #b5f028;
      box-shadow: 0 0 20px rgba(181,240,40,0.4);
    }
    /* pitch markings */
    .mini-pitch::before {
      content: '';
      position: absolute;
      top: 50%;
      left: 0;
      right: 0;
      height: 2px;
      background: rgba(255,255,255,0.6);
      transform: translateY(-50%);
      pointer-events: none;
    }
    .mini-pitch::after {
      content: '';
      position: absolute;
      top: 50%;
      left: 50%;
      width: 50px;
      height: 50px;
      border: 2px solid rgba(255,255,255,0.5);
      border-radius: 50%;
      transform: translate(-50%, -50%);
      pointer-events: none;
    }
    .goal-left, .goal-right {
      position: absolute;
      top: 50%;
      width: 20px;
      height: 40px;
      border: 2px solid rgba(255,255,255,0.6);
      transform: translateY(-50%);
      pointer-events: none;
    }
    .goal-left { left: 10px; border-right: none; }
    .goal-right { right: 10px; border-left: none; }
    .accuracy-number {
      position: absolute;
      bottom: 5px;
      right: 12px;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 3.5rem;
      font-weight: bold;
      color: rgba(0, 30, 0, 0.55);
      text-shadow: 0 0 2px rgba(255,255,255,0.3);
      pointer-events: none;
      z-index: 2;
    }

    /* champion controls below pitch */
    .champion-controls {
      display: flex;
      gap: 12px;
      align-items: center;
      flex-wrap: wrap;
    }
    .champion-selector {
      flex: 2;
      padding: 8px 12px;
      background: rgba(0,0,0,0.7);
      border-radius: 40px;
      color: white;
      border: 1px solid #b5f028;
      font-family: 'Barlow Condensed';
      font-weight: 600;
    }
    .lock-champ-btn {
      background: rgba(0,0,0,0.6);
      border: 1px solid white;
      border-radius: 40px;
      padding: 6px 16px;
      font-size: 0.8rem;
      cursor: pointer;
      font-weight: bold;
      color: white;
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }
    .lock-champ-btn.locked { background: #b5f028; color: black; border-color: #b5f028; }
    .penalty-text { font-size: 0.7rem; color: #ffaa66; margin-left: auto; }

    /* HORIZONTAL SLIM MATCH PREDICTIONS (each match is a small pitch) */
    .predictions-section {
      margin-top: 1rem;
    }
    .section-title {
      font-family: 'Bebas Neue';
      font-size: 1.5rem;
      margin-bottom: 1rem;
      padding: 0 1rem;
    }
    .matches-horizontal {
      display: flex;
      overflow-x: auto;
      gap: 16px;
      padding: 0.5rem 1rem 1rem;
      scrollbar-width: thin;
    }
    .match-mini-pitch {
      flex: 0 0 280px;
      background: linear-gradient(145deg, #2d8c3a, #1a5e2a);
      border-radius: 12px;
      padding: 0.8rem;
      border: 2px solid white;
      position: relative;
      transition: 0.2s;
    }
    .match-mini-pitch::before {
      content: '';
      position: absolute;
      top: 50%;
      left: 0;
      right: 0;
      height: 1px;
      background: rgba(255,255,255,0.4);
      transform: translateY(-50%);
      pointer-events: none;
    }
    .match-mini-pitch .teams {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
      position: relative;
      z-index: 2;
    }
    .team-name-sm { font-weight: bold; font-size: 0.9rem; text-shadow: 0 1px 2px black; }
    .vs-sm { font-size: 0.7rem; color: #b5f028; font-weight: bold; }
    .score-inputs {
      display: flex;
      justify-content: center;
      gap: 12px;
      align-items: center;
    }
    .score-input-mini {
      width: 50px;
      height: 40px;
      background: rgba(0,0,0,0.7);
      border-radius: 12px;
      text-align: center;
      font-size: 1.3rem;
      color: #b5f028;
      border: 1px solid #b5f028;
      font-weight: bold;
    }
    .score-input-mini:disabled { background: #2a2a2a; color: #aaa; border-color: #555; }
    .actual-hint {
      text-align: center;
      font-size: 0.65rem;
      margin-top: 6px;
      color: #b5f028;
    }
    .btn-submit-lime {
      background: linear-gradient(95deg, #b5f028, #8bcb1f);
      border: none;
      font-family: 'Bebas Neue';
      padding: 10px 24px;
      border-radius: 60px;
      cursor: pointer;
      font-weight: bold;
      margin: 1rem;
    }
    .tab-bar-modern {
      display: flex;
      gap: 12px;
      padding: 0 2rem;
      margin: 1rem 0;
    }
    .tab-modern {
      padding: 6px 24px;
      font-family: 'Barlow Condensed';
      font-weight: bold;
      cursor: pointer;
      border-radius: 60px;
      background: rgba(0, 0, 0, 0.5);
      color: #eee;
    }
    .tab-modern.active { background: #b5f028; color: #0a2a12; }
    .card-log { background: rgba(0, 0, 0, 0.7); border: 1px solid #b5f028; border-radius: 28px; padding: 1.5rem; margin: 1rem; }
    @media (max-width: 700px) {
      .match-mini-pitch { flex: 0 0 240px; }
      .league-row { padding: 0.8rem; }
    }
  </style>
</head>
<body>
<div class="loader" id="loader"><i class="fas fa-futbol"></i></div>
<div class="app-wrapper">
  <div class="glass-nav">
    <div style="display: flex; gap: 12px; align-items: baseline;">
      <div class="logo-text"><i class="fas fa-futbol"></i> The Gaffer's Pick</div>
      <div class="season-badge">2025/26</div>
    </div>
    <div style="display: flex; gap: 1rem; align-items: center;">
      <div class="card-stack"><i class="fas fa-square" style="color:#f5d742"></i> <span id="yellowCount">0</span> | <i class="fas fa-square" style="color:#e34d4d"></i> <span id="redCount">0</span></div>
      <div class="gw-badge" id="globalGWbadge">GW 1</div>
      <button class="btn-outline-lime" onclick="openModal()"><i class="fas fa-user-astronaut"></i> Sign In</button>
    </div>
  </div>

  <div class="gw-strip" id="gwStrip"><div class="gw-container" id="gwContainer"></div></div>

  <!-- VERTICAL LEAGUE LIST (mini pitches + champion controls below) -->
  <div class="leagues-vertical" id="leaguesVertical"></div>

  <!-- PREDICTIONS SECTION (horizontal slim pitch cards) -->
  <div class="predictions-section">
    <div class="section-title"><i class="fas fa-futbol"></i> Match Predictions · <span id="currentLeagueName">Premier League</span></div>
    <div id="predictionsContainer" class="matches-horizontal"></div>
    <div style="display: flex; justify-content: flex-end; padding: 0 1rem 1rem;">
      <button class="btn-submit-lime" id="submitPredictionsBtn" onclick="submitPredictions()"><i class="fas fa-lock"></i> LOCK GW PREDICTIONS</button>
    </div>
  </div>

  <div class="tab-bar-modern">
    <div class="tab-modern active" data-tab="predict">⚡ Predictions</div>
    <div class="tab-modern" data-tab="cards">🃏 Discipline</div>
    <div class="tab-modern" data-tab="leaderboard">📊 Leaderboard</div>
  </div>
  <div id="panel-cards" class="panel" style="display:none"></div>
  <div id="panel-leaderboard" class="panel" style="display:none"></div>

  <div class="modal-overlay" id="modalOverlay" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.95); backdrop-filter:blur(12px); align-items:center; justify-content:center; z-index:200;">
    <div style="background:#0f2a1a; padding:2rem; border-radius:40px; width:90%; max-width:400px; border:1px solid #b5f028;">
      <h2 style="color:white;">Enter The Dugout</h2>
      <input type="text" id="demoUser" placeholder="Username" style="width:100%; margin:1rem 0; padding:12px; background:#0a1812; border:1px solid #3e6b48; color:white; border-radius:40px;">
      <button onclick="fakeLogin()" class="btn-submit-lime" style="width:100%">Start Predicting</button>
      <button onclick="closeModal()" style="margin-top:1rem; background:none; border:none; color:#8aa;">Close</button>
    </div>
  </div>
</div>

<script>
  // hide loader
  (function() { const l=document.getElementById('loader'); function h(){ if(l) l.classList.add('hide'); } if(document.readyState==='loading') document.addEventListener('DOMContentLoaded',h); else h(); setTimeout(h,1500); })();

  // TOP 5 TEAMS ONLY
  const leaguesData = {
    epl: { name: "Premier League", badge: "https://upload.wikimedia.org/wikipedia/en/thumb/f/f2/Premier_League_Logo.svg/120px-Premier_League_Logo.svg.png", fullName: "Premier League", teams: ["Arsenal","Man City","Liverpool","Chelsea","Man Utd"], fixtures: [{ home:"Arsenal", away:"Man City"},{ home:"Liverpool", away:"Chelsea"},{ home:"Man Utd", away:"Tottenham"},{ home:"Newcastle", away:"Aston Villa"},{ home:"Brighton", away:"West Ham"}] },
    liga: { name: "La Liga", badge: "https://upload.wikimedia.org/wikipedia/commons/thumb/0/0f/LaLiga_logo.svg/120px-LaLiga_logo.svg.png", fullName: "La Liga", teams: ["Real Madrid","Barcelona","Atletico","Athletic","Real Betis"], fixtures: [{ home:"Real Madrid", away:"Barcelona"},{ home:"Atletico", away:"Sevilla"},{ home:"Athletic", away:"Villarreal"},{ home:"Real Betis", away:"Real Soc."},{ home:"Valencia", away:"Osasuna"}] },
    serie: { name: "Serie A", badge: "https://upload.wikimedia.org/wikipedia/commons/thumb/e/e7/Serie_A_logo_2022.svg/120px-Serie_A_logo_2022.svg.png", fullName: "Serie A", teams: ["Inter Milan","Juventus","AC Milan","Napoli","Lazio"], fixtures: [{ home:"Inter Milan", away:"Juventus"},{ home:"AC Milan", away:"Napoli"},{ home:"Lazio", away:"Roma"},{ home:"Atalanta", away:"Fiorentina"},{ home:"Torino", away:"Bologna"}] },
    bundes: { name: "Bundesliga", badge: "https://upload.wikimedia.org/wikipedia/commons/thumb/d/df/Bundesliga_logo.svg/120px-Bundesliga_logo.svg.png", fullName: "Bundesliga", teams: ["Bayern","Dortmund","Leverkusen","Leipzig","Stuttgart"], fixtures: [{ home:"Bayern", away:"Dortmund"},{ home:"Leverkusen", away:"Leipzig"},{ home:"Stuttgart", away:"Gladbach"},{ home:"Frankfurt", away:"Freiburg"},{ home:"Wolfsburg", away:"Hoffenheim"}] },
    ligue: { name: "Ligue 1", badge: "https://upload.wikimedia.org/wikipedia/commons/thumb/c/c3/Ligue_1_Uber_Eats_logo.svg/120px-Ligue_1_Uber_Eats_logo.svg.png", fullName: "Ligue 1", teams: ["PSG","Monaco","Marseille","Lyon","Lens"], fixtures: [{ home:"PSG", away:"Monaco"},{ home:"Marseille", away:"Lyon"},{ home:"Lens", away:"Rennes"},{ home:"Lille", away:"Nice"},{ home:"Nantes", away:"Strasbourg"}] },
    worldcup: { name: "World Cup", badge: "https://upload.wikimedia.org/wikipedia/en/thumb/6/6a/FIFA_World_Cup_Logo_2026.png/120px-FIFA_World_Cup_Logo_2026.png", fullName: "FIFA World Cup", teams: ["Brazil","Argentina","France","Germany","Spain"], fixtures: [{ home:"Brazil", away:"Argentina"},{ home:"France", away:"Spain"},{ home:"Germany", away:"England"},{ home:"Portugal", away:"Netherlands"},{ home:"Belgium", away:"Croatia"}] }
  };

  // generate actual results and user predictions for all GWs (1-38)
  let actualResults = {}, userPredictions = {};
  function generateData() {
    for (let league of Object.keys(leaguesData)) {
      actualResults[league] = {};
      userPredictions[league] = {};
      for (let gw = 1; gw <= 38; gw++) {
        actualResults[league][gw] = [];
        userPredictions[league][gw] = [];
        for (let i = 0; i < leaguesData[league].fixtures.length; i++) {
          let homeScore = Math.floor(Math.random() * 4);
          let awayScore = Math.floor(Math.random() * 3);
          if (homeScore === awayScore && homeScore === 0 && Math.random() > 0.3) homeScore = 1;
          actualResults[league][gw].push({ homeScore, awayScore });
          let hPred = homeScore + (Math.random() > 0.6 ? (Math.random() > 0.5 ? 1 : -1) : 0);
          let aPred = awayScore + (Math.random() > 0.6 ? (Math.random() > 0.5 ? 1 : -1) : 0);
          hPred = Math.max(0, Math.min(5, hPred));
          aPred = Math.max(0, Math.min(5, aPred));
          userPredictions[league][gw].push({ hPred, aPred });
        }
      }
    }
  }
  generateData();

  function computeAccuracy(league, currentGW) {
    let total = 0, correct = 0;
    for (let gw = 1; gw < currentGW; gw++) {
      let matches = userPredictions[league][gw];
      let actuals = actualResults[league][gw];
      for (let i = 0; i < matches.length; i++) {
        total++;
        if (matches[i].hPred === actuals[i].homeScore && matches[i].aPred === actuals[i].awayScore) correct++;
      }
    }
    return total === 0 ? 0 : Math.round((correct / total) * 100);
  }

  let currentLeague = "epl";
  let currentGW = 32;
  let leagueScores = { epl: 0, liga: 0, serie: 0, bundes: 0, ligue: 0, worldcup: 0 };
  let championPicks = { epl: "", liga: "", serie: "", bundes: "", ligue: "", worldcup: "" };
  let lockState = {};
  let penaltyPoints = { epl: 0, liga: 0, serie: 0, bundes: 0, ligue: 0, worldcup: 0 };
  let leagueAccuracy = {};
  function updateAllAccuracies() { for (let l of Object.keys(leaguesData)) leagueAccuracy[l] = computeAccuracy(l, currentGW); }
  updateAllAccuracies();

  let userCards = { yellows: 0, reds: 0, cardHistory: [] };
  let isSuspended = false;
  function giveYellowCard(reason) { if(isSuspended) return; userCards.yellows++; userCards.cardHistory.push({ gw: currentGW, reason, type:"yellow" }); showToast(`🟡 YELLOW: ${reason}`, "#f5d742"); updateCardUI(); let recent = userCards.cardHistory.filter(c=>c.type==="yellow" && (currentGW-c.gw)<=3).length; if(recent>=2 && userCards.reds===0) giveRedCard("Two yellows in 3 GWs"); }
  function giveRedCard(reason) { if(userCards.reds>0) return; userCards.reds++; userCards.cardHistory.push({ gw: currentGW, reason, type:"red" }); let deduction = 20; let keys = Object.keys(leagueScores); for(let k of keys) leagueScores[k] = Math.max(0, leagueScores[k] - deduction/keys.length); updateScoreDisplay(); isSuspended=true; showToast(`🔴 RED CARD! -20pts, suspended next GW. ${reason}`, "#e34d4d"); updateCardUI(); userCards.yellows=0; }
  function updateCardUI() { document.getElementById("yellowCount").innerText = userCards.yellows; document.getElementById("redCount").innerText = userCards.reds; }
  function checkRiskyPrediction(h,a) { let margin = Math.abs(parseInt(h||0)-parseInt(a||0)); if(margin>=4) giveYellowCard(`Risky margin ${h}-${a}`); }
  function showToast(msg, color="#b5f028") { let t=document.createElement("div"); t.innerText=msg; t.style.position="fixed"; t.style.bottom="20px"; t.style.left="50%"; t.style.transform="translateX(-50%)"; t.style.background=color; t.style.color="#0a2a12"; t.style.padding="8px 20px"; t.style.borderRadius="60px"; t.style.zIndex="999"; t.style.fontWeight="bold"; document.body.appendChild(t); setTimeout(()=>t.remove(),2500); }

  function updateMatchPred(league, idx, type, val) {
    if(isSuspended) { showToast("Suspended this GW!"); return; }
    if (currentGW <= 31) { showToast("Past gameweeks are locked!"); return; }
    let pred = userPredictions[league][currentGW][idx];
    if(type === 'home') pred.hPred = parseInt(val) || 0;
    else pred.aPred = parseInt(val) || 0;
    checkRiskyPrediction(pred.hPred, pred.aPred);
    renderPredictions();
  }

  function submitPredictions() {
    if(isSuspended) { showToast("Suspended! Cannot submit."); return; }
    if (currentGW <= 31) { showToast("Past gameweeks are already recorded."); return; }
    showToast(`✅ GW${currentGW} predictions saved! Accuracy will update when you advance GW.`, "#b5f028");
    // In a real app, you would lock submissions here.
  }

  // RENDER VERTICAL LEAGUE ROWS (mini pitch + champion controls below)
  function renderLeaguesVertical() {
    const container = document.getElementById("leaguesVertical");
    container.innerHTML = "";
    for (let [key, league] of Object.entries(leaguesData)) {
      let lock = lockState[key] || { locked: false, lockGW: null };
      let percent = leagueAccuracy[key] || 0;
      let row = document.createElement("div");
      row.className = "league-row";
      row.innerHTML = `
        <div class="league-header">
          <img src="${league.badge}" class="league-badge-img" onerror="this.src='https://via.placeholder.com/50'">
          <div class="league-name">${league.name}</div>
          <div class="league-points">${Math.round(leagueScores[key])} pts</div>
        </div>
        <div class="mini-pitch ${currentLeague === key ? 'active-pitch' : ''}" data-league="${key}" onclick="selectLeague('${key}')">
          <div class="goal-left"></div><div class="goal-right"></div>
          <div class="accuracy-number">${percent}%</div>
        </div>
        <div class="champion-controls">
          <select class="champion-selector" id="champSelect-${key}" ${lock.locked ? 'disabled' : ''} onchange="updateChampionPick('${key}', this.value)">
            <option value="">— Pick Champion —</option>
            ${league.teams.map(t => `<option ${championPicks[key]===t ? 'selected' : ''}>${t}</option>`).join('')}
          </select>
          <button class="lock-champ-btn ${lock.locked ? 'locked' : ''}" onclick="toggleLeagueLock('${key}')">
            <i class="fas ${lock.locked ? 'fa-lock' : 'fa-lock-open'}"></i> ${lock.locked ? 'Locked' : 'Unlock'}
          </button>
          ${penaltyPoints[key] ? `<div class="penalty-text">⚠️ -${penaltyPoints[key]} pts</div>` : ''}
        </div>
      `;
      container.appendChild(row);
    }
  }

  window.selectLeague = (leagueId) => {
    currentLeague = leagueId;
    renderLeaguesVertical();
    renderPredictions();
    document.getElementById("currentLeagueName").innerText = leaguesData[leagueId].name;
  };
  window.updateChampionPick = (leagueId, val) => {
    if(lockState[leagueId]?.locked) { showToast("Champion locked! Unlock first."); return; }
    championPicks[leagueId] = val;
    renderLeaguesVertical();
  };
  function toggleLeagueLock(leagueId) {
    let lock = lockState[leagueId];
    if(!lock) lockState[leagueId] = { locked: false, lockGW: null };
    lock = lockState[leagueId];
    if(!lock.locked) {
      if(!championPicks[leagueId]) { showToast("Select a champion first!"); return; }
      lock.locked = true; lock.lockGW = currentGW;
      showToast(`🔒 ${leaguesData[leagueId].fullName} champion locked at GW${currentGW}`);
    } else {
      let weeks = currentGW - (lock.lockGW || currentGW);
      let penalty = weeks * 2;
      if(penalty>0) {
        penaltyPoints[leagueId] += penalty;
        leagueScores[leagueId] = Math.max(0, leagueScores[leagueId] - penalty);
        giveYellowCard(`Unlocked ${leaguesData[leagueId].fullName} after ${weeks} GWs (-${penalty} pts)`);
        updateScoreDisplay();
      }
      lock.locked = false; lock.lockGW = null;
    }
    renderLeaguesVertical();
  }

  // RENDER HORIZONTAL SLIM MATCH PITCHES
  function renderPredictions() {
    const container = document.getElementById("predictionsContainer");
    const matches = leaguesData[currentLeague].fixtures;
    const userPreds = userPredictions[currentLeague][currentGW];
    const actuals = actualResults[currentLeague][currentGW];
    const isPast = currentGW < 32;
    let html = "";
    matches.forEach((m, idx) => {
      let userH = userPreds[idx].hPred;
      let userA = userPreds[idx].aPred;
      let actualH = actuals[idx].homeScore;
      let actualA = actuals[idx].awayScore;
      let displayHome = isPast ? actualH : (userH !== undefined ? userH : '');
      let displayAway = isPast ? actualA : (userA !== undefined ? userA : '');
      html += `
        <div class="match-mini-pitch">
          <div class="teams">
            <span class="team-name-sm">${m.home}</span>
            <span class="vs-sm">VS</span>
            <span class="team-name-sm">${m.away}</span>
          </div>
          <div class="score-inputs">
            <input class="score-input-mini" type="number" id="h_${idx}" value="${displayHome}" ${isPast ? 'disabled' : ''} placeholder="0" onchange="updateMatchPred('${currentLeague}',${idx},'home',this.value)">
            <span style="color:#b5f028;">-</span>
            <input class="score-input-mini" type="number" id="a_${idx}" value="${displayAway}" ${isPast ? 'disabled' : ''} placeholder="0" onchange="updateMatchPred('${currentLeague}',${idx},'away',this.value)">
          </div>
          ${isPast ? `<div class="actual-hint">Actual: ${actualH}–${actualA}</div>` : '<div class="actual-hint">Predict score</div>'}
        </div>
      `;
    });
    container.innerHTML = html;
  }

  function renderCardsPanel() {
    let history = `<div class="card-log"><h3>🃏 DISCIPLINARY RECORD</h3>`;
    if(userCards.cardHistory.length===0) history += `<p>✅ No cards this season</p>`;
    else userCards.cardHistory.slice().reverse().forEach(c => { history += `<div><i class="fas fa-${c.type==='yellow'?'square':'circle'}" style="color:${c.type==='yellow'?'#f5d742':'#e34d4d'}"></i> GW${c.gw}: ${c.reason} (${c.type.toUpperCase()})</div>`; });
    history += `<p style="margin-top:1rem">⚠️ Rules: 4+ goal margin OR unlock champion = 🟡. Two yellows in 3 GWs = 🔴 (-20pts, next GW suspension).</p></div>`;
    document.getElementById("panel-cards").innerHTML = history;
  }
  function renderLeaderboard() {
    let total = Object.values(leagueScores).reduce((a,b)=>a+b,0);
    document.getElementById("panel-leaderboard").innerHTML = `<div class="card-log"><h2>🏆 GLOBAL LEADERBOARD</h2><div>1. ⚡ EliteGaffer - 4,890</div><div>2. 🎯 YOU - ${total.toFixed(0)} pts</div><div><small>Accuracy % updates per gameweek based on correct predictions.</small></div></div>`;
  }
  function updateScoreDisplay() { renderLeaguesVertical(); }

  // GW Strip 1-38 with dynamic accuracy update
  function buildGWStrip() {
    let container = document.getElementById("gwContainer");
    for(let i=1;i<=38;i++) {
      let btn = document.createElement("button");
      btn.className = "gw-btn";
      btn.innerHTML = `<i class="fas fa-futbol"></i> GW ${i}`;
      if(i===currentGW) btn.classList.add("active-gw");
      btn.onclick = () => {
        currentGW = i;
        document.getElementById("globalGWbadge").innerHTML = `GW ${currentGW}`;
        document.querySelectorAll(".gw-btn").forEach(b=>b.classList.remove("active-gw"));
        btn.classList.add("active-gw");
        updateAllAccuracies();   // recalc percentages based on new currentGW
        renderLeaguesVertical();  // refresh % in league pitches
        renderPredictions();      // show locked/unlocked matches
        showToast(`Gameweek ${currentGW} — Accuracy updated based on past GWs.`);
      };
      container.appendChild(btn);
    }
  }

  for(let l of Object.keys(leaguesData)) if(!lockState[l]) lockState[l] = { locked: false, lockGW: null };
  function fakeLogin() { closeModal(); showToast("Welcome! Change GW to see accuracy % change."); }
  function openModal() { document.getElementById("modalOverlay").style.display = "flex"; }
  function closeModal() { document.getElementById("modalOverlay").style.display = "none"; }

  window.updateMatchPred = updateMatchPred;
  buildGWStrip();
  renderLeaguesVertical();
  renderPredictions();
  renderCardsPanel();
  renderLeaderboard();
  updateCardUI();
  document.getElementById("currentLeagueName").innerText = leaguesData[currentLeague].name;

  // TABS
  document.querySelectorAll(".tab-modern").forEach(t=>t.addEventListener("click",()=>{
    document.querySelectorAll(".tab-modern").forEach(tt=>tt.classList.remove("active"));
    t.classList.add("active");
    switchTab(t.getAttribute("data-tab"));
  }));
  function switchTab(tabId) {
    document.querySelectorAll(".panel").forEach(p=>p.style.display="none");
    document.getElementById(`panel-${tabId}`).style.display="block";
    if(tabId==='cards') renderCardsPanel();
    if(tabId==='leaderboard') renderLeaderboard();
  }
  // hide predictions panel initially? Actually predictions are always visible above tabs, but we keep them.
  // Ensure predictions container stays visible.
</script>
</body>
</html>
