<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
  <title>The Gaffer's Pick | TikTok Pitch · Vertical Scroll</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@400;600;700&family=Barlow:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      background: #0a0a0a;
      font-family: 'Barlow', sans-serif;
      color: white;
      overflow-x: hidden;
    }
    /* loader */
    .loader {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: #0a0a0a;
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 9999;
      transition: opacity 0.5s;
    }
    .loader i { font-size: 4rem; color: #b5f028; animation: spin 1s linear infinite; }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    .loader.hide { opacity: 0; pointer-events: none; }

    /* TikTok-style vertical scroll container */
    .tiktok-scroll {
      height: 100vh;
      overflow-y: scroll;
      scroll-snap-type: y mandatory;
      scroll-behavior: smooth;
    }
    .league-pitch {
      scroll-snap-align: start;
      min-height: 100vh;
      width: 100%;
      position: relative;
      background: linear-gradient(145deg, #1a6b2e, #0f451f);
      border-bottom: 3px solid #b5f028;
      display: flex;
      flex-direction: column;
      overflow-y: auto;
    }
    /* pitch markings on whole container */
    .league-pitch::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      border: 4px solid rgba(255,255,255,0.3);
      border-radius: 20px;
      margin: 15px;
      pointer-events: none;
      z-index: 1;
    }
    .league-pitch::after {
      content: '';
      position: absolute;
      top: 50%;
      left: 0;
      right: 0;
      height: 3px;
      background: rgba(255,255,255,0.4);
      transform: translateY(-50%);
      pointer-events: none;
      z-index: 1;
    }
    /* center circle */
    .center-circle {
      position: absolute;
      top: 50%;
      left: 50%;
      width: 120px;
      height: 120px;
      border: 2px solid rgba(255,255,255,0.4);
      border-radius: 50%;
      transform: translate(-50%, -50%);
      pointer-events: none;
      z-index: 1;
    }
    /* goal areas */
    .goal-area-left, .goal-area-right {
      position: absolute;
      top: 50%;
      width: 40px;
      height: 80px;
      border: 2px solid rgba(255,255,255,0.5);
      transform: translateY(-50%);
      pointer-events: none;
      z-index: 1;
    }
    .goal-area-left { left: 20px; border-right: none; }
    .goal-area-right { right: 20px; border-left: none; }

    /* header inside pitch */
    .pitch-header {
      position: relative;
      z-index: 3;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 1rem 1.5rem;
      background: rgba(0,0,0,0.5);
      backdrop-filter: blur(8px);
      margin: 15px 15px 0 15px;
      border-radius: 60px;
    }
    .league-badge {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .league-badge img { width: 45px; height: 45px; object-fit: contain; filter: drop-shadow(0 2px 4px black); }
    .league-title { font-family: 'Bebas Neue', font-size: 1.8rem; line-height: 1; }
    .league-points { font-size: 1.2rem; font-weight: bold; color: #b5f028; }

    /* matches grid (inside pitch, like scoreboards on the field) */
    .matches-on-pitch {
      position: relative;
      z-index: 3;
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 16px;
      padding: 1.5rem;
      margin-top: auto;
      margin-bottom: auto;
    }
    .match-card-pitch {
      background: rgba(0,0,0,0.65);
      backdrop-filter: blur(12px);
      border-radius: 20px;
      padding: 12px;
      width: 220px;
      border: 1px solid #b5f028;
      text-align: center;
    }
    .match-teams {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
      font-weight: bold;
      font-size: 0.9rem;
      margin-bottom: 10px;
    }
    .score-inputs {
      display: flex;
      justify-content: center;
      gap: 12px;
      align-items: center;
    }
    .score-input-pitch {
      width: 55px;
      height: 45px;
      background: #0a2a12;
      border-radius: 12px;
      text-align: center;
      font-size: 1.4rem;
      color: #b5f028;
      border: 1px solid #b5f028;
      font-weight: bold;
    }
    .score-input-pitch:disabled {
      background: #2a2a2a;
      color: #aaa;
      border-color: #555;
    }
    .actual-result {
      font-size: 0.7rem;
      margin-top: 6px;
      color: #b5f028;
    }

    /* champion control (outside pitch - below) */
    .champion-controls-outside {
      position: relative;
      z-index: 3;
      background: rgba(0,0,0,0.7);
      backdrop-filter: blur(12px);
      margin: 15px;
      padding: 12px 20px;
      border-radius: 60px;
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }
    .champion-selector-outside {
      flex: 2;
      padding: 8px 15px;
      background: #0a2a12;
      border-radius: 40px;
      color: white;
      border: 1px solid #b5f028;
      font-family: 'Barlow Condensed';
      font-weight: bold;
    }
    .lock-champ-outside {
      background: rgba(0,0,0,0.6);
      border: 1px solid white;
      border-radius: 40px;
      padding: 6px 20px;
      cursor: pointer;
      font-weight: bold;
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }
    .lock-champ-outside.locked { background: #b5f028; color: black; border-color: #b5f028; }
    .penalty-text { font-size: 0.7rem; color: #ffaa66; }

    /* transparent champion text inside pitch (when locked) */
    .champion-overlay {
      position: absolute;
      bottom: 30%;
      left: 50%;
      transform: translateX(-50%);
      font-family: 'Bebas Neue';
      font-size: 3rem;
      font-weight: bold;
      color: rgba(255,255,255,0.2);
      text-transform: uppercase;
      white-space: nowrap;
      pointer-events: none;
      z-index: 2;
      text-align: center;
    }
    /* accuracy percentage on pitch (transparent) */
    .accuracy-overlay-pitch {
      position: absolute;
      top: 20%;
      right: 20px;
      font-family: 'Bebas Neue';
      font-size: 4rem;
      font-weight: bold;
      color: rgba(0, 30, 0, 0.45);
      text-shadow: 0 0 4px rgba(0,0,0,0.5);
      pointer-events: none;
      z-index: 2;
    }

    /* GW strip fixed at top (outside scroll) */
    .gw-strip-fixed {
      position: sticky;
      top: 0;
      background: rgba(0,0,0,0.9);
      backdrop-filter: blur(16px);
      padding: 10px 0;
      overflow-x: auto;
      white-space: nowrap;
      z-index: 100;
      border-bottom: 1px solid #b5f028;
    }
    .gw-container-fixed {
      display: inline-flex;
      gap: 8px;
      padding: 0 1rem;
    }
    .gw-btn-fixed {
      background: #2a2a2a;
      border: 1px solid #5a9e6a;
      color: #eee;
      font-family: 'Barlow Condensed';
      font-weight: bold;
      padding: 6px 18px;
      border-radius: 40px;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }
    .gw-btn-fixed.active-gw { background: #b5f028; color: #0a2a12; }
    .gw-btn-fixed i { font-size: 0.8rem; }

    /* tabs fixed at bottom */
    .bottom-tabs {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: rgba(0,0,0,0.9);
      backdrop-filter: blur(16px);
      display: flex;
      justify-content: space-around;
      padding: 10px 0;
      border-top: 1px solid #b5f028;
      z-index: 100;
    }
    .bottom-tab {
      text-align: center;
      padding: 5px 20px;
      font-family: 'Barlow Condensed';
      font-weight: bold;
      cursor: pointer;
      color: #aaa;
    }
    .bottom-tab.active { color: #b5f028; border-bottom: 2px solid #b5f028; }
    .card-log { background: #0a0a0a; padding: 1rem; margin-bottom: 70px; }
    @media (max-width: 700px) {
      .match-card-pitch { width: 180px; }
      .champion-overlay { font-size: 2rem; white-space: normal; width: 80%; text-align: center; }
      .accuracy-overlay-pitch { font-size: 2.5rem; top: 15%; }
    }
  </style>
</head>
<body>
<div class="loader" id="loader"><i class="fas fa-futbol"></i></div>

<!-- Fixed GW Strip -->
<div class="gw-strip-fixed" id="gwStripFixed">
  <div class="gw-container-fixed" id="gwContainerFixed"></div>
</div>

<!-- TikTok vertical scroll (each league = one full screen pitch) -->
<div class="tiktok-scroll" id="tiktokScroll"></div>

<!-- Fixed Bottom Tabs -->
<div class="bottom-tabs">
  <div class="bottom-tab active" data-tab="predict">⚡ Pitch</div>
  <div class="bottom-tab" data-tab="cards">🃏 Cards</div>
  <div class="bottom-tab" data-tab="leaderboard">🏆 Rank</div>
</div>

<!-- panels for cards/leaderboard (hidden by default, shown when tab clicked) -->
<div id="panel-cards" style="display:none; margin-bottom: 70px;"></div>
<div id="panel-leaderboard" style="display:none; margin-bottom: 70px;"></div>

<div class="modal-overlay" id="modalOverlay" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.95); backdrop-filter:blur(12px); align-items:center; justify-content:center; z-index:200;">
  <div style="background:#0f2a1a; padding:2rem; border-radius:40px; width:90%; max-width:400px; border:1px solid #b5f028;">
    <h2 style="color:white;">Enter The Dugout</h2>
    <input type="text" id="demoUser" placeholder="Username" style="width:100%; margin:1rem 0; padding:12px; background:#0a1812; border:1px solid #3e6b48; color:white; border-radius:40px;">
    <button onclick="fakeLogin()" class="btn-submit-lime" style="background:#b5f028; border:none; padding:10px; width:100%; border-radius:40px;">Start</button>
    <button onclick="closeModal()" style="margin-top:1rem; background:none; border:none; color:#8aa;">Close</button>
  </div>
</div>

<script>
  // hide loader
  (function() { const l=document.getElementById('loader'); function h(){ if(l) l.classList.add('hide'); } if(document.readyState==='loading') document.addEventListener('DOMContentLoaded',h); else h(); setTimeout(h,1500); })();

  // LEAGUES (Top 5 teams only)
  const leaguesData = {
    epl: { name: "Premier League", badge: "https://upload.wikimedia.org/wikipedia/en/thumb/f/f2/Premier_League_Logo.svg/120px-Premier_League_Logo.svg.png", fullName: "Premier League", teams: ["Arsenal","Man City","Liverpool","Chelsea","Man Utd"], fixtures: [{ home:"Arsenal", away:"Man City"},{ home:"Liverpool", away:"Chelsea"},{ home:"Man Utd", away:"Tottenham"},{ home:"Newcastle", away:"Aston Villa"},{ home:"Brighton", away:"West Ham"}] },
    liga: { name: "La Liga", badge: "https://upload.wikimedia.org/wikipedia/commons/thumb/0/0f/LaLiga_logo.svg/120px-LaLiga_logo.svg.png", fullName: "La Liga", teams: ["Real Madrid","Barcelona","Atletico","Athletic","Real Betis"], fixtures: [{ home:"Real Madrid", away:"Barcelona"},{ home:"Atletico", away:"Sevilla"},{ home:"Athletic", away:"Villarreal"},{ home:"Real Betis", away:"Real Soc."},{ home:"Valencia", away:"Osasuna"}] },
    serie: { name: "Serie A", badge: "https://upload.wikimedia.org/wikipedia/commons/thumb/e/e7/Serie_A_logo_2022.svg/120px-Serie_A_logo_2022.svg.png", fullName: "Serie A", teams: ["Inter Milan","Juventus","AC Milan","Napoli","Lazio"], fixtures: [{ home:"Inter Milan", away:"Juventus"},{ home:"AC Milan", away:"Napoli"},{ home:"Lazio", away:"Roma"},{ home:"Atalanta", away:"Fiorentina"},{ home:"Torino", away:"Bologna"}] },
    bundes: { name: "Bundesliga", badge: "https://upload.wikimedia.org/wikipedia/commons/thumb/d/df/Bundesliga_logo.svg/120px-Bundesliga_logo.svg.png", fullName: "Bundesliga", teams: ["Bayern","Dortmund","Leverkusen","Leipzig","Stuttgart"], fixtures: [{ home:"Bayern", away:"Dortmund"},{ home:"Leverkusen", away:"Leipzig"},{ home:"Stuttgart", away:"Gladbach"},{ home:"Frankfurt", away:"Freiburg"},{ home:"Wolfsburg", away:"Hoffenheim"}] },
    ligue: { name: "Ligue 1", badge: "https://upload.wikimedia.org/wikipedia/commons/thumb/c/c3/Ligue_1_Uber_Eats_logo.svg/120px-Ligue_1_Uber_Eats_logo.svg.png", fullName: "Ligue 1", teams: ["PSG","Monaco","Marseille","Lyon","Lens"], fixtures: [{ home:"PSG", away:"Monaco"},{ home:"Marseille", away:"Lyon"},{ home:"Lens", away:"Rennes"},{ home:"Lille", away:"Nice"},{ home:"Nantes", away:"Strasbourg"}] },
    worldcup: { name: "World Cup", badge: "https://upload.wikimedia.org/wikipedia/en/thumb/6/6a/FIFA_World_Cup_Logo_2026.png/120px-FIFA_World_Cup_Logo_2026.png", fullName: "FIFA World Cup", teams: ["Brazil","Argentina","France","Germany","Spain"], fixtures: [{ home:"Brazil", away:"Argentina"},{ home:"France", away:"Spain"},{ home:"Germany", away:"England"},{ home:"Portugal", away:"Netherlands"},{ home:"Belgium", away:"Croatia"}] }
  };

  // generate actual results and user predictions (1-38 GW)
  let actualResults = {}, userPredictions = {};
  function generateData() {
    for (let league of Object.keys(leaguesData)) {
      actualResults[league] = {};
      userPredictions[league] = {};
      for (let gw = 1; gw <= 38; gw++) {
        actualResults[league][gw] = [];
        userPredictions[league][gw] = [];
        for (let i = 0; i < leaguesData[league].fixtures.length; i++) {
          let homeScore = Math.floor(Math.random() * 4);
          let awayScore = Math.floor(Math.random() * 3);
          if (homeScore === awayScore && homeScore === 0 && Math.random() > 0.3) homeScore = 1;
          actualResults[league][gw].push({ homeScore, awayScore });
          let hPred = homeScore + (Math.random() > 0.6 ? (Math.random() > 0.5 ? 1 : -1) : 0);
          let aPred = awayScore + (Math.random() > 0.6 ? (Math.random() > 0.5 ? 1 : -1) : 0);
          hPred = Math.max(0, Math.min(5, hPred));
          aPred = Math.max(0, Math.min(5, aPred));
          userPredictions[league][gw].push({ hPred, aPred });
        }
      }
    }
  }
  generateData();

  function computeAccuracy(league, currentGW) {
    let total = 0, correct = 0;
    for (let gw = 1; gw < currentGW; gw++) {
      let matches = userPredictions[league][gw];
      let actuals = actualResults[league][gw];
      for (let i = 0; i < matches.length; i++) {
        total++;
        if (matches[i].hPred === actuals[i].homeScore && matches[i].aPred === actuals[i].awayScore) correct++;
      }
    }
    return total === 0 ? 0 : Math.round((correct / total) * 100);
  }

  let currentGW = 32;
  let leagueScores = { epl: 0, liga: 0, serie: 0, bundes: 0, ligue: 0, worldcup: 0 };
  let championPicks = { epl: "", liga: "", serie: "", bundes: "", ligue: "", worldcup: "" };
  let lockState = {};
  let penaltyPoints = { epl: 0, liga: 0, serie: 0, bundes: 0, ligue: 0, worldcup: 0 };
  let leagueAccuracy = {};
  function updateAllAccuracies() { for (let l of Object.keys(leaguesData)) leagueAccuracy[l] = computeAccuracy(l, currentGW); }
  updateAllAccuracies();

  // cards & suspension
  let userCards = { yellows: 0, reds: 0, cardHistory: [] };
  let isSuspended = false;
  function giveYellowCard(reason) { if(isSuspended) return; userCards.yellows++; userCards.cardHistory.push({ gw: currentGW, reason, type:"yellow" }); showToast(`🟡 YELLOW: ${reason}`, "#f5d742"); updateCardUI(); let recent = userCards.cardHistory.filter(c=>c.type==="yellow" && (currentGW-c.gw)<=3).length; if(recent>=2 && userCards.reds===0) giveRedCard("Two yellows in 3 GWs"); }
  function giveRedCard(reason) { if(userCards.reds>0) return; userCards.reds++; userCards.cardHistory.push({ gw: currentGW, reason, type:"red" }); let deduction = 20; let keys = Object.keys(leagueScores); for(let k of keys) leagueScores[k] = Math.max(0, leagueScores[k] - deduction/keys.length); updateScoreDisplay(); isSuspended=true; showToast(`🔴 RED CARD! -20pts, suspended next GW. ${reason}`, "#e34d4d"); updateCardUI(); userCards.yellows=0; }
  function updateCardUI() { document.getElementById("yellowCount") ? document.getElementById("yellowCount").innerText = userCards.yellows : null; document.getElementById("redCount") ? document.getElementById("redCount").innerText = userCards.reds : null; }
  function showToast(msg, color="#b5f028") { let t=document.createElement("div"); t.innerText=msg; t.style.position="fixed"; t.style.bottom="80px"; t.style.left="50%"; t.style.transform="translateX(-50%)"; t.style.background=color; t.style.color="#0a2a12"; t.style.padding="8px 20px"; t.style.borderRadius="60px"; t.style.zIndex="999"; t.style.fontWeight="bold"; document.body.appendChild(t); setTimeout(()=>t.remove(),2500); }

  function updateMatchPred(league, idx, type, val) {
    if(isSuspended) { showToast("Suspended this GW!"); return; }
    if (currentGW <= 31) { showToast("Past gameweeks are locked!"); return; }
    let pred = userPredictions[league][currentGW][idx];
    if(type === 'home') pred.hPred = parseInt(val) || 0;
    else pred.aPred = parseInt(val) || 0;
    let margin = Math.abs(pred.hPred - pred.aPred);
    if(margin >= 4) giveYellowCard(`Risky margin ${pred.hPred}-${pred.aPred}`);
    renderTikTokScroll();
  }

  function submitPredictions(leagueId) {
    if(isSuspended) { showToast("Suspended! Cannot submit."); return; }
    if (currentGW <= 31) { showToast("Past gameweeks are already recorded."); return; }
    showToast(`✅ GW${currentGW} predictions saved for ${leaguesData[leagueId].name}`, "#b5f028");
  }

  // RENDER TIKTOK SCROLL (each league as full-screen pitch)
  function renderTikTokScroll() {
    const container = document.getElementById("tiktokScroll");
    container.innerHTML = "";
    for (let [key, league] of Object.entries(leaguesData)) {
      let lock = lockState[key] || { locked: false, lockGW: null };
      let percent = leagueAccuracy[key] || 0;
      let championPick = championPicks[key];
      let isLocked = lock.locked;
      let userPreds = userPredictions[key][currentGW];
      let actuals = actualResults[key][currentGW];
      let isPast = currentGW < 32;
      let matchesHtml = "";
      league.fixtures.forEach((m, idx) => {
        let userH = userPreds[idx].hPred;
        let userA = userPreds[idx].aPred;
        let actualH = actuals[idx].homeScore;
        let actualA = actuals[idx].awayScore;
        let displayHome = isPast ? actualH : (userH !== undefined ? userH : '');
        let displayAway = isPast ? actualA : (userA !== undefined ? userA : '');
        matchesHtml += `
          <div class="match-card-pitch">
            <div class="match-teams">
              <span>${m.home}</span>
              <span style="color:#b5f028;">VS</span>
              <span>${m.away}</span>
            </div>
            <div class="score-inputs">
              <input class="score-input-pitch" type="number" id="h_${key}_${idx}" value="${displayHome}" ${isPast ? 'disabled' : ''} placeholder="0" onchange="updateMatchPred('${key}',${idx},'home',this.value)">
              <span>-</span>
              <input class="score-input-pitch" type="number" id="a_${key}_${idx}" value="${displayAway}" ${isPast ? 'disabled' : ''} placeholder="0" onchange="updateMatchPred('${key}',${idx},'away',this.value)">
            </div>
            ${isPast ? `<div class="actual-result">Actual: ${actualH}–${actualA}</div>` : '<div class="actual-result">⚡ Predict</div>'}
          </div>
        `;
      });
      const pitchDiv = document.createElement("div");
      pitchDiv.className = "league-pitch";
      pitchDiv.id = `pitch-${key}`;
      pitchDiv.innerHTML = `
        <div class="center-circle"></div>
        <div class="goal-area-left"></div>
        <div class="goal-area-right"></div>
        <div class="accuracy-overlay-pitch">${percent}%</div>
        ${isLocked && championPick ? `<div class="champion-overlay">🏆 ${championPick}</div>` : ''}
        <div class="pitch-header">
          <div class="league-badge">
            <img src="${league.badge}" onerror="this.src='https://via.placeholder.com/45'">
            <div class="league-title">${league.name}</div>
          </div>
          <div class="league-points">${Math.round(leagueScores[key])} pts</div>
        </div>
        <div class="matches-on-pitch">
          ${matchesHtml}
        </div>
        <div class="champion-controls-outside">
          <select class="champion-selector-outside" id="champSelect-${key}" ${isLocked ? 'disabled' : ''} onchange="updateChampionPick('${key}', this.value)">
            <option value="">— Pick Champion —</option>
            ${league.teams.map(t => `<option ${championPicks[key]===t ? 'selected' : ''}>${t}</option>`).join('')}
          </select>
          <button class="lock-champ-outside ${isLocked ? 'locked' : ''}" onclick="toggleLeagueLock('${key}')">
            <i class="fas ${isLocked ? 'fa-lock' : 'fa-lock-open'}"></i> ${isLocked ? 'Locked' : 'Unlock'}
          </button>
          ${penaltyPoints[key] ? `<div class="penalty-text">⚠️ -${penaltyPoints[key]}</div>` : ''}
          ${!isPast ? `<button class="lock-champ-outside" style="background:#b5f028; color:black; margin-left:auto;" onclick="submitPredictions('${key}')"><i class="fas fa-save"></i> Save GW</button>` : ''}
        </div>
      `;
      container.appendChild(pitchDiv);
    }
  }

  window.updateChampionPick = (leagueId, val) => {
    if(lockState[leagueId]?.locked) { showToast("Champion locked! Unlock first."); return; }
    championPicks[leagueId] = val;
    renderTikTokScroll();
  };
  function toggleLeagueLock(leagueId) {
    let lock = lockState[leagueId];
    if(!lock) lockState[leagueId] = { locked: false, lockGW: null };
    lock = lockState[leagueId];
    if(!lock.locked) {
      if(!championPicks[leagueId]) { showToast("Select a champion first!"); return; }
      lock.locked = true; lock.lockGW = currentGW;
      showToast(`🔒 ${leaguesData[leagueId].fullName} champion locked at GW${currentGW}`);
    } else {
      let weeks = currentGW - (lock.lockGW || currentGW);
      let penalty = weeks * 2;
      if(penalty>0) {
        penaltyPoints[leagueId] += penalty;
        leagueScores[leagueId] = Math.max(0, leagueScores[leagueId] - penalty);
        giveYellowCard(`Unlocked ${leaguesData[leagueId].fullName} after ${weeks} GWs (-${penalty} pts)`);
        updateScoreDisplay();
      }
      lock.locked = false; lock.lockGW = null;
    }
    renderTikTokScroll();
  }
  function updateScoreDisplay() { renderTikTokScroll(); }

  // GW Strip
  function buildGWStrip() {
    let container = document.getElementById("gwContainerFixed");
    for(let i=1;i<=38;i++) {
      let btn = document.createElement("button");
      btn.className = "gw-btn-fixed";
      btn.innerHTML = `<i class="fas fa-futbol"></i> GW ${i}`;
      if(i===currentGW) btn.classList.add("active-gw");
      btn.onclick = () => {
        currentGW = i;
        document.querySelectorAll(".gw-btn-fixed").forEach(b=>b.classList.remove("active-gw"));
        btn.classList.add("active-gw");
        updateAllAccuracies();
        renderTikTokScroll();
        showToast(`Gameweek ${currentGW} — Accuracy updated.`);
      };
      container.appendChild(btn);
    }
  }

  // Cards & Leaderboard panels
  function renderCardsPanel() {
    let history = `<div class="card-log"><h3>🃏 DISCIPLINARY RECORD</h3>`;
    if(userCards.cardHistory.length===0) history += `<p>✅ No cards this season</p>`;
    else userCards.cardHistory.slice().reverse().forEach(c => { history += `<div><i class="fas fa-${c.type==='yellow'?'square':'circle'}" style="color:${c.type==='yellow'?'#f5d742':'#e34d4d'}"></i> GW${c.gw}: ${c.reason} (${c.type.toUpperCase()})</div>`; });
    history += `<p style="margin-top:1rem">⚠️ Rules: 4+ goal margin OR unlock champion = 🟡. Two yellows in 3 GWs = 🔴 (-20pts, next GW suspension).</p></div>`;
    document.getElementById("panel-cards").innerHTML = history;
  }
  function renderLeaderboard() {
    let total = Object.values(leagueScores).reduce((a,b)=>a+b,0);
    document.getElementById("panel-leaderboard").innerHTML = `<div class="card-log"><h2>🏆 GLOBAL LEADERBOARD</h2><div>1. ⚡ EliteGaffer - 4,890</div><div>2. 🎯 YOU - ${total.toFixed(0)} pts</div><div><small>Accuracy % updates per gameweek based on correct predictions.</small></div></div>`;
  }

  // tab switching
  function switchTab(tabId) {
    const scrollContainer = document.getElementById("tiktokScroll");
    const cardsPanel = document.getElementById("panel-cards");
    const lbPanel = document.getElementById("panel-leaderboard");
    if (tabId === 'predict') {
      scrollContainer.style.display = "block";
      cardsPanel.style.display = "none";
      lbPanel.style.display = "none";
    } else if (tabId === 'cards') {
      scrollContainer.style.display = "none";
      cardsPanel.style.display = "block";
      lbPanel.style.display = "none";
      renderCardsPanel();
    } else if (tabId === 'leaderboard') {
      scrollContainer.style.display = "none";
      cardsPanel.style.display = "none";
      lbPanel.style.display = "block";
      renderLeaderboard();
    }
    document.querySelectorAll(".bottom-tab").forEach(t=>t.classList.remove("active"));
    document.querySelector(`.bottom-tab[data-tab="${tabId}"]`).classList.add("active");
  }

  // init locks
  for(let l of Object.keys(leaguesData)) if(!lockState[l]) lockState[l] = { locked: false, lockGW: null };
  function fakeLogin() { closeModal(); showToast("Welcome! Scroll vertically – each league is a pitch."); }
  function openModal() { document.getElementById("modalOverlay").style.display = "flex"; }
  function closeModal() { document.getElementById("modalOverlay").style.display = "none"; }

  window.updateMatchPred = updateMatchPred;
  buildGWStrip();
  renderTikTokScroll();
  renderCardsPanel();
  renderLeaderboard();
  updateCardUI();

  // bottom tabs event listeners
  document.querySelectorAll(".bottom-tab").forEach(tab => {
    tab.addEventListener("click", () => {
      switchTab(tab.getAttribute("data-tab"));
    });
  });
  switchTab("predict");
</script>
</body>
</html>
