      align-items: center;

      left: 0;

      height: 2px;

  };

  // generate actual results & user predictions (same logic)
  let actualResults = {}, userPredictions = {};
  function generateData() {
    for (let league of Object.keys(leaguesData)) {
      actualResults[league] = {};
      userPredictions[league] = {};
      for (let gw = 1; gw <= 38; gw++) {
        actualResults[league][gw] = [];
        userPredictions[league][gw] = [];
        let fixtures = leaguesData[league].fixtures;
        for (let i = 0; i < fixtures.length; i++) {
          let homeScore = Math.floor(Math.random() * 4);
          let awayScore = Math.floor(Math.random() * 3);
          if (homeScore === awayScore && homeScore === 0 && Math.random() > 0.3) homeScore = 1;
          actualResults[league][gw].push({ homeScore, awayScore });
          let hPred = homeScore + (Math.random() > 0.6 ? (Math.random() > 0.5 ? 1 : -1) : 0);
          let aPred = awayScore + (Math.random() > 0.6 ? (Math.random() > 0.5 ? 1 : -1) : 0);
          hPred = Math.max(0, Math.min(5, hPred));
          aPred = Math.max(0, Math.min(5, aPred));
          userPredictions[league][gw].push({ hPred, aPred });
        }
      }
    }
  }
  generateData();

  function computeAccuracy(league, currentGW) {
    let total = 0, correct = 0;
    for (let gw = 1; gw < currentGW; gw++) {
      let matches = userPredictions[league][gw];
      let actuals = actualResults[league][gw];
      for (let i = 0; i < matches.length; i++) {
        total++;
        if (matches[i].hPred === actuals[i].homeScore && matches[i].aPred === actuals[i].awayScore) correct++;
      }
    }
    return total === 0 ? 0 : Math.round((correct / total) * 100);
  }

  let currentGW = 32;
  let leagueScores = { epl:0, liga:0, serie:0, bundes:0, ligue:0, worldcup:0 };
  let championPicks = { epl:"", liga:"", serie:"", bundes:"", ligue:"", worldcup:"" };
  let lockState = {};
  let penaltyPoints = { epl:0, liga:0, serie:0, bundes:0, ligue:0, worldcup:0 };
  let leagueAccuracy = {};
  function updateAllAccuracies() { for (let l of Object.keys(leaguesData)) leagueAccuracy[l] = computeAccuracy(l, currentGW); }
  updateAllAccuracies();

  let isSuspended = false;
  function showToast(msg, color="#b5f028") { let t=document.createElement("div"); t.innerText=msg; t.style.position="fixed"; t.style.bottom="80px"; t.style.left="50%"; t.style.transform="translateX(-50%)"; t.style.background=color; t.style.color="black"; t.style.padding="8px 20px"; t.style.borderRadius="60px"; t.style.zIndex="999"; document.body.appendChild(t); setTimeout(()=>t.remove(),2000); }

  function updateMatchPred(league, idx, type, val) {
    if (currentGW <= 31) { showToast("Past GW locked!"); return; }
    let pred = userPredictions[league][currentGW][idx];
    if(type === 'home') pred.hPred = parseInt(val) || 0;
    else pred.aPred = parseInt(val) || 0;
    renderCurrentPage();
  }
  function submitPredictions(leagueId) {
    if (currentGW <= 31) { showToast("Past GW locked."); return; }
    showToast(`✅ GW${currentGW} predictions saved for ${leaguesData[leagueId].name}`);
  }

  // Awards as image buttons
  const awardsData = {
    ballon: { name: "Ballon d'Or", image: "ballon.jpg", points: 1000, locked: false, pick: "" },
    ucl: { name: "UCL Winner", image: "ucl.png", points: 800, locked: false, pick: "" },
    europa: { name: "Europa League", image: "europa.png", points: 600, locked: false, pick: "" }
  };
  let savedAwards = JSON.parse(localStorage.getItem("gaffer_awards_image") || "{}");
  for (let id of Object.keys(awardsData)) if (savedAwards[id]) awardsData[id].locked = savedAwards[id].locked;
  function saveAwards() { let toSave={}; for(let id of Object.keys(awardsData)) toSave[id]={locked:awardsData[id].locked}; localStorage.setItem("gaffer_awards_image",JSON.stringify(toSave)); }
  function renderAwardsBar() {
    const container = document.getElementById("awardsBar");
    container.innerHTML = "";
    for (let [id, award] of Object.entries(awardsData)) {
      const btn = document.createElement("div");
      btn.className = `award-btn ${award.locked ? 'locked' : ''}`;
      btn.style.backgroundImage = `url('${award.image}')`;
      btn.innerHTML = `<span>${award.name}<br>${award.points} pts</span>`;
      btn.onclick = () => toggleAwardLock(id);
      container.appendChild(btn);
    }
  }
  function toggleAwardLock(id) {
    let award = awardsData[id];
    if (!award.locked) { award.locked=true; showToast(`🔒 ${award.name} locked! +${award.points} pts`); }
    else { award.locked=false; showToast(`🔓 ${award.name} unlocked`); }
    saveAwards(); renderAwardsBar();
  }

  // champion pick & lock
  window.updateChampionPick = (leagueId, val) => {
    if(lockState[leagueId]?.locked) { showToast("Champion locked! Unlock first."); return; }
    championPicks[leagueId] = val;
    renderCurrentPage();
  };
  function toggleLeagueLock(leagueId) {
    let lock = lockState[leagueId] || { locked: false };
    if(!lock.locked) {
      if(!championPicks[leagueId]) { showToast("Pick a champion first!"); return; }
      lock.locked=true; lock.lockGW=currentGW;
      showToast(`🔒 ${leaguesData[leagueId].fullName} champion locked`);
    } else {
      let weeks = currentGW - (lock.lockGW || currentGW);
      let penalty = weeks * 2;
      if(penalty>0) penaltyPoints[leagueId] += penalty;
      lock.locked=false;
      showToast(`🔓 Unlocked! Penalty -${penalty}`);
    }
    lockState[leagueId]=lock;
    renderCurrentPage();
  }

  // render dual‑half pitch
  function renderLeaguePage(leagueId) {
    const league = leaguesData[leagueId];
    const lock = lockState[leagueId] || { locked: false };
    const percent = leagueAccuracy[leagueId] || 0;
    const championPick = championPicks[leagueId];
    const isPast = currentGW < 32;
    const userPreds = userPredictions[leagueId][currentGW];
    const actuals = actualResults[leagueId][currentGW];
    let matchesHtml = "";
    league.fixtures.forEach((m, idx) => {
      let userH = userPreds[idx]?.hPred !== undefined ? userPreds[idx].hPred : '';
      let userA = userPreds[idx]?.aPred !== undefined ? userPreds[idx].aPred : '';
      let actualH = actuals[idx]?.homeScore;
      let actualA = actuals[idx]?.awayScore;
      let displayHome = isPast ? actualH : userH;
      let displayAway = isPast ? actualA : userA;
      const homeLogo = getBadgeUrl(m.home);
      const awayLogo = getBadgeUrl(m.away);
      matchesHtml += `
        <div style="display:flex; justify-content:space-between; align-items:center; margin:20px 0;">
          <div style="text-align:center; width:100px;">
            <div class="team-badge-shirt" style="background-image:url('${homeLogo}');"></div>
            <div class="team-name-text">${m.home}</div>
          </div>
          <div class="goal-area" style="display:flex; align-items:center; justify-content:center; gap:10px; width:200px;">
            <input class="score-input-goal" type="number" value="${displayHome}" ${isPast ? 'disabled' : ''} onchange="updateMatchPred('${leagueId}',${idx},'home',this.value)">
            <span class="vs-badge">VS</span>
            <input class="score-input-goal" type="number" value="${displayAway}" ${isPast ? 'disabled' : ''} onchange="updateMatchPred('${leagueId}',${idx},'away',this.value)">
          </div>
          <div style="text-align:center; width:100px;">
            <div class="team-badge-shirt" style="background-image:url('${awayLogo}');"></div>
            <div class="team-name-text">${m.away}</div>
          </div>
        </div>
        ${isPast ? `<div style="text-align:center; font-size:0.8rem;">Actual: ${actualH}–${actualA}</div>` : ''}
      `;
    });
    return `
      <div class="page" id="page-${leagueId}">
        <div class="pitch-dual">
          <div class="pitch-half">
            <div class="center-circle-percent" style="margin-bottom:20px;">${percent}%</div>
            ${matchesHtml}
          </div>
          <div class="pitch-half" style="background: rgba(30,60,30,0.1);">
            <div style="text-align:center; margin-top:20px;">
              <div class="center-circle-percent" style="width:80px; height:80px; font-size:1.5rem;">🏆</div>
            </div>
            ${lock.locked && championPick ? `<div style="text-align:center; margin:20px; font-size:1.2rem;"><i class="fas fa-crown"></i> Champion: ${championPick}</div>` : ''}
            <div class="champion-control">
              <select class="champion-select" ${lock.locked ? 'disabled' : ''} onchange="updateChampionPick('${leagueId}', this.value)">
                <option value="">— Pick Champion —</option>
                ${league.teams.map(t => `<option ${championPicks[leagueId]===t ? 'selected' : ''}>${t}</option>`).join('')}
              </select>
              <button class="lock-btn ${lock.locked ? 'locked' : ''}" onclick="toggleLeagueLock('${leagueId}')">
                <i class="fas ${lock.locked ? 'fa-lock' : 'fa-lock-open'}"></i> ${lock.locked ? 'Locked' : 'Unlock'}
              </button>
              ${!isPast ? `<button class="lock-btn" style="background:#b5f028; color:black;" onclick="submitPredictions('${leagueId}')"><i class="fas fa-save"></i> Save GW</button>` : ''}
            </div>
          </div>
        </div>
      </div>
    `;
  }

  let currentActiveLeague = "epl";
  let currentTab = "predict";
  function renderCurrentPage() {
    const pagesDiv = document.getElementById("pagesContainer");
    const leaguesPanel = document.getElementById("leaguesPanel");
    if (currentTab === "leagues") {
      pagesDiv.style.display = "none";
      leaguesPanel.style.display = "block";
      renderLeaguesPanel();
    } else {
      pagesDiv.style.display = "block";
      leaguesPanel.style.display = "none";
      let html = "";
      for (let id of Object.keys(leaguesData)) html += renderLeaguePage(id);
      pagesDiv.innerHTML = html;
      document.querySelectorAll(".page").forEach(p => p.classList.remove("active-page"));
      document.getElementById(`page-${currentActiveLeague}`)?.classList.add("active-page");
    }
    document.getElementById("gwCurrentDisplay").innerHTML = `<i class="fas fa-futbol"></i> GW ${currentGW}`;
    document.querySelectorAll(".league-btn").forEach(btn => {
      let lid = btn.getAttribute("data-league");
      if (currentTab==="predict" && lid===currentActiveLeague) btn.classList.add("active");
      else btn.classList.remove("active");
    });
  }

  // leagues (create/join)
  let userLeagues = JSON.parse(localStorage.getItem("gaffer_leagues") || "[]");
  function saveLeagues() { localStorage.setItem("gaffer_leagues", JSON.stringify(userLeagues)); }
  function createLeague() { let name=prompt("League name:"); if(!name) return; let code=Math.random().toString(36).substring(2,8).toUpperCase(); userLeagues.push({name,code,members:["Gaffer"],admin:"Gaffer"}); saveLeagues(); showToast(`League created! Code: ${code}`); renderLeaguesPanel(); }
  function joinLeague() { let code=prompt("Enter code:"); let l=userLeagues.find(l=>l.code===code); if(!l){ showToast("Invalid"); return; } if(l.members.includes("Gaffer")){ showToast("Already in"); return; } l.members.push("Gaffer"); saveLeagues(); showToast(`Joined ${l.name}`); renderLeaguesPanel(); }
  function renderLeaguesPanel() {
    let myLeagues = userLeagues.filter(l=>l.members.includes("Gaffer"));
    let html = `<div style="background:rgba(0,0,0,0.6); padding:20px; border-radius:24px;"><h3>My Leagues</h3><button onclick="createLeague()" class="lock-btn">+ Create</button> <button onclick="joinLeague()" class="lock-btn">Join</button><div>`;
    for(let l of myLeagues) html += `<div><strong>${l.name}</strong> (${l.code})<br>Members: ${l.members.join(", ")}</div>`;
    html += `</div></div>`;
    document.getElementById("leaguesPanel").innerHTML = html;
  }

  // build menu
  function buildMenu() {
    const menu = document.getElementById("menuLeft");
    menu.innerHTML = "";
    const leaguesTab = document.createElement("button");
    leaguesTab.className = "menu-btn"; leaguesTab.innerHTML = `<i class="fas fa-users"></i> Leagues`;
    leaguesTab.onclick = () => { currentTab="leagues"; renderCurrentPage(); };
    menu.appendChild(leaguesTab);
    for(let id of Object.keys(leagueImages)) {
      const btn = document.createElement("div");
      btn.className = "league-btn";
      btn.style.backgroundImage = `url('${leagueImages[id]}')`;
      btn.setAttribute("data-league", id);
      btn.title = leaguesData[id].name;
      btn.onclick = () => { currentTab="predict"; currentActiveLeague=id; renderCurrentPage(); };
      menu.appendChild(btn);
    }
  }
  function setupGWArrows() {
    document.getElementById("gwPrev").onclick = () => { if(currentGW>1){ currentGW--; updateAllAccuracies(); renderCurrentPage(); showToast(`GW ${currentGW}`); } };
    document.getElementById("gwNext").onclick = () => { if(currentGW<38){ currentGW++; updateAllAccuracies(); renderCurrentPage(); showToast(`GW ${currentGW}`); } };
  }

  for(let l of Object.keys(leaguesData)) if(!lockState[l]) lockState[l]={locked:false};
  buildMenu(); setupGWArrows(); renderAwardsBar(); renderCurrentPage();
  setTimeout(()=>document.getElementById("loader").classList.add("hide"),1000);
</script>
</body>
</html>
