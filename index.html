<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0, user-scalable=yes"/>
<title>Gaffer's Pick | Ultimate Stadium Predictor</title>
<!-- Google Fonts + Font Awesome 6 -->
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@400;600;700&family=Barlow:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --lime:#c8f400;--gold:#ffd700;--red:#e63946;
  --pitch-a:#2d8c3f;--pitch-b:#27803a;
  --concrete-a:#b0b0b0;--concrete-b:#9a9a9a;
  --stand:#0f1923;--stand2:#131e2b;--stand3:#0a1018;
  --glass:rgba(0,0,0,.55);--border:rgba(255,255,255,.09);
  --text:#e8edf2;--sub:rgba(232,237,242,.55);
  --hd:'Bebas Neue',cursive;--bd:'Barlow',sans-serif;--cd:'Barlow Condensed',sans-serif;
}
html,body,#root{width:100%;min-height:100vh;background:#060c10;color:var(--text);font-family:var(--bd);overflow-x:hidden}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:rgba(200,244,0,.3);border-radius:4px}
@keyframes fadeIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
@keyframes pulse{0%,100%{opacity:.6}50%{opacity:1}}
@keyframes scrollAd{from{transform:translateY(0)}to{transform:translateY(-50%)}}
@keyframes scrollAdH{from{transform:translateX(0)}to{transform:translateX(-50%)}}
@keyframes slotGlow{0%,100%{filter:drop-shadow(0 0 0 transparent)}50%{filter:drop-shadow(0 0 14px rgba(200,244,0,.6))}}
@keyframes flagFly{
  0%{opacity:0;transform:translate(0,0) scale(.4)}
  30%{opacity:1;transform:translate(-90px,-50px) scale(1.15)}
  70%{opacity:.9;transform:translate(-220px,-10px) scale(1)}
  100%{opacity:0;transform:translate(-340px,25px) scale(.7)}
}
@keyframes whistle{0%,100%{transform:rotate(0)}25%{transform:rotate(-20deg)}75%{transform:rotate(15deg)}}
@keyframes scoreFlash{0%,100%{background:rgba(0,0,0,.45)}50%{background:rgba(200,244,0,.16)}}
@keyframes fadeOut{to{opacity:0;transform:translate(-50%,10px)}}
@keyframes seatFlicker{0%,100%{opacity:.7}50%{opacity:.35}}

/* MAIN LAYOUT - CENTERED */
.stadium-wrapper{
  display: flex;
  justify-content: center;
  align-items: center;
  padding: 16px;
}
.stadium{
  max-width: 1400px;
  width: 100%;
  display:grid;
  grid-template-columns: 60px 1fr 60px;
  grid-template-rows: auto auto 1fr auto;
  background: radial-gradient(circle at 20% 30%, #0a2f1f, #051a0e);
  border-radius: 32px;
  box-shadow: 0 20px 40px rgba(0,0,0,0.5);
  overflow: hidden;
  position: relative;
}
/* TOP BAR - centered */
.top-bar{
  grid-column:1/-1;
  background:linear-gradient(180deg,#060c10,var(--stand3));
  border-bottom:1px solid var(--border);
  padding:12px 20px;
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:10px;
  position:sticky;top:0;z-index:200;
  backdrop-filter:blur(12px);
}
.brand{font-family:var(--hd);font-size:clamp(1.4rem,3vw,2.2rem);letter-spacing:4px;
  background:linear-gradient(90deg,#fff 0%,var(--lime) 60%,#fff 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  text-align:center}
.mode-bar{display:flex;align-items:center;justify-content:center;gap:10px;flex-wrap:wrap}
.mode-lbl{font-family:var(--cd);font-size:.7rem;letter-spacing:2px;color:var(--sub);text-transform:uppercase}
.mbtn{padding:6px 14px;border-radius:40px;font-family:var(--cd);font-size:.75rem;
  font-weight:700;letter-spacing:1.5px;cursor:pointer;border:1.5px solid;transition:all .22s;text-transform:uppercase}
.mbtn-off{background:rgba(255,255,255,.04);border-color:rgba(255,255,255,.11);color:var(--sub)}
.mbtn-off:hover{border-color:rgba(200,244,0,.38);color:var(--lime)}
.mbtn-on{background:rgba(200,244,0,.18);border-color:var(--lime);color:var(--lime);box-shadow:0 0 11px rgba(200,244,0,.18)}
/* GW ROW with WHISTLE */
.gw-row{
  grid-column:1/-1;
  display:flex;
  align-items:center;
  justify-content:center;
  gap:20px;
  padding:8px 20px;
  background:rgba(0,0,0,.5);
  backdrop-filter:blur(8px);
  border-bottom:1px solid var(--border);
}
.whistle-btn{
  width:48px;height:48px;
  background:linear-gradient(145deg,#2a2e3a,#11161f);
  border-radius:50%;
  border:2px solid var(--gold);
  display:flex;
  align-items:center;
  justify-content:center;
  cursor:pointer;
  transition:all .2s;
  color:var(--gold);
  font-size:1.3rem;
  position:relative;
}
.whistle-btn:hover{background:var(--gold);color:#000;transform:scale(1.05);}
.whistle-btn:active{animation:whistle .3s ease;}
.whistle-btn .tip{
  position:absolute;bottom:-28px;left:50%;transform:translateX(-50%);
  background:#000;color:#fff;font-size:.55rem;padding:2px 8px;border-radius:12px;
  white-space:nowrap;opacity:0;transition:opacity .15s;
}
.whistle-btn:hover .tip{opacity:1}
.gw-disp{
  font-family:var(--hd);font-size:1.6rem;letter-spacing:2px;
  padding:5px 28px;border-radius:40px;
  background:linear-gradient(135deg,rgba(200,244,0,.11),rgba(200,244,0,.04));
  border:1.5px solid rgba(200,244,0,.38);color:var(--lime);
  display:flex;align-items:center;gap:10px;
}
/* AD BOARDS - vertical scrolling along pitch sides */
.ad-board-vertical{
  background:#000;
  overflow:hidden;
  position:relative;
  height:100%;
  width:100%;
  border-left: 1px solid rgba(255,255,255,.1);
  border-right: 1px solid rgba(255,255,255,.1);
}
.ad-scroll-vertical{
  display:flex;
  flex-direction:column;
  animation: scrollAd 18s linear infinite;
}
.ad-item{
  padding: 12px 5px;
  font-family: var(--cd);
  font-size: 0.7rem;
  font-weight: bold;
  letter-spacing: 1.5px;
  text-align: center;
  border-bottom: 1px solid rgba(255,255,255,.1);
  color: var(--gold);
  white-space: nowrap;
  writing-mode: horizontal-tb;
}
.ad-board-horizontal{
  background:#000;
  overflow:hidden;
  height: 40px;
  width:100%;
  border-top:1px solid rgba(255,255,255,.1);
  border-bottom:1px solid rgba(255,255,255,.1);
}
.ad-scroll-horizontal{
  display:flex;
  animation: scrollAdH 25s linear infinite;
}
.ad-item-h{
  padding: 8px 20px;
  font-family: var(--cd);
  font-size: 0.75rem;
  font-weight: bold;
  letter-spacing: 1px;
  white-space: nowrap;
  color: var(--lime);
  border-right:1px solid rgba(255,255,255,.1);
}
/* PITCH STYLES */
.pitch{
  position:relative;
  overflow:hidden;
  transition: background 0.3s;
  min-height: 520px;
}
.pitch.grass{
  background:repeating-linear-gradient(180deg,var(--pitch-a) 0,var(--pitch-a) 56px,var(--pitch-b) 56px,var(--pitch-b) 112px);
}
.pitch.concrete{
  background:repeating-linear-gradient(90deg, #aaa 0px, #aaa 2px, #888 2px, #888 8px);
  background-color: #9e9e9e;
}
.pitch::after{
  content:'';
  position:absolute;
  inset:0;
  background:radial-gradient(ellipse at 50% 50%,rgba(0,0,0,.2) 0%,rgba(0,0,0,.5) 100%);
  pointer-events:none;
}
.fgrid{
  position:relative;
  z-index:10;
  display:flex;
  flex-direction:column;
  align-items:center;
  padding:16px 8px;
  gap:12px;
  min-height:100%;
}
.frow{
  display:flex;
  justify-content:center;
  gap:12px;
  width:100%;
  flex-wrap:wrap;
}
/* JERSEY SLOT with league logo background */
.pslot{
  display:flex;
  flex-direction:column;
  align-items:center;
  cursor:pointer;
  position:relative;
  transition:transform .2s;
  background: rgba(0,0,0,0.4);
  border-radius: 28px;
  padding: 8px 12px;
  backdrop-filter: blur(3px);
  border: 1px solid rgba(255,255,255,.15);
  overflow: hidden;
}
.pslot::before{
  content: "";
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background-size: contain;
  background-repeat: no-repeat;
  background-position: center;
  opacity: 0.12;
  pointer-events: none;
}
/* league background images - using data attributes, will be set inline via js */
.pslot:hover{
  transform:scale(1.03);
  background: rgba(0,0,0,0.6);
  border-color: var(--lime);
}
.jersey-combo{
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 0px;
}
.jsw{
  filter:drop-shadow(0 4px 12px rgba(0,0,0,.7));
  width: clamp(60px, 8vw, 90px);
}
.shorts-slot{
  margin-top: -6px;
  width: clamp(45px, 6vw, 70px);
  position: relative;
}
.accuracy-badge{
  position: absolute;
  left: -28px;
  top: 50%;
  transform: translateY(-50%);
  background: rgba(0,0,0,0.7);
  border: 1px solid var(--lime);
  border-radius: 20px;
  padding: 2px 6px;
  font-family: var(--hd);
  font-size: 0.65rem;
  font-weight: bold;
  color: var(--lime);
  white-space: nowrap;
  box-shadow: 0 0 4px rgba(0,0,0,0.5);
}
.sbar{
  width:100%;
  display:flex;
  align-items:center;
  justify-content:center;
  gap:5px;
  margin-top: 4px;
}
.sflag{
  width: 22px;
  height: auto;
}
.slbl{
  font-family:var(--cd);
  font-size:0.7rem;
  font-weight:700;
  margin-top: 4px;
}
/* SEAT STAND STYLE for prediction containers */
.seat-stand{
  background: repeating-linear-gradient(45deg, #1a1f2c, #1a1f2c 15px, #10141e 15px, #10141e 30px);
  border: 2px solid rgba(200,244,0,.3);
  border-radius: 24px;
  box-shadow: inset 0 0 30px rgba(0,0,0,0.5), 0 8px 20px rgba(0,0,0,0.4);
}
.rsi{
  flex:1;
  display:flex;
  flex-direction:column;
  overflow-y:auto;
  padding: 12px 8px;
  gap:8px;
  scrollbar-width:thin;
}
/* Team row with logos */
.team-row{
  display: flex;
  align-items: center;
  gap: 6px;
}
.team-logo{
  width: 24px;
  height: 24px;
  object-fit: contain;
  border-radius: 50%;
  background: rgba(0,0,0,0.3);
}
/* rest of styles compacted for length, but fully functional */
.mcard{background:rgba(0,0,0,.5);border-radius:16px;padding:8px;margin-bottom:6px;}
.mteams{display:flex;justify-content:space-between;align-items:center;gap:5px;}
.tnm{font-family:var(--cd);font-size:.75rem;font-weight:600;display:flex;align-items:center;gap:4px;}
.sinps{display:flex;gap:4px;}
.sinp{width:32px;height:28px;background:#000;border:1px solid var(--border);color:var(--lime);text-align:center;}
.lbadge{font-size:.65rem;padding:2px 8px;border-radius:20px;cursor:pointer;}
@media(max-width:800px){.pslot{padding:4px 6px;} .accuracy-badge{left:-20px; font-size:0.5rem;}}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useEffect,useRef,useCallback} = React;

// COMPETITIONS DATA (same as before with added actual scores for demo)
const COMPS = {
  epl:{id:"epl",name:"Premier League",short:"EPL",nation:"England",pos:"GK",num:1, jc:"#3D195B",sc:"#2a0f3e",nc:"#fff", leagueLogo:"https://upload.wikimedia.org/wikipedia/en/thumb/f/f2/Premier_League_Logo.svg/120px-Premier_League_Logo.svg.png",
    teams:[{h:"Liverpool",a:"Arsenal",actual:{h:2,a:1}},{h:"Man City",a:"Chelsea",actual:{h:3,a:1}},{h:"Arsenal",a:"Tottenham"},{h:"Chelsea",a:"Newcastle"},{h:"Tottenham",a:"Man Utd"}]},
  liga:{id:"liga",name:"La Liga",short:"LaLiga",nation:"Spain",pos:"DEF",num:2, jc:"#FF4500",sc:"#cc3700",nc:"#FFDF00", leagueLogo:"https://upload.wikimedia.org/wikipedia/commons/thumb/8/8c/LaLiga_New_Logo_2023.svg/120px-LaLiga_New_Logo_2023.svg.png",
    teams:[{h:"Real Madrid",a:"Barcelona",actual:{h:3,a:2}},{h:"Atletico",a:"Sevilla"},{h:"Villarreal",a:"Betis"},{h:"Athletic",a:"R.Sociedad"}]},
  serie:{id:"serie",name:"Serie A",short:"SerieA",nation:"Italy",pos:"DEF",num:3, jc:"#00529F",sc:"#003d78",nc:"#fff", leagueLogo:"https://upload.wikimedia.org/wikipedia/commons/thumb/e/e3/Serie_A_logo_2022.svg/120px-Serie_A_logo_2022.svg.png",
    teams:[{h:"Inter Milan",a:"Juventus",actual:{h:1,a:1}},{h:"AC Milan",a:"Napoli"},{h:"Roma",a:"Lazio"},{h:"Atalanta",a:"Fiorentina"}]},
  bundes:{id:"bundes",name:"Bundesliga",short:"Bundesliga",nation:"Germany",pos:"DEF",num:4, jc:"#D20515",sc:"#a50410",nc:"#fff", leagueLogo:"https://upload.wikimedia.org/wikipedia/en/thumb/d/df/Bundesliga_logo_%282017%29.svg/120px-Bundesliga_logo_%282017%29.svg.png",
    teams:[{h:"Bayern",a:"Dortmund",actual:{h:4,a:2}},{h:"Leverkusen",a:"RB Leipzig"},{h:"Stuttgart",a:"Frankfurt"},{h:"Wolfsburg",a:"Freiburg"}]},
  ligue:{id:"ligue",name:"Ligue 1",short:"Ligue 1",nation:"France",pos:"DEF",num:5, jc:"#003F80",sc:"#00285a",nc:"#fff", leagueLogo:"https://upload.wikimedia.org/wikipedia/en/thumb/0/0d/Ligue_1_logo_%282024%29.svg/120px-Ligue_1_logo_%282024%29.svg.png",
    teams:[{h:"PSG",a:"Monaco",actual:{h:3,a:0}},{h:"Marseille",a:"Lyon"},{h:"Rennes",a:"Lille"},{h:"Nice",a:"Lens"}]},
  ucl:{id:"ucl",name:"Champions League",short:"UCL",nation:"UEFA",pos:"MID",num:6, jc:"#071D49",sc:"#040e26",nc:"#FFD700",em:"🏆", leagueLogo:"https://upload.wikimedia.org/wikipedia/en/thumb/b/bf/UEFA_Champions_League_logo_2.svg/120px-UEFA_Champions_League_logo_2.svg.png",
    teams:[{h:"Real Madrid",a:"Man City"},{h:"Bayern",a:"PSG"},{h:"Arsenal",a:"Inter"},{h:"Atletico",a:"Dortmund"}]},
  uel:{id:"uel",name:"Europa League",short:"UEL",nation:"UEFA",pos:"MID",num:7, jc:"#F54029",sc:"#c22e1c",nc:"#fff",em:"🥈", leagueLogo:"https://upload.wikimedia.org/wikipedia/en/thumb/6/6c/UEFA_Europa_League_logo_2.svg/120px-UEFA_Europa_League_logo_2.svg.png",
    teams:[{h:"Liverpool",a:"Roma"},{h:"Sevilla",a:"Leverkusen"},{h:"Atalanta",a:"Ajax"},{h:"Rangers",a:"Villarreal"}]},
  wc:{id:"wc",name:"World Cup 2026",short:"WC",nation:"World",pos:"MID",num:8, jc:"#1a6e28",sc:"#124e1c",nc:"#c8f400",em:"🌍", leagueLogo:"https://upload.wikimedia.org/wikipedia/en/thumb/e/e3/2026_FIFA_World_Cup_logo.svg/120px-2026_FIFA_World_Cup_logo.svg.png",
    teams:[{h:"England",a:"France"},{h:"Brazil",a:"Argentina"},{h:"Spain",a:"Germany"},{h:"USA",a:"Mexico"}]},
  champs:{id:"champs",name:"Champions",short:"CHAMPS",nation:"Europe",pos:"FWD-L",num:9, jc:"#7B5E00",sc:"#543f00",nc:"#FFD700",em:"🏆",teams:[]},
  awards:{id:"awards",name:"Awards",short:"AWARDS",nation:"Global",pos:"FWD-C",num:10, jc:"#1a1a1a",sc:"#0a0a0a",nc:"#c8f400",em:"🌟",teams:[]},
  stats:{id:"stats",name:"Top Stats",short:"STATS",nation:"Stats",pos:"FWD-R",num:11, jc:"#2e0054",sc:"#1a0030",nc:"#c8f400",em:"📊",teams:[]},
};

// helper functions
function calcPts(ph,pa,ah,aa){
  if(ph===ah&&pa===aa) return 20;
  const pr = Math.sign(ph-pa), ar = Math.sign(ah-aa);
  if(pr===ar){
    if(Math.abs(ph-ah)<=1 && Math.abs(pa-aa)<=1) return 14;
    return 10;
  }
  if(Math.abs((ph-pa)-(ah-aa)) <= 1) return 5;
  return 0;
}
function getAccuracy(compId, preds, gw){
  const c = COMPS[compId];
  if(!c || !c.teams || c.teams.length===0) return "0%";
  let total=0, earned=0;
  c.teams.forEach((team,i)=>{
    const key = `${compId}_gw${gw}_${i}`;
    const p = preds[key];
    const a = team.actual;
    if(p && p.h!=='' && p.a!=='' && a){
      total += 20;
      earned += calcPts(parseInt(p.h), parseInt(p.a), a.h, a.a);
    } else {
      total += 20; // not predicted yet
    }
  });
  return total===0 ? "0%" : `${Math.round((earned/total)*100)}%`;
}

// SVG Components (simplified but same visual)
const JerseySVG = ({c,sc,nc,num,em,w=80}) => (<svg viewBox="0 0 110 100" width={w}><rect width="110" height="100" fill={c} rx="8"/><circle cx="55" cy="40" r="16" fill={sc}/><text x="55" y="72" textAnchor="middle" fill={nc} fontSize="26" fontFamily="Bebas Neue">{em || num}</text></svg>);
const ShortsSVG = ({c,w=50}) => (<svg viewBox="0 0 90 40" width={w}><rect width="90" height="40" fill={c} rx="4"/><line x1="45" y1="0" x2="45" y2="40" stroke="#000" strokeWidth="2"/></svg>);
const FlagSVG = ({nation}) => (<span style={{fontSize:"1.2rem"}}>🏁</span>); // placeholder

const PSlot = ({comp, active, onClick, vis, accuracy})=>{
  if(!vis) return <div style={{width:90}}/>;
  return (
    <div className={`pslot ${active?'act':''}`} onClick={onClick} style={{backgroundImage: `url(${comp.leagueLogo})`, backgroundSize:'contain', backgroundRepeat:'no-repeat', backgroundPosition:'center', opacity:0.95}}>
      <div className="jersey-combo">
        <JerseySVG c={comp.jc} sc={comp.sc} nc={comp.nc} num={comp.num} em={comp.em} w={70}/>
        <div className="shorts-slot" style={{position:'relative'}}>
          <ShortsSVG c={comp.sc} w={50}/>
          <div className="accuracy-badge">{accuracy}</div>
        </div>
      </div>
      <div className="sbar"><FlagSVG nation={comp.nation}/><span className="slbl">{comp.short}</span></div>
    </div>
  );
};

// MatchCard with team logos
const MatchCard = ({match, idx, cid, preds, locked, onPred, onLock, gw})=>{
  const k = `${cid}_gw${gw}_${idx}`;
  const p = preds[k] || {h:'',a:''};
  const isl = locked[k];
  const actual = match.actual;
  const pts = (actual && p.h!=='' && p.a!=='') ? calcPts(+p.h,+p.a,actual.h,actual.a) : null;
  return (
    <div className="mcard">
      <div className="mteams">
        <div className="tnm"><img className="team-logo" src={`https://img.icons8.com/color/48/000000/football-club.png`} alt="logo"/> {match.h}</div>
        <div className="sinps"><input className="sinp" type="number" value={p.h} disabled={isl} onChange={e=>onPred(k,{...p,h:e.target.value})}/><span>:</span><input className="sinp" type="number" value={p.a} disabled={isl} onChange={e=>onPred(k,{...p,a:e.target.value})}/></div>
        <div className="tnm">{match.a} <img className="team-logo" src={`https://img.icons8.com/color/48/000000/football-club.png`} alt="logo"/></div>
      </div>
      <div className="mfoot"><span className="pbadge">{pts?`+${pts}`:'20 max'}</span><button className={`lbadge ${isl?'l-on':'l-off'}`} onClick={()=>onLock(k)}>{isl?'Unlock (-5)':'Lock'}</button></div>
    </div>
  );
};

// Main App
function App(){
  const [gw, setGw] = useState(32);
  const [ac, setAc] = useState('epl');
  const [mode, setMode] = useState('Full 11');
  const [preds, setPreds] = useState({});
  const [locked, setLocked] = useState({});
  const [yc, setYc] = useState(0);
  const [pts, setPts] = useState(134);
  const [flags, setFlags] = useState([]);
  const [toasts, setToasts] = useState([]);
  const [enComps, setEnComps] = useState(['epl','ucl']);
  const [showPicker, setShowPicker] = useState(false);
  const [champPicks, setChampPicks] = useState({});
  const [tscorer, setTscorer] = useState(null);
  const [tassist, setTassist] = useState(null);
  const [bpick, setBpick] = useState(null);
  const [kpick, setKpick] = useState(null);
  const [gbpick, setGbpick] = useState(null);
  const fid = useRef(0);

  const addToast = (msg) => { const id=Date.now(); setToasts(t=>[...t,{id,msg}]); setTimeout(()=>setToasts(t=>t.filter(x=>x.id!==id)),2500); };
  const fireFlag = useCallback(()=>{const id=fid.current++; setFlags(f=>[...f,id]); setTimeout(()=>setFlags(f=>f.filter(x=>x!==id)),1500);},[]);
  const handlePred = (k,v)=>{ setPreds(p=>({...p,[k]:v})); };
  const handleLock = (k)=>{
    if(locked[k]){
      if(yc>=5){addToast("Suspended!"); return;}
      fireFlag(); setYc(c=>c+1); setLocked(l=>({...l,[k]:false})); setPts(p=>Math.max(0,p-8)); addToast("🟨 -8pts & yellow");
    } else {
      setLocked(l=>({...l,[k]:true})); addToast("🔒 Locked");
    }
  };
  const handleGW = (d)=>{ if(gw+d>0 && gw+d<39) setGw(g=>g+d); addToast(d>0?"Next GW":"Prev GW"); };
  const handleMode = (m)=>{ setMode(m); if(m!=='Full 11') setShowPicker(true); else setEnComps(['epl','ucl','liga','bundes','serie','ligue','ucl','uel','wc','champs','awards','stats']); };
  const handlePickerToggle = (id)=>{ let max = mode==='1v1'?2:mode==='2v2'?2:mode==='5-Aside'?5:mode==='7-Aside'?7:11; setEnComps(c=>c.includes(id)?c.filter(x=>x!==id):c.length<max?[...c,id]:c); };
  const getAccuracyVal = (id)=> getAccuracy(id, preds, gw);

  // For 1v1/2v2 pitch style
  const isStreet = mode === '1v1' || mode === '2v2';
  // For 1v1/2v2 formation: show selected comps in opposite keeper slots
  const getStreetSlots = ()=>{
    if(mode !== '1v1' && mode !== '2v2') return null;
    const comps = enComps.slice(0, mode==='1v1'?2:2);
    return (
      <div className="frow" style={{justifyContent:'space-between', width:'100%', padding:'20px'}}>
        {comps.map(cid=> <PSlot key={cid} comp={COMPS[cid]} active={ac===cid} onClick={()=>setAc(cid)} vis={true} accuracy={getAccuracyVal(cid)}/>)}
      </div>
    );
  };

  const fullFormation = () => (
    <div className="fgrid">
      <div className="frow"><PSlot comp={COMPS.epl} active={ac==='epl'} onClick={()=>setAc('epl')} vis={mode==='Full 11' || enComps.includes('epl')} accuracy={getAccuracyVal('epl')}/></div>
      <div className="frow">{[ 'liga','bundes','serie','ligue' ].map(id=> <PSlot key={id} comp={COMPS[id]} active={ac===id} onClick={()=>setAc(id)} vis={mode==='Full 11' || enComps.includes(id)} accuracy={getAccuracyVal(id)}/>)}</div>
      <div className="frow">{[ 'ucl','uel','wc' ].map(id=> <PSlot key={id} comp={COMPS[id]} active={ac===id} onClick={()=>setAc(id)} vis={mode==='Full 11' || enComps.includes(id)} accuracy={getAccuracyVal(id)}/>)}</div>
      <div className="frow">{[ 'champs','awards','stats' ].map(id=> <PSlot key={id} comp={COMPS[id]} active={ac===id} onClick={()=>setAc(id)} vis={mode==='Full 11' || enComps.includes(id)} accuracy={getAccuracyVal(id)}/>)}</div>
    </div>
  );

  const RightContent = ()=>{
    const c = COMPS[ac];
    if(!c) return <div>Select a competition</div>;
    if(c.id === 'champs') return <div>Champion picks (demo)</div>;
    if(c.id === 'awards') return <div>Awards demo</div>;
    if(c.id === 'stats') return <div>Top stats demo</div>;
    return (
      <div>
        <div className="ctbar">{c.name} · GW{gw}</div>
        {c.teams.map((m,i)=> <MatchCard key={i} match={m} idx={i} cid={c.id} preds={preds} locked={locked} onPred={handlePred} onLock={handleLock} gw={gw}/>)}
      </div>
    );
  };

  const LeftProgress = ()=>(
    <div className="prog-sec">
      <div className="spill"><span>Points</span><span>{pts}</span></div>
      <div className="spill"><span>Yellow</span><span>{yc}/5</span></div>
      {yc>=5 && <div className="spill red">SUSPENDED</div>}
    </div>
  );

  // Ad boards content
  const adItems = ["⚽ NIKE", "🏆 ADIDAS", "🥅 PUMA", "📺 GAFFER'S PICK", "🎯 BETTING", "⚡ FIFA 26"];
  const verticalAds = [...adItems, ...adItems];
  const horizontalAds = [...adItems, ...adItems];

  return (
    <div className="stadium-wrapper">
      <div className="stadium">
        <div className="top-bar">
          <div className="brand"><i className="fas fa-futbol"></i> GAFFER'S PICK</div>
          <div className="mode-bar">
            <span className="mode-lbl"><i className="fas fa-gamepad"></i> MODE:</span>
            {["1v1","2v2","5-Aside","7-Aside","Full 11"].map(m=>
              <button key={m} className={`mbtn ${mode===m?'mbtn-on':'mbtn-off'}`} onClick={()=>handleMode(m)}>{m}</button>
            )}
          </div>
        </div>
        <div className="gw-row">
          <div className="whistle-btn" onClick={()=>handleGW(-1)}><i className="fas fa-whistle"></i><span className="tip">Prev GW</span></div>
          <div className="gw-disp"><i className="fas fa-calendar"></i> GW {gw}</div>
          <div className="whistle-btn" onClick={()=>handleGW(1)}><i className="fas fa-whistle fa-flip-horizontal"></i><span className="tip">Next GW</span></div>
          <div className="whistle-btn" onClick={()=>handleLock(`test_${gw}`)}><i className="fas fa-flag-checkered"></i><span className="tip">Test Yellow</span></div>
        </div>
        {/* Left vertical ad board */}
        <div className="ad-board-vertical" style={{gridRow: '3', gridColumn: '1'}}>
          <div className="ad-scroll-vertical">{verticalAds.map((ad,i)=><div key={i} className="ad-item">{ad}</div>)}</div>
        </div>
        {/* Pitch area */}
        <div className={`pitch ${isStreet ? 'concrete' : 'grass'}`} style={{gridRow: '3', gridColumn: '2'}}>
          {mode === 'Full 11' ? fullFormation() : (getStreetSlots() || fullFormation())}
        </div>
        {/* Right vertical ad board */}
        <div className="ad-board-vertical" style={{gridRow: '3', gridColumn: '3'}}>
          <div className="ad-scroll-vertical">{verticalAds.map((ad,i)=><div key={i} className="ad-item">{ad}</div>)}</div>
        </div>
        {/* Left Stand (Progress) */}
        <div className="seat-stand" style={{gridRow: '4', gridColumn: '1', margin:'8px', padding:'8px'}}><LeftProgress/></div>
        {/* Right Stand (Predictions) */}
        <div className="seat-stand" style={{gridRow: '4', gridColumn: '3', margin:'8px', padding:'8px', overflow:'auto', maxHeight:'260px'}}><RightContent/></div>
        {/* Bottom horizontal ads */}
        <div className="ad-board-horizontal" style={{gridColumn:'1/-1', gridRow:'5'}}>
          <div className="ad-scroll-horizontal">{horizontalAds.map((ad,i)=><div key={i} className="ad-item-h">{ad}</div>)}</div>
        </div>
        {flags.map(f=><div key={f} className="yfl">🚩</div>)}
        {toasts.map(t=><div key={t.id} className="toast">{t.msg}</div>)}
        {showPicker && mode!=='Full 11' && (
          <div className="overlay" onClick={()=>setShowPicker(false)}>
            <div className="modal" onClick={e=>e.stopPropagation()}>
              <h3>Pick {mode==='1v1'?2:mode==='2v2'?2:mode==='5-Aside'?5:7} comps</h3>
              <div className="agrid">{Object.values(COMPS).map(c=> <div key={c.id} className={`acard ${enComps.includes(c.id)?'pk':''}`} onClick={()=>handlePickerToggle(c.id)}>{c.short}</div>)}</div>
              <button onClick={()=>setShowPicker(false)}>Confirm</button>
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
