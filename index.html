<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>The Gaffer's Pick | Live Data · Past GWs Locked · Accuracy %</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@400;600;700&family=Barlow:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    /* DARK GREY BACKGROUND - text clearly visible */
    body {
      background: #1e1e1e;
      font-family: 'Barlow', sans-serif;
      min-height: 100vh;
      color: #f0f0f0;
    }

    .app-wrapper {
      position: relative;
      z-index: 2;
      min-height: 100vh;
    }

    /* MODERN NAV */
    .glass-nav {
      background: rgba(0, 0, 0, 0.85);
      backdrop-filter: blur(16px);
      border-bottom: 1px solid #b5f028;
      padding: 0 2rem;
      height: 70px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .logo-text {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.8rem;
      background: linear-gradient(135deg, #b5f028, #e0ff80);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }

    .season-badge {
      background: #1f3a24;
      padding: 4px 12px;
      border-radius: 40px;
      font-size: 0.7rem;
      color: #b5f028;
    }

    .card-stack {
      background: rgba(0, 0, 0, 0.7);
      padding: 5px 16px;
      border-radius: 40px;
      display: flex;
      gap: 12px;
      font-weight: bold;
    }

    .gw-badge {
      background: #b5f028;
      color: #0a2a12;
      padding: 5px 18px;
      border-radius: 40px;
      font-weight: bold;
    }

    .btn-outline-lime {
      background: transparent;
      border: 1.5px solid #b5f028;
      color: #b5f028;
      border-radius: 40px;
      padding: 6px 24px;
      cursor: pointer;
    }

    /* custom scrollbar */
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: #2a2a2a; border-radius: 10px; }
    ::-webkit-scrollbar-thumb { background: #b5f028; border-radius: 10px; }

    /* GW STRIP */
    .gw-strip {
      background: rgba(0, 0, 0, 0.6);
      backdrop-filter: blur(8px);
      padding: 12px 0;
      overflow-x: auto;
      border-bottom: 1px solid #b5f028;
    }

    .gw-container {
      display: inline-flex;
      gap: 8px;
      padding: 0 1rem;
    }

    .gw-btn {
      background: #2a2a2a;
      border: 1px solid #5a9e6a;
      color: #eee;
      font-family: 'Barlow Condensed';
      font-weight: bold;
      padding: 6px 18px;
      border-radius: 40px;
      cursor: pointer;
    }

    .gw-btn.active-gw {
      background: #b5f028;
      color: #0a2a12;
    }

    /* LEAGUE CARDS - green containers only */
    .leagues-scroll {
      overflow-x: auto;
      padding: 2rem 1rem;
    }

    .leagues-track {
      display: inline-flex;
      gap: 24px;
      padding: 0 1rem;
    }

    .league-card {
      position: relative;
      width: 300px;
      background: linear-gradient(145deg, #2d8c3a, #1a5e2a);
      border-radius: 16px;
      padding: 1.2rem;
      border: 2px solid white;
      box-shadow: 0 0 0 2px rgba(0,0,0,0.2), inset 0 0 0 2px rgba(255,255,255,0.2);
      transition: all 0.25s ease;
      cursor: pointer;
      overflow: hidden;
    }

    /* pitch markings */
    .league-card::before {
      content: '';
      position: absolute;
      top: 8%;
      left: 5%;
      width: 90%;
      height: 84%;
      border: 1px solid rgba(255,255,255,0.5);
      border-radius: 8px;
      pointer-events: none;
    }
    .league-card::after {
      content: '';
      position: absolute;
      top: 50%;
      left: 50%;
      width: 40px;
      height: 40px;
      border: 1px solid rgba(255,255,255,0.4);
      border-radius: 50%;
      transform: translate(-50%, -50%);
      pointer-events: none;
    }

    .league-card.active-league {
      border: 2px solid #b5f028;
      box-shadow: 0 0 20px rgba(181,240,40,0.5);
      transform: scale(1.02);
    }

    .accuracy-bg {
      position: absolute;
      bottom: 5px;
      right: 12px;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 6.5rem;
      font-weight: bold;
      color: rgba(255, 255, 255, 0.15);
      pointer-events: none;
      z-index: 1;
    }

    .league-card-content {
      position: relative;
      z-index: 3;
      color: white;
      text-shadow: 0 1px 2px black;
    }

    .league-badge-img {
      width: 48px;
      height: 48px;
      object-fit: contain;
      filter: drop-shadow(0 2px 4px black);
      background: rgba(0,0,0,0.3);
      border-radius: 12px;
      padding: 4px;
    }

    .league-name {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.4rem;
    }

    .league-points {
      font-size: 1.2rem;
      font-weight: bold;
      color: #b5f028;
    }

    /* transparent pick champion */
    .champion-selector {
      width: 100%;
      margin: 12px 0;
      padding: 8px;
      background: rgba(0, 0, 0, 0.5);
      backdrop-filter: blur(4px);
      border-radius: 40px;
      color: white;
      border: 1px solid #b5f028;
      font-family: 'Barlow Condensed';
      font-weight: 600;
    }

    .lock-champ-btn {
      background: rgba(0,0,0,0.5);
      border: 1px solid white;
      border-radius: 40px;
      padding: 6px 12px;
      font-size: 0.75rem;
      cursor: pointer;
      width: 100%;
      font-weight: bold;
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: 0.2s;
    }

    .lock-champ-btn.locked {
      background: #b5f028;
      color: black;
      border-color: #b5f028;
    }

    /* AWARDS CARDS - also green */
    .awards-panel {
      margin: 1rem;
      padding: 0.5rem;
    }

    .awards-title {
      font-family: 'Bebas Neue';
      font-size: 1.5rem;
      color: white;
      margin-bottom: 1rem;
    }

    .awards-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 20px;
      justify-content: center;
    }

    .award-card {
      position: relative;
      background: linear-gradient(145deg, #2d8c3a, #1a5e2a);
      border: 2px solid white;
      border-radius: 16px;
      padding: 1rem;
      min-width: 200px;
      text-align: center;
      overflow: hidden;
    }
    .award-card::before {
      content: '';
      position: absolute;
      inset: 8px;
      border: 1px solid rgba(255,255,255,0.4);
      border-radius: 8px;
      pointer-events: none;
    }
    .award-card select {
      background: rgba(0,0,0,0.6);
      border-radius: 40px;
      padding: 6px;
      margin: 8px 0;
      width: 90%;
      color: white;
      border: 1px solid #b5f028;
    }
    .lock-award-btn {
      background: rgba(0,0,0,0.5);
      border: 1px solid #ffcc44;
      border-radius: 30px;
      padding: 4px 12px;
      cursor: pointer;
      color: white;
    }

    /* TABS */
    .tab-bar-modern {
      display: flex;
      gap: 12px;
      padding: 0 2rem;
      margin: 1rem 0;
    }

    .tab-modern {
      padding: 8px 28px;
      font-family: 'Barlow Condensed';
      font-weight: bold;
      cursor: pointer;
      border-radius: 60px;
      background: rgba(0, 0, 0, 0.5);
      color: #eee;
      transition: 0.2s;
    }

    .tab-modern.active {
      background: #b5f028;
      color: #0a2a12;
    }

    /* MATCH CARDS - scores on each side */
    .matches-grid {
      display: flex;
      flex-direction: column;
      gap: 12px;
      padding: 1rem 2rem;
      max-height: 500px;
      overflow-y: auto;
    }

    .match-card {
      background: rgba(0, 0, 0, 0.7);
      backdrop-filter: blur(8px);
      border-radius: 24px;
      display: grid;
      grid-template-columns: 1fr auto 1fr auto;
      align-items: center;
      gap: 0.5rem;
      padding: 1rem 1.5rem;
      border: 1px solid #b5f028;
    }

    .team-home, .team-away {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .team-away {
      justify-content: flex-end;
    }
    .team-name {
      font-weight: 700;
      font-size: 1rem;
    }
    .score-input {
      width: 60px;
      height: 48px;
      background: #1a3a1a;
      border-radius: 16px;
      text-align: center;
      font-size: 1.6rem;
      color: #b5f028;
      border: 1px solid #b5f028;
      font-weight: bold;
    }
    .score-input:disabled {
      background: #2a2a2a;
      color: #aaa;
      border-color: #555;
    }

    .btn-submit-lime {
      background: linear-gradient(95deg, #b5f028, #8bcb1f);
      border: none;
      font-family: 'Bebas Neue';
      padding: 12px 28px;
      border-radius: 60px;
      cursor: pointer;
      font-weight: bold;
      font-size: 1rem;
    }

    .card-log {
      background: rgba(0, 0, 0, 0.7);
      border: 1px solid #b5f028;
      border-radius: 28px;
      padding: 1.5rem;
      margin: 1rem;
    }

    @media (max-width: 700px) {
      .match-card {
        grid-template-columns: 1fr;
        gap: 0.5rem;
      }
      .league-card {
        width: 260px;
      }
      .team-home, .team-away {
        justify-content: center;
      }
    }
  </style>
</head>
<body>
<div class="app-wrapper">
  <div class="glass-nav">
    <div style="display: flex; gap: 12px; align-items: baseline;">
      <div class="logo-text"><i class="fas fa-futbol"></i> The Gaffer's Pick</div>
      <div class="season-badge">2025/26</div>
    </div>
    <div style="display: flex; gap: 1rem; align-items: center;">
      <div class="card-stack"><i class="fas fa-square" style="color:#f5d742"></i> <span id="yellowCount">0</span> | <i class="fas fa-square" style="color:#e34d4d"></i> <span id="redCount">0</span></div>
      <div class="gw-badge" id="globalGWbadge">GW 1</div>
      <button class="btn-outline-lime" onclick="openModal()"><i class="fas fa-user-astronaut"></i> Sign In</button>
    </div>
  </div>

  <div class="gw-strip" id="gwStrip"><div class="gw-container" id="gwContainer"></div></div>

  <div class="leagues-scroll">
    <div class="leagues-track" id="leaguesTrack"></div>
  </div>

  <div class="awards-panel">
    <div class="awards-title"><i class="fas fa-star-of-life"></i> MAJOR AWARDS</div>
    <div class="awards-grid" id="awardsGrid"></div>
  </div>

  <div class="tab-bar-modern">
    <div class="tab-modern active" data-tab="predict">⚡ Match Predictions</div>
    <div class="tab-modern" data-tab="cards">🃏 Discipline</div>
    <div class="tab-modern" data-tab="leaderboard">📊 Leaderboard</div>
  </div>

  <div id="panel-predict" class="panel"></div>
  <div id="panel-cards" class="panel" style="display:none"></div>
  <div id="panel-leaderboard" class="panel" style="display:none"></div>

  <div class="modal-overlay" id="modalOverlay" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.95); backdrop-filter:blur(12px); align-items:center; justify-content:center; z-index:200;">
    <div style="background:#0f2a1a; padding:2rem; border-radius:40px; width:90%; max-width:400px; border:1px solid #b5f028;">
      <h2 style="color:white;">Enter The Dugout</h2>
      <input type="text" id="demoUser" placeholder="Username" style="width:100%; margin:1rem 0; padding:12px; background:#0a1812; border:1px solid #3e6b48; color:white; border-radius:40px;">
      <button onclick="fakeLogin()" class="btn-submit-lime" style="width:100%">Start Predicting</button>
      <button onclick="closeModal()" style="margin-top:1rem; background:none; border:none; color:#8aa;">Close</button>
    </div>
  </div>
</div>

<script>
  // ------------------------------
  // 1. LEAGUES DATA & FIXTURES (realistic 2025-26)
  // ------------------------------
  const leaguesData = {
    epl: { name: "Premier League", badge: "https://upload.wikimedia.org/wikipedia/en/thumb/f/f2/Premier_League_Logo.svg/120px-Premier_League_Logo.svg.png", fullName: "Premier League", teams: ["Arsenal","Man City","Liverpool","Chelsea","Tottenham"], fixtures: [{ home:"Arsenal", away:"Man City"},{ home:"Liverpool", away:"Chelsea"},{ home:"Man Utd", away:"Tottenham"},{ home:"Newcastle", away:"Aston Villa"},{ home:"Brighton", away:"West Ham"}] },
    liga: { name: "La Liga", badge: "https://upload.wikimedia.org/wikipedia/commons/thumb/0/0f/LaLiga_logo.svg/120px-LaLiga_logo.svg.png", fullName: "La Liga", teams: ["Real Madrid","Barcelona","Atletico","Athletic","Real Betis"], fixtures: [{ home:"Real Madrid", away:"Barcelona"},{ home:"Atletico", away:"Sevilla"},{ home:"Athletic", away:"Villarreal"},{ home:"Real Betis", away:"Real Soc."},{ home:"Valencia", away:"Osasuna"}] },
    serie: { name: "Serie A", badge: "https://upload.wikimedia.org/wikipedia/commons/thumb/e/e7/Serie_A_logo_2022.svg/120px-Serie_A_logo_2022.svg.png", fullName: "Serie A", teams: ["Inter Milan","Juventus","AC Milan","Napoli","Lazio"], fixtures: [{ home:"Inter Milan", away:"Juventus"},{ home:"AC Milan", away:"Napoli"},{ home:"Lazio", away:"Roma"},{ home:"Atalanta", away:"Fiorentina"},{ home:"Torino", away:"Bologna"}] },
    bundes: { name: "Bundesliga", badge: "https://upload.wikimedia.org/wikipedia/commons/thumb/d/df/Bundesliga_logo.svg/120px-Bundesliga_logo.svg.png", fullName: "Bundesliga", teams: ["Bayern","Dortmund","Leverkusen","Leipzig","Stuttgart"], fixtures: [{ home:"Bayern", away:"Dortmund"},{ home:"Leverkusen", away:"Leipzig"},{ home:"Stuttgart", away:"Gladbach"},{ home:"Frankfurt", away:"Freiburg"},{ home:"Wolfsburg", away:"Hoffenheim"}] },
    ligue: { name: "Ligue 1", badge: "https://upload.wikimedia.org/wikipedia/commons/thumb/c/c3/Ligue_1_Uber_Eats_logo.svg/120px-Ligue_1_Uber_Eats_logo.svg.png", fullName: "Ligue 1", teams: ["PSG","Monaco","Marseille","Lyon","Lens"], fixtures: [{ home:"PSG", away:"Monaco"},{ home:"Marseille", away:"Lyon"},{ home:"Lens", away:"Rennes"},{ home:"Lille", away:"Nice"},{ home:"Nantes", away:"Strasbourg"}] },
    worldcup: { name: "World Cup", badge: "https://upload.wikimedia.org/wikipedia/en/thumb/6/6a/FIFA_World_Cup_Logo_2026.png/120px-FIFA_World_Cup_Logo_2026.png", fullName: "FIFA World Cup", teams: ["Brazil","Argentina","France","Germany","Spain"], fixtures: [{ home:"Brazil", away:"Argentina"},{ home:"France", away:"Spain"},{ home:"Germany", away:"England"},{ home:"Portugal", away:"Netherlands"},{ home:"Belgium", away:"Croatia"}] }
  };

  // ------------------------------
  // 2. SIMULATED ACTUAL RESULTS (for GW 1 to 38)
  // ------------------------------
  let actualResults = {}; // actualResults[league][gw][matchIdx] = { homeScore, awayScore }
  function generateActualResults() {
    for (let league of Object.keys(leaguesData)) {
      actualResults[league] = {};
      for (let gw = 1; gw <= 38; gw++) {
        actualResults[league][gw] = [];
        for (let i = 0; i < leaguesData[league].fixtures.length; i++) {
          // realistic random scores: home win/draw/away
          let homeScore = Math.floor(Math.random() * 4);
          let awayScore = Math.floor(Math.random() * 3);
          if (homeScore === awayScore && homeScore === 0 && Math.random() > 0.3) homeScore = 1;
          actualResults[league][gw].push({ homeScore, awayScore });
        }
      }
    }
  }
  generateActualResults();

  // ------------------------------
  // 3. USER PREDICTIONS STORAGE (simulate past predictions)
  // ------------------------------
  let userPredictions = {}; // userPredictions[league][gw][matchIdx] = { hPred, aPred }
  function initUserPredictions() {
    for (let league of Object.keys(leaguesData)) {
      userPredictions[league] = {};
      for (let gw = 1; gw <= 38; gw++) {
        userPredictions[league][gw] = [];
        for (let i = 0; i < leaguesData[league].fixtures.length; i++) {
          // simulate user predictions: sometimes correct, sometimes off
          let actual = actualResults[league][gw][i];
          let hPred = actual.homeScore + (Math.random() > 0.6 ? (Math.random() > 0.5 ? 1 : -1) : 0);
          let aPred = actual.awayScore + (Math.random() > 0.6 ? (Math.random() > 0.5 ? 1 : -1) : 0);
          hPred = Math.max(0, Math.min(5, hPred));
          aPred = Math.max(0, Math.min(5, aPred));
          userPredictions[league][gw].push({ hPred, aPred });
        }
      }
    }
  }
  initUserPredictions();

  // ------------------------------
  // 4. CALCULATE ACCURACY PER LEAGUE (based on past GWs up to currentGW-1)
  // ------------------------------
  function computeAccuracy(league, currentGW) {
    let totalMatches = 0;
    let correctExact = 0;
    for (let gw = 1; gw < currentGW; gw++) {
      let matches = userPredictions[league][gw];
      let actuals = actualResults[league][gw];
      for (let i = 0; i < matches.length; i++) {
        totalMatches++;
        if (matches[i].hPred === actuals[i].homeScore && matches[i].aPred === actuals[i].awayScore) {
          correctExact++;
        }
      }
    }
    return totalMatches === 0 ? 0 : Math.round((correctExact / totalMatches) * 100);
  }

  // ------------------------------
  // 5. GLOBAL STATE
  // ------------------------------
  let currentLeague = "epl";
  let currentGW = 32;        // current gameweek (we are at GW32, past GWs locked)
  let leagueScores = { epl: 0, liga: 0, serie: 0, bundes: 0, ligue: 0, worldcup: 0 };
  let championPicks = { epl: "", liga: "", serie: "", bundes: "", ligue: "", worldcup: "" };
  let lockState = {};
  let penaltyPoints = { epl: 0, liga: 0, serie: 0, bundes: 0, ligue: 0, worldcup: 0 };
  let leagueAccuracy = {};

  function updateAllAccuracies() {
    for (let l of Object.keys(leaguesData)) {
      leagueAccuracy[l] = computeAccuracy(l, currentGW);
    }
  }
  updateAllAccuracies();

  // cards system (simplified)
  let userCards = { yellows: 0, reds: 0, cardHistory: [] };
  let isSuspended = false;
  function giveYellowCard(reason) { if(isSuspended) return; userCards.yellows++; userCards.cardHistory.push({ gw: currentGW, reason, type:"yellow" }); showToast(`🟡 YELLOW: ${reason}`, "#f5d742"); updateCardUI(); let recent = userCards.cardHistory.filter(c=>c.type==="yellow" && (currentGW-c.gw)<=3).length; if(recent>=2 && userCards.reds===0) giveRedCard("Two yellows in 3 GWs"); }
  function giveRedCard(reason) { if(userCards.reds>0) return; userCards.reds++; userCards.cardHistory.push({ gw: currentGW, reason, type:"red" }); let deduction = 20; let keys = Object.keys(leagueScores); for(let k of keys) leagueScores[k] = Math.max(0, leagueScores[k] - deduction/keys.length); updateScoreDisplay(); isSuspended=true; showToast(`🔴 RED CARD! -20pts, suspended next GW. ${reason}`, "#e34d4d"); updateCardUI(); userCards.yellows=0; }
  function updateCardUI() { document.getElementById("yellowCount").innerText = userCards.yellows; document.getElementById("redCount").innerText = userCards.reds; }
  function checkRiskyPrediction(h,a) { let margin = Math.abs(parseInt(h||0)-parseInt(a||0)); if(margin>=4) giveYellowCard(`Risky margin ${h}-${a}`); }
  function showToast(msg, color="#b5f028") { let t=document.createElement("div"); t.innerText=msg; t.style.position="fixed"; t.style.bottom="20px"; t.style.left="50%"; t.style.transform="translateX(-50%)"; t.style.background=color; t.style.color="#0a2a12"; t.style.padding="8px 20px"; t.style.borderRadius="60px"; t.style.zIndex="999"; t.style.fontWeight="bold"; document.body.appendChild(t); setTimeout(()=>t.remove(),2500); }

  function updateMatchPred(league, idx, type, val) {
    if(isSuspended) { showToast("Suspended this GW!"); return; }
    if (currentGW <= 31) { showToast("Past gameweeks are locked!"); return; }
    let pred = userPredictions[league][currentGW][idx];
    if(type === 'home') pred.hPred = parseInt(val) || 0;
    else pred.aPred = parseInt(val) || 0;
    checkRiskyPrediction(pred.hPred, pred.aPred);
    // re-render to show updated values
    renderPredictions();
  }

  function submitPredictions() {
    if(isSuspended) { showToast("Suspended! Cannot submit."); return; }
    if (currentGW <= 31) { showToast("Past gameweeks are already recorded."); return; }
    showToast(`✅ GW${currentGW} predictions saved! Accuracy will update after GW ends.`, "#b5f028");
    // In real app, you would lock submissions. Here we just notify.
  }

  // render league cards with accuracy %
  function renderLeagues() {
    const track = document.getElementById("leaguesTrack");
    track.innerHTML = "";
    for(let [key, league] of Object.entries(leaguesData)) {
      let lock = lockState[key] || { locked: false, lockGW: null };
      let percent = leagueAccuracy[key] || 0;
      let card = document.createElement("div");
      card.className = `league-card ${currentLeague === key ? 'active-league' : ''}`;
      card.onclick = (e) => { if(e.target.tagName!=='SELECT' && e.target.tagName!=='BUTTON') { currentLeague = key; renderLeagues(); renderPredictions(); } };
      card.innerHTML = `
        <div class="accuracy-bg">${percent}%</div>
        <div class="league-card-content">
          <div style="display:flex; align-items:center; gap:8px;">
            <img src="${league.badge}" class="league-badge-img" onerror="this.src='https://via.placeholder.com/48'">
            <div><div class="league-name">${league.name}</div><div class="league-points">${Math.round(leagueScores[key])} pts</div></div>
          </div>
          <select class="champion-selector" id="champSelect-${key}" ${lock.locked ? 'disabled' : ''} onchange="updateChampionPick('${key}', this.value)">
            <option value="">— Pick Champion —</option>
            ${league.teams.map(t => `<option ${championPicks[key]===t ? 'selected' : ''}>${t}</option>`).join('')}
          </select>
          <button class="lock-champ-btn ${lock.locked ? 'locked' : ''}" onclick="event.stopPropagation(); toggleLeagueLock('${key}')">
            <i class="fas ${lock.locked ? 'fa-lock' : 'fa-lock-open'}"></i> ${lock.locked ? 'Locked' : 'Unlock'}
          </button>
          ${penaltyPoints[key] ? `<div class="penalty-text">⚠️ Penalty -${penaltyPoints[key]}</div>` : ''}
        </div>
      `;
      track.appendChild(card);
    }
  }

  window.updateChampionPick = (leagueId, val) => {
    if(lockState[leagueId]?.locked) { showToast("Champion locked! Unlock first."); return; }
    championPicks[leagueId] = val;
    renderLeagues();
  };
  function toggleLeagueLock(leagueId) {
    let lock = lockState[leagueId];
    if(!lock) lockState[leagueId] = { locked: false, lockGW: null };
    lock = lockState[leagueId];
    if(!lock.locked) {
      if(!championPicks[leagueId]) { showToast("Select a champion first!"); return; }
      lock.locked = true; lock.lockGW = currentGW;
      showToast(`🔒 ${leaguesData[leagueId].fullName} champion locked at GW${currentGW}`);
    } else {
      let weeks = currentGW - (lock.lockGW || currentGW);
      let penalty = weeks * 2;
      if(penalty>0) {
        penaltyPoints[leagueId] += penalty;
        leagueScores[leagueId] = Math.max(0, leagueScores[leagueId] - penalty);
        giveYellowCard(`Unlocked ${leaguesData[leagueId].fullName} after ${weeks} GWs (-${penalty} pts)`);
        updateScoreDisplay();
      }
      lock.locked = false; lock.lockGW = null;
    }
    renderLeagues();
  }

  // Awards (unchanged)
  const awardsList = [
    { id: "ballon", name: "Ballon d'Or", options: ["Messi","Haaland","Mbappé","Vinicius","Bellingham"], points: 150, locked: false, lockGW: null, pick: "" },
    { id: "ucl", name: "UCL Winner", options: ["Real Madrid","Man City","Bayern","PSG","Arsenal"], points: 120, locked: false, lockGW: null, pick: "" },
    { id: "euro", name: "Euro / WC Winner", options: ["France","Spain","Germany","England","Argentina"], points: 100, locked: false, lockGW: null, pick: "" }
  ];
  function renderAwards() {
    const container = document.getElementById("awardsGrid");
    container.innerHTML = "";
    awardsList.forEach(award => {
      let card = document.createElement("div");
      card.className = "award-card";
      card.innerHTML = `
        <h3 style="color:white; font-size:1.1rem;">${award.name}</h3>
        <select id="award-${award.id}" ${award.locked ? 'disabled' : ''} onchange="updateAwardPick('${award.id}', this.value)">
          <option value="">— Predict Winner —</option>
          ${award.options.map(opt => `<option ${award.pick===opt ? 'selected' : ''}>${opt}</option>`).join('')}
        </select>
        <div style="font-size:0.7rem; color:#ffd966;">🏆 Bonus: ${award.points} pts | Penalty: -${Math.floor(award.points*0.3)}</div>
        <button class="lock-award-btn" onclick="toggleAwardLock('${award.id}')">${award.locked ? '🔒 Locked' : '🔓 Unlock'}</button>
      `;
      container.appendChild(card);
    });
  }
  window.updateAwardPick = (id, val) => { let a = awardsList.find(x=>x.id===id); if(a.locked) { showToast("Award locked!"); return; } a.pick = val; renderAwards(); };
  function toggleAwardLock(id) {
    let a = awardsList.find(x=>x.id===id);
    if(!a.locked) { if(!a.pick) { showToast("Pick a winner first!"); return; } a.locked=true; a.lockGW=currentGW; showToast(`🔒 ${a.name} locked`); }
    else { let weeks = currentGW - (a.lockGW||currentGW); let penalty = weeks*3; if(penalty>0) { let totalPenalty = Math.min(50, penalty); for(let k of Object.keys(leagueScores)) leagueScores[k] = Math.max(0, leagueScores[k] - totalPenalty/6); giveYellowCard(`Unlocked ${a.name} after ${weeks} GWs`); updateScoreDisplay(); } a.locked=false; a.lockGW=null; }
    renderAwards();
  }

  // render predictions with scores on each side
  function renderPredictions() {
    const panel = document.getElementById("panel-predict");
    if(isSuspended) { panel.innerHTML = `<div style="padding:2rem;text-align:center;"><i class="fas fa-ban"></i><h2>SUSPENDED GW ${currentGW}</h2></div>`; return; }
    let matches = leaguesData[currentLeague].fixtures;
    let userPreds = userPredictions[currentLeague][currentGW];
    let actuals = actualResults[currentLeague][currentGW];
    let isPast = currentGW < 32; // GW 1-31 are past, locked
    let html = `<div class="matches-grid">`;
    matches.forEach((m, idx) => {
      let userH = userPreds[idx].hPred;
      let userA = userPreds[idx].aPred;
      let actualH = actuals[idx].homeScore;
      let actualA = actuals[idx].awayScore;
      let displayHomeScore = isPast ? actualH : (userH !== undefined ? userH : '');
      let displayAwayScore = isPast ? actualA : (userA !== undefined ? userA : '');
      html += `
        <div class="match-card">
          <div class="team-home">
            <span class="team-name">${m.home}</span>
            <input class="score-input" type="number" id="h_${idx}" value="${displayHomeScore}" ${isPast ? 'disabled' : ''} placeholder="0" onchange="updateMatchPred('${currentLeague}',${idx},'home',this.value)">
          </div>
          <div>VS</div>
          <div class="team-away">
            <input class="score-input" type="number" id="a_${idx}" value="${displayAwayScore}" ${isPast ? 'disabled' : ''} placeholder="0" onchange="updateMatchPred('${currentLeague}',${idx},'away',this.value)">
            <span class="team-name">${m.away}</span>
          </div>
          ${isPast ? `<div style="font-size:0.8rem; color:#b5f028;">Actual: ${actualH} - ${actualA}</div>` : '<div></div>'}
        </div>`;
    });
    if (!isPast) {
      html += `<div style="display:flex; justify-content:flex-end; margin-top:1rem"><button class="btn-submit-lime" onclick="submitPredictions()"><i class="fas fa-lock"></i> LOCK GW${currentGW} PREDICTIONS</button></div>`;
    } else {
      html += `<div style="margin-top:1rem; text-align:center; color:#aaa;">⚠️ Gameweek ${currentGW} is complete. Results are final.</div>`;
    }
    html += `</div>`;
    panel.innerHTML = html;
  }

  function renderCardsPanel() {
    let history = `<div class="card-log"><h3>🃏 DISCIPLINARY RECORD</h3>`;
    if(userCards.cardHistory.length===0) history += `<p>✅ No cards this season</p>`;
    else userCards.cardHistory.slice().reverse().forEach(c => { history += `<div><i class="fas fa-${c.type==='yellow'?'square':'circle'}" style="color:${c.type==='yellow'?'#f5d742':'#e34d4d'}"></i> GW${c.gw}: ${c.reason} (${c.type.toUpperCase()})</div>`; });
    history += `<p style="margin-top:1rem">⚠️ Rules: 4+ goal margin OR unlock champion = 🟡. Two yellows in 3 GWs = 🔴 (-20pts, next GW suspension).</p></div>`;
    document.getElementById("panel-cards").innerHTML = history;
  }
  function renderLeaderboard() {
    let total = Object.values(leagueScores).reduce((a,b)=>a+b,0);
    document.getElementById("panel-leaderboard").innerHTML = `<div class="card-log"><h2>🏆 GLOBAL LEADERBOARD</h2><div>1. ⚡ EliteGaffer - 4,890</div><div>2. 🎯 YOU - ${total.toFixed(0)} pts</div><div><small>Accuracy % based on correct predictions in past gameweeks.</small></div></div>`;
  }
  function updateScoreDisplay() { renderLeagues(); }

  // GW strip 1-38
  function buildGWStrip() {
    let container = document.getElementById("gwContainer");
    for(let i=1;i<=38;i++) {
      let btn = document.createElement("button");
      btn.innerText = `GW ${i}`;
      btn.classList.add("gw-btn");
      if(i===currentGW) btn.classList.add("active-gw");
      btn.onclick = () => {
        currentGW = i;
        document.getElementById("globalGWbadge").innerHTML = `GW ${currentGW}`;
        document.querySelectorAll(".gw-btn").forEach(b=>b.classList.remove("active-gw"));
        btn.classList.add("active-gw");
        // update accuracies based on new currentGW (for display)
        updateAllAccuracies();
        renderLeagues();
        renderPredictions();
        showToast(`Gameweek ${currentGW} ${currentGW < 32 ? '(Past - results locked)' : '(Active - predictions open)'}`);
      };
      container.appendChild(btn);
    }
  }

  for(let l of Object.keys(leaguesData)) if(!lockState[l]) lockState[l] = { locked: false, lockGW: null };
  function fakeLogin() { closeModal(); showToast("Welcome! Past GWs have actual results. Your accuracy % updates automatically."); }
  function openModal() { document.getElementById("modalOverlay").style.display = "flex"; }
  function closeModal() { document.getElementById("modalOverlay").style.display = "none"; }

  window.updateMatchPred = updateMatchPred;
  buildGWStrip();
  renderLeagues();
  renderAwards();
  renderPredictions();
  renderCardsPanel();
  renderLeaderboard();
  updateCardUI();

  document.querySelectorAll(".tab-modern").forEach(t=>t.addEventListener("click",()=>{
    document.querySelectorAll(".tab-modern").forEach(tt=>tt.classList.remove("active"));
    t.classList.add("active");
    switchTab(t.getAttribute("data-tab"));
  }));
  function switchTab(tabId) {
    document.querySelectorAll(".panel").forEach(p=>p.style.display="none");
    document.getElementById(`panel-${tabId}`).style.display="block";
    if(tabId==='predict') renderPredictions();
    if(tabId==='cards') renderCardsPanel();
    if(tabId==='leaderboard') renderLeaderboard();
  }
  switchTab("predict");
</script>
</body>
</html>
