<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>The Gaffer's Pick | Interactive · Leagues · Awards Chips</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@400;600;700&family=Barlow:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #2a2a2a; font-family: 'Barlow', sans-serif; color: white; overflow-x: hidden; }
    .loader { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #1a1a1a; display: flex; justify-content: center; align-items: center; z-index: 9999; transition: opacity 0.5s; }
    .loader i { font-size: 4rem; color: #b5f028; animation: spin 1s linear infinite; }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    .loader.hide { opacity: 0; pointer-events: none; }

    /* nav */
    .top-menu { position: sticky; top: 0; background: rgba(0,0,0,0.85); backdrop-filter: blur(12px); border-bottom: 1px solid #b5f028; z-index: 100; display: flex; justify-content: space-between; align-items: center; padding: 8px 2rem; flex-wrap: wrap; }
    .menu-container { display: flex; gap: 8px; flex-wrap: wrap; }
    .menu-btn { background: rgba(42,42,42,0.8); border: 1px solid #5a9e6a; color: #eee; font-family: 'Barlow Condensed'; font-weight: bold; padding: 8px 20px; border-radius: 40px; cursor: pointer; display: inline-flex; align-items: center; gap: 6px; }
    .menu-btn.active { background: #b5f028; color: #0a2a12; border-color: #b5f028; }
    .user-area { display: flex; gap: 10px; align-items: center; }
    .user-area button { background: rgba(0,0,0,0.6); border: 1px solid #b5f028; border-radius: 40px; padding: 6px 16px; cursor: pointer; color: white; }

    /* GW selector */
    .gw-indicator { background: rgba(0,0,0,0.8); backdrop-filter: blur(8px); padding: 8px 2rem; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #3a5a3a; }
    .gw-nav { display: flex; align-items: center; gap: 16px; background: rgba(0,0,0,0.5); border-radius: 60px; padding: 4px 12px; }
    .gw-arrow { background: #2a2a2a; border: 1px solid #b5f028; border-radius: 50%; width: 36px; height: 36px; display: flex; align-items: center; justify-content: center; cursor: pointer; }
    .gw-current { font-family: 'Bebas Neue'; font-size: 1.4rem; background: #1a2a1a; padding: 4px 20px; border-radius: 40px; display: inline-flex; align-items: center; gap: 8px; }

    /* awards bar (horizontal pitch-like containers) */
    .awards-bar { display: flex; flex-wrap: wrap; justify-content: center; gap: 16px; margin: 12px; }
    .award-card { background: rgba(30,60,30,0.4); backdrop-filter: blur(4px); border: 1px solid white; border-radius: 20px; padding: 8px 16px; min-width: 180px; text-align: center; position: relative; overflow: hidden; }
    .award-card::before { content: ''; position: absolute; top: 50%; left: 0; right: 0; height: 1px; background: rgba(255,255,255,0.3); transform: translateY(-50%); pointer-events: none; }
    .award-card select { background: rgba(0,0,0,0.6); border-radius: 30px; padding: 4px 8px; color: white; border: 1px solid #b5f028; margin: 5px 0; }
    .lock-award { background: none; border: 1px solid gold; border-radius: 30px; padding: 2px 12px; cursor: pointer; }

    /* page containers */
    .page { display: none; padding: 1rem; }
    .page.active-page { display: block; }
    .pitch-container { position: relative; background: rgba(30,60,30,0.25); border-radius: 24px; margin-bottom: 1rem; min-height: 550px; border: 2px solid rgba(255,255,255,0.6); overflow: hidden; }
    .pitch-container .halfway-line { position: absolute; top: 50%; left: 0; right: 0; height: 2px; background: white; transform: translateY(-50%); }
    .pitch-container .center-circle { position: absolute; top: 50%; left: 50%; width: 80px; height: 80px; border: 2px solid white; border-radius: 50%; transform: translate(-50%, -50%); }
    .penalty-area-left, .penalty-area-right { position: absolute; top: 50%; width: 50px; height: 120px; border: 2px solid white; transform: translateY(-50%); }
    .penalty-area-left { left: 0; border-left: none; }
    .penalty-area-right { right: 0; border-right: none; }
    .goal-line-left, .goal-line-right { position: absolute; top: 50%; width: 12px; height: 40px; background: white; transform: translateY(-50%); }
    .goal-line-left { left: 0; }
    .goal-line-right { right: 0; }
    .accuracy-overlay { position: absolute; inset: 0; background: rgba(10,40,10,0.55); display: flex; align-items: center; justify-content: center; font-family: 'Bebas Neue'; font-size: 8rem; font-weight: bold; color: rgba(0,0,0,0.65); pointer-events: none; z-index: 2; }
    .matches-pitch { position: relative; z-index: 3; display: flex; flex-direction: column; gap: 20px; max-width: 800px; margin: 60px auto; padding: 1rem; }
    .match-row { display: flex; align-items: center; justify-content: center; gap: 15px; background: rgba(0,0,0,0.3); border-radius: 60px; padding: 12px 20px; }
    .team-home, .team-away { font-weight: bold; font-size: 1rem; min-width: 100px; text-align: center; }
    .score-input-pitch { width: 65px; height: 55px; background: transparent; border: 2px solid white; border-radius: 16px; text-align: center; font-size: 1.6rem; color: #b5f028; font-weight: bold; }
    .score-input-pitch:disabled { border-color: #888; color: #ccc; }
    .champion-control { background: rgba(0,0,0,0.5); border-radius: 60px; padding: 12px 20px; margin-top: 16px; display: flex; flex-wrap: wrap; gap: 12px; justify-content: space-between; }
    .champion-select { background: rgba(10,42,18,0.8); border: 1px solid #b5f028; border-radius: 40px; padding: 8px 15px; color: white; flex: 2; }
    .lock-btn { background: rgba(0,0,0,0.6); border: 1px solid white; border-radius: 40px; padding: 6px 18px; cursor: pointer; display: inline-flex; align-items: center; gap: 8px; }
    .lock-btn.locked { background: #b5f028; color: black; }

    /* league management */
    .league-panel { background: rgba(0,0,0,0.6); border-radius: 24px; padding: 1.5rem; margin-bottom: 1rem; }
    .league-panel input, .league-panel button { margin: 5px; padding: 8px; border-radius: 40px; border: none; }
    .league-list { margin-top: 1rem; }
    .league-item { background: rgba(255,255,255,0.1); border-radius: 16px; padding: 10px; margin-bottom: 8px; }
    @media (max-width: 700px) { .match-row { flex-wrap: wrap; } .team-home, .team-away { min-width: 70px; font-size: 0.8rem; } .score-input-pitch { width: 50px; height: 45px; font-size: 1.2rem; } }
  </style>
</head>
<body>
<div class="loader" id="loader"><i class="fas fa-futbol"></i></div>

<div class="top-menu">
  <div class="menu-container" id="menuContainer"></div>
  <div class="user-area" id="userArea">
    <button id="loginBtn" onclick="showLoginModal()">Sign In / Sign Up</button>
    <span id="userDisplay" style="display:none;"></span>
    <button id="logoutBtn" style="display:none;" onclick="logout()">Logout</button>
  </div>
</div>

<div class="gw-indicator">
  <span><i class="fas fa-calendar-alt"></i> Gameweek</span>
  <div class="gw-nav">
    <div class="gw-arrow" id="gwPrev"><i class="fas fa-chevron-left"></i></div>
    <div class="gw-current" id="gwCurrentDisplay"><i class="fas fa-futbol"></i> GW 32</div>
    <div class="gw-arrow" id="gwNext"><i class="fas fa-chevron-right"></i></div>
  </div>
</div>

<div class="awards-bar" id="awardsBar"></div>

<div id="pagesContainer"></div>

<!-- League Management Panel (shown inside "Leagues" page) -->
<div id="leaguesPanel" style="display:none; padding:1rem;"></div>

<!-- Modals -->
<div id="loginModal" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.9); backdrop-filter:blur(12px); align-items:center; justify-content:center; z-index:200;">
  <div style="background:#0f2a1a; padding:2rem; border-radius:40px; width:90%; max-width:400px;">
    <h2>Enter The Dugout</h2>
    <input type="text" id="loginUsername" placeholder="Username" style="width:100%; margin:1rem 0; padding:12px; border-radius:40px;">
    <button onclick="loginOrRegister()" class="lock-btn" style="background:#b5f028; color:black; width:100%">Play</button>
    <button onclick="closeModal('loginModal')" style="margin-top:1rem; background:none; border:none; color:#aaa;">Close</button>
  </div>
</div>

<script>
  // ---------- STORAGE KEYS ----------
  const STORAGE_USERS = "gaffer_users";
  const STORAGE_LEAGUES = "gaffer_leagues";
  const STORAGE_PREDICTIONS = "gaffer_predictions";
  const STORAGE_AWARDS = "gaffer_awards";
  const STORAGE_CURRENT_USER = "gaffer_current_user";

  // ---------- LEAGUES DATA (Top 5 teams) ----------
  const leaguesData = {
    epl: { name: "Premier League", teams: ["Arsenal","Man City","Liverpool","Chelsea","Man Utd"], fixtures: [{ home:"Arsenal", away:"Man City"},{ home:"Liverpool", away:"Chelsea"},{ home:"Man Utd", away:"Tottenham"},{ home:"Newcastle", away:"Aston Villa"},{ home:"Brighton", away:"West Ham"}] },
    liga: { name: "La Liga", teams: ["Real Madrid","Barcelona","Atletico","Athletic","Real Betis"], fixtures: [{ home:"Real Madrid", away:"Barcelona"},{ home:"Atletico", away:"Sevilla"},{ home:"Athletic", away:"Villarreal"},{ home:"Real Betis", away:"Real Soc."},{ home:"Valencia", away:"Osasuna"}] },
    serie: { name: "Serie A", teams: ["Inter Milan","Juventus","AC Milan","Napoli","Lazio"], fixtures: [{ home:"Inter Milan", away:"Juventus"},{ home:"AC Milan", away:"Napoli"},{ home:"Lazio", away:"Roma"},{ home:"Atalanta", away:"Fiorentina"},{ home:"Torino", away:"Bologna"}] },
    bundes: { name: "Bundesliga", teams: ["Bayern","Dortmund","Leverkusen","Leipzig","Stuttgart"], fixtures: [{ home:"Bayern", away:"Dortmund"},{ home:"Leverkusen", away:"Leipzig"},{ home:"Stuttgart", away:"Gladbach"},{ home:"Frankfurt", away:"Freiburg"},{ home:"Wolfsburg", away:"Hoffenheim"}] },
    ligue: { name: "Ligue 1", teams: ["PSG","Monaco","Marseille","Lyon","Lens"], fixtures: [{ home:"PSG", away:"Monaco"},{ home:"Marseille", away:"Lyon"},{ home:"Lens", away:"Rennes"},{ home:"Lille", away:"Nice"},{ home:"Nantes", away:"Strasbourg"}] },
    worldcup: { name: "World Cup", teams: ["Brazil","Argentina","France","Germany","Spain"], fixtures: [{ home:"Brazil", away:"Argentina"},{ home:"France", away:"Spain"},{ home:"Germany", away:"England"},{ home:"Portugal", away:"Netherlands"},{ home:"Belgium", away:"Croatia"}] }
  };

  // generate actual results (random but consistent per GW)
  let actualResults = {};
  function generateActualResults() {
    for (let league of Object.keys(leaguesData)) {
      actualResults[league] = {};
      for (let gw = 1; gw <= 38; gw++) {
        actualResults[league][gw] = [];
        for (let i = 0; i < leaguesData[league].fixtures.length; i++) {
          let homeScore = Math.floor(Math.random() * 4);
          let awayScore = Math.floor(Math.random() * 3);
          if (homeScore === awayScore && homeScore === 0 && Math.random() > 0.3) homeScore = 1;
          actualResults[league][gw].push({ homeScore, awayScore });
        }
      }
    }
  }
  generateActualResults();

  // points calculation per match
  function calculateMatchPoints(predHome, predAway, actualHome, actualAway) {
    if (predHome === actualHome && predAway === actualAway) return 20;
    let predWinner = predHome > predAway ? "home" : (predHome < predAway ? "away" : "draw");
    let actualWinner = actualHome > actualAway ? "home" : (actualHome < actualAway ? "away" : "draw");
    if (predWinner === actualWinner) {
      let diffHome = Math.abs(predHome - actualHome);
      let diffAway = Math.abs(predAway - actualAway);
      if (diffHome <= 1 && diffAway <= 1) return 12;
      return 8;
    }
    let diffHome = Math.abs(predHome - actualHome);
    let diffAway = Math.abs(predAway - actualAway);
    if (diffHome <= 1 && diffAway <= 1) return 4;
    return 0;
  }

  // user system
  let currentUser = null;
  let users = JSON.parse(localStorage.getItem(STORAGE_USERS) || "{}");
  let leagues = JSON.parse(localStorage.getItem(STORAGE_LEAGUES) || "[]");
  let predictions = JSON.parse(localStorage.getItem(STORAGE_PREDICTIONS) || "{}");
  let awardsState = JSON.parse(localStorage.getItem(STORAGE_AWARDS) || "{}");

  function saveUsers() { localStorage.setItem(STORAGE_USERS, JSON.stringify(users)); }
  function saveLeagues() { localStorage.setItem(STORAGE_LEAGUES, JSON.stringify(leagues)); }
  function savePredictions() { localStorage.setItem(STORAGE_PREDICTIONS, JSON.stringify(predictions)); }
  function saveAwards() { localStorage.setItem(STORAGE_AWARDS, JSON.stringify(awardsState)); }

  function loginOrRegister() {
    let username = document.getElementById("loginUsername").value.trim();
    if (!username) return;
    if (!users[username]) {
      users[username] = { username, totalPoints: 0, leagues: [] };
      saveUsers();
    }
    currentUser = username;
    localStorage.setItem(STORAGE_CURRENT_USER, username);
    closeModal("loginModal");
    updateUIForUser();
    showToast(`Welcome ${username}!`);
    renderCurrentPage();
  }

  function logout() {
    currentUser = null;
    localStorage.removeItem(STORAGE_CURRENT_USER);
    updateUIForUser();
    renderCurrentPage();
  }

  function updateUIForUser() {
    let loginBtn = document.getElementById("loginBtn");
    let logoutBtn = document.getElementById("logoutBtn");
    let userDisplay = document.getElementById("userDisplay");
    if (currentUser) {
      loginBtn.style.display = "none";
      logoutBtn.style.display = "inline-block";
      userDisplay.style.display = "inline-block";
      userDisplay.innerHTML = `<i class="fas fa-user"></i> ${currentUser}`;
    } else {
      loginBtn.style.display = "inline-block";
      logoutBtn.style.display = "none";
      userDisplay.style.display = "none";
    }
  }

  // league functions
  function createLeague() {
    let name = prompt("League name:");
    if (!name) return;
    let code = Math.random().toString(36).substring(2, 8).toUpperCase();
    leagues.push({ name, code, members: [currentUser], admin: currentUser });
    saveLeagues();
    if (!users[currentUser].leagues) users[currentUser].leagues = [];
    users[currentUser].leagues.push(code);
    saveUsers();
    showToast(`League created! Code: ${code}`);
    renderLeaguesPanel();
  }

  function joinLeague() {
    let code = prompt("Enter league code:");
    let league = leagues.find(l => l.code === code);
    if (!league) { showToast("Invalid code"); return; }
    if (league.members.includes(currentUser)) { showToast("Already in league"); return; }
    league.members.push(currentUser);
    if (!users[currentUser].leagues) users[currentUser].leagues = [];
    users[currentUser].leagues.push(code);
    saveLeagues();
    saveUsers();
    showToast(`Joined ${league.name}`);
    renderLeaguesPanel();
  }

  function renderLeaguesPanel() {
    const container = document.getElementById("leaguesPanel");
    if (!currentUser) { container.innerHTML = `<div class="league-panel">Please sign in to join leagues.</div>`; return; }
    let myLeagues = leagues.filter(l => l.members.includes(currentUser));
    let html = `<div class="league-panel"><h3><i class="fas fa-users"></i> My Leagues</h3><button onclick="createLeague()" class="lock-btn">+ Create League</button> <button onclick="joinLeague()" class="lock-btn">Join League</button><div class="league-list">`;
    for (let l of myLeagues) {
      let memberPoints = [];
      for (let m of l.members) {
        let total = users[m]?.totalPoints || 0;
        memberPoints.push({ user: m, points: total });
      }
      memberPoints.sort((a,b)=>b.points - a.points);
      html += `<div class="league-item"><strong>${l.name}</strong> (Code: ${l.code})<br>`;
      for (let mp of memberPoints) html += `${mp.user}: ${mp.points} pts &nbsp;`;
      html += `</div>`;
    }
    html += `</div></div>`;
    container.innerHTML = html;
  }

  // update user total points from predictions (for all GWs)
  function updateUserTotalPoints() {
    if (!currentUser) return;
    let total = 0;
    for (let gw = 1; gw <= 38; gw++) {
      for (let league of Object.keys(leaguesData)) {
        let preds = predictions?.[currentUser]?.[league]?.[gw];
        if (preds) {
          let actuals = actualResults[league][gw];
          for (let i = 0; i < preds.length; i++) {
            total += calculateMatchPoints(preds[i].hPred, preds[i].aPred, actuals[i].homeScore, actuals[i].awayScore);
          }
        }
      }
    }
    // add award points if locked
    let userAwards = awardsState[currentUser] || {};
    for (let award of ["ballon", "ucl", "europa"]) {
      let a = userAwards[award];
      if (a && a.locked && a.pick) {
        // simplified: award points at end of season, but we add now for display
        total += a.points;
      }
    }
    users[currentUser].totalPoints = total;
    saveUsers();
  }

  // predict helpers
  function updateMatchPred(league, idx, type, val) {
    if (!currentUser) { showToast("Sign in first!"); return; }
    let gw = currentGW;
    if (gw <= 31) { showToast("Past GW locked!"); return; }
    if (!predictions[currentUser]) predictions[currentUser] = {};
    if (!predictions[currentUser][league]) predictions[currentUser][league] = {};
    if (!predictions[currentUser][league][gw]) predictions[currentUser][league][gw] = [];
    let preds = predictions[currentUser][league][gw];
    while (preds.length <= idx) preds.push({ hPred: "", aPred: "" });
    if (type === 'home') preds[idx].hPred = parseInt(val) || 0;
    else preds[idx].aPred = parseInt(val) || 0;
    savePredictions();
    updateUserTotalPoints();
    renderCurrentPage();
  }

  function savePredictionsGW() {
    if (!currentUser) { showToast("Sign in!"); return; }
    if (currentGW <= 31) { showToast("Past GW locked"); return; }
    showToast(`GW${currentGW} predictions saved!`);
    updateUserTotalPoints();
  }

  // awards chip system
  function initAwardsForUser() {
    if (!currentUser) return;
    if (!awardsState[currentUser]) {
      awardsState[currentUser] = {
        ballon: { points: 1000, locked: false, lockGW: null, pick: "", basePoints: 1000 },
        ucl: { points: 800, locked: false, lockGW: null, pick: "", basePoints: 800 },
        europa: { points: 600, locked: false, lockGW: null, pick: "", basePoints: 600 }
      };
      saveAwards();
    }
  }

  function updateAwardPick(awardId, val) {
    if (!currentUser) return;
    initAwardsForUser();
    let award = awardsState[currentUser][awardId];
    if (award.locked) { showToast("Award locked! Unlock first."); return; }
    award.pick = val;
    saveAwards();
    renderAwardsBar();
  }

  function toggleAwardLock(awardId) {
    if (!currentUser) return;
    initAwardsForUser();
    let award = awardsState[currentUser][awardId];
    if (!award.locked) {
      if (!award.pick) { showToast("Pick a winner first!"); return; }
      award.locked = true;
      award.lockGW = currentGW;
      // full points awarded (stored)
      award.points = award.basePoints;
      showToast(`🔒 ${awardId.toUpperCase()} locked at GW${currentGW} -> +${award.points} pts`);
    } else {
      // unlock penalty: points deducted based on GW difference
      let weeks = currentGW - (award.lockGW || currentGW);
      let penalty = Math.min(weeks * 15, award.basePoints * 0.7);
      award.points = Math.max(0, award.basePoints - penalty);
      award.locked = false;
      showToast(`🔓 Unlocked! Penalty -${Math.round(penalty)} pts. New value: ${Math.round(award.points)} pts`);
    }
    saveAwards();
    updateUserTotalPoints();
    renderAwardsBar();
  }

  // rendering
  let currentActiveLeague = "epl";
  let currentGW = 32;

  function renderAwardsBar() {
    if (!currentUser) { document.getElementById("awardsBar").innerHTML = `<div class="award-card">Sign in to predict awards</div>`; return; }
    initAwardsForUser();
    let awards = awardsState[currentUser];
    let html = "";
    for (let [id, award] of Object.entries(awards)) {
      let name = id === "ballon" ? "Ballon d'Or" : (id === "ucl" ? "UCL Winner" : "Europa League");
      html += `<div class="award-card">
        <span><i class="fas fa-trophy"></i> ${name}</span>
        <select onchange="updateAwardPick('${id}', this.value)" ${award.locked ? 'disabled' : ''}>
          <option value="">— Pick —</option>
          ${(id==="ballon"?["Messi","Haaland","Mbappé"]:id==="ucl"?["Real Madrid","Man City","Bayern"]:["Liverpool","Roma","Sevilla"]).map(opt => `<option ${award.pick===opt ? 'selected' : ''}>${opt}</option>`).join('')}
        </select>
        <div style="font-size:0.8rem;">🏆 ${Math.round(award.points)} pts</div>
        <button class="lock-award" onclick="toggleAwardLock('${id}')">${award.locked ? '🔒 Locked' : '🔓 Unlock'}</button>
      </div>`;
    }
    document.getElementById("awardsBar").innerHTML = html;
  }

  function renderLeaguePage(leagueId) {
    if (!currentUser) return `<div class="pitch-container"><div class="accuracy-overlay">Sign In</div><div class="matches-pitch">Please sign in to predict</div></div>`;
    let league = leaguesData[leagueId];
    let isPast = currentGW < 32;
    let userPreds = predictions?.[currentUser]?.[leagueId]?.[currentGW] || [];
    let actuals = actualResults[leagueId][currentGW];
    let matchesHtml = "";
    league.fixtures.forEach((m, idx) => {
      let userH = userPreds[idx]?.hPred || "";
      let userA = userPreds[idx]?.aPred || "";
      let actualH = actuals[idx].homeScore;
      let actualA = actuals[idx].awayScore;
      let displayHome = isPast ? actualH : userH;
      let displayAway = isPast ? actualA : userA;
      matchesHtml += `
        <div class="match-row">
          <div class="team-home">${m.home}</div>
          <input class="score-input-pitch" type="number" id="h_${leagueId}_${idx}" value="${displayHome}" ${isPast ? 'disabled' : ''} placeholder="0" onchange="updateMatchPred('${leagueId}',${idx},'home',this.value)">
          <span class="vs-badge">VS</span>
          <input class="score-input-pitch" type="number" id="a_${leagueId}_${idx}" value="${displayAway}" ${isPast ? 'disabled' : ''} placeholder="0" onchange="updateMatchPred('${leagueId}',${idx},'away',this.value)">
          <div class="team-away">${m.away}</div>
          ${isPast ? `<span class="actual-hint">${actualH}–${actualA}</span>` : ''}
        </div>
      `;
    });
    let percent = 0;
    if (currentUser && users[currentUser]) percent = Math.round((users[currentUser].totalPoints / 3800) * 100);
    let championPick = predictions?.[currentUser]?.[leagueId]?.champion || "";
    return `
      <div class="pitch-container">
        <div class="halfway-line"></div><div class="center-circle"></div>
        <div class="penalty-area-left"></div><div class="penalty-area-right"></div>
        <div class="goal-line-left"></div><div class="goal-line-right"></div>
        <div class="accuracy-overlay">${percent}%</div>
        <div class="matches-pitch">${matchesHtml}</div>
        <div class="champion-control">
          <select class="champion-select" onchange="updateChampionPick('${leagueId}', this.value)">
            <option value="">— Pick Champion —</option>
            ${league.teams.map(t => `<option ${championPick===t ? 'selected' : ''}>${t}</option>`).join('')}
          </select>
          ${!isPast ? `<button class="lock-btn" onclick="savePredictionsGW()"><i class="fas fa-save"></i> Save GW</button>` : ''}
        </div>
      </div>
    `;
  }

  window.updateChampionPick = (leagueId, val) => {
    if (!currentUser) return;
    if (!predictions[currentUser]) predictions[currentUser] = {};
    if (!predictions[currentUser][leagueId]) predictions[currentUser][leagueId] = {};
    predictions[currentUser][leagueId].champion = val;
    savePredictions();
  };

  function renderCurrentPage() {
    const container = document.getElementById("pagesContainer");
    const leaguesPanel = document.getElementById("leaguesPanel");
    let activeTab = document.querySelector(".menu-btn.active")?.getAttribute("data-tab") || "predict";
    if (activeTab === "leagues") {
      container.style.display = "none";
      leaguesPanel.style.display = "block";
      renderLeaguesPanel();
    } else {
      container.style.display = "block";
      leaguesPanel.style.display = "none";
      let html = "";
      for (let id of Object.keys(leaguesData)) {
        html += `<div class="page" id="page-${id}" data-league="${id}">${renderLeaguePage(id)}</div>`;
      }
      container.innerHTML = html;
      document.querySelectorAll(".page").forEach(p => p.classList.remove("active-page"));
      let activePage = document.getElementById(`page-${currentActiveLeague}`);
      if (activePage) activePage.classList.add("active-page");
    }
    document.getElementById("gwCurrentDisplay").innerHTML = `<i class="fas fa-futbol"></i> GW ${currentGW}`;
  }

  function buildMenu() {
    const menu = document.getElementById("menuContainer");
    menu.innerHTML = `
      <button class="menu-btn active" data-tab="predict" data-league="epl"><i class="fas fa-futbol"></i> Predict</button>
      <button class="menu-btn" data-tab="leagues"><i class="fas fa-users"></i> Leagues</button>
    `;
    document.querySelectorAll(".menu-btn").forEach(btn => {
      btn.onclick = () => {
        document.querySelectorAll(".menu-btn").forEach(b => b.classList.remove("active"));
        btn.classList.add("active");
        let tab = btn.getAttribute("data-tab");
        if (tab === "predict") {
          let league = btn.getAttribute("data-league") || "epl";
          currentActiveLeague = league;
          renderCurrentPage();
        } else {
          renderCurrentPage();
        }
      };
    });
  }

  function setupGWArrows() {
    document.getElementById("gwPrev").onclick = () => { if (currentGW > 1) { currentGW--; renderCurrentPage(); showToast(`GW ${currentGW}`); } };
    document.getElementById("gwNext").onclick = () => { if (currentGW < 38) { currentGW++; renderCurrentPage(); showToast(`GW ${currentGW}`); } };
  }

  function showToast(msg) { let t=document.createElement("div"); t.innerText=msg; t.style.position="fixed"; t.style.bottom="80px"; t.style.left="50%"; t.style.transform="translateX(-50%)"; t.style.background="#b5f028"; t.style.color="black"; t.style.padding="8px 20px"; t.style.borderRadius="60px"; t.style.zIndex="999"; document.body.appendChild(t); setTimeout(()=>t.remove(),2000); }
  function showLoginModal() { document.getElementById("loginModal").style.display = "flex"; }
  function closeModal(id) { document.getElementById(id).style.display = "none"; }

  // init
  (function() {
    const loader = document.getElementById("loader");
    setTimeout(() => loader.classList.add("hide"), 800);
    let savedUser = localStorage.getItem(STORAGE_CURRENT_USER);
    if (savedUser && users[savedUser]) currentUser = savedUser;
    updateUIForUser();
    buildMenu();
    setupGWArrows();
    renderAwardsBar();
    renderCurrentPage();
    window.updateMatchPred = updateMatchPred;
    window.updateAwardPick = updateAwardPick;
    window.toggleAwardLock = toggleAwardLock;
    window.createLeague = createLeague;
    window.joinLeague = joinLeague;
    window.savePredictionsGW = savePredictionsGW;
    window.showLoginModal = showLoginModal;
    window.closeModal = closeModal;
    window.logout = logout;
    window.loginOrRegister = loginOrRegister;
  })();
</script>
</body>
</html>
