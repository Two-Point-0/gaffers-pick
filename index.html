<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>The Gaffer's Pick | Football Formation · 4-4-2 Diamond</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@400;600;700&family=Barlow:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #1a5a2a;
      font-family: 'Barlow', sans-serif;
      color: white;
      min-height: 100vh;
      background-image: radial-gradient(circle at 20% 30%, rgba(255,255,255,0.1) 2%, transparent 2.5%);
      background-size: 40px 40px;
    }
    .loader {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: #1a1a1a;
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 9999;
      transition: opacity 0.5s;
    }
    .loader i { font-size: 4rem; color: #b5f028; animation: spin 1s linear infinite; }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    .loader.hide { opacity: 0; pointer-events: none; }

    .app-container {
      max-width: 1300px;
      margin: 0 auto;
      padding: 20px;
    }

    /* pitch lines behind formation */
    .formation-pitch {
      position: relative;
      background: rgba(30,70,30,0.4);
      border-radius: 60px;
      padding: 40px 20px;
      margin-bottom: 40px;
      border: 2px solid rgba(255,255,255,0.5);
      backdrop-filter: blur(2px);
    }
    /* white pitch markings */
    .formation-pitch::before {
      content: '';
      position: absolute;
      top: 50%;
      left: 10%;
      right: 10%;
      height: 2px;
      background: white;
      transform: translateY(-50%);
      opacity: 0.4;
    }
    .formation-pitch::after {
      content: '';
      position: absolute;
      top: 10%;
      left: 50%;
      width: 2px;
      height: 80%;
      background: white;
      transform: translateX(-50%);
      opacity: 0.4;
    }
    .center-circle {
      position: absolute;
      top: 50%;
      left: 50%;
      width: 100px;
      height: 100px;
      border: 2px solid white;
      border-radius: 50%;
      transform: translate(-50%, -50%);
      opacity: 0.5;
      pointer-events: none;
    }

    /* formation grid */
    .formation-row {
      display: flex;
      justify-content: center;
      gap: 20px;
      margin: 20px 0;
      flex-wrap: wrap;
      position: relative;
      z-index: 2;
    }
    .formation-card {
      width: 130px;
      background: rgba(0,0,0,0.5);
      backdrop-filter: blur(8px);
      border-radius: 20px;
      padding: 12px 8px;
      text-align: center;
      cursor: pointer;
      transition: all 0.2s;
      border: 1px solid rgba(255,255,255,0.4);
    }
    .formation-card.active {
      border-color: #b5f028;
      background: rgba(181,240,40,0.2);
      transform: scale(1.05);
      box-shadow: 0 0 15px #b5f028;
    }
    .formation-img {
      width: 70px;
      height: 70px;
      margin: 0 auto;
      background-size: contain;
      background-position: center;
      background-repeat: no-repeat;
      background-color: rgba(0,0,0,0.3);
      border-radius: 12px;
    }
    .formation-name {
      font-family: 'Barlow Condensed';
      font-weight: bold;
      margin-top: 8px;
      font-size: 0.8rem;
    }
    .formation-pts {
      font-size: 0.7rem;
      color: #b5f028;
    }

    /* gameweek selector */
    .gw-bar {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 20px;
      margin: 20px 0;
      background: rgba(0,0,0,0.6);
      backdrop-filter: blur(8px);
      padding: 8px 20px;
      border-radius: 60px;
      width: fit-content;
      margin-left: auto;
      margin-right: auto;
    }
    .gw-arrow {
      background: #2a2a2a;
      border: 1px solid #b5f028;
      border-radius: 50%;
      width: 36px;
      height: 36px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
    }
    .gw-current {
      font-family: 'Bebas Neue';
      font-size: 1.4rem;
      background: #1a2a1a;
      padding: 4px 24px;
      border-radius: 40px;
    }

    /* prediction panel (below formation) */
    .prediction-panel {
      background: rgba(0,0,0,0.4);
      backdrop-filter: blur(8px);
      border-radius: 32px;
      padding: 20px;
      margin-top: 20px;
      border: 1px solid rgba(255,255,255,0.3);
    }
    .league-title {
      font-family: 'Bebas Neue';
      font-size: 2rem;
      text-align: center;
      margin-bottom: 20px;
    }
    .matches-grid {
      display: flex;
      flex-direction: column;
      gap: 15px;
      max-width: 800px;
      margin: 0 auto;
    }
    .match-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: rgba(0,0,0,0.5);
      border-radius: 60px;
      padding: 10px 20px;
      flex-wrap: wrap;
      gap: 10px;
    }
    .team-badge {
      width: 50px;
      height: 50px;
      background-size: contain;
      background-position: center;
      background-repeat: no-repeat;
      background-color: rgba(0,0,0,0.4);
      border-radius: 12px;
    }
    .team-name {
      font-size: 0.8rem;
      font-weight: bold;
      text-align: center;
    }
    .score-input {
      width: 60px;
      height: 45px;
      background: transparent;
      border: 2px solid white;
      border-radius: 12px;
      text-align: center;
      font-size: 1.3rem;
      color: #b5f028;
      font-weight: bold;
    }
    .score-input:disabled { border-color: #888; color: #aaa; }
    .vs-badge { font-weight: bold; color: #b5f028; margin: 0 10px; }
    .champion-area {
      margin-top: 20px;
      display: flex;
      justify-content: center;
      gap: 15px;
      flex-wrap: wrap;
    }
    .champion-select {
      background: rgba(10,42,18,0.8);
      border: 1px solid #b5f028;
      border-radius: 40px;
      padding: 6px 12px;
      color: white;
    }
    .lock-btn {
      background: rgba(0,0,0,0.6);
      border: 1px solid white;
      border-radius: 40px;
      padding: 6px 16px;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }
    .lock-btn.locked { background: #b5f028; color: black; }
    .actual-hint { font-size: 0.7rem; margin-left: 10px; }

    @media (max-width: 800px) {
      .formation-card { width: 100px; }
      .formation-img { width: 50px; height: 50px; }
      .match-row { flex-direction: column; text-align: center; }
    }
  </style>
</head>
<body>
<div class="loader" id="loader"><i class="fas fa-futbol"></i></div>
<div class="app-container">
  <!-- formation layout (4-4-2 diamond) -->
  <div class="formation-pitch">
    <div class="center-circle"></div>
    <!-- GK: Premier League -->
    <div class="formation-row">
      <div class="formation-card" data-league="epl" id="card-epl">
        <div class="formation-img" style="background-image: url('premier-league-footballlogos-org.png');"></div>
        <div class="formation-name">Premier League</div>
        <div class="formation-pts" id="pts-epl">0 pts</div>
      </div>
    </div>
    <!-- Defenders: 4 leagues -->
    <div class="formation-row">
      <div class="formation-card" data-league="liga" id="card-liga">
        <div class="formation-img" style="background-image: url('laliga-footballlogos-org.png');"></div>
        <div class="formation-name">La Liga</div>
        <div class="formation-pts" id="pts-liga">0 pts</div>
      </div>
      <div class="formation-card" data-league="serie" id="card-serie">
        <div class="formation-img" style="background-image: url('seria-a-footballlogos-org.png');"></div>
        <div class="formation-name">Serie A</div>
        <div class="formation-pts" id="pts-serie">0 pts</div>
      </div>
      <div class="formation-card" data-league="bundes" id="card-bundes">
        <div class="formation-img" style="background-image: url('bundesliga-footballlogos-org.png');"></div>
        <div class="formation-name">Bundesliga</div>
        <div class="formation-pts" id="pts-bundes">0 pts</div>
      </div>
      <div class="formation-card" data-league="ligue" id="card-ligue">
        <div class="formation-img" style="background-image: url('lique-1-footballlogos-org.png');"></div>
        <div class="formation-name">Ligue 1</div>
        <div class="formation-pts" id="pts-ligue">0 pts</div>
      </div>
    </div>
    <!-- Midfielders: UCL + Europa League -->
    <div class="formation-row">
      <div class="formation-card" data-league="ucl" id="card-ucl">
        <div class="formation-img" style="background-image: url('ucl.png');"></div>
        <div class="formation-name">UCL Winner</div>
        <div class="formation-pts" id="pts-ucl">0 pts</div>
      </div>
      <div class="formation-card" data-league="europa" id="card-europa">
        <div class="formation-img" style="background-image: url('europa.png');"></div>
        <div class="formation-name">Europa League</div>
        <div class="formation-pts" id="pts-europa">0 pts</div>
      </div>
    </div>
    <!-- Strikers: World Cup + Ballon d'Or -->
    <div class="formation-row">
      <div class="formation-card" data-league="worldcup" id="card-worldcup">
        <div class="formation-img" style="background-image: url('world-cup-2026-footballogos-org.png');"></div>
        <div class="formation-name">World Cup 2026</div>
        <div class="formation-pts" id="pts-worldcup">0 pts</div>
      </div>
      <div class="formation-card" data-league="ballon" id="card-ballon">
        <div class="formation-img" style="background-image: url('ballon.jpg');"></div>
        <div class="formation-name">Ballon d'Or</div>
        <div class="formation-pts" id="pts-ballon">0 pts</div>
      </div>
    </div>
  </div>

  <!-- GW selector -->
  <div class="gw-bar">
    <div class="gw-arrow" id="gwPrev"><i class="fas fa-chevron-left"></i></div>
    <div class="gw-current" id="gwCurrentDisplay"><i class="fas fa-futbol"></i> GW 32</div>
    <div class="gw-arrow" id="gwNext"><i class="fas fa-chevron-right"></i></div>
  </div>

  <!-- prediction panel (dynamic) -->
  <div class="prediction-panel" id="predictionPanel">
    <div class="league-title" id="panelTitle">Select a league</div>
    <div id="panelContent"></div>
  </div>
</div>

<script>
  // ------------------------------
  // 1. LEAGUE DATA & AWARDS (simplified for demo)
  // ------------------------------
  const leaguesData = {
    epl: { name: "Premier League", type: "league", teams: ["Arsenal","Man City","Liverpool","Chelsea","Man Utd","Tottenham"], fixtures: [{ home:"Arsenal", away:"Man City"},{ home:"Liverpool", away:"Chelsea"},{ home:"Man Utd", away:"Tottenham"}] },
    liga: { name: "La Liga", type: "league", teams: ["Real Madrid","Barcelona","Atletico","Sevilla","Villarreal","Real Betis"], fixtures: [{ home:"Real Madrid", away:"Barcelona"},{ home:"Atletico", away:"Sevilla"},{ home:"Villarreal", away:"Real Betis"}] },
    serie: { name: "Serie A", type: "league", teams: ["Inter Milan","Juventus","AC Milan","Napoli","Roma","Lazio"], fixtures: [{ home:"Inter Milan", away:"Juventus"},{ home:"AC Milan", away:"Napoli"},{ home:"Roma", away:"Lazio"}] },
    bundes: { name: "Bundesliga", type: "league", teams: ["Bayern","Dortmund","Leverkusen","Leipzig","Stuttgart","Frankfurt"], fixtures: [{ home:"Bayern", away:"Dortmund"},{ home:"Leverkusen", away:"Leipzig"},{ home:"Stuttgart", away:"Frankfurt"}] },
    ligue: { name: "Ligue 1", type: "league", teams: ["PSG","Monaco","Marseille","Lyon","Lens","Lille"], fixtures: [{ home:"PSG", away:"Monaco"},{ home:"Marseille", away:"Lyon"},{ home:"Lens", away:"Lille"}] },
    ucl: { name: "UCL Winner", type: "award", options: ["Real Madrid","Man City","Bayern","PSG","Arsenal","Inter"], points: 800, locked: false, pick: "" },
    europa: { name: "Europa League", type: "award", options: ["Liverpool","Roma","Sevilla","Leverkusen","Atalanta","Ajax"], points: 600, locked: false, pick: "" },
    worldcup: { name: "World Cup 2026", type: "league", teams: ["Brazil","Argentina","France","Germany","Spain","England","Portugal","Netherlands"], fixtures: [{ home:"Brazil", away:"Argentina"},{ home:"France", away:"Germany"},{ home:"Spain", away:"England"},{ home:"Portugal", away:"Netherlands"}] },
    ballon: { name: "Ballon d'Or", type: "award", options: ["Messi","Haaland","Mbappé","Vinicius","Bellingham","Salah"], points: 1000, locked: false, pick: "" }
  };

  // team badge mapping (subset for demo)
  const teamBadges = {
    "Arsenal": "arsenal-footballlogos-org.png",
    "Man City": "manchester-city-footballlogos-org.png",
    "Liverpool": "liverpool-footballlogos-org.png",
    "Chelsea": "chelsea-footballogos-orq.png",
    "Man Utd": "manchester-united-footballlogos-org.png",
    "Tottenham": "tottenham-hotspur-footballlogos-org.png",
    "Real Madrid": "real-madrid-footballlogos-org.png",
    "Barcelona": "fc-barcelona-footballogos-org.png",
    "Atletico": "atletico-madrid-footballlogos-org.png",
    "Sevilla": "sevilla-fc-footballlogos-org.png",
    "Villarreal": "villarreal-cf-footballlogos-org.png",
    "Real Betis": "real-betis-footballlogos-org.png",
    "Inter Milan": "inter-milan-footballlogos-org.png",
    "Juventus": "juventus-footballogos-org.png",
    "AC Milan": "ac-milan-footballlogos-org.png",
    "Napoli": "napoli-footballlogos-org.png",
    "Roma": "roma-footballlogos-org.png",
    "Lazio": "lazio-footballlogos-org.png",
    "Bayern": "bayern-munich-footballlogos-org.png",
    "Dortmund": "borussia-dortmund-footballlogo5-org.png",
    "Leverkusen": "bayer-leverkusen-footballlogos-org.png",
    "Leipzig": "rb-leipzig-footballlogos-org.png",
    "Stuttgart": "vfb-stuttgart-footballlogos-org.png",
    "Frankfurt": "eintracht-frankfurt-footballlogos-org.png",
    "PSG": "paris-saint-germain-footballlogos-org.png",
    "Monaco": "as-monaco-footballlogos-org.png",
    "Marseille": "olympique-de-marseille-footballlogos-o...",
    "Lyon": "olympique-lyonnais-footballogos-org.png",
    "Lens": "lens-footballlogos-org.png",
    "Lille": "lille-osc-footballlogos-org.png",
    "Brazil": "brazil-national-team-footballogos-org.png",
    "Argentina": "argentina-national-team-footballlogos-o...",
    "France": "france-national-team-footballlogos-org.N",
    "Germany": "germany-national-team-footballlogos-o...",
    "Spain": "spain-national-team-footballogos-org.p...",
    "England": "england-national-team-footballlogos-or..",
    "Portugal": "portugal-national-team-footballogos-or..",
    "Netherlands": "netherlands-dutch-national-team-footb.."
  };
  function getBadgeUrl(team) { return teamBadges[team] || "https://via.placeholder.com/50?text="+team.charAt(0); }

  // generate actual results & user predictions (random but consistent per GW)
  let actualResults = {}, userPredictions = {};
  function generateData() {
    for (let league of Object.keys(leaguesData)) {
      if (leaguesData[league].type !== "league") continue;
      actualResults[league] = {};
      userPredictions[league] = {};
      for (let gw = 1; gw <= 38; gw++) {
        actualResults[league][gw] = [];
        userPredictions[league][gw] = [];
        let fixtures = leaguesData[league].fixtures;
        for (let i = 0; i < fixtures.length; i++) {
          let homeScore = Math.floor(Math.random() * 4);
          let awayScore = Math.floor(Math.random() * 3);
          if (homeScore === awayScore && homeScore === 0 && Math.random() > 0.3) homeScore = 1;
          actualResults[league][gw].push({ homeScore, awayScore });
          let hPred = homeScore + (Math.random() > 0.6 ? (Math.random() > 0.5 ? 1 : -1) : 0);
          let aPred = awayScore + (Math.random() > 0.6 ? (Math.random() > 0.5 ? 1 : -1) : 0);
          hPred = Math.max(0, Math.min(5, hPred));
          aPred = Math.max(0, Math.min(5, aPred));
          userPredictions[league][gw].push({ hPred, aPred });
        }
      }
    }
  }
  generateData();

  let currentGW = 32;
  let leaguePoints = { epl:0, liga:0, serie:0, bundes:0, ligue:0, worldcup:0, ucl:0, europa:0, ballon:0 };
  let championPicks = { epl:"", liga:"", serie:"", bundes:"", ligue:"", worldcup:"" };
  let awardPicks = { ucl:"", europa:"", ballon:"" };
  let awardLocked = { ucl:false, europa:false, ballon:false };
  let lockState = {};

  function updatePoints() {
    // calculate league points from predictions
    for (let league of ["epl","liga","serie","bundes","ligue","worldcup"]) {
      let total = 0;
      for (let gw = 1; gw <= currentGW; gw++) {
        let preds = userPredictions[league]?.[gw];
        let actuals = actualResults[league]?.[gw];
        if (preds && actuals) {
          for (let i=0; i<preds.length; i++) {
            let p = preds[i], a = actuals[i];
            if (p.hPred === a.homeScore && p.aPred === a.awayScore) total += 20;
            else {
              let predWinner = p.hPred > p.aPred ? "home" : (p.hPred < p.aPred ? "away" : "draw");
              let actualWinner = a.homeScore > a.awayScore ? "home" : (a.homeScore < a.awayScore ? "away" : "draw");
              if (predWinner === actualWinner) total += 8;
              else if (Math.abs(p.hPred - a.homeScore) <=1 && Math.abs(p.aPred - a.awayScore) <=1) total += 4;
            }
          }
        }
      }
      leaguePoints[league] = total;
    }
    // award points
    for (let award of ["ucl","europa","ballon"]) {
      if (awardLocked[award] && awardPicks[award]) leaguePoints[award] = leaguesData[award].points;
      else leaguePoints[award] = 0;
    }
    updateFormationPoints();
  }

  function updateFormationPoints() {
    for (let id of ["epl","liga","serie","bundes","ligue","worldcup","ucl","europa","ballon"]) {
      let el = document.getElementById(`pts-${id}`);
      if (el) el.innerText = `${leaguePoints[id]} pts`;
    }
  }

  // match prediction update
  function updateMatchPred(league, idx, type, val) {
    if (currentGW <= 31) { showToast("Past GW locked!"); return; }
    let pred = userPredictions[league][currentGW][idx];
    if (type === 'home') pred.hPred = parseInt(val) || 0;
    else pred.aPred = parseInt(val) || 0;
    updatePoints();
    renderPredictionPanel(league);
  }

  function submitPredictions(league) {
    if (currentGW <= 31) { showToast("Past GW locked."); return; }
    showToast(`✅ GW${currentGW} predictions saved for ${leaguesData[league].name}`);
    updatePoints();
  }

  // award handling
  function updateAwardPick(leagueId, val) {
    if (awardLocked[leagueId]) { showToast("Award locked! Unlock first."); return; }
    awardPicks[leagueId] = val;
    renderPredictionPanel(leagueId);
  }
  function toggleAwardLock(leagueId) {
    if (!awardLocked[leagueId]) {
      if (!awardPicks[leagueId]) { showToast("Pick a winner first!"); return; }
      awardLocked[leagueId] = true;
      showToast(`🔒 ${leaguesData[leagueId].name} locked! +${leaguesData[leagueId].points} pts`);
    } else {
      awardLocked[leagueId] = false;
      showToast(`🔓 ${leaguesData[leagueId].name} unlocked`);
    }
    updatePoints();
    renderPredictionPanel(leagueId);
  }

  // champion pick for leagues
  function updateChampionPick(leagueId, val) {
    if (lockState[leagueId]?.locked) { showToast("Champion locked! Unlock first."); return; }
    championPicks[leagueId] = val;
    renderPredictionPanel(leagueId);
  }
  function toggleChampionLock(leagueId) {
    let lock = lockState[leagueId] || { locked: false };
    if (!lock.locked) {
      if (!championPicks[leagueId]) { showToast("Pick a champion first!"); return; }
      lock.locked = true;
      showToast(`🔒 Champion locked for ${leaguesData[leagueId].name}`);
    } else {
      lock.locked = false;
      showToast(`🔓 Champion unlocked`);
    }
    lockState[leagueId] = lock;
    renderPredictionPanel(leagueId);
  }

  // render prediction panel for selected league/award
  function renderPredictionPanel(leagueId) {
    const data = leaguesData[leagueId];
    const panelTitle = document.getElementById("panelTitle");
    const panelContent = document.getElementById("panelContent");
    panelTitle.innerText = data.name;

    if (data.type === "league") {
      const isPast = currentGW < 32;
      const fixtures = data.fixtures;
      const userPreds = userPredictions[leagueId][currentGW] || [];
      const actuals = actualResults[leagueId][currentGW] || [];
      let html = `<div class="matches-grid">`;
      fixtures.forEach((m, idx) => {
        let userH = userPreds[idx]?.hPred !== undefined ? userPreds[idx].hPred : '';
        let userA = userPreds[idx]?.aPred !== undefined ? userPreds[idx].aPred : '';
        let actualH = actuals[idx]?.homeScore;
        let actualA = actuals[idx]?.awayScore;
        let displayHome = isPast ? actualH : userH;
        let displayAway = isPast ? actualA : userA;
        html += `
          <div class="match-row">
            <div style="display:flex; align-items:center; gap:8px;">
              <div class="team-badge" style="background-image:url('${getBadgeUrl(m.home)}');"></div>
              <span class="team-name">${m.home}</span>
            </div>
            <div>
              <input class="score-input" type="number" value="${displayHome}" ${isPast ? 'disabled' : ''} onchange="updateMatchPred('${leagueId}',${idx},'home',this.value)">
              <span class="vs-badge">VS</span>
              <input class="score-input" type="number" value="${displayAway}" ${isPast ? 'disabled' : ''} onchange="updateMatchPred('${leagueId}',${idx},'away',this.value)">
            </div>
            <div style="display:flex; align-items:center; gap:8px;">
              <span class="team-name">${m.away}</span>
              <div class="team-badge" style="background-image:url('${getBadgeUrl(m.away)}');"></div>
            </div>
            ${isPast ? `<div class="actual-hint">Actual: ${actualH}–${actualA}</div>` : ''}
          </div>
        `;
      });
      html += `</div><div class="champion-area">
        <select class="champion-select" ${lockState[leagueId]?.locked ? 'disabled' : ''} onchange="updateChampionPick('${leagueId}', this.value)">
          <option value="">— Pick League Champion —</option>
          ${data.teams.map(t => `<option ${championPicks[leagueId]===t ? 'selected' : ''}>${t}</option>`).join('')}
        </select>
        <button class="lock-btn ${lockState[leagueId]?.locked ? 'locked' : ''}" onclick="toggleChampionLock('${leagueId}')">
          <i class="fas ${lockState[leagueId]?.locked ? 'fa-lock' : 'fa-lock-open'}"></i> ${lockState[leagueId]?.locked ? 'Locked' : 'Unlock'}
        </button>
        ${!isPast ? `<button class="lock-btn" style="background:#b5f028; color:black;" onclick="submitPredictions('${leagueId}')"><i class="fas fa-save"></i> Save GW</button>` : ''}
      </div>`;
      panelContent.innerHTML = html;
    } else {
      // award
      const award = data;
      const isLocked = awardLocked[leagueId];
      const currentPick = awardPicks[leagueId] || "";
      let html = `
        <div style="text-align:center; padding:20px;">
          <div style="font-size:1.2rem; margin-bottom:15px;">🏆 Predict the winner – ${award.points} pts if correct</div>
          <select id="awardSelect" ${isLocked ? 'disabled' : ''} onchange="updateAwardPick('${leagueId}', this.value)">
            <option value="">— Select Winner —</option>
            ${award.options.map(opt => `<option ${currentPick===opt ? 'selected' : ''}>${opt}</option>`).join('')}
          </select>
          <button class="lock-btn ${isLocked ? 'locked' : ''}" style="margin-left:15px;" onclick="toggleAwardLock('${leagueId}')">
            <i class="fas ${isLocked ? 'fa-lock' : 'fa-lock-open'}"></i> ${isLocked ? 'Locked' : 'Unlock'}
          </button>
        </div>
      `;
      panelContent.innerHTML = html;
    }
  }

  // active league/award selection
  let activeId = "epl";
  function setActive(id) {
    activeId = id;
    // update active class on formation cards
    document.querySelectorAll(".formation-card").forEach(card => {
      card.classList.remove("active");
      if (card.getAttribute("data-league") === id) card.classList.add("active");
    });
    renderPredictionPanel(id);
  }

  // GW controls
  function setupGW() {
    document.getElementById("gwPrev").onclick = () => { if (currentGW > 1) { currentGW--; updatePoints(); renderPredictionPanel(activeId); document.getElementById("gwCurrentDisplay").innerHTML = `<i class="fas fa-futbol"></i> GW ${currentGW}`; showToast(`GW ${currentGW}`); } };
    document.getElementById("gwNext").onclick = () => { if (currentGW < 38) { currentGW++; updatePoints(); renderPredictionPanel(activeId); document.getElementById("gwCurrentDisplay").innerHTML = `<i class="fas fa-futbol"></i> GW ${currentGW}`; showToast(`GW ${currentGW}`); } };
  }

  function showToast(msg) { let t=document.createElement("div"); t.innerText=msg; t.style.position="fixed"; t.style.bottom="80px"; t.style.left="50%"; t.style.transform="translateX(-50%)"; t.style.background="#b5f028"; t.style.color="black"; t.style.padding="8px 20px"; t.style.borderRadius="60px"; t.style.zIndex="999"; document.body.appendChild(t); setTimeout(()=>t.remove(),2000); }

  // init
  (function() {
    for (let id of Object.keys(leaguesData)) {
      let card = document.querySelector(`.formation-card[data-league="${id}"]`);
      if (card) card.onclick = () => setActive(id);
    }
    setupGW();
    updatePoints();
    setActive("epl");
    setTimeout(() => document.getElementById("loader").classList.add("hide"), 800);
  })();
</script>
</body>
</html>
