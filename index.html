<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Gaffer's Pick | Advanced</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@400;600;700&family=Barlow:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">

<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#000;color:white;font-family:'Barlow',sans-serif}

/* NAV */
.nav{display:flex;justify-content:space-between;align-items:center;padding:1rem 2rem;background:#000;border-bottom:1px solid #222}
.logo{font-family:'Bebas Neue';font-size:2rem;color:#c5ff50}

/* GW STRIP */
.gw-strip{display:flex;overflow-x:auto;padding:10px;background:#111}
.gw-btn{margin-right:8px;padding:6px 16px;border-radius:20px;background:#222;color:white;border:none;cursor:pointer}
.active-gw{background:#c5ff50;color:black}

/* LEAGUES */
.leagues{display:flex;gap:20px;overflow-x:auto;padding:20px}
.league{
position:relative;width:280px;padding:15px;border-radius:20px;cursor:pointer;
background:linear-gradient(to bottom,#1c5f2c,#2e8b57,#1c5f2c);
border:3px solid white;
}
.league::before{content:"";position:absolute;left:50%;top:0;width:2px;height:100%;background:white;opacity:.5}

.percent{position:absolute;bottom:10px;right:10px;font-size:6rem;font-family:'Bebas Neue';color:rgba(255,255,255,0.07);z-index:0}
.league-content{position:relative;z-index:2}

select,button{width:100%;margin-top:10px;padding:6px;border-radius:20px}
select{background:#000;color:white;border:1px solid white}
button{background:#111;color:white;border:1px solid white;cursor:pointer}
button.locked{background:white;color:black}

/* MATCHES */
.matches{padding:20px}
.match{display:flex;justify-content:space-between;align-items:center;background:#111;padding:10px;margin-bottom:10px;border-radius:10px}
input{width:50px;text-align:center;background:#000;color:#c5ff50;border:1px solid #555}

.submit{background:#c5ff50;color:black;font-weight:bold;margin-top:10px}

/* AWARDS */
.awards{padding:20px;background:#111;margin:20px;border-radius:20px}
.award{margin-bottom:15px}

/* LEADERBOARD */
.leaderboard{padding:20px}

</style>
</head>
<body>

<div class="nav">
<div class="logo">⚽ Gaffer's Pick</div>
<div id="gwLabel">GW 1</div>
</div>

<div class="gw-strip" id="gwStrip"></div>

<div class="leagues" id="leagues"></div>

<div class="matches" id="matches"></div>

<div class="awards" id="awards"></div>

<div class="leaderboard" id="leaderboard"></div>

<script>
const leagues={
epl:{name:"Premier League",teams:["Arsenal","Man City","Liverpool"],fixtures:[{home:"Arsenal",away:"Man City"},{home:"Liverpool",away:"Chelsea"}]},
laliga:{name:"La Liga",teams:["Real Madrid","Barcelona"],fixtures:[{home:"Madrid",away:"Barcelona"}]}
};

let currentLeague="epl";
let currentGW=1;
let accuracy={epl:10,laliga:20};
let scores={epl:0,laliga:0};
let picks={};
let locks={};

/* GW */
for(let i=1;i<=20;i++){
let b=document.createElement("button");
b.innerText="GW "+i;
b.className="gw-btn";
if(i===1)b.classList.add("active-gw");
b.onclick=()=>{currentGW=i;document.getElementById("gwLabel").innerText="GW "+i;renderMatches()};
document.getElementById("gwStrip").appendChild(b);
}

/* LEAGUES */
function renderLeagues(){
let div=document.getElementById("leagues");
div.innerHTML="";
for(let k in leagues){
let l=leagues[k];
let card=document.createElement("div");
card.className="league";
card.onclick=()=>{currentLeague=k;renderMatches()};
card.innerHTML=`
<div class="percent">${accuracy[k]}%</div>
<div class="league-content">
<h2>${l.name}</h2>
<div>${scores[k]} pts</div>
<select onchange="pickChampion('${k}',this.value)">
<option>Pick Champion</option>
${l.teams.map(t=>`<option>${t}</option>`).join("")}
</select>
<button onclick="toggleLock('${k}')">${locks[k]?'<i class=\"fas fa-lock\"></i> Locked':'<i class=\"fas fa-lock-open\"></i> Unlock'}</button>
</div>`;
div.appendChild(card);
}
}

function pickChampion(l,v){picks[l]=v}
function toggleLock(l){locks[l]=!locks[l];renderLeagues()}

/* MATCHES */
function renderMatches(){
let m=leagues[currentLeague].fixtures;
let div=document.getElementById("matches");
let html="";
m.forEach(g=>{
html+=`<div class="match">${g.home} <input> : <input> ${g.away}</div>`;
});
html+=`<button class="submit" onclick="submit()">Submit Predictions</button>`;
div.innerHTML=html;
}

function submit(){
accuracy[currentLeague]+=Math.floor(Math.random()*10)+5;
scores[currentLeague]+=Math.floor(Math.random()*50);
renderLeagues();
renderLeaderboard();
}

/* AWARDS */
const awardsData=["Ballon d'Or","UCL Winner"];
function renderAwards(){
let div=document.getElementById("awards");
let html="<h2>Awards</h2>";
awardsData.forEach(a=>{
html+=`<div class="award">${a}<select><option>Pick</option></select></div>`;
});
div.innerHTML=html;
}

/* LEADERBOARD */
function renderLeaderboard(){
let total=Object.values(scores).reduce((a,b)=>a+b,0);
document.getElementById("leaderboard").innerHTML=`<h2>Leaderboard</h2><div>You: ${total} pts</div>`;
}

renderLeagues();
renderMatches();
renderAwards();
renderLeaderboard();
</script>

</body>
</html>
