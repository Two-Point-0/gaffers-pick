<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Gaffer's Pick · Stadium Predictor</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@300;400;600;700;800;900&family=Barlow:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --lime:#c8f400;--gold:#ffd700;--red:#e63946;--cyan:#00d4ff;--purple:#9b59b6;
  --bg:#060b10;--card:#0a1420;--border:rgba(255,255,255,.07);
  --text:#e8edf2;--sub:rgba(232,237,242,.5);
  --hd:'Bebas Neue',cursive;--cd:'Barlow Condensed',sans-serif;--bd:'Barlow',sans-serif;
  --seat:#0d2a14;--seat-on:#c8f400;
  --nav-h:72px;--hdr-h:52px;
  --panel-w:clamp(200px,22vw,275px);
  --anim:.52s;
}
html,body{width:100%;height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:var(--bd)}
#root{width:100%;height:100%}
::-webkit-scrollbar{width:3px;height:3px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:rgba(200,244,0,.2);border-radius:3px}

/* ── KEYFRAMES ── */
@keyframes adH{0%{transform:translateX(0)}100%{transform:translateX(-50%)}}
@keyframes adHR{0%{transform:translateX(-50%)}100%{transform:translateX(0)}}
@keyframes adV{0%{transform:translateY(0)}100%{transform:translateY(-50%)}}
@keyframes adVR{0%{transform:translateY(-50%)}100%{transform:translateY(0)}}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes pulse{0%,100%{opacity:.4}50%{opacity:1}}
@keyframes glow{0%,100%{box-shadow:0 0 6px rgba(200,244,0,.15)}50%{box-shadow:0 0 22px rgba(200,244,0,.6)}}
@keyframes hPulse{0%,100%{text-shadow:0 0 20px rgba(200,244,0,.08)}50%{text-shadow:0 0 38px rgba(200,244,0,.42)}}
@keyframes ptsUp{0%{opacity:1;transform:translateY(0) scale(1)}100%{opacity:0;transform:translateY(-38px) scale(1.5)}}
@keyframes toastIn{from{opacity:0;transform:translate(-50%,12px)}to{opacity:1;transform:translate(-50%,0)}}
@keyframes toastOut{to{opacity:0;transform:translate(-50%,-10px)}}
@keyframes roofSlideL{from{transform:translateX(0)}to{transform:translateX(-100%)}}
@keyframes roofSlideR{from{transform:translateX(0)}to{transform:translateX(100%)}}
@keyframes roofCloseL{from{transform:translateX(-100%)}to{transform:translateX(0)}}
@keyframes roofCloseR{from{transform:translateX(100%)}to{transform:translateX(0)}}
@keyframes cardFlash{0%{background:rgba(230,57,70,.3)}50%{background:rgba(230,57,70,.6)}100%{background:rgba(230,57,70,.3)}}
@keyframes yellowFlash{0%{background:rgba(255,215,0,.3)}50%{background:rgba(255,215,0,.5)}100%{background:rgba(255,215,0,.3)}}
@keyframes spin{from{transform:rotate(0)}to{transform:rotate(360deg)}}
@keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-4px)}}
@keyframes panelIn{from{opacity:0;transform:translateX(-10px)}to{opacity:1;transform:translateX(0)}}
@keyframes scoreIn{0%{transform:scale(1.6);opacity:0}100%{transform:scale(1);opacity:1}}

/* ── SHELL ── */
.app{display:flex;flex-direction:column;height:100vh;overflow:hidden}

/* ── HEADER ── */
.hdr{
  flex-shrink:0;height:var(--hdr-h);
  background:linear-gradient(180deg,#020508,#060f1a);
  border-bottom:1px solid rgba(200,244,0,.14);
  display:flex;align-items:center;padding:0 14px;gap:10px;position:relative;z-index:600;
}
.brand{
  font-family:var(--hd);font-size:clamp(1.3rem,2.8vw,1.85rem);letter-spacing:5px;
  background:linear-gradient(90deg,rgba(255,255,255,.5),var(--lime),rgba(255,255,255,.9),var(--lime));
  background-size:200%;-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  animation:hPulse 3s ease infinite;flex:1;text-align:center;
}
.pts-pill{
  display:flex;align-items:center;gap:5px;padding:5px 13px;border-radius:40px;
  background:rgba(255,215,0,.07);border:1px solid rgba(255,215,0,.3);flex-shrink:0;cursor:pointer;
}
.pts-num{font-family:var(--hd);font-size:1.05rem;color:var(--gold)}
.pts-lbl{font-family:var(--cd);font-size:.43rem;color:rgba(255,215,0,.48);letter-spacing:1px}
.season-tag{font-family:var(--cd);font-size:.42rem;letter-spacing:3px;color:rgba(200,244,0,.28);flex-shrink:0}
.pts-anim{
  position:absolute;left:70px;top:50%;transform:translateY(-50%);
  font-family:var(--hd);font-size:1.6rem;color:var(--lime);pointer-events:none;z-index:9999;
  animation:ptsUp 1.2s ease forwards;
}
.pts-deduct{color:var(--red)!important}

/* ── BODY ── */
.body{flex:1;display:flex;overflow:hidden;position:relative}

/* ── PANELS ── */
.panel{
  position:absolute;top:0;bottom:0;z-index:400;
  width:var(--panel-w);
  background:linear-gradient(180deg,#02070d,#040d16);
  display:flex;flex-direction:column;overflow:hidden;
  pointer-events:none;opacity:0;
  transition:transform var(--anim) cubic-bezier(.77,0,.18,1), opacity var(--anim);
}
.panel.left{left:0;border-right:1px solid rgba(200,244,0,.1);transform:translateX(-100%)}
.panel.right{right:0;border-left:1px solid rgba(200,244,0,.1);transform:translateX(100%)}
.panel.show{pointer-events:all;opacity:1;transform:translateX(0)}

.panel-seats{flex-shrink:0;height:40px;overflow:hidden;background:linear-gradient(180deg,#040c15,#05101e);border-bottom:1px solid rgba(200,244,0,.04)}
.ps-inner{display:flex;flex-direction:column;justify-content:center;gap:1px;padding:3px 4px;height:100%}
.ps-row{display:flex;gap:1px}
.psv{width:clamp(4px,.7vw,7px);height:clamp(3px,.5vw,5px);border-radius:1px;background:var(--seat);flex-shrink:0;transition:background .4s}
.psv.on{background:var(--seat-on)}

.ptabs{display:flex;gap:2px;padding:5px 6px;border-bottom:1px solid rgba(200,244,0,.07);flex-shrink:0}
.ptab{
  flex:1;padding:4px 2px;border-radius:4px;
  font-family:var(--cd);font-size:.42rem;font-weight:800;letter-spacing:.8px;text-transform:uppercase;
  border:1px solid rgba(255,255,255,.06);background:transparent;color:var(--sub);
  cursor:pointer;transition:all .13s;
}
.ptab.on{border-color:rgba(200,244,0,.38);background:rgba(200,244,0,.07);color:var(--lime)}
.panel-scroll{flex:1;overflow-y:auto;overflow-x:hidden;padding:8px 9px}

/* ── PITCH WRAP ── */
.pitch-wrap{
  flex:1;display:flex;flex-direction:column;position:relative;overflow:hidden;
  transition:margin var(--anim) cubic-bezier(.77,0,.18,1);
  z-index:100;
}
.pitch-wrap.open{margin-left:var(--panel-w);margin-right:var(--panel-w)}

/* ── STANDS ── */
.stand{
  flex-shrink:0;width:clamp(16px,2.6vw,40px);
  display:flex;flex-direction:column;overflow:hidden;
  position:relative;z-index:200;
  transition:width var(--anim) cubic-bezier(.77,0,.18,1);
  background:linear-gradient(90deg,#030a0f,#050e18);
}
.stand.right{background:linear-gradient(270deg,#030a0f,#050e18)}
.stand.shrink{width:clamp(8px,1.4vw,20px)}
.stand-inner{flex:1;display:flex;flex-direction:column;justify-content:center;gap:1px;padding:2px 1px;overflow:hidden}
.stand-row{display:flex;gap:1px;justify-content:center}
.sv{width:clamp(2px,.36vw,3.5px);height:clamp(1.5px,.26vw,3px);border-radius:.5px;background:var(--seat);flex-shrink:0;transition:background .35s}
.sv.on{background:var(--seat-on)}
.stand-adv{width:clamp(5px,1vw,13px);background:#000;overflow:hidden;flex-shrink:0}
.sadv-i{display:flex;flex-direction:column;height:200%}
.sadv-i.go{animation:adV 13s linear infinite}
.sadv-i.rv{animation:adVR 16s linear infinite}
.sadv-b{display:flex;align-items:center;justify-content:center;flex-shrink:0;min-height:clamp(14px,2.6vw,38px)}
.sadv-t{font-family:var(--cd);font-size:clamp(.2rem,.34vw,.32rem);font-weight:900;letter-spacing:2px;text-transform:uppercase;writing-mode:vertical-rl;white-space:nowrap}

/* ── BILLBOARDS ── */
.bb{flex-shrink:0;background:#000;overflow:hidden;height:clamp(13px,1.7vw,20px);opacity:0;transition:opacity .4s;pointer-events:none}
.bb.show{opacity:1;pointer-events:all}
.bb-inner{display:flex;height:100%;width:200%}
.bb-inner.go{animation:adH 15s linear infinite}
.bb-inner.rv{animation:adHR 18s linear infinite}
.bb-block{display:flex;align-items:center;justify-content:center;height:100%;padding:0 clamp(6px,1.2vw,14px);flex-shrink:0}
.bb-text{font-family:var(--cd);font-size:clamp(.33rem,.58vw,.48rem);font-weight:900;letter-spacing:2px;text-transform:uppercase;white-space:nowrap}

/* ── COURT ── */
.court-area{flex:1;position:relative;overflow:hidden}

/* ROOF — covers the green pitch when closed */
.roof{position:absolute;inset:0;z-index:50;display:flex;pointer-events:none}
.roof-half{width:50%;height:100%;display:flex;flex-direction:column;overflow:hidden;will-change:transform}
.roof-half.left{
  background:linear-gradient(160deg,#0a1520 0%,#0d1e30 40%,#081018 100%);
  border-right:2px solid rgba(200,244,0,.12);
  pointer-events:all;
}
.roof-half.right{
  background:linear-gradient(200deg,#0a1520 0%,#0d1e30 40%,#081018 100%);
  border-left:2px solid rgba(200,244,0,.12);
  pointer-events:all;
}
/* aerial stadium texture on roof */
.roof-half::before{
  content:'';position:absolute;inset:0;
  background:
    repeating-linear-gradient(0deg,rgba(200,244,0,.02) 0,rgba(200,244,0,.02) 1px,transparent 1px,transparent 28px),
    repeating-linear-gradient(90deg,rgba(200,244,0,.02) 0,rgba(200,244,0,.02) 1px,transparent 1px,transparent 28px);
  pointer-events:none;
}
.roof.opening .roof-half.left{animation:roofSlideL .62s cubic-bezier(.77,0,.18,1) forwards}
.roof.opening .roof-half.right{animation:roofSlideR .62s cubic-bezier(.77,0,.18,1) forwards}
.roof.closing .roof-half.left{animation:roofCloseL .52s cubic-bezier(.77,0,.18,1) forwards}
.roof.closing .roof-half.right{animation:roofCloseR .52s cubic-bezier(.77,0,.18,1) forwards}
.roof.open .roof-half.left{transform:translateX(-100%)}
.roof.open .roof-half.right{transform:translateX(100%)}
.roof.closed .roof-half{transform:translateX(0)}

/* Roof content — aerial view when closed */
.roof-aerial{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:8px}
.roof-aerial-title{font-family:var(--hd);font-size:clamp(.6rem,1.2vw,1rem);letter-spacing:3px;color:rgba(200,244,0,.18);margin-bottom:4px}
.roof-logo{font-size:clamp(1.4rem,3vw,2.4rem);opacity:.18;margin-bottom:3px}
.roof-seats-grid{display:grid;grid-template-columns:repeat(20,1fr);gap:1px;width:90%;opacity:.35}
.roof-seat{height:4px;border-radius:1px;background:var(--seat)}
.roof-seat.on{background:var(--seat-on)}

/* Roof seat rows */
.roof-ss{flex-shrink:0;background:#040c16;padding:1px 0;border-bottom:1px solid rgba(200,244,0,.04)}
.roof-ss.bot{border-bottom:none;border-top:1px solid rgba(200,244,0,.04)}
.rhs{display:flex;gap:1px;padding:0 1px}
.rh{width:clamp(3px,.56vw,5.5px);height:clamp(2px,.42vw,4px);border-radius:1px 1px 0 0;background:var(--seat);flex-shrink:0;transition:background .3s}
.rh.on{background:var(--seat-on)}

/* Roof pane (panel inside roof) */
.roof-pane{flex:1;overflow-y:auto;overflow-x:hidden;padding:6px 9px;background:linear-gradient(180deg,rgba(4,10,20,.98),rgba(6,14,28,.96))}

/* Open/close roof button on court */
.roof-btn{
  position:absolute;bottom:10px;left:50%;transform:translateX(-50%);z-index:200;
  display:flex;align-items:center;gap:6px;padding:7px 20px;border-radius:40px;
  background:rgba(0,0,0,.88);border:2px solid rgba(200,244,0,.45);
  color:var(--lime);font-family:var(--cd);font-size:.62rem;font-weight:700;letter-spacing:1.8px;
  cursor:pointer;backdrop-filter:blur(10px);transition:all .15s;white-space:nowrap;pointer-events:all;
}
.roof-btn:hover{background:rgba(200,244,0,.12);border-color:var(--lime)}
.roof-icon{font-size:1rem;transition:transform .3s}
.roof-btn.open-state .roof-icon{transform:rotate(180deg)}

/* ── COURT SURFACE ── */
.court-bg{position:absolute;inset:0}
.court-bg.football{background:repeating-linear-gradient(180deg,#1a7828 0,#1a7828 38px,#166d22 38px,#166d22 76px)}
.court-bg.basketball{background:linear-gradient(180deg,#c4500a,#a84009)}
.court-bg.american{background:repeating-linear-gradient(90deg,#2e7d32 0,#2e7d32 56px,#256726 56px,#256726 112px)}
.court-bg.baseball{background:radial-gradient(ellipse 85% 85% at 50% 100%,#6b8f3c,#4a6b2a 58%,#8b5e3c 58%,#7a4f30)}
.court-bg.tennis{background:linear-gradient(180deg,#2e8b57,#236b43)}
.court-bg.rugby{background:repeating-linear-gradient(180deg,#1a7828 0,#1a7828 40px,#166d22 40px,#166d22 80px)}
.court-bg.cricket{background:radial-gradient(ellipse 100% 80% at 50% 50%,#4a7c2f,#3a6422)}
.court-bg.hockey{background:linear-gradient(180deg,#b8d8ec,#9fc4db)}
.court-bg::after{content:'';position:absolute;inset:0;z-index:2;pointer-events:none;background:radial-gradient(ellipse 88% 78% at 50% 50%,transparent 18%,rgba(0,0,0,.54) 100%)}
.court-svg{position:absolute;inset:0;width:100%;height:100%;z-index:3;pointer-events:none}

/* chip column */
.chip-col{
  position:absolute;left:0;top:0;bottom:0;z-index:30;
  width:clamp(40px,6vw,62px);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:clamp(3px,.5vw,6px);padding:4px clamp(2px,.4vw,5px);
  background:linear-gradient(180deg,rgba(2,6,12,.97),rgba(4,10,18,.94));
  border-right:1px solid rgba(200,244,0,.09);
  transform:translateX(-100%);opacity:0;pointer-events:none;
  transition:transform .45s cubic-bezier(.77,0,.18,1),opacity .4s;
}
.chip-col.show{transform:translateX(0);opacity:1;pointer-events:all}
.chip-btn{
  display:flex;flex-direction:column;align-items:center;gap:2px;
  padding:clamp(4px,.55vw,7px) clamp(2px,.4vw,5px);
  border-radius:7px;cursor:pointer;border:1px solid;
  transition:all .18s;width:100%;
}
.chip-btn:hover:not(.used){transform:translateY(-2px);filter:brightness(1.2)}
.chip-btn.used{opacity:.28;cursor:default;filter:grayscale(.9)}
.chip-icon{font-size:clamp(.82rem,1.4vw,1.18rem);line-height:1}
.chip-code{font-family:var(--hd);font-size:clamp(.25rem,.42vw,.38rem);letter-spacing:.5px;text-align:center;line-height:1.1}
.chip-st{font-family:var(--cd);font-size:clamp(.19rem,.3vw,.28rem);text-align:center;opacity:.55}
.chip-tip{
  position:fixed;background:rgba(2,5,13,.98);border-radius:9px;
  padding:10px 14px;min-width:170px;max-width:220px;
  z-index:5000;animation:fadeUp .12s ease;pointer-events:none;
  border:1px solid;
}
.ct-name{font-family:var(--hd);font-size:.9rem;letter-spacing:1.5px;margin-bottom:2px}
.ct-fx{font-family:var(--cd);font-size:.55rem;font-weight:700;margin-bottom:4px}
.ct-desc{font-family:var(--cd);font-size:.49rem;color:var(--sub);line-height:1.45;margin-bottom:4px}
.ct-how{font-family:var(--cd);font-size:.44rem;color:rgba(255,215,0,.6);font-style:italic;border-top:1px solid rgba(255,255,255,.06);padding-top:4px;margin-top:2px}

/* player dots */
.pdot-wrap{display:flex;flex-direction:column;align-items:center;gap:1px;cursor:pointer}
.pdot{
  width:clamp(14px,2.4vw,26px);height:clamp(14px,2.4vw,26px);border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  border:2px solid rgba(255,255,255,.26);
  font-family:var(--cd);font-size:clamp(.28rem,.52vw,.48rem);font-weight:900;
  transition:transform .14s;cursor:pointer;position:relative;
}
.pdot:hover{transform:scale(1.25)}
.pdot.hm{background:linear-gradient(145deg,#3D195B,#2a0f3e);color:#fff}
.pdot.aw{background:linear-gradient(145deg,#c22e1c,#8a1f12);color:#fff}
.pdot.nb-h{background:linear-gradient(145deg,#17408B,#0d2a5c);color:#fff}
.pdot.nb-a{background:linear-gradient(145deg,#C9082A,#8a0520);color:#fff}
.pdot.scored{border-color:var(--gold)!important;box-shadow:0 0 8px rgba(255,215,0,.65)}
.pdot.ycard{border-color:var(--gold)!important;box-shadow:0 0 6px rgba(255,215,0,.5)}
.pdot.rcard{border-color:var(--red)!important;box-shadow:0 0 8px rgba(230,57,70,.7)}
.ycard-badge{position:absolute;top:-4px;right:-4px;background:var(--gold);color:#000;border-radius:2px;width:8px;height:10px;font-size:6px;display:flex;align-items:center;justify-content:center;font-weight:900}
.rcard-badge{position:absolute;top:-4px;right:-4px;background:var(--red);color:#fff;border-radius:2px;width:8px;height:10px;font-size:6px;display:flex;align-items:center;justify-content:center;font-weight:900}
.p-name{
  font-family:var(--cd);font-size:clamp(.22rem,.4vw,.36rem);font-weight:700;color:#fff;
  text-shadow:0 1px 3px rgba(0,0,0,.95);background:rgba(0,0,0,.68);
  padding:1px 3px;border-radius:2px;text-align:center;white-space:nowrap;max-width:42px;overflow:hidden;text-overflow:ellipsis;
}
.p-rat{font-family:var(--hd);font-size:clamp(.22rem,.38vw,.34rem);padding:1px 3px;border-radius:2px;margin-top:1px;text-align:center}
.rA{background:rgba(200,244,0,.92);color:#000}.rB{background:rgba(46,204,113,.88);color:#000}
.rC{background:rgba(255,215,0,.88);color:#000}.rD{background:rgba(255,140,0,.84);color:#000}.rF{background:rgba(230,57,70,.84);color:#fff}

/* match HUD */
.match-hud{
  position:absolute;top:7px;left:50%;transform:translateX(-50%);
  z-index:25;background:rgba(0,0,0,.92);border:1px solid rgba(200,244,0,.18);
  border-radius:9px;padding:6px 11px;min-width:clamp(130px,19vw,185px);pointer-events:none;
}
.hud-score-row{display:flex;align-items:center;justify-content:center;gap:8px;margin-bottom:2px}
.hud-team{font-family:var(--cd);font-size:clamp(.42rem,.76vw,.62rem);font-weight:700}
.hud-score{font-family:var(--hd);font-size:clamp(.9rem,1.6vw,1.25rem);color:var(--lime);padding:0 5px;animation:scoreIn .3s ease}
.hud-status{font-family:var(--cd);font-size:clamp(.3rem,.52vw,.44rem);text-align:center;letter-spacing:1px;margin-bottom:3px}
.hud-stat{display:flex;align-items:center;gap:2px;margin-bottom:2px}
.hud-sv{font-family:var(--hd);font-size:clamp(.28rem,.48vw,.42rem);min-width:14px}
.hud-sv.h{color:var(--lime);text-align:right}.hud-sv.a{color:#f54029}
.hud-sl{font-family:var(--cd);font-size:clamp(.24rem,.42vw,.34rem);color:var(--sub);min-width:30px;text-align:center}
.hud-bar{flex:1;height:2px;background:rgba(255,255,255,.07);border-radius:3px;overflow:hidden}
.hud-fill{height:100%;border-radius:3px}
.hud-fill.h{background:var(--lime)}.hud-fill.a{background:#f54029}

/* live ball */
.ball{
  position:absolute;width:clamp(7px,1.2vw,13px);height:clamp(7px,1.2vw,13px);
  border-radius:50%;background:radial-gradient(circle at 35% 35%,#fff,#bbb);
  border:1.5px solid rgba(0,0,0,.32);z-index:22;
  transition:left 1.6s ease,top 1.6s ease;
  box-shadow:0 2px 8px rgba(0,0,0,.72);pointer-events:none;
}

/* event feed */
.ev-feed{
  position:absolute;bottom:clamp(40px,7vh,58px);left:50%;transform:translateX(-50%);
  z-index:26;display:flex;flex-direction:column;gap:2px;align-items:center;pointer-events:none;width:70%;
}
.ev-item{
  font-family:var(--cd);font-size:clamp(.37rem,.6vw,.5rem);font-weight:700;
  padding:2px 9px;border-radius:16px;background:rgba(0,0,0,.94);
  border:1px solid rgba(200,244,0,.28);color:var(--lime);animation:fadeUp .2s ease;
  white-space:nowrap;letter-spacing:.7px;
}
.ev-item.goal{border-color:var(--gold);color:var(--gold)}
.ev-item.card-y{border-color:var(--gold);color:var(--gold);animation:yellowFlash 1s ease 2}
.ev-item.card-r{border-color:var(--red);color:var(--red);animation:cardFlash 1s ease 2}

/* player tooltip */
.ptip{
  position:fixed;z-index:9999;background:rgba(0,0,0,.97);
  border:1px solid rgba(200,244,0,.26);border-radius:8px;padding:8px 12px;min-width:120px;
  pointer-events:none;animation:fadeUp .12s ease;
}
.ptip-name{font-family:var(--hd);font-size:.84rem;color:var(--lime)}
.ptip-pos{font-family:var(--cd);font-size:.46rem;color:var(--sub);margin-bottom:3px}
.ptip-row{display:flex;justify-content:space-between;font-family:var(--cd);font-size:.5rem;padding:2px 0;border-bottom:1px solid rgba(255,255,255,.04)}
.ptip-row:last-child{border:none}
.ptip-k{color:var(--sub)}.ptip-v{color:var(--lime);font-weight:700}

/* ── NAV ── */
.nav{
  flex-shrink:0;height:var(--nav-h);
  background:linear-gradient(0deg,#020508,#060e18);
  border-top:1px solid rgba(200,244,0,.1);
  display:grid;grid-template-columns:1fr auto 1fr;
  z-index:600;
}
.nav-btn{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:2px;cursor:pointer;border:none;background:transparent;
  border-top:3px solid transparent;padding:4px 10px;color:var(--text);transition:all .14s;
}
.nav-btn:hover,.nav-btn.active{border-top-color:var(--lime);background:rgba(200,244,0,.04)}
.nav-icon-wrap{position:relative;display:flex;align-items:center;justify-content:center}
.nav-icon-svg{width:clamp(18px,3vw,26px);height:clamp(18px,3vw,26px);opacity:.35;transition:opacity .15s;fill:none;stroke:currentColor;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}
.nav-btn.active .nav-icon-svg,.nav-btn:hover .nav-icon-svg{opacity:1;color:var(--lime)}
.nav-label{font-family:var(--cd);font-size:clamp(.3rem,.58vw,.48rem);font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--sub)}
.nav-btn.active .nav-label,.nav-btn:hover .nav-label{color:var(--lime)}
.nav-sub{font-family:var(--cd);font-size:clamp(.24rem,.44vw,.36rem);color:rgba(200,244,0,.28);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:80px;text-align:center}

/* centre OPEN btn */
.open-btn{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:3px;cursor:pointer;border:none;
  border-top:3px solid var(--lime);
  background:radial-gradient(circle at 40% 36%,rgba(200,244,0,.16),rgba(0,0,0,.65));
  padding:6px 28px;color:var(--text);transition:all .18s;
  min-width:clamp(85px,14vw,148px);
}
.open-btn:hover{background:radial-gradient(circle at 40% 36%,rgba(200,244,0,.26),rgba(0,0,0,.55))}
.ob-icon-wrap{position:relative;width:32px;height:32px;margin-bottom:2px}
.ob-stadium{width:32px;height:32px}
.ob-lbl{font-family:var(--cd);font-size:clamp(.3rem,.62vw,.5rem);font-weight:900;letter-spacing:2px;text-transform:uppercase;color:var(--lime)}

/* ── POPUP ── */
.pop-overlay{position:fixed;inset:0;z-index:1800}
.pop-menu{
  position:fixed;bottom:calc(var(--nav-h)+4px);
  background:linear-gradient(145deg,#091520,#050f18);
  border:1px solid rgba(200,244,0,.2);border-radius:10px;
  z-index:1900;overflow:hidden;min-width:150px;max-height:258px;overflow-y:auto;
  animation:fadeUp .13s ease;box-shadow:0 -6px 26px rgba(0,0,0,.85);
}
.pop-item{
  padding:7px 12px;font-family:var(--cd);font-size:.64rem;font-weight:700;
  letter-spacing:.6px;cursor:pointer;display:flex;align-items:center;gap:7px;
  transition:background .11s;border-bottom:1px solid rgba(255,255,255,.04);color:var(--sub);
}
.pop-item:last-child{border:none}
.pop-item:hover{background:rgba(200,244,0,.07);color:var(--lime)}
.pop-item.sel{background:rgba(200,244,0,.1);color:var(--lime);border-left:2px solid var(--lime);padding-left:10px}
.pop-sub{font-family:var(--cd);font-size:.41rem;color:rgba(255,255,255,.26);display:block;margin-top:1px}

/* ── SHARED PANEL STYLES ── */
.sec{font-family:var(--cd);font-size:.54rem;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--lime);display:flex;align-items:center;gap:4px;border-bottom:1px solid rgba(200,244,0,.1);padding-bottom:3px;margin-bottom:5px}
.divr{height:1px;background:linear-gradient(90deg,transparent,rgba(200,244,0,.1),transparent);margin:5px 0}
.card{background:rgba(0,0,0,.44);border:1px solid rgba(255,255,255,.06);border-radius:7px;padding:6px 8px;margin-bottom:5px}
.card.highlight{border-color:rgba(200,244,0,.25);background:rgba(200,244,0,.04)}

/* ── ACCOUNT ── */
.acc-avatar{width:32px;height:32px;border-radius:50%;background:linear-gradient(135deg,#c8f400,#7fc000);display:flex;align-items:center;justify-content:center;font-size:1rem;flex-shrink:0;font-family:var(--hd)}
.acc-name{font-family:var(--hd);font-size:.88rem;color:var(--lime);letter-spacing:1px}
.acc-rank{font-family:var(--cd);font-size:.44rem;color:var(--sub)}
.stat3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:2px;margin-bottom:4px}
.sc{background:rgba(0,0,0,.44);border:1px solid var(--border);border-radius:5px;padding:4px 3px;text-align:center}
.sc-v{font-family:var(--hd);font-size:.9rem;color:var(--lime);display:block}
.sc-l{font-family:var(--cd);font-size:.39rem;color:var(--sub);letter-spacing:.5px}

/* yellow/red card tracker */
.card-tracker{display:flex;align-items:center;gap:3px;margin-bottom:4px;padding:4px 6px;border-radius:5px;background:rgba(0,0,0,.3);border:1px solid rgba(255,255,255,.06)}
.ycards-row{display:flex;gap:2px;flex:1;flex-wrap:wrap}
.ycard-pip{width:10px;height:13px;border-radius:2px;background:var(--gold);opacity:.25}
.ycard-pip.earned{opacity:1;animation:yellowFlash .5s ease}
.rcard-pip{width:10px;height:13px;border-radius:2px;background:var(--red);opacity:1}
.card-lbl{font-family:var(--cd);font-size:.42rem;color:var(--sub);flex-shrink:0;white-space:nowrap}
.ban-notice{font-family:var(--cd);font-size:.44rem;color:var(--red);text-align:center;padding:3px 6px;border-radius:5px;background:rgba(230,57,70,.12);border:1px solid rgba(230,57,70,.3);margin-bottom:4px;animation:cardFlash 2s ease infinite}

/* GW scroll — 1 at a time */
.gw-nav{display:flex;align-items:center;gap:4px;margin-bottom:5px}
.gw-nav-btn{width:22px;height:22px;border-radius:5px;border:1px solid rgba(200,244,0,.28);background:rgba(0,0,0,.4);color:var(--lime);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:.7rem;font-family:var(--hd);transition:all .13s;flex-shrink:0}
.gw-nav-btn:hover{background:rgba(200,244,0,.1);border-color:var(--lime)}
.gw-display{flex:1;background:rgba(0,0,0,.44);border:1px solid rgba(200,244,0,.22);border-radius:6px;padding:5px 7px;text-align:center}
.gw-num{font-family:var(--hd);font-size:.88rem;color:var(--lime);letter-spacing:2px}
.gw-pts-big{font-family:var(--hd);font-size:1.2rem;color:var(--gold)}
.gw-meta{font-family:var(--cd);font-size:.42rem;color:var(--sub)}
.gw-pts-bar{height:3px;background:rgba(255,255,255,.08);border-radius:3px;overflow:hidden;margin-top:3px}
.gw-pts-fill{height:100%;background:linear-gradient(90deg,var(--lime),#90ff00);border-radius:3px;transition:width .4s}

/* formation scroll — 1 at a time */
.form-nav{display:flex;align-items:center;gap:4px;margin-bottom:5px}
.form-display{flex:1;background:rgba(0,0,0,.44);border:1px solid rgba(200,244,0,.22);border-radius:6px;padding:6px 8px}
.form-name{font-family:var(--hd);font-size:.88rem;color:var(--lime);letter-spacing:2px;margin-bottom:2px}
.form-desc{font-family:var(--cd);font-size:.46rem;color:var(--sub);line-height:1.4}
.form-pts-row{display:flex;gap:4px;margin-top:4px;flex-wrap:wrap}
.form-pts-item{font-family:var(--cd);font-size:.38rem;padding:1px 5px;border-radius:8px;background:rgba(200,244,0,.06);border:1px solid rgba(200,244,0,.14);color:var(--lime)}

/* leagues */
.league-item{
  display:flex;align-items:center;gap:6px;padding:6px 8px;border-radius:6px;
  margin-bottom:3px;background:rgba(0,0,0,.35);border:1px solid rgba(255,255,255,.06);
  cursor:pointer;transition:all .14s;
}
.league-item:hover{border-color:rgba(200,244,0,.28);background:rgba(200,244,0,.04)}
.league-icon{font-size:1rem}
.league-name{font-family:var(--cd);font-size:.6rem;font-weight:700;flex:1}
.league-sub{font-family:var(--cd);font-size:.4rem;color:var(--sub)}
.league-pts{font-family:var(--hd);font-size:.78rem;color:var(--lime)}

/* league modal */
.modal-overlay{position:fixed;inset:0;z-index:3000;background:rgba(0,0,0,.8);display:flex;align-items:center;justify-content:center;animation:fadeIn .2s ease}
.modal{background:linear-gradient(145deg,#090f1a,#050c14);border:1px solid rgba(200,244,0,.22);border-radius:12px;padding:16px;min-width:280px;max-width:360px;width:92%;max-height:80vh;overflow-y:auto;animation:fadeUp .2s ease}
.modal-title{font-family:var(--hd);font-size:1.1rem;letter-spacing:3px;color:var(--lime);margin-bottom:3px}
.modal-sub{font-family:var(--cd);font-size:.48rem;color:var(--sub);margin-bottom:12px}
.modal-close{position:absolute;top:12px;right:12px;width:28px;height:28px;border-radius:50%;border:1px solid rgba(255,255,255,.1);background:rgba(0,0,0,.5);color:var(--sub);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:.8rem;font-family:var(--hd)}
.modal-close:hover{border-color:var(--red);color:var(--red)}
.lb-row{display:flex;align-items:center;gap:5px;padding:4px 6px;border-radius:5px;margin-bottom:3px;background:rgba(0,0,0,.32);border:1px solid transparent;transition:all .14s}
.lb-row:hover{border-color:rgba(200,244,0,.14)}
.lb-row.me{border-color:rgba(200,244,0,.3);background:rgba(200,244,0,.05)}
.lb-pos{font-family:var(--hd);font-size:.8rem;color:var(--sub);min-width:14px}
.lb-pos.top{color:var(--gold)}
.lb-name{font-family:var(--cd);font-size:.62rem;font-weight:700;flex:1}
.lb-pts{font-family:var(--hd);font-size:.8rem;color:var(--lime)}
.lb-delta{font-family:var(--cd);font-size:.44rem;min-width:16px;text-align:right}
.lb-delta.up{color:#2ecc71}.lb-delta.dn{color:var(--red)}

/* fav team */
.fav-pitch{background:repeating-linear-gradient(180deg,#1a7828 0,#1a7828 13px,#166d22 13px,#166d22 26px);border-radius:6px;overflow:hidden;position:relative;height:112px;margin-bottom:5px}
.fav-overlay{position:absolute;inset:0;display:flex;flex-direction:column;justify-content:space-between;padding:5px 0}
.fav-row{display:flex;justify-content:center;gap:4px}
.fav-pl{display:flex;flex-direction:column;align-items:center;gap:1px;cursor:pointer}
.fav-dot{width:clamp(13px,2.2vw,19px);height:clamp(13px,2.2vw,19px);border-radius:50%;background:linear-gradient(145deg,#3D195B,#2a0f3e);border:1.5px solid rgba(255,255,255,.28);display:flex;align-items:center;justify-content:center;font-family:var(--cd);font-size:clamp(.22rem,.4vw,.34rem);font-weight:900;color:#fff;transition:transform .14s}
.fav-dot:hover{transform:scale(1.25)}
.fav-dot.rated{border-color:var(--gold);box-shadow:0 0 5px rgba(255,215,0,.5)}
.fav-pname{font-family:var(--cd);font-size:clamp(.19rem,.34vw,.3rem);color:#fff;text-shadow:0 1px 2px rgba(0,0,0,.9);background:rgba(0,0,0,.62);padding:0px 2px;border-radius:2px}
.rate-list{max-height:80px;overflow-y:auto}
.rate-row{display:flex;align-items:center;gap:3px;padding:2px 0;border-bottom:1px solid rgba(255,255,255,.04)}
.rate-row:last-child{border:none}
.rate-num{font-family:var(--hd);font-size:.62rem;color:var(--sub);min-width:13px}
.rate-name{font-family:var(--cd);font-size:.54rem;font-weight:700;flex:1}
.rate-pos{font-family:var(--cd);font-size:.4rem;color:rgba(200,244,0,.48);min-width:22px}
.stars{display:flex;gap:1px}
.star{font-size:.54rem;cursor:pointer;color:rgba(255,255,255,.18);transition:color .1s}
.star.on{color:var(--gold)}

/* right panel: split columns */
.split{display:flex;gap:6px;height:100%}
.split-col{flex:1;overflow-y:auto;overflow-x:hidden;min-width:0}
.split-div{width:1px;background:linear-gradient(180deg,transparent,rgba(200,244,0,.12),transparent);flex-shrink:0;margin:4px 0}
.col-title{font-family:var(--cd);font-size:.48rem;font-weight:800;letter-spacing:1.5px;text-transform:uppercase;color:rgba(200,244,0,.38);margin-bottom:4px;padding-bottom:2px;border-bottom:1px solid rgba(200,244,0,.08)}

/* predictions */
.pred-card{background:rgba(0,0,0,.44);border:1px solid var(--border);border-radius:6px;padding:5px 7px;margin-bottom:4px;cursor:pointer;transition:all .14s;animation:fadeUp .18s ease}
.pred-card:hover,.pred-card.act{border-color:rgba(200,244,0,.28);background:rgba(200,244,0,.04)}
.pc-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:2px}
.pc-time{font-family:var(--hd);font-size:.6rem;color:var(--sub)}
.pc-time.live{color:var(--red);animation:pulse 1.5s infinite}
.live-pill{display:inline-flex;align-items:center;gap:2px;padding:1px 4px;border-radius:8px;background:rgba(230,57,70,.13);border:1px solid rgba(230,57,70,.3);font-family:var(--cd);font-size:.38rem;font-weight:700;color:var(--red);letter-spacing:.6px}
.live-dot{width:4px;height:4px;border-radius:50%;background:var(--red);animation:pulse 1s infinite;display:inline-block;margin-right:2px}
.pc-teams{display:flex;align-items:center;gap:2px;margin-bottom:4px}
.pc-tn{font-family:var(--cd);font-size:.55rem;font-weight:700;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pc-tn.a{text-align:right}
.pc-sc{font-family:var(--hd);font-size:.92rem;color:var(--lime);padding:2px 4px;background:rgba(0,0,0,.55);border-radius:4px;border:1px solid rgba(200,244,0,.15);flex-shrink:0}
.pc-sc.live{animation:glow 2s infinite}
.pred-row{display:flex;align-items:center;justify-content:space-between;gap:3px}
.pred-lbl{font-family:var(--cd);font-size:.4rem;color:rgba(200,244,0,.42);letter-spacing:.6px}
.sinp-wrap{display:flex;align-items:center;gap:2px}
.sinp{width:22px;height:20px;border-radius:4px;background:rgba(0,0,0,.7);border:1.5px solid rgba(255,255,255,.13);color:var(--lime);text-align:center;font-family:var(--hd);font-size:.78rem;outline:none}
.sinp:focus{border-color:var(--lime)}
.sinp:disabled{color:#0d0d0d;border-color:#0c0c0c;background:rgba(0,0,0,.28)}
.score-sep{font-family:var(--hd);font-size:.58rem;color:var(--sub)}
.lock-wrap{display:flex;align-items:center;gap:2px}
/* UNLOCK = YELLOW as per spec */
.lock-btn{padding:2px 6px;border-radius:10px;font-family:var(--cd);font-size:.44rem;font-weight:700;cursor:pointer;border:1px solid;transition:all .13s}
.lock-btn.unlocked{background:rgba(255,215,0,.07);border-color:rgba(255,215,0,.55);color:rgba(255,215,0,.9)}
.lock-btn.unlocked:hover{background:rgba(255,215,0,.15);border-color:var(--gold);color:var(--gold)}
.lock-btn.locked{background:rgba(200,244,0,.07);border-color:var(--lime);color:var(--lime)}
.pts-badge{font-family:var(--cd);font-size:.42rem;font-weight:700;padding:1px 5px;border-radius:10px}
.pts-badge.exact{background:rgba(255,215,0,.1);color:var(--gold);border:1px solid rgba(255,215,0,.22)}
.pts-badge.good{background:rgba(200,244,0,.08);color:var(--lime);border:1px solid rgba(200,244,0,.18)}
.pts-badge.miss{background:rgba(230,57,70,.09);color:var(--red);border:1px solid rgba(230,57,70,.2)}
.pc-fb{font-family:var(--cd);font-size:.4rem;text-align:center;margin-top:2px;color:rgba(255,255,255,.3)}
.pc-hint{font-family:var(--cd);font-size:.34rem;text-align:right;margin-top:1px;color:rgba(255,255,255,.16)}

/* stats column */
.stat-item{display:flex;align-items:center;gap:3px;padding:3px 4px;border-radius:5px;margin-bottom:2px;background:rgba(0,0,0,.3);border:1px solid rgba(255,255,255,.04)}
.si-pos{font-family:var(--hd);font-size:.7rem;color:var(--gold);min-width:12px}
.si-info{flex:1;overflow:hidden}
.si-name{font-family:var(--cd);font-size:.54rem;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.si-club{font-family:var(--cd);font-size:.4rem;color:var(--sub)}
.si-val{font-family:var(--hd);font-size:.72rem;color:var(--lime)}
.stbl{width:100%;border-collapse:collapse;font-family:var(--cd);font-size:.5rem}
.stbl th{color:rgba(200,244,0,.36);letter-spacing:.5px;padding:2px;text-align:right;font-weight:700;font-size:.42rem}
.stbl th:first-child,.stbl td:first-child{text-align:left}
.stbl td{padding:2px;color:var(--sub);text-align:right;border-bottom:1px solid rgba(255,255,255,.03)}
.stbl tr.t1 td{color:var(--lime)}
.pos-n{font-family:var(--hd);font-size:.68rem}
.pos-g{color:var(--gold)}
.t-nm{max-width:50px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-weight:700;color:var(--text);font-size:.52rem}
.pts-c{font-family:var(--hd);font-size:.72rem;color:var(--lime)}

/* chip vault */
.cv-grid{display:grid;grid-template-columns:1fr 1fr;gap:4px;margin-bottom:6px}
.cv-card{border-radius:6px;padding:6px 7px;cursor:pointer;border:1.5px solid;position:relative;overflow:hidden;transition:transform .14s,border-color .14s}
.cv-card:not(.cv-used):hover{transform:translateY(-2px)}
.cv-card.cv-used{opacity:.3;cursor:default;filter:grayscale(.85)}
.cv-icon{font-size:.92rem;display:block;margin-bottom:2px}
.cv-name{font-family:var(--hd);font-size:.7rem;letter-spacing:1.5px;display:block;line-height:1}
.cv-fx{font-family:var(--cd);font-size:.42rem;font-weight:700;display:block;margin-top:2px;line-height:1.3}
.cv-gain{font-family:var(--cd);font-size:.38rem;opacity:.6;margin-top:1px;display:block;font-style:italic}
.cv-used-tag{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-family:var(--hd);font-size:.58rem;letter-spacing:2px;background:rgba(0,0,0,.28);border-radius:6px}
.cv-detail{background:rgba(0,0,0,.44);border:1px solid rgba(200,244,0,.1);border-radius:7px;padding:7px 9px;margin-bottom:5px;min-height:52px}
.cv-ph{font-family:var(--cd);font-size:.48rem;color:rgba(255,255,255,.2);text-align:center;padding:10px 0}
.cv-play{width:100%;padding:7px;border-radius:6px;font-family:var(--hd);font-size:.72rem;letter-spacing:2px;cursor:pointer;transition:all .14s;border:1.5px solid;background:transparent;display:flex;align-items:center;justify-content:center;gap:5px;margin-bottom:6px}
.cv-play:active{transform:scale(.97)}
.cv-hist-lbl{font-family:var(--cd);font-size:.42rem;font-weight:800;letter-spacing:2px;text-transform:uppercase;color:rgba(200,244,0,.32);margin-bottom:4px}
.cv-hist-row{display:flex;align-items:center;gap:4px;padding:3px 0;border-bottom:1px solid rgba(255,255,255,.04)}
.cv-hist-row:last-child{border:none}
.cvh-chip{font-family:var(--hd);font-size:.62rem;letter-spacing:1px;min-width:28px}
.cvh-gw{font-family:var(--cd);font-size:.4rem;font-weight:700;color:var(--sub);min-width:28px}
.cvh-desc{font-family:var(--cd);font-size:.42rem;color:var(--sub);flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.cvh-pts{font-family:var(--hd);font-size:.66rem;margin-left:auto}

/* toast */
.toast{
  position:fixed;bottom:calc(var(--nav-h)+8px);left:50%;transform:translateX(-50%);
  z-index:8000;padding:7px 18px;border-radius:40px;
  font-family:var(--cd);font-size:.65rem;letter-spacing:.8px;
  pointer-events:none;white-space:nowrap;
  animation:toastIn .2s ease,toastOut .3s ease 2.1s forwards;
}
</style>

<body>
<div id="root">Loading…</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<script type="text/babel">
const {useState,useEffect,useRef,useCallback,useMemo}=React;

/* ═══════════════════════════════════════════
   STATIC DATA
═══════════════════════════════════════════ */

/* ═══════════════════════════════════════════
   HELPERS
═══════════════════════════════════════════ */
function calcPts(ph,pa,ah,aa,fid='full11',activeChips=[]){
  ph=+ph;pa=+pa;ah=+ah;aa=+aa;
  if([ph,pa,ah,aa].some(isNaN))return{pts:0,type:'miss'};
  const f=FORMATIONS.find(x=>x.id===fid)||FORMATIONS[4];
  let type='miss',raw=0;
  if(ph===ah&&pa===aa){type='exact';raw=f.pts.exact;}
  else{
    const pr=Math.sign(ph-pa),ar=Math.sign(ah-aa);
    if(pr===ar){
      if(Math.abs(ph-ah)<=1&&Math.abs(pa-aa)<=1){type='close';raw=f.pts.close;}
      else{type='result';raw=f.pts.result;}
    } else if(Math.abs((ph-pa)-(ah-aa))<=1){type='near';raw=f.pts.near;}
  }
  // apply chip modifiers
  let pts=raw;
  activeChips.forEach(cid=>{
    const chip=CHIPS.find(c=>c.id===cid);
    if(chip)pts=chip.ptsMod(pts,type);
  });
  return{pts,type};
}

function ptsFB(pts,type){
  if(type==='exact')return{t:'🎯 EXACT SCORE!',c:'exact'};
  if(type==='close')return{t:'✅ Result + Score',c:'good'};
  if(type==='result')return{t:'🟡 Correct Result',c:'good'};
  if(type==='near')return{t:'🔶 Near Miss',c:'good'};
  return{t:'❌ Miss',c:'miss'};
}

function genMatches(lid,sport){
  const league=Object.values(ALL_LEAGUES).flat().find(l=>l.id===lid);
  if(!league)return[];
  const teams=league.teams;
  const statuses=['live','live','finished','upcoming'];
  return Array.from({length:Math.min(4,Math.floor(teams.length/2))},(_,i)=>{
    const h=teams[i*2],a=teams[i*2+1]||teams[0];
    const st=statuses[i]||'finished';
    const sh=st==='upcoming'?0:Math.floor(Math.random()*4);
    const sa=st==='upcoming'?0:Math.floor(Math.random()*3);
    const mn=st==='live'?22+Math.floor(Math.random()*55):st==='finished'?90:0;
    const poss=45+Math.round(Math.random()*18);
    const players_h=['Salah','Núñez','Diaz','Saka','Haaland'];
    const players_a=['Kane','Rashford','Toney','Werner','Watkins'];
    return{
      id:`${lid}_${i}`,h,a,status:st,min:mn,score:{h:sh,a:sa},
      stats:{h:{poss,shots:5+Math.floor(Math.random()*12),corners:2+Math.floor(Math.random()*7)},
             a:{poss:100-poss,shots:3+Math.floor(Math.random()*8),corners:1+Math.floor(Math.random()*5)}},
      events:st!=='upcoming'?[
        {id:'e1',min:15+Math.floor(Math.random()*25),type:'goal',text:`⚽ ${h.split(' ').pop()} score!`,teamColor:'h'},
        Math.random()>.4?{id:'e2',min:45+Math.floor(Math.random()*30),type:'goal',text:`⚽ ${a.split(' ').pop()} equalise!`,teamColor:'a'}:null,
        Math.random()>.6?{id:'e3',min:30+Math.floor(Math.random()*40),type:'yellow',text:`🟨 Yellow card — ${players_h[Math.floor(Math.random()*players_h.length)]}`}:null,
      ].filter(Boolean):[],
    };
  });
}

function genLineups(match,sport){
  const hS=match.h.split(' ').pop(),aS=match.a.split(' ').pop();
  const r=()=>+(5.5+Math.random()*4.5).toFixed(1);
  const mk=(pre,pos,g=0,yc=0,rc=0)=>({name:`${pre} ${pos}`,pos,rat:r(),goals:g,assists:0,yellowCards:yc,redCard:rc});
  return{
    home:[
      {players:[mk(hS,'GK',0,Math.random()<.1?1:0)]},
      {players:[mk(hS,'RB',0,Math.random()<.15?1:0),mk(hS,'CB'),mk(hS,'CB'),mk(hS,'LB',0,Math.random()<.1?1:0)]},
      {players:[mk(hS,'CM',0,Math.random()<.12?1:0),mk(hS,'CM'),mk(hS,'AM')]},
      {players:[mk(hS,'RW'),mk(hS,'ST',match.score.h,0,Math.random()<.05?1:0),mk(hS,'LW')]},
    ],
    away:[
      {players:[mk(aS,'GK')]},
      {players:[mk(aS,'RB'),mk(aS,'CB',0,Math.random()<.15?1:0),mk(aS,'CB'),mk(aS,'LB')]},
      {players:[mk(aS,'CM'),mk(aS,'CM',0,Math.random()<.12?1:0),mk(aS,'AM')]},
      {players:[mk(aS,'RW'),mk(aS,'ST',match.score.a),mk(aS,'LW',0,Math.random()<.1?1:0)]},
    ],
  };
}

const PanelSeatRow=({cols=44,lr=.42})=>{
  const [lit,setLit]=useState(()=>Array(cols).fill(0).map(()=>Math.random()<lr));
  useEffect(()=>{const t=setInterval(()=>{const i=Math.floor(Math.random()*cols);setLit(l=>{const n=[...l];n[i]=!n[i];return n;});},360);return()=>clearInterval(t);},[cols]);
  return <div className="ps-row">{lit.map((on,i)=><div key={i} className={`psv${on?' on':''}`}/>)}</div>;
};
const PanelSeats=({rows=3})=>(
  <div className="panel-seats">
    <div className="ps-inner">{Array(rows).fill(0).map((_,i)=><PanelSeatRow key={i} cols={44} lr={.36+i*.04}/>)}</div>
  </div>
);
const StandSeats=({rows=26,cols=6})=>{
  const tot=rows*cols;
  const [lit,setLit]=useState(()=>Array(tot).fill(0).map(()=>Math.random()<.4));
  useEffect(()=>{const t=setInterval(()=>{const i=Math.floor(Math.random()*tot);setLit(l=>{const n=[...l];n[i]=!n[i];return n;});},450);return()=>clearInterval(t);},[tot]);
  return <div className="stand-inner">{Array(rows).fill(0).map((_,ri)=><div key={ri} className="stand-row">{Array(cols).fill(0).map((_,ci)=><div key={ci} className={`sv${lit[ri*cols+ci]?' on':''}`}/>)}</div>)}</div>;
};
const Billboard=({ads,rv,show})=>{const all=[...ads,...ads];return <div className={`bb${show?' show':''}`}><div className={`bb-inner ${rv?'rv':'go'}`}>{all.map((a,i)=><div key={i} className="bb-block" style={{background:a.b,minWidth:'clamp(70px,11vw,152px)'}}><span className="bb-text" style={{color:a.c}}>{a.t}</span></div>)}</div></div>;};
const StandAdV=({ads,rv})=>{const all=[...ads,...ads];return <div className="stand-adv"><div className={`sadv-i ${rv?'rv':'go'}`}>{all.map((a,i)=><div key={i} className="sadv-b" style={{background:a.b}}><span className="sadv-t" style={{color:a.c}}>{a.t}</span></div>)}</div></div>;};

/* ═══════════════════════════════════════════
   COURT VIEW
═══════════════════════════════════════════ */
const CourtView=({match,sport})=>{
  const [ball,setBall]=useState({x:50,y:50});
  const [evts,setEvts]=useState([]);
  const [hov,setHov]=useState(null);
  const [tipPos,setTipPos]=useState({x:0,y:0});
  useEffect(()=>{
    if(!match||match.status!=='live')return;
    const t=setInterval(()=>{
      setBall({x:16+Math.random()*68,y:10+Math.random()*80});
      if(Math.random()<.18){
        const msgs=['Corner!','⚠️ Foul!','Offside!','Shot blocked!','Free kick!','VAR Check...','Goal kick'];
        const id=Date.now();
        setEvts(ev=>[{id,text:msgs[Math.floor(Math.random()*msgs.length)]},...ev].slice(0,2));
        setTimeout(()=>setEvts(ev=>ev.filter(e=>e.id!==id)),2800);
      }
    },2000);
    return()=>clearInterval(t);
  },[match?.id,match?.status]);

  if(!match)return null;
  const isLive=match.status==='live',isDone=match.status==='finished';
  const lu=genLineups(match,sport);
  const rCl=r=>{const n=parseFloat(r);if(n>=9)return'rA';if(n>=8)return'rB';if(n>=7)return'rC';if(n>=6)return'rD';return'rF';};
  const dCl=h=>sport==='basketball'?(h?'nb-h':'nb-a'):h?'hm':'aw';

  return(<>
    <div className="match-hud">
      <div className="hud-score-row">
        <span className="hud-team">{match.h.split(' ').pop()}</span>
        <span className="hud-score">{match.score.h}–{match.score.a}</span>
        <span className="hud-team">{match.a.split(' ').pop()}</span>
      </div>
      <div className="hud-status" style={{color:isLive?'#e63946':isDone?'rgba(200,244,0,.54)':'rgba(255,255,255,.28)'}}>
        {isLive?`🔴 ${match.min}'`:isDone?'✅ FULL TIME':'🕐 UPCOMING'}
      </div>
      {[{l:'Poss',h:match.stats.h.poss,a:match.stats.a.poss,u:'%'},
        {l:'Shots',h:match.stats.h.shots,a:match.stats.a.shots,u:''},
        {l:'Corners',h:match.stats.h.corners,a:match.stats.a.corners,u:''}].map(s=>(
        <div key={s.l} className="hud-stat">
          <span className="hud-sv h">{s.h}{s.u}</span>
          <div className="hud-bar"><div className="hud-fill h" style={{width:`${s.h/(s.h+s.a)*100}%`}}/></div>
          <span className="hud-sl">{s.l}</span>
          <div className="hud-bar"><div className="hud-fill a" style={{width:`${s.a/(s.h+s.a)*100}%`}}/></div>
          <span className="hud-sv a">{s.a}{s.u}</span>
        </div>
      ))}
    </div>

    {/* Home — bottom */}
    <div style={{position:'absolute',bottom:'1%',left:0,right:0,zIndex:12,display:'flex',flexDirection:'column',gap:'clamp(2px,.5vw,6px)',alignItems:'center',padding:'0 2%'}}>
      {[...lu.home].reverse().map((row,ri)=>(
        <div key={ri} style={{display:'flex',justifyContent:'center',gap:'clamp(3px,1.1vw,14px)',width:'100%'}}>
          {row.players.map((p,pi)=>(
            <div key={pi} className="pdot-wrap"
              onMouseEnter={e=>{setHov(p);setTipPos({x:e.clientX,y:e.clientY});}}
              onMouseLeave={()=>setHov(null)}>
              <div className={`pdot ${dCl(true)}${p.goals>0?' scored':''}${p.yellowCards>0?' ycard':''}${p.redCard?' rcard':''}`}>
                {p.goals>0?'⚽':p.pos.slice(0,2)}
                {p.yellowCards>0&&<div className="ycard-badge">🟨</div>}
                {p.redCard&&<div className="rcard-badge">🟥</div>}
              </div>
              <div className="p-name">{p.name.split(' ').pop()}</div>
              {(isDone||isLive)&&<span className={`p-rat ${rCl(p.rat)}`}>{p.rat}</span>}
            </div>
          ))}
        </div>
      ))}
    </div>

    {/* Away — top */}
    <div style={{position:'absolute',top:'1%',left:0,right:0,zIndex:12,display:'flex',flexDirection:'column',gap:'clamp(2px,.5vw,6px)',alignItems:'center',padding:'0 2%'}}>
      {lu.away.map((row,ri)=>(
        <div key={ri} style={{display:'flex',justifyContent:'center',gap:'clamp(3px,1.1vw,14px)',width:'100%'}}>
          {row.players.map((p,pi)=>(
            <div key={pi} className="pdot-wrap"
              onMouseEnter={e=>{setHov(p);setTipPos({x:e.clientX,y:e.clientY});}}
              onMouseLeave={()=>setHov(null)}>
              <div className={`pdot ${dCl(false)}${p.yellowCards>0?' ycard':''}${p.redCard?' rcard':''}`}>
                {p.goals>0?'⚽':p.pos.slice(0,2)}
                {p.yellowCards>0&&<div className="ycard-badge">🟨</div>}
                {p.redCard&&<div className="rcard-badge">🟥</div>}
              </div>
              <div className="p-name">{p.name.split(' ').pop()}</div>
              {(isDone||isLive)&&<span className={`p-rat ${rCl(p.rat)}`}>{p.rat}</span>}
            </div>
          ))}
        </div>
      ))}
    </div>

    {isLive&&<div className="ball" style={{left:`${ball.x}%`,top:`${ball.y}%`,transform:'translate(-50%,-50%)'}}/>}

    <div className="ev-feed">
      {[...match.events.slice(-2),...evts].slice(0,3).map((ev,i)=>(
        <div key={ev.id||i} className={`ev-item${ev.type==='goal'?' goal':ev.type==='yellow'?' card-y':ev.type==='red'?' card-r':''}`}>
          {ev.text||ev.t}
        </div>
      ))}
    </div>

    {hov&&(
      <div className="ptip" style={{left:tipPos.x+12,top:Math.min(tipPos.y-55,window.innerHeight-135)}}>
        <div className="ptip-name">{hov.name}</div>
        <div className="ptip-pos">{hov.pos}</div>
        <div className="ptip-row"><span className="ptip-k">Rating</span><span className="ptip-v">{hov.rat}</span></div>
        <div className="ptip-row"><span className="ptip-k">Goals</span><span className="ptip-v">{hov.goals}</span></div>
        <div className="ptip-row"><span className="ptip-k">🟨 Cards</span><span className="ptip-v" style={{color:'var(--gold)'}}>{hov.yellowCards}</span></div>
        {hov.redCard&&<div className="ptip-row"><span className="ptip-k">🟥 RED</span><span className="ptip-v" style={{color:'var(--red)'}}>SENT OFF</span></div>}
      </div>
    )}
  </>);
};

const ChipCol=({usedChips,onUse,show})=>{
  const [tip,setTip]=useState(null);
  const [tipPos,setTipPos]=useState({x:0,y:0});
  return(
    <div className={`chip-col${show?' show':''}`}>
      {CHIPS.map(ch=>{
        const used=usedChips.includes(ch.id);
        return(
          <div key={ch.id}
            className={`chip-btn${used?' used':''}`}
            style={{background:ch.bg,borderColor:ch.border}}
            onClick={()=>!used&&onUse(ch.id)}
            onMouseEnter={e=>{setTip(ch.id);setTipPos({x:e.clientX,y:e.clientY});}}
            onMouseLeave={()=>setTip(null)}>
            <span className="chip-icon">{ch.icon}</span>
            <span className="chip-code" style={{color:ch.color}}>{ch.code}</span>
            <span className="chip-st" style={{color:ch.color}}>{used?'✓':'avail'}</span>
          </div>
        );
      })}
      {tip&&(()=>{
        const ch=CHIPS.find(c=>c.id===tip);if(!ch)return null;
        return(
          <div className="chip-tip" style={{
            left:Math.min(tipPos.x+12,window.innerWidth-225),
            top:Math.min(tipPos.y-18,window.innerHeight-180),
            borderColor:ch.border,
          }}>
            <div className="ct-name" style={{color:ch.color}}>{ch.icon} {ch.name}</div>
            <div className="ct-fx" style={{color:ch.color}}>{ch.effect}</div>
            <div className="ct-desc">{ch.desc}</div>
            <div className="ct-how">🏅 How to earn: {ch.howToGain}</div>
          </div>
        );
      })()}
    </div>
  );
};

const LeagueModal=({league,onClose,myYellowCards,myRedCards})=>{

  // after 5 yellows in a season, missed GW = -15pts penalty applied

    <div className="modal-overlay" onClick={e=>e.target===e.currentTarget&&onClose()}>

        <button className="modal-close" onClick={onClose}>✕</button>
        <div className="modal-title">{league.icon} {league.name}</div>

        {myBanned&&(
          <div style={{background:'rgba(230,57,70,.1)',border:'1px solid rgba(230,57,70,.3)',borderRadius:7,padding:'8px 10px',marginBottom:10}}>
            <div style={{fontFamily:'var(--hd)',fontSize:'.72rem',color:'var(--red)',letterSpacing:'1.5px',marginBottom:3}}>🟥 SUSPENDED THIS GW</div>
            <div style={{fontFamily:'var(--cd)',fontSize:'.5rem',color:'rgba(230,57,70,.8)',lineHeight:1.5}}>
              You've accumulated 5 yellow cards this season. You miss GW{32} and receive a -15pt deduction. Any predictions you lock this GW score 0 pts.

          </div>
        )}

        <div style={{fontFamily:'var(--cd)',fontSize:'.5rem',color:'rgba(200,244,0,.35)',marginBottom:8,letterSpacing:'1px',textTransform:'uppercase'}}>
          GW32 Leaderboard
        </div>
        
        {standings.map((m,i)=>(
          <div key={m.name} className={`lb-row${m.isMe?' me':''}`}>
            <span className={`lb-pos${i<3?' top':''}`}>{m.pos}</span>
            <div style={{flex:1}}>
              <div className="lb-name">{m.isMe?'⭐ '+m.name:m.name}</div>
              <div style={{display:'flex',gap:4,marginTop:1}}>
                {Array(Math.min(m.yc,5)).fill(0).map((_,yi)=>(
                  <div key={yi} style={{width:7,height:9,background:yi===4&&m.yc>=5?'var(--red)':'var(--gold)',borderRadius:1,opacity:.9}}/>
                ))}

              <div className="lb-pts">{m.pts}</div>
              <div style={{fontFamily:'var(--cd)',fontSize:'.4rem',color:'rgba(200,244,0,.4)'}}>+{m.gw32pts} GW32</div>
            </div>
            <span className={`lb-delta ${m.delta>0?'up':'dn'}`}>{m.delta>0?'▲':'▼'}{Math.abs(m.delta)}</span>
          </div>
        ))}

        <div style={{marginTop:12,padding:'8px 10px',background:'rgba(0,0,0,.3)',borderRadius:7,border:'1px solid rgba(255,255,255,.06)'}}>
          <div style={{fontFamily:'var(--cd)',fontSize:'.48rem',fontWeight:700,color:'rgba(200,244,0,.5)',letterSpacing:'1px',textTransform:'uppercase',marginBottom:4}}>🟨 Disciplinary Rules</div>
          <div style={{fontFamily:'var(--cd)',fontSize:'.44rem',color:'var(--sub)',lineHeight:1.6}}>
            • Each yellow card = -2 pts deducted<br/>
            • 5 yellow cards in a season = 1 GW ban + -15 pts<br/>
            • Red card = -8 pts + instant 1 GW suspension<br/>
            • After suspension GW: card slate wiped, fresh start
          </div>
        </div>
      </div>
    </div>
  );

/* ═══════════════════════════════════════════
   APP ROOT
═══════════════════════════════════════════ */
function App(){
  /* roof / open state */
  const [roofState,setRoofState]=useState('closed'); // closed | opening | open | closing
  const isOpen=roofState==='open'||roofState==='opening';

  /* sport / league */
  const [selSport,setSport]=useState('football');
  const [selLeague,setLeague]=useState('epl');
  const [pop,setPop]=useState(null);

  /* panels */
  const [leftTab,setLeftTab]=useState('account');
  const [rightTab,setRightTab]=useState('preds');

  /* match */
  const [selMatch,setSelMatch]=useState(null);
  const [matches,setMatches]=useState(()=>genMatches('epl','football'));

  /* predictions */
  const [preds,setPreds]=useState({});
  const [locked,setLocked]=useState({});

  /* points */
  const [pts,setPts]=useState(ACCOUNT.totalPts);
  const [ptsAnim,setPtsAnim]=useState(null);
  const [ptsIsDeduct,setPtsIsDeduct]=useState(false);

  /* formation/GW */
  const [formIdx,setFormIdx]=useState(4); // default Full 11
  const [gwIdx,setGwIdx]=useState(GW_DATA.filter(Boolean).length-1);

  /* chips */
  const [usedChips,setUsedChips]=useState([]);
  const [chipHistory,setChipHistory]=useState([]);
  const [activeChips,setActiveChips]=useState([]);

  /* card tracking */
  const [totalYellows,setTotalYellows]=useState(3); // start with 3 for demo
  const [totalReds,setTotalReds]=useState(0);
  const myBanned=totalYellows>=5;

  /* leagues modal */
  const [openLeague,setOpenLeague]=useState(null);

  /* toasts */
  const [toasts,setToasts]=useState([]);

  const sportBtnRef=useRef(null);
  const leagueBtnRef=useRef(null);

  /* Live match ticker */
  useEffect(()=>{
    const t=setInterval(()=>{
      setMatches(ms=>ms.map(m=>{
        if(m.status!=='live')return m;
        const nm=Math.min(90,m.min+1);
        let ns={...m.score};
        // random goal ~2% chance per tick
        if(Math.random()<.022){const sd=Math.random()<.55?'h':'a';ns={...ns,[sd]:ns[sd]+1};}
        // random yellow card event
        let evts=[...m.events];
        if(Math.random()<.03){
          const id='yc'+Date.now();
          evts=[...evts,{id,min:nm,type:'yellow',text:`🟨 Yellow — ${['Silva','Jones','Smith','Brown'][Math.floor(Math.random()*4)]}`}].slice(-4);
        }
        return{...m,min:nm,score:ns,status:nm>=90?'finished':m.status,events:evts};
      }));
    },1400);
    return()=>clearInterval(t);
  },[]);

  /* Simulate points gaining every 8s */
  useEffect(()=>{
    const t=setInterval(()=>{
      const gain=Math.floor(Math.random()*8)+1;
      // rare deduction (yellow card)
      if(Math.random()<.08){
        const deduct=-(Math.floor(Math.random()*4)+2);
        setPts(p=>Math.max(0,p+deduct));
        showPtsAnim(deduct,true);
        if(Math.random()<.3){
          setTotalYellows(y=>{
            const ny=y+1;
            if(ny>=5)toast('🟥 SUSPENDED! 5 yellows = GW ban + -15pts','var(--red)');
            else toast(`🟨 Yellow card! ${ny}/5 accumulated. -2pts`,'var(--gold)');
            return ny;
          });
        }
        toast(`⚠️ Points deducted: ${deduct} pts`,'var(--red)');
      } else {
        setPts(p=>p+gain);
        showPtsAnim(gain,false);
      }
    },8000);
    return()=>clearInterval(t);
  },[]);

  function showPtsAnim(n,deduct){
    setPtsAnim(n);setPtsIsDeduct(deduct);setTimeout(()=>setPtsAnim(null),1200);
  }

  function toast(msg,col='var(--lime)'){
    const id=Date.now()+Math.random();
    setToasts(t=>[...t,{id,msg,col}]);
    setTimeout(()=>setToasts(t=>t.filter(x=>x.id!==id)),2600);
  }

  function toggleRoof(){
    if(roofState==='closed'||roofState==='closing'){
      setRoofState('opening');
      setTimeout(()=>setRoofState('open'),640);
    } else {
      setRoofState('closing');
      setTimeout(()=>setRoofState('closed'),540);
    }
  }

  function handlePred(k,v){setPreds(p=>({...p,[k]:v}))}

  function handleLock(k,match){
    if(locked[k]){setLocked(l=>({...l,[k]:false}));toast('🔓 Prediction unlocked','var(--gold)');return;}
    const p2=preds[k];
    if(!p2||p2.h===''||p2.a===''){toast('⚠️ Enter a score prediction first','#ff6b35');return;}
    setLocked(l=>({...l,[k]:true}));
    if(match.status!=='upcoming'){
      const {pts:earned,type}=calcPts(+p2.h,+p2.a,match.score.h,match.score.a,FORMATIONS[formIdx].id,activeChips);
      if(earned>0){setPts(p=>p+earned);showPtsAnim(earned,false);toast(`${ptsFB(earned,type).t} +${earned}pts`);}
      else toast('🔒 Locked — 0 pts this time','var(--red)');
    } else toast('🔒 Prediction locked in!');
  }

  function handleChip(id){
    setUsedChips(u=>[...u,id]);
    setActiveChips(a=>[...a,id]);
    const chip=CHIPS.find(c=>c.id===id);
    setChipHistory(h=>[{chip:chip.code,gw:`GW${ACCOUNT.gw}`,pts:'active',desc:chip.effect,icon:chip.icon},...h]);
    toast(`${chip.icon} ${chip.name} ACTIVATED — ${chip.effect}`,chip.color);
    if(id==='oracle'){setPts(p=>p+50);showPtsAnim(50,false);}
    if(id==='ironwall'){setPts(p=>p+10);showPtsAnim(10,false);}
  }

  function handleSport(id){
    setSport(id);
    const fl=(ALL_LEAGUES[id]||[])[0]?.id||'epl';
    setLeague(fl);setMatches(genMatches(fl,id));setSelMatch(null);setLocked({});setPreds({});
    toast(SPORTS.find(s=>s.id===id)?.lbl||id);
  }
  function handleLeague(id){
    setLeague(id);setMatches(genMatches(id,selSport));setSelMatch(null);setLocked({});setPreds({});
    toast(Object.values(ALL_LEAGUES).flat().find(l=>l.id===id)?.lbl||id);
  }

  const curSport=SPORTS.find(s=>s.id===selSport)||SPORTS[0];
  const leagues=ALL_LEAGUES[selSport]||[];
  const curLeague=leagues.find(l=>l.id===selLeague)||leagues[0]||{lbl:'League',icon:'🏆'};
  const selMatchObj=selMatch?matches.find(m=>m.id===selMatch):null;

  return(
    <div className="app">

      {/* HEADER */}
      <div className="hdr">
        <div className="pts-pill" onClick={()=>toast(`Total: ${pts.toLocaleString()} pts · GW${ACCOUNT.gw}`)}>
          <span className="pts-num">{pts.toLocaleString()}</span>
          <span className="pts-lbl">PTS</span>
        </div>
        {ptsAnim!==null&&(
          <div className={`pts-anim${ptsIsDeduct?' pts-deduct':''}`}>
            {ptsAnim>0?'+':''}{ptsAnim}
          </div>
        )}
        <div className="brand">⚽ Gaffer's Pick</div>
        <div className="season-tag">2025/26</div>
      </div>

      {/* BODY */}
      <div className="body">

        {/* LEFT PANEL */}
        <div className={`panel left${isOpen?' show':''}`}>
          <PanelSeats rows={3}/>
          <div className="ptabs">
            <button className={`ptab${leftTab==='account'?' on':''}`} onClick={()=>setLeftTab('account')}>👤 Account</button>
            <button className={`ptab${leftTab==='fav'?' on':''}`} onClick={()=>setLeftTab('fav')}>⭐ Fav Team</button>
          </div>
          <div className="panel-scroll">
            <div style={{animation:'panelIn .3s ease'}}>
              {leftTab==='account'
                ?<AccountTab
                    pts={pts} totalYellows={totalYellows} totalReds={totalReds}
                    gwIdx={gwIdx} setGwIdx={setGwIdx}
                    formIdx={formIdx} setFormIdx={setFormIdx}
                    onLeagueClick={setOpenLeague}/>
                :<FavTeamTab sport={selSport} selLeague={selLeague}/>
              }
            </div>
          </div>
        </div>

        {/* LEFT STAND */}
        <div className={`stand${isOpen?' shrink':''}`} style={{display:'flex',flexDirection:'row'}}>
          <div style={{flex:1,display:'flex',flexDirection:'column',overflow:'hidden'}}>
            <Billboard ads={ADS} show={isOpen}/>
            <StandSeats rows={26} cols={5}/>
            <Billboard ads={ADS} rv show={isOpen}/>
          </div>
          <StandAdV ads={ADS_V}/>
        </div>

        {/* PITCH */}
        <div className={`pitch-wrap${isOpen?' open':''}`}>
          <Billboard ads={ADS} show={isOpen}/>

          <div className="court-area">
            <ChipCol usedChips={usedChips} onUse={handleChip} show={isOpen}/>

            {/* Court */}
            <div className="court-bg" style={{position:'absolute',inset:0,left:isOpen?'clamp(40px,6vw,62px)':'0',transition:'left .45s'}}
              className={`court-bg ${curSport.court}`}/>
            <div style={{position:'absolute',inset:0,left:isOpen?'clamp(40px,6vw,62px)':'0',transition:'left .45s',zIndex:3}}>
              {COURT_SVGS[curSport.id]||<FootballSVG/>}
              <CourtView match={selMatchObj} sport={selSport}/>
            </div>

            {/* ROOF — covers pitch when closed, aerial stadium view */}
            <div className={`roof ${roofState}`} style={{pointerEvents:'none'}}>
              <div className="roof-half left">
                <div className="roof-ss"><RoofSeatRow cols={28} lr={.44}/></div>
                <div className="roof-pane">
                  <PredsAndStatsTab
                    matches={matches} preds={preds} locked={locked}
                    onPred={handlePred} onLock={handleLock}
                    onSel={id=>setSelMatch(p=>p===id?null:id)}
                    selMatch={selMatch} formIdx={formIdx}
                    selLeague={selLeague} activeChips={activeChips}
                    myBanned={myBanned}/>
                </div>
                <div className="roof-ss bot"><RoofSeatRow cols={28} lr={.36}/></div>
              </div>
              <div className="roof-half right">
                <div className="roof-ss"><RoofSeatRow cols={28} lr={.44}/></div>
                <div className="roof-pane">
                  <ChipsTab usedChips={usedChips} onUse={handleChip} chipHistory={chipHistory} pts={pts}/>
                </div>
                <div className="roof-ss bot"><RoofSeatRow cols={28} lr={.36}/></div>
              </div>
            </div>

            {/* Roof open/close button — on the court */}
            <button className={`roof-btn${isOpen?' open-state':''}`} onClick={toggleRoof}>
              <StadiumIcon isOpen={isOpen}/>
              <span style={{marginLeft:4}}>{isOpen?'Close Roof':'Open Roof'}</span>
            </button>
          </div>

          <Billboard ads={ADS} rv show={isOpen}/>
        </div>

        {/* RIGHT STAND */}
        <div className={`stand right${isOpen?' shrink':''}`} style={{display:'flex',flexDirection:'row'}}>
          <StandAdV ads={ADS_V} rv/>
          <div style={{flex:1,display:'flex',flexDirection:'column',overflow:'hidden'}}>
            <Billboard ads={ADS} rv show={isOpen}/>
            <StandSeats rows={26} cols={5}/>
            <Billboard ads={ADS} show={isOpen}/>
          </div>
        </div>

        {/* RIGHT PANEL */}
        <div className={`panel right${isOpen?' show':''}`}>
          <PanelSeats rows={3}/>
          <div className="ptabs">
            <button className={`ptab${rightTab==='preds'?' on':''}`} onClick={()=>setRightTab('preds')}>🎯 Preds & Stats</button>
            <button className={`ptab${rightTab==='chips'?' on':''}`} onClick={()=>setRightTab('chips')}>⚡ Chips</button>
          </div>
          <div className="panel-scroll">
            <div style={{animation:'panelIn .3s ease'}}>
              {rightTab==='preds'
                ?<PredsAndStatsTab
                    matches={matches} preds={preds} locked={locked}
                    onPred={handlePred} onLock={handleLock}
                    onSel={id=>setSelMatch(p=>p===id?null:id)}
                    selMatch={selMatch} formIdx={formIdx}
                    selLeague={selLeague} activeChips={activeChips}
                    myBanned={myBanned}/>
                :<ChipsTab usedChips={usedChips} onUse={handleChip} chipHistory={chipHistory} pts={pts}/>
              }
            </div>
          </div>
        </div>

      </div>{/* end body */}

      {/* NAV — SPORT | OPEN | LEAGUE only */}
      <div className="nav">
        <button ref={sportBtnRef}
          className={`nav-btn${pop==='sport'?' active':''}`}
          onClick={()=>setPop(o=>o==='sport'?null:'sport')}>
          <div className="nav-icon-wrap">
            <SportIcon sport={curSport.id}/>
          </div>
          <span className="nav-label">{curSport.lbl}</span>
          <span className="nav-sub">SPORT ▲</span>
        </button>

        {/* OPEN/CLOSE — custom stadium SVG icon */}
        <button className="open-btn" onClick={toggleRoof}>
          <div className="ob-icon-wrap">
            <StadiumIcon isOpen={isOpen}/>
          </div>
          <span className="ob-lbl">{isOpen?'CLOSE':'OPEN'}</span>
        </button>

        <button ref={leagueBtnRef}
          className={`nav-btn${pop==='league'?' active':''}`}
          onClick={()=>setPop(o=>o==='league'?null:'league')}>
          <div className="nav-icon-wrap">
            <LeagueIcon/>
          </div>
          <span className="nav-label">{curLeague.lbl}</span>
          <span className="nav-sub">LEAGUE ▲</span>
        </button>
      </div>

      {/* POPUPS */}
      {pop==='sport'&&<Popup items={SPORTS} sel={selSport} onSel={handleSport} onClose={()=>setPop(null)} btnRef={sportBtnRef}/>}
      {pop==='league'&&<Popup items={leagues} sel={selLeague} onSel={handleLeague} onClose={()=>setPop(null)} btnRef={leagueBtnRef}/>}

      {/* LEAGUE MODAL */}
      {openLeague&&<LeagueModal league={openLeague} onClose={()=>setOpenLeague(null)} myYellowCards={totalYellows} myRedCards={totalReds}/>}

      {/* TOASTS */}
      {toasts.map(t=>(
        <div key={t.id} className="toast"
          style={{background:'linear-gradient(90deg,#040d14,#071509)',border:`1.5px solid ${t.col}`,color:t.col}}>
          {t.msg}
        </div>
      ))}
    </div>
  );
}

const el=document.getElementById('root');
if(el){
  try{ReactDOM.createRoot(el).render(<App/>);}
  catch(e){
    console.error(e);
    el.innerHTML=`<div style="color:#c8f400;padding:2rem;text-align:center;font-family:monospace;background:#060b10;height:100vh;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:1rem">
      <div style="font-size:2rem">⚽</div>
      <div>Error loading Gaffer's Pick</div>
      <div style="font-size:.8rem;color:rgba(200,244,0,.5)">${e.message}</div>
    </div>`;
  }
}
</script>
</body>
</html>
