<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>The Gaffer's Pick | Stadium Edition</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Oswald:wght@300;400;600;700&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      user-select: none;
    }

    body {
      font-family: 'Rajdhani', sans-serif;
      background: #0a1a0c;
      color: #fff;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ========= MODERN STADIUM AERIAL ========= */
    .stadium {
      position: relative;
      width: 100%;
      min-height: 100vh;
      background: radial-gradient(ellipse at 50% 30%, #1a3a1a, #071007);
      overflow-x: auto;
    }

    /* Pitch container with margins for billboards */
    .pitch-container {
      position: relative;
      max-width: 1400px;
      margin: 0 auto;
      padding: 20px 20px 20px 20px;
    }

    /* Main grass pitch */
    .pitch {
      position: relative;
      width: 100%;
      aspect-ratio: 16 / 10;
      background: linear-gradient(145deg, #1c7926, #0f4a17);
      border-radius: 40px 40px 30px 30px;
      box-shadow: 0 0 0 8px rgba(255, 255, 255, 0.08), 0 25px 40px rgba(0, 0, 0, 0.6);
      overflow: hidden;
      border: 1px solid rgba(200, 244, 0, 0.3);
    }

    /* Grass stripes */
    .grass-pattern {
      position: absolute;
      inset: 0;
      background: repeating-linear-gradient(90deg, rgba(0,0,0,0.1) 0px, rgba(0,0,0,0.1) 2px, transparent 2px, transparent 40px);
      pointer-events: none;
    }

    /* Pitch markings SVG */
    .markings {
      position: absolute;
      inset: 0;
      pointer-events: none;
    }
    .markings svg {
      width: 100%;
      height: 100%;
    }

    /* ========= SHIRT CONTAINERS (jersey style) ========= */
    .shirt-slot {
      position: absolute;
      transform: translate(-50%, -50%);
      display: flex;
      flex-direction: column;
      align-items: center;
      cursor: pointer;
      z-index: 20;
      transition: all 0.2s ease;
      width: auto;
    }
    .shirt-slot:hover { transform: translate(-50%, -50%) scale(1.05); }
    .shirt-slot.active .jersey-card { border: 3px solid var(--lime); box-shadow: 0 0 0 4px rgba(200,244,0,0.3), 0 0 0 8px rgba(0,0,0,0.2); }
    .jersey-card {
      background: rgba(10, 20, 12, 0.85);
      backdrop-filter: blur(10px);
      border-radius: 24px;
      padding: 6px 12px;
      display: flex;
      flex-direction: column;
      align-items: center;
      border: 1px solid rgba(255,255,255,0.2);
      box-shadow: 0 8px 20px rgba(0,0,0,0.5);
      transition: all 0.2s;
      min-width: 85px;
    }
    .jersey-icon {
      font-size: 2.4rem;
      filter: drop-shadow(0 2px 4px rgba(0,0,0,0.6));
    }
    .shirt-label {
      font-family: 'Oswald';
      font-size: 0.7rem;
      font-weight: 600;
      text-align: center;
      color: rgba(255,255,255,0.9);
      letter-spacing: 1px;
      margin-top: 2px;
    }
    .shirt-sub {
      font-family: 'Rajdhani';
      font-size: 0.6rem;
      color: var(--lime);
      background: rgba(0,0,0,0.5);
      border-radius: 20px;
      padding: 2px 8px;
      margin-top: 4px;
      display: flex;
      align-items: center;
      gap: 5px;
    }
    .shirt-sub img {
      width: 16px;
      height: 12px;
      object-fit: cover;
      border-radius: 2px;
    }
    .accuracy-glow {
      transition: all 0.3s;
    }
    .gold-glow { text-shadow: 0 0 6px #ffd700; color: #ffd700; }
    .silver-glow { text-shadow: 0 0 5px #c0c0c0; color: #e0e0e0; }
    .bronze-glow { text-shadow: 0 0 4px #cd7f32; color: #f4a460; }

    /* ========= BILLBOARDS (ad boards) ========= */
    .ad-board {
      position: absolute;
      background: rgba(0,0,0,0.7);
      backdrop-filter: blur(10px);
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 20px;
      padding: 8px 20px;
      white-space: nowrap;
      overflow-x: auto;
      scrollbar-width: none;
      border: 1px solid rgba(200,244,0,0.3);
      z-index: 15;
      pointer-events: none;
    }
    .ad-board span {
      font-family: 'Bebas Neue';
      font-size: 1rem;
      letter-spacing: 2px;
      color: var(--lime);
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }
    .ad-board i { font-size: 1rem; }
    .ad-top { top: -35px; left: 20px; right: 20px; }
    .ad-bottom { bottom: -35px; left: 20px; right: 20px; }

    /* ========= SEAT CONTAINERS (left & right wings) ========= */
    .seat-stands {
      position: absolute;
      top: 0;
      bottom: 0;
      width: 300px;
      background: linear-gradient(135deg, #111a11, #0a130a);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(200,244,0,0.2);
      border-radius: 28px;
      padding: 20px 16px;
      overflow-y: auto;
      z-index: 25;
      box-shadow: 0 0 30px rgba(0,0,0,0.7);
      transition: all 0.3s;
    }
    .seat-left { left: -320px; }
    .seat-right { right: -320px; }
    /* on large screens we show them inside */
    @media (min-width: 1300px) {
      .seat-left { left: 20px; }
      .seat-right { right: 20px; }
      .pitch-container { padding: 0 340px; }
    }
    .seat-title {
      font-family: 'Bebas Neue';
      font-size: 1.6rem;
      color: var(--lime);
      border-bottom: 2px solid rgba(200,244,0,0.4);
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .match-row {
      display: flex;
      align-items: center;
      gap: 10px;
      background: rgba(0,0,0,0.5);
      border-radius: 40px;
      padding: 8px 12px;
      margin-bottom: 8px;
      font-size: 0.8rem;
    }
    .score-input {
      width: 45px;
      height: 32px;
      background: #000;
      border: 1px solid var(--lime);
      border-radius: 10px;
      text-align: center;
      color: var(--lime);
      font-family: 'Bebas Neue';
      font-size: 1rem;
    }
    .lock-btn-sm {
      background: rgba(255,255,255,0.1);
      border: none;
      padding: 6px 12px;
      border-radius: 30px;
      font-size: 0.7rem;
      cursor: pointer;
      margin-top: 6px;
    }
    .lock-active { background: var(--lime); color: #000; }

    /* ========= MODE SWITCHER ========= */
    .mode-bar {
      display: flex;
      justify-content: center;
      gap: 15px;
      padding: 15px 0 5px;
      flex-wrap: wrap;
      position: relative;
      z-index: 30;
    }
    .mode-btn {
      background: rgba(0,0,0,0.6);
      border: 2px solid var(--lime);
      border-radius: 60px;
      padding: 8px 24px;
      font-family: 'Bebas Neue';
      font-size: 1.2rem;
      color: var(--lime);
      cursor: pointer;
      transition: 0.2s;
    }
    .mode-btn.active, .mode-btn:hover {
      background: var(--lime);
      color: #000;
      transform: scale(1.02);
    }
    .street-bg { background: radial-gradient(circle at 30% 20%, #2c2c2c, #0a0a0a); }
    .pitch-bg { background: radial-gradient(ellipse at 50% 30%, #1a3a1a, #071007); }

    /* ========= TOAST & FOOTER ========= */
    .toast {
      position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
      background: var(--lime); color: #000; padding: 10px 24px;
      border-radius: 40px; font-family: 'Oswald'; z-index: 9999;
      animation: fadeInOut 2s ease forwards;
    }
    @keyframes fadeInOut { 0%{opacity:0;bottom:0} 10%{opacity:1;bottom:30px} 90%{opacity:1} 100%{opacity:0;bottom:0} }
    footer {
      text-align: center;
      padding: 20px;
      font-size: 0.7rem;
      color: rgba(255,255,255,0.4);
      margin-top: 30px;
    }
    :root {
      --lime: #c8f400;
    }
  </style>
</head>
<body>
<div class="stadium" id="stadiumBg">
  <div class="mode-bar">
    <div class="mode-btn" data-mode="1v1">⚡ 1v1 Street</div>
    <div class="mode-btn" data-mode="2v2">🔥 2v2 Street</div>
    <div class="mode-btn" data-mode="5v5">🏆 5v5</div>
    <div class="mode-btn active" data-mode="full11">🏟️ Full 11</div>
  </div>

  <div class="pitch-container">
    <div class="pitch" id="pitchField">
      <div class="grass-pattern"></div>
      <div class="markings">
        <svg viewBox="0 0 1200 750" preserveAspectRatio="none">
          <rect x="40" y="40" width="1120" height="670" rx="10" stroke="white" stroke-width="3" fill="none" opacity="0.5"/>
          <circle cx="600" cy="375" r="70" stroke="white" stroke-width="2.5" fill="none" opacity="0.5"/>
          <circle cx="600" cy="375" r="4" fill="white" opacity="0.8"/>
          <line x1="40" y1="375" x2="1160" y2="375" stroke="white" stroke-width="2.5" opacity="0.5"/>
          <rect x="200" y="40" width="800" height="120" rx="6" stroke="white" stroke-width="2" fill="none" opacity="0.4"/>
          <rect x="200" y="590" width="800" height="120" rx="6" stroke="white" stroke-width="2" fill="none" opacity="0.4"/>
          <circle cx="600" cy="100" r="5" fill="white" opacity="0.6"/>
          <circle cx="600" cy="650" r="5" fill="white" opacity="0.6"/>
          <path d="M 280 160 A 85 85 0 0 1 920 160" stroke="white" stroke-width="2" fill="none" opacity="0.4"/>
          <path d="M 280 590 A 85 85 0 0 0 920 590" stroke="white" stroke-width="2" fill="none" opacity="0.4"/>
        </svg>
      </div>
      <!-- shirt slots will be injected via js for dynamic positioning and modes -->
      <div id="shirtsContainer"></div>
    </div>

    <!-- advertisement boards -->
    <div class="ad-board ad-top"><span><i class="fa-solid fa-video"></i> HEINEKEN ⚽ LIVE MATCH</span><span><i class="fa-brands fa-uefa"></i> CHAMPIONS LEAGUE</span><span><i class="fa-solid fa-futbol"></i> ADIDAS ORIGINALS</span></div>
    <div class="ad-board ad-bottom"><span><i class="fa-solid fa-chart-line"></i> CRYPTO.COM STADIUM</span><span><i class="fa-solid fa-car"></i> HYUNDAI OFFICIAL</span><span><i class="fa-solid fa-headset"></i> EA SPORTS FC</span></div>
  </div>

  <!-- SEAT CONTAINERS (prediction panels) -->
  <div class="seat-stands seat-left" id="leftSeat">
    <div class="seat-title"><i class="fa-solid fa-house-chimney"></i> <span id="leftTitle">Home / Info</span></div>
    <div id="leftPanelContent"></div>
  </div>
  <div class="seat-stands seat-right" id="rightSeat">
    <div class="seat-title"><i class="fa-solid fa-trophy"></i> <span id="rightTitle">Away / Lock</span></div>
    <div id="rightPanelContent"></div>
  </div>
</div>

<footer><i class="fa-regular fa-copyright"></i> The Gaffer's Pick – predict, lock, dominate</footer>

<script>
  // ----------------------------- DATA MODELS ---------------------------------
  const leaguesData = {
    epl: { name:"Premier League", flag:"🏴󠁧󠁢󠁥󠁮󠁧󠁿", code:"eng", fixtures:[{h:"Arsenal",a:"Man City"},{h:"Liverpool",a:"Chelsea"},{h:"Tottenham",a:"Man Utd"},{h:"Newcastle",a:"Aston Villa"}], teams:["Arsenal","Man City","Liverpool","Chelsea","Man Utd"] },
    laliga: { name:"La Liga", flag:"🇪🇸", code:"esp", fixtures:[{h:"Real Madrid",a:"Barcelona"},{h:"Atletico",a:"Sevilla"},{h:"Villarreal",a:"Real Betis"},{h:"Athletic",a:"Sociedad"}], teams:["Real Madrid","Barcelona","Atletico","Sevilla","Villarreal"] },
    seriea: { name:"Serie A", flag:"🇮🇹", code:"ita", fixtures:[{h:"Inter",a:"Juventus"},{h:"AC Milan",a:"Napoli"},{h:"Roma",a:"Lazio"},{h:"Atalanta",a:"Fiorentina"}], teams:["Inter","Juventus","AC Milan","Napoli","Roma"] },
    bundes: { name:"Bundesliga", flag:"🇩🇪", code:"ger", fixtures:[{h:"Bayern",a:"Dortmund"},{h:"Leverkusen",a:"RB Leipzig"},{h:"Stuttgart",a:"Frankfurt"},{h:"Wolfsburg",a:"Gladbach"}], teams:["Bayern","Dortmund","Leverkusen","RB Leipzig","Stuttgart"] },
    ligue1: { name:"Ligue 1", flag:"🇫🇷", code:"fra", fixtures:[{h:"PSG",a:"Monaco"},{h:"Marseille",a:"Lyon"},{h:"Lille",a:"Rennes"},{h:"Nice",a:"Lens"}], teams:["PSG","Monaco","Marseille","Lyon","Lille"] },
    ucl: { name:"UCL Winner", type:"award", options:["Real Madrid","Man City","Bayern","PSG","Arsenal"], points:800 },
    europa: { name:"Europa League", type:"award", options:["Liverpool","Roma","Sevilla","Leverkusen","Atalanta"], points:600 },
    worldcup: { name:"World Cup 2026", type:"award", options:["Brazil","France","Argentina","England","Spain"], points:1000 },
    ballon: { name:"Ballon d'Or", type:"player", players:[{name:"Kylian Mbappé",pts:1200},{name:"Erling Haaland",pts:1050},{name:"Vinicius Jr",pts:980},{name:"Rodri",pts:900},{name:"Jude Bellingham",pts:880}] },
    goldenboy: { name:"Golden Boy/Kopa", type:"player", players:[{name:"Jude Bellingham",pts:700},{name:"Jamal Musiala",pts:680},{name:"Pedri",pts:650},{name:"Gavi",pts:620},{name:"Florian Wirtz",pts:600}] },
    champBonus: { name:"Champion Bonus", type:"champBonus", points:500 }
  };

  // state management
  let currentMode = "full11";
  let currentGW = 32;
  let activeLeagueId = "epl";
  let userPicks = { champion: {}, award: {}, player: {} };
  let locks = { champion: {}, award: {}, player: {} };
  let lockGW = {};
  let predictions = {}; // store score predictions per league per GW
  let actualResults = {};

  // init mock data
  function initData() {
    for (let lid of ["epl","laliga","seriea","bundes","ligue1"]) {
      predictions[lid] = {};
      actualResults[lid] = {};
      for (let gw=1; gw<=38; gw++) {
        predictions[lid][gw] = leaguesData[lid].fixtures.map(()=>({h:Math.floor(Math.random()*4), a:Math.floor(Math.random()*3)}));
        actualResults[lid][gw] = leaguesData[lid].fixtures.map(()=>({h:Math.floor(Math.random()*4), a:Math.floor(Math.random()*3)}));
      }
    }
    // load from storage
    const saved = localStorage.getItem("gaffer_picks");
    if(saved) { let s=JSON.parse(saved); userPicks=s.userPicks||{}; locks=s.locks||{}; lockGW=s.lockGW||{}; }
  }
  initData();

  function saveToStorage() { localStorage.setItem("gaffer_picks", JSON.stringify({userPicks,locks,lockGW})); }

  function toast(msg) { let t=document.createElement("div"); t.className="toast"; t.innerHTML=msg; document.body.appendChild(t); setTimeout(()=>t.remove(),2000); }

  // accuracy %
  function getAccuracy(leagueId, gw) {
    let total=0, corr=0;
    for(let g=1; g<gw; g++) {
      let preds = predictions[leagueId]?.[g], acts = actualResults[leagueId]?.[g];
      if(preds) preds.forEach((p,i)=>{ total++; if(p.h===acts[i].h && p.a===acts[i].a) corr++; });
    }
    return total?Math.round((corr/total)*100):0;
  }

  function getGlowClass(acc) { if(acc>=70) return "gold-glow"; if(acc>=40) return "silver-glow"; return "bronze-glow"; }

  // shirt positions (433)
  const shirtPositions = {
    epl: { left:"50%", top:"13%" }, // GK
    laliga: { left:"20%", top:"28%" }, seriea: { left:"40%", top:"28%" }, bundes: { left:"60%", top:"28%" }, ligue1: { left:"80%", top:"28%" },
    ucl: { left:"30%", top:"48%" }, europa: { left:"50%", top:"48%" }, worldcup: { left:"70%", top:"48%" },
    ballon: { left:"25%", top:"70%" }, goldenboy: { left:"75%", top:"70%" }, champBonus: { left:"50%", top:"87%" }
  };

  function renderShirts() {
    const container = document.getElementById("shirtsContainer");
    let activeIds = [];
    if(currentMode==="1v1") activeIds = ["epl","ucl","ballon"]; // 1v1: one league + ucl + ballon
    else if(currentMode==="2v2") activeIds = ["epl","ucl","ballon","goldenboy"];
    else if(currentMode==="5v5") activeIds = ["epl","laliga","seriea","bundes","ligue1","ucl","europa","ballon","goldenboy"];
    else activeIds = Object.keys(shirtPositions); // full 11

    let html="";
    for(let id of activeIds) {
      if(!shirtPositions[id]) continue;
      const pos = shirtPositions[id];
      const league = leaguesData[id];
      let acc = (id.includes("epl")||id.includes("liga")||id.includes("seriea")||id.includes("bundes")||id.includes("ligue1")) ? getAccuracy(id, currentGW) : 0;
      let subHtml = acc ? `<span class="shirt-sub ${getGlowClass(acc)}">${acc}%</span>` : `<span class="shirt-sub">⚡</span>`;
      if(id==="ballon") subHtml = `<span class="shirt-sub">${userPicks.player?.ballon?.name || "Pick"}</span>`;
      if(id==="goldenboy") subHtml = `<span class="shirt-sub">${userPicks.player?.goldenboy?.name || "Pick"}</span>`;
      if(id==="ucl" && userPicks.award?.ucl) subHtml = `<span class="shirt-sub">🏆 ${userPicks.award.ucl}</span>`;
      if(id==="worldcup" && userPicks.award?.worldcup) subHtml = `<span class="shirt-sub">🌍 ${userPicks.award.worldcup}</span>`;
      html += `<div class="shirt-slot" style="left:${pos.left}; top:${pos.top};" data-id="${id}">
        <div class="jersey-card">
          <div class="jersey-icon">${league.flag ? league.flag : (id==="ucl"?"🏆":id==="europa"?"🥈":id==="worldcup"?"🌍":id==="ballon"?"⭐":id==="goldenboy"?"🌟":"👕")}</div>
          <div class="shirt-label">${league.name}</div>
          ${subHtml}
        </div>
      </div>`;
    }
    container.innerHTML = html;
    document.querySelectorAll(".shirt-slot").forEach(el => {
      el.addEventListener("click", (e) => { e.stopPropagation(); activeLeagueId = el.dataset.id; updateSeatPanels(); highlightActiveShirt(); });
    });
    highlightActiveShirt();
  }

  function highlightActiveShirt() {
    document.querySelectorAll(".shirt-slot").forEach(el=>el.classList.remove("active"));
    const activeEl = document.querySelector(`.shirt-slot[data-id="${activeLeagueId}"]`);
    if(activeEl) activeEl.classList.add("active");
  }

  // seat panels update
  function updateSeatPanels() {
    const lid = activeLeagueId;
    const data = leaguesData[lid];
    if(!data) return;
    document.getElementById("leftTitle").innerHTML = `${data.flag || "🏠"} ${data.name} – Home`;
    document.getElementById("rightTitle").innerHTML = `${data.flag || "🔒"} Away / Lock`;

    if(data.fixtures) { // league
      const isPast = currentGW < 32;
      const fixtures = data.fixtures;
      const preds = predictions[lid][currentGW];
      const actual = actualResults[lid][currentGW];
      let leftHtml="", rightHtml="";
      fixtures.forEach((m,idx)=>{
        leftHtml += `<div class="match-row"><span style="flex:1">${m.h}</span><input class="score-input" type="number" value="${isPast?actual[idx].h:preds[idx].h}" ${isPast?"disabled":""} onchange="updateScore('${lid}',${idx},'h',this.value)"></div>`;
        rightHtml += `<div class="match-row"><input class="score-input" type="number" value="${isPast?actual[idx].a:preds[idx].a}" ${isPast?"disabled":""} onchange="updateScore('${lid}',${idx},'a',this.value)"><span style="flex:1;text-align:right">${m.a}</span></div>`;
      });
      let champHtml = `<div style="margin-top:12px"><select class="lock-btn-sm" ${locks.champion[lid]?"disabled":""} onchange="userPicks.champion['${lid}']=this.value; saveToStorage()"><option value="">🏆 Pick Champion</option>${data.teams.map(t=>`<option ${userPicks.champion[lid]===t?"selected":""}>${t}</option>`).join("")}</select><button class="lock-btn-sm ${locks.champion[lid]?"lock-active":""}" onclick="toggleLock('champion','${lid}')">🔒 ${locks.champion[lid]?"Locked":"Lock"}</button></div>`;
      leftHtml += champHtml;
      if(!isPast) leftHtml += `<button class="lock-btn-sm" onclick="saveGWLeague('${lid}')">💾 Save GW</button>`;
      document.getElementById("leftPanelContent").innerHTML = leftHtml;
      document.getElementById("rightPanelContent").innerHTML = rightHtml;
    } 
    else if(data.type === "award") {
      let pick = userPicks.award?.[lid] || "";
      let locked = locks.award?.[lid];
      let html = `<select class="lock-btn-sm" style="width:100%;margin-bottom:10px" ${locked?"disabled":""} onchange="userPicks.award['${lid}']=this.value; saveToStorage()"><option value="">Select Winner</option>${data.options.map(o=>`<option ${pick===o?"selected":""}>${o}</option>`).join("")}</select><button class="lock-btn-sm ${locked?"lock-active":""}" onclick="toggleLock('award','${lid}')">🔒 ${locked?"Locked":"Lock Prediction"}</button><div style="margin-top:12px;font-size:0.7rem">🏆 ${data.points} pts if correct</div>`;
      document.getElementById("leftPanelContent").innerHTML = html;
      document.getElementById("rightPanelContent").innerHTML = `<div style="text-align:center;padding:20px"><i class="fa-solid fa-trophy" style="font-size:2rem;color:var(--lime)"></i><br>${locked?"Locked +"+data.points:"Unlocked"}</div>`;
    }
    else if(data.type === "player") {
      let playerKey = lid==="ballon"?"ballon":"goldenboy";
      let currentPick = userPicks.player?.[playerKey]?.name || "";
      let locked = locks.player?.[playerKey];
      let optionsHtml = `<select class="lock-btn-sm" style="width:100%" ${locked?"disabled":""} onchange="setPlayerPick('${playerKey}',this.value)"><option value="">— Select Player —</option>${data.players.map(p=>`<option ${currentPick===p.name?"selected":""}>${p.name} (${p.pts} pts)</option>`).join("")}</select>`;
      let info = `<div style="margin-top:12px;background:rgba(0,0,0,0.4);padding:10px;border-radius:16px"><i class="fa-solid fa-chart-simple"></i> Rank: ${data.players.findIndex(p=>p.name===currentPick)+1 || '-'}<br>Points: ${data.players.find(p=>p.name===currentPick)?.pts||0}</div>`;
      let lockBtn = `<button class="lock-btn-sm ${locked?"lock-active":""}" onclick="toggleLock('player','${playerKey}')">🔒 ${locked?"Locked":"Lock Player"}</button>`;
      document.getElementById("leftPanelContent").innerHTML = optionsHtml + info + lockBtn;
      document.getElementById("rightPanelContent").innerHTML = `<div style="padding:10px;text-align:center"><i class="fa-solid fa-star"></i> Yellow card deduction if unlocked late: -50 per GW</div>`;
    }
    else if(lid==="champBonus") {
      document.getElementById("leftPanelContent").innerHTML = `<div>🏆 Each correct champion gives +500 pts. Lock before GW30 avoids deduction.</div><button class="lock-btn-sm" onclick="toast('Champion bonus automatically applied')">Track</button>`;
      document.getElementById("rightPanelContent").innerHTML = `<div><i class="fa-solid fa-chart-line"></i> Current total champions locked: ${Object.values(locks.champion).filter(Boolean).length}</div>`;
    }
  }

  window.updateScore = (lid, idx, side, val) => { if(currentGW>=32) { predictions[lid][currentGW][idx][side]=Math.min(9,Math.max(0,parseInt(val)||0)); toast("Prediction updated"); updateSeatPanels(); } else toast("Past GW locked"); };
  window.saveGWLeague = (lid) => { toast(`GW${currentGW} saved for ${leaguesData[lid].name}`); saveToStorage(); };
  window.toggleLock = (type, id) => {
    let key = type==="champion"?id : (type==="award"?id : id);
    if(!locks[type]) locks[type]={};
    if(!locks[type][key]) { 
      if((type==="champion" && !userPicks.champion?.[id]) || (type==="award" && !userPicks.award?.[id]) || (type==="player" && !userPicks.player?.[key]?.name)) { toast("Make a selection first"); return; }
      locks[type][key]=true; lockGW[`${type}_${key}`]=currentGW; toast(`🔒 Locked! +${type==="award"?leaguesData[id]?.points:(type==="player"?leaguesData[id==="ballon"?"ballon":"goldenboy"]?.players.find(p=>p.name===userPicks.player[key]?.name)?.pts:500)} pts`);
    } else { locks[type][key]=false; toast("🔓 Unlocked – penalty may apply"); }
    saveToStorage(); updateSeatPanels();
  };
  window.setPlayerPick = (key, name) => { if(!userPicks.player) userPicks.player={}; userPicks.player[key] = {name}; saveToStorage(); updateSeatPanels(); };

  function changeMode(mode) {
    currentMode = mode;
    const bgDiv = document.getElementById("stadiumBg");
    if(mode==="1v1" || mode==="2v2") bgDiv.className = "stadium street-bg";
    else bgDiv.className = "stadium pitch-bg";
    document.querySelectorAll(".mode-btn").forEach(btn=>btn.classList.remove("active"));
    document.querySelector(`.mode-btn[data-mode="${mode}"]`).classList.add("active");
    renderShirts();
    activeLeagueId = (mode==="1v1"?"epl":mode==="2v2"?"epl":mode==="5v5"?"epl":"epl");
    updateSeatPanels();
    highlightActiveShirt();
  }

  // navigation events
  document.querySelectorAll(".mode-btn").forEach(btn => btn.addEventListener("click", (e) => changeMode(btn.dataset.mode)));
  // gw controls (whistle)
  const gwDisplay = document.createElement("div"); // we add floating whistle
  const whistleDiv = document.createElement("div");
  whistleDiv.innerHTML = `<i class="fa-solid fa-whistle" style="position:fixed;bottom:20px;right:20px;background:#111;border:2px solid gold;border-radius:50%;width:48px;height:48px;display:flex;align-items:center;justify-content:center;cursor:pointer;z-index:1000;font-size:1.5rem;color:gold;"></i>`;
  document.body.appendChild(whistleDiv);
  whistleDiv.onclick = () => {
    if(currentGW<38) { currentGW++; toast(`Referee whistle: GW ${currentGW}`); renderShirts(); updateSeatPanels(); }
    else toast("Final GW reached");
  };
  // additional prev gw
  const prevDiv = document.createElement("div");
  prevDiv.innerHTML = `<i class="fa-solid fa-rectangle-xmark" style="position:fixed;bottom:20px;left:20px;background:#111;border:2px solid gold;border-radius:50%;width:48px;height:48px;display:flex;align-items:center;justify-content:center;cursor:pointer;z-index:1000;font-size:1.5rem;color:gold;"></i>`;
  document.body.appendChild(prevDiv);
  prevDiv.onclick = () => { if(currentGW>1) { currentGW--; toast(`Back to GW ${currentGW}`); renderShirts(); updateSeatPanels(); } else toast("GW1"); };

  // init
  renderShirts();
  updateSeatPanels();
  changeMode("full11");
</script>
</body>
</html>
