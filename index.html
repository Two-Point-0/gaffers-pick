<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Gaffer's Pick · Stadium Predictor</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Russo+One&family=Barlow+Condensed:wght@300;400;600;700;800;900&family=Barlow:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --lime:#c8f400;--gold:#ffd700;--red:#e63946;--blue:#0066cc;
  --pitch-a:#1d7a30;--pitch-b:#198228;--pitch-c:#165e22;
  --bg:#060b10;--panel:#0a1520;--panel2:#0d1c2e;
  --glass:rgba(10,20,35,.92);--glassl:rgba(10,20,35,.78);
  --border:rgba(255,255,255,.07);--borderl:rgba(200,244,0,.2);
  --text:#e8edf2;--sub:rgba(232,237,242,.48);
  --hd:'Bebas Neue',cursive;--ru:'Russo One',sans-serif;
  --cd:'Barlow Condensed',sans-serif;--bd:'Barlow',sans-serif;
  --seat:#0d2a14;--seat-on:#c8f400;--seat-red:#cc2233;--seat-gold:#ffd700;
  --nav-h:72px;--header-h:50px;
}
html,body{width:100%;height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:var(--bd)}
#root{width:100%;height:100%;display:flex;flex-direction:column}
::-webkit-scrollbar{width:3px;height:3px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:rgba(200,244,0,.2);border-radius:3px}

@keyframes roofSlideLeft{from{transform:translateX(0)}to{transform:translateX(-100%)}}
@keyframes roofSlideRight{from{transform:translateX(0)}to{transform:translateX(100%)}}
@keyframes roofCloseLeft{from{transform:translateX(-100%)}to{transform:translateX(0)}}
@keyframes roofCloseRight{from{transform:translateX(100%)}to{transform:translateX(0)}}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes adScrollH{from{transform:translateX(0)}to{transform:translateX(-50%)}}
@keyframes adScrollHR{from{transform:translateX(-50%)}to{transform:translateX(0)}}
@keyframes adScrollV{from{transform:translateY(0)}to{transform:translateY(-50%)}}
@keyframes adScrollVR{from{transform:translateY(-50%)}to{transform:translateY(0)}}
@keyframes flagFly{0%{opacity:0;transform:translate(0,0)scale(.3)}40%{opacity:1;transform:translate(-60px,-50px)scale(1.2)}100%{opacity:0;transform:translate(-260px,15px)scale(.5)}}
@keyframes scoreGlow{0%,100%{box-shadow:none}50%{box-shadow:0 0 14px rgba(200,244,0,.35)}}
@keyframes pitchLoad{from{opacity:0}to{opacity:1}}
@keyframes toastIn{from{opacity:0;transform:translate(-50%,12px)}to{opacity:1;transform:translate(-50%,0)}}
@keyframes toastOut{to{opacity:0;transform:translate(-50%,-8px)}}
@keyframes headerPulse{0%,100%{text-shadow:0 0 20px rgba(200,244,0,.1)}50%{text-shadow:0 0 40px rgba(200,244,0,.4),0 0 80px rgba(200,244,0,.15)}}
@keyframes seatWave{0%,100%{opacity:1}50%{opacity:.6}}
@keyframes ballSpin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.12)}}

/* APP LAYOUT: header / stadium / nav */
.app{
  display:grid;
  grid-template-rows: var(--header-h) 1fr var(--nav-h);
  height:100vh;
  overflow:hidden;
  background:var(--bg);
}

/* HEADER */
.header{
  background:linear-gradient(180deg,#040810 0%,#07111e 100%);
  border-bottom:1px solid rgba(200,244,0,.1);
  display:flex;align-items:center;justify-content:center;
  position:relative;z-index:100;padding:0 12px;
  gap:8px;
}
.brand{
  font-family:var(--hd);font-size:clamp(1.4rem,3.5vw,2rem);
  letter-spacing:5px;
  background:linear-gradient(90deg,rgba(255,255,255,.7) 0%,var(--lime) 40%,rgba(255,255,255,.9) 70%,var(--lime) 100%);
  background-size:200%;
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  animation:headerPulse 3s ease infinite;
}
.pts-chip{
  display:flex;align-items:center;gap:4px;
  padding:3px 10px;border-radius:40px;
  background:rgba(255,215,0,.08);border:1px solid rgba(255,215,0,.3);
  flex-shrink:0;
}
.pts-val{font-family:var(--hd);font-size:.95rem;color:var(--gold);line-height:1}
.pts-lbl{font-family:var(--cd);font-size:.48rem;color:rgba(255,215,0,.6);letter-spacing:1px}

/* STADIUM MAIN — 5 columns + roof overlay */
.stadium-main{
  position:relative;overflow:hidden;
  display:grid;
  grid-template-columns: clamp(22px,4vw,52px) clamp(28px,5vw,68px) 1fr clamp(28px,5vw,68px) clamp(22px,4vw,52px);
  grid-template-rows: 1fr;
}

/* SEAT COLUMNS — full height edges */
.seat-col{
  display:flex;flex-direction:column;
  background:linear-gradient(180deg,#030810,#060e18);
  overflow:hidden;position:relative;z-index:2;
}
.seat-col.left{border-right:1px solid rgba(200,244,0,.06);}
.seat-col.right{border-left:1px solid rgba(200,244,0,.06);}
.seat-col-inner{flex:1;display:flex;flex-direction:column;justify-content:stretch;gap:1px;padding:2px 1px;overflow:hidden;}
.seat-row-v{display:flex;flex-direction:column;gap:1px;flex:1;align-items:center;}
.vseat{width:clamp(4px,.7vw,8px);height:clamp(3px,.5vw,6px);border-radius:1px;background:var(--seat);flex-shrink:0;transition:background .4s;}
.vseat.on{background:var(--seat-on)}

/* Stand columns */
.stand-col{
  display:flex;flex-direction:column;
  background:linear-gradient(90deg,#040911,#070f1c);
  overflow:hidden;
}
.stand-col.right-stand{background:linear-gradient(270deg,#040911,#070f1c);}
.stand-ad-v{flex-shrink:0;background:#000;overflow:hidden;height:100%;width:clamp(18px,2.8vw,32px);position:relative;}
.stand-seats-main{flex:1;display:flex;flex-direction:column;justify-content:center;padding:2px 0;gap:1px;overflow:hidden;}
.stand-row{display:flex;gap:1px;justify-content:center;}
.sseat{width:clamp(4px,.75vw,7px);height:clamp(3px,.55vw,5.5px);border-radius:1px;background:var(--seat);flex-shrink:0;transition:background .3s;}
.sseat.on{background:var(--seat-on)}

/* AD boards vertical inside stands */
.adv-inner{display:flex;flex-direction:column;height:200%;animation:adScrollV 16s linear infinite;}
.adv-inner.rev{animation:adScrollVR 16s linear infinite;}
.adv-block{display:flex;align-items:center;justify-content:center;flex-shrink:0;writing-mode:vertical-rl;text-orientation:mixed;padding:6px 2px;}
.adv-txt{font-family:var(--cd);font-size:clamp(.32rem,.5vw,.45rem);font-weight:900;letter-spacing:2px;text-transform:uppercase;white-space:nowrap;}

/* PITCH / CENTER COLUMN */
.pitch-col{
  display:flex;flex-direction:column;position:relative;overflow:hidden;
}
.adboard-h{height:clamp(18px,2.2vw,28px);background:#000;overflow:hidden;flex-shrink:0;}
.adboard-h-inner{display:flex;height:100%;width:200%;animation:adScrollH 20s linear infinite;}
.adboard-h.rev .adboard-h-inner{animation:adScrollHR 22s linear infinite;}
.ad-block-h{display:flex;align-items:center;justify-content:center;height:100%;padding:0 clamp(8px,1.5vw,18px);flex-shrink:0;gap:5px;}
.ad-block-h-txt{font-family:var(--cd);font-size:clamp(.42rem,.75vw,.58rem);font-weight:900;letter-spacing:2px;text-transform:uppercase;white-space:nowrap;}
.seats-row-wrap{background:#07111e;border-bottom:2px solid rgba(200,244,0,.07);padding:2px 0;flex-shrink:0;}
.seats-row-wrap.bot{border-bottom:none;border-top:2px solid rgba(200,244,0,.07);}
.pitch-field{flex:1;position:relative;overflow:hidden;background:repeating-linear-gradient(180deg,var(--pitch-a) 0,var(--pitch-a) 42px,var(--pitch-b) 42px,var(--pitch-b) 84px);animation:pitchLoad .5s ease both;}
.pitch-field::after{content:'';position:absolute;inset:0;z-index:2;pointer-events:none;background:radial-gradient(ellipse 85% 75% at 50% 50%,transparent 25%,rgba(0,0,0,.5) 100%);}
.pitch-svg{position:absolute;inset:0;width:100%;height:100%;opacity:.35;z-index:1;pointer-events:none;}
.formation{position:relative;z-index:10;display:flex;flex-direction:column;align-items:center;padding:clamp(4px,.8vw,10px);gap:clamp(2px,.6vw,8px);height:100%;justify-content:space-around;}
.frow{display:flex;justify-content:center;gap:clamp(4px,1vw,12px);width:100%;}

/* ROOF — slides open/close, sits over pitch only (not edge seat cols) */
.roof{
  position:absolute;inset:0;z-index:50;
  display:flex;pointer-events:none;
}
.roof-left,.roof-right{
  width:50%;height:100%;will-change:transform;display:flex;flex-direction:column;overflow:hidden;pointer-events:all;
}
.roof-left{background:linear-gradient(135deg,#050b14,#0b1929);border-right:2px solid rgba(200,244,0,.12);}
.roof-right{background:linear-gradient(225deg,#050b14,#0b1929);border-left:2px solid rgba(200,244,0,.12);}
.roof.opening .roof-left{animation:roofSlideLeft .6s cubic-bezier(.77,0,.18,1) forwards}
.roof.opening .roof-right{animation:roofSlideRight .6s cubic-bezier(.77,0,.18,1) forwards}
.roof.closing .roof-left{animation:roofCloseLeft .5s cubic-bezier(.77,0,.18,1) forwards}
.roof.closing .roof-right{animation:roofCloseRight .5s cubic-bezier(.77,0,.18,1) forwards}
.roof.closed .roof-left,.roof.closed .roof-right{transform:translateX(0)}
.roof.opened .roof-left{transform:translateX(-100%)}
.roof.opened .roof-right{transform:translateX(100%)}

/* Roof seat strips (inside roof panels, visible when roof opens) */
.roof-seat-strip{flex-shrink:0;padding:2px 0;background:#040c16;}
.roof-seat-strip.top{border-bottom:1px solid rgba(200,244,0,.07);}
.roof-seat-strip.bot{border-top:1px solid rgba(200,244,0,.07);}

/* Roof content panel */
.roof-content{flex:1;overflow:hidden;display:flex;flex-direction:column;}
.roof-panel-inner{flex:1;overflow-y:auto;padding:8px 10px;}

/* Roof AD strip — horizontal, runs behind "goals" (top/bottom of pitch area) */
.roof-ad-strip{
  position:absolute;left:0;right:0;height:clamp(18px,2.4vw,26px);z-index:52;background:#000;overflow:hidden;pointer-events:none;
}
.roof-ad-strip.top{top:0;}
.roof-ad-strip.bot{bottom:0;}
.roof-ad-strip-inner{display:flex;height:100%;width:200%;animation:adScrollH 14s linear infinite;}
.roof-ad-strip.rev .roof-ad-strip-inner{animation:adScrollHR 14s linear infinite;}
.roof-ad-seg{display:flex;align-items:center;justify-content:center;height:100%;padding:0 clamp(10px,2vw,22px);flex-shrink:0;}
.roof-ad-seg-txt{font-family:var(--cd);font-size:clamp(.4rem,.65vw,.54rem);font-weight:900;letter-spacing:2.5px;text-transform:uppercase;white-space:nowrap;}

/* Roof open button */
.roof-toggle{
  position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
  z-index:60;display:flex;align-items:center;gap:5px;
  padding:5px 14px;border-radius:40px;
  background:rgba(0,0,0,.75);border:1.5px solid rgba(200,244,0,.4);
  color:var(--lime);font-family:var(--cd);font-size:.62rem;font-weight:700;letter-spacing:1.5px;
  cursor:pointer;backdrop-filter:blur(8px);pointer-events:all;
  transition:all .18s;
}
.roof-toggle:hover{background:rgba(200,244,0,.12);border-color:var(--lime);}

/* NAV — 5 buttons, middle is sport ball */
.nav{
  background:linear-gradient(0deg,#030810,#070f1c);
  border-top:1px solid rgba(200,244,0,.1);
  display:grid;
  grid-template-columns: 1fr 1fr 1fr 1fr 1fr;
  align-items:stretch;z-index:100;
  padding:0;overflow:hidden;
}
.nav-btn{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:2px;cursor:pointer;border:none;background:transparent;
  border-top:2px solid transparent;padding:4px 6px;
  transition:all .18s;position:relative;color:var(--text);
  overflow:hidden;
}
.nav-btn:hover,.nav-btn.active{border-top-color:var(--lime);}
.nav-btn .ni{font-size:clamp(.85rem,1.8vw,1.05rem);filter:grayscale(1) opacity(.4);transition:filter .18s;}
.nav-btn:hover .ni,.nav-btn.active .ni{filter:grayscale(0) opacity(1);}
.nav-btn .nl{font-family:var(--cd);font-size:clamp(.38rem,.65vw,.52rem);font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--sub);text-align:center;}
.nav-btn.active .nl{color:var(--lime);}
.nav-btn .nbdge{position:absolute;top:5px;right:calc(50% - 14px);background:var(--red);color:#fff;font-family:var(--cd);font-size:.4rem;font-weight:700;padding:1px 4px;border-radius:10px;}
.nav-sep-v{width:1px;background:rgba(255,255,255,.06);margin:6px 0;}

/* SPORT BALL BUTTON — center nav */
.sport-ball-btn{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:2px;cursor:pointer;border:none;
  background:radial-gradient(circle at 40% 35%,rgba(200,244,0,.18),rgba(0,0,0,.5));
  border-top:2px solid var(--lime);
  padding:4px 6px;transition:all .2s;position:relative;color:var(--text);
  border-left:1px solid rgba(200,244,0,.1);border-right:1px solid rgba(200,244,0,.1);
}
.sport-ball-btn:hover{background:radial-gradient(circle at 40% 35%,rgba(200,244,0,.28),rgba(0,0,0,.4));}
.ball-icon{font-size:clamp(1.2rem,2.4vw,1.6rem);transition:transform .3s;display:block;line-height:1;}
.sport-ball-btn:hover .ball-icon{animation:ballSpin .6s linear;}
.ball-lbl{font-family:var(--cd);font-size:clamp(.38rem,.65vw,.52rem);font-weight:900;letter-spacing:1.5px;text-transform:uppercase;color:var(--lime);}

/* SCROLL BUTTONS */
.scroll-nav-btn{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:1px;cursor:pointer;border:none;background:transparent;
  border-top:2px solid transparent;padding:3px 4px;
  transition:all .18s;color:var(--text);overflow:hidden;
  position:relative;
}
.scroll-nav-btn.active{border-top-color:var(--lime);}
.scroll-btn-icon{font-size:clamp(.7rem,1.5vw,.9rem);filter:grayscale(1) opacity(.5);transition:filter .18s;display:block;line-height:1.2;}
.scroll-nav-btn:hover .scroll-btn-icon,.scroll-nav-btn.active .scroll-btn-icon{filter:grayscale(0) opacity(1);}
.scroll-btn-lbl{font-family:var(--cd);font-size:clamp(.3rem,.55vw,.44rem);font-weight:700;letter-spacing:.8px;text-transform:uppercase;color:var(--sub);text-align:center;max-width:52px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.scroll-nav-btn.active .scroll-btn-lbl,.scroll-nav-btn:hover .scroll-btn-lbl{color:var(--lime);}
.scroll-btn-sub{font-family:var(--cd);font-size:clamp(.26rem,.45vw,.37rem);color:rgba(200,244,0,.45);letter-spacing:.5px;text-align:center;max-width:52px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.nav-col{display:flex;flex-direction:column;overflow:hidden;border-top:2px solid transparent;}
.nav-col.active{border-top-color:rgba(200,244,0,.2);}

/* Scroll popup menu */
.scroll-popup{
  position:fixed;bottom:calc(var(--nav-h) + 4px);
  background:linear-gradient(145deg,#0d1c2e,#060f1a);
  border:1px solid rgba(200,244,0,.25);border-radius:10px;
  z-index:2000;overflow:hidden;min-width:130px;
  animation:fadeIn .15s ease;
  box-shadow:0 -4px 24px rgba(0,0,0,.6);
}
.scroll-popup-item{
  padding:7px 14px;font-family:var(--cd);font-size:.68rem;font-weight:700;
  letter-spacing:.8px;cursor:pointer;display:flex;align-items:center;gap:7px;
  transition:background .15s;border-bottom:1px solid rgba(255,255,255,.04);
  color:var(--sub);
}
.scroll-popup-item:last-child{border-bottom:none;}
.scroll-popup-item:hover{background:rgba(200,244,0,.08);color:var(--lime);}
.scroll-popup-item.sel{background:rgba(200,244,0,.12);color:var(--lime);border-left:2px solid var(--lime);}
.scroll-popup-item .spi-icon{font-size:.85rem;flex-shrink:0;width:18px;text-align:center;}

/* PANEL CONTENT */
.panel-ttl{font-family:var(--cd);font-size:.66rem;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--lime);margin-bottom:6px;display:flex;align-items:center;gap:5px;border-bottom:1px solid rgba(200,244,0,.12);padding-bottom:5px;}
.spill{background:rgba(0,0,0,.45);border:1px solid var(--border);border-radius:7px;padding:5px 8px;margin-bottom:3px;display:flex;justify-content:space-between;align-items:center;}
.sk{font-family:var(--cd);font-size:.58rem;letter-spacing:.8px;color:var(--sub)}
.sv{font-family:var(--hd);font-size:1rem;color:var(--lime)}
.metric-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:3px;margin-bottom:5px}
.metric-card{background:rgba(0,0,0,.45);border:1px solid var(--border);border-radius:7px;padding:5px 4px;text-align:center;}
.mc-val{font-family:var(--hd);font-size:.95rem;color:var(--lime)}
.mc-lbl{font-family:var(--cd);font-size:.48rem;color:var(--sub);letter-spacing:.8px;text-transform:uppercase}
.pbar-wrap{margin-bottom:5px}
.pbar-lbl{font-family:var(--cd);font-size:.55rem;letter-spacing:1.2px;color:rgba(200,244,0,.55);display:flex;justify-content:space-between;margin-bottom:2px}
.pbar-bg{height:3px;background:rgba(255,255,255,.07);border-radius:3px;overflow:hidden}
.pbar-fill{height:100%;border-radius:3px;background:linear-gradient(90deg,var(--lime),#90ff00);transition:width .6s ease}
.yc-wrap{display:flex;gap:3px;align-items:center}
.ycd{width:11px;height:15px;border-radius:2px;background:rgba(255,215,0,.1);border:1px solid rgba(255,215,0,.2);transition:all .3s}
.ycd.on{background:var(--gold);box-shadow:0 0 4px var(--gold)}
.lb-row{display:flex;align-items:center;gap:5px;padding:4px 6px;border-radius:6px;margin-bottom:2px;cursor:pointer;background:rgba(0,0,0,.3);border:1px solid transparent;}
.lb-row.me{border-color:rgba(200,244,0,.38);background:rgba(200,244,0,.07)}
.lb-pos{font-family:var(--hd);font-size:.85rem;color:var(--sub);min-width:16px}
.lb-pos.t{color:var(--gold)}
.lb-nm{font-family:var(--cd);font-size:.68rem;font-weight:700;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.lb-pts{font-family:var(--hd);font-size:.88rem;color:var(--lime)}
.lb-chg{font-family:var(--cd);font-size:.5rem;min-width:20px;text-align:right}
.lb-chg.up{color:#2ecc71}.lb-chg.dn{color:var(--red)}
.sdiv{height:1px;background:linear-gradient(90deg,transparent,rgba(200,244,0,.12),transparent);margin:6px 0}
.mcard{background:rgba(0,0,0,.4);border:1px solid var(--border);border-radius:8px;padding:7px 8px;margin-bottom:4px;animation:fadeIn .2s ease both;}
.mteams{display:flex;align-items:center;justify-content:space-between;gap:3px;margin-bottom:5px}
.tnm{font-family:var(--cd);font-size:.67rem;font-weight:600;flex:1;display:flex;align-items:center;gap:3px;}
.tnm.aw{justify-content:flex-end}
.tlogo{width:15px;height:15px;object-fit:contain;flex-shrink:0;border-radius:2px;background:#1a1a1a;}
.sinps{display:flex;align-items:center;gap:2px;flex-shrink:0}
.sinp{width:26px;height:24px;border-radius:5px;background:rgba(0,0,0,.6);border:1.5px solid rgba(255,255,255,.15);color:var(--lime);text-align:center;font-family:var(--hd);font-size:.88rem;outline:none;}
.sinp:focus{border-color:var(--lime)}
.sinp:disabled{color:#1a1a1a;border-color:#0d0d0d}
.ssep{font-family:var(--hd);font-size:.7rem;color:var(--sub);padding:0 1px}
.mfoot{display:flex;justify-content:space-between;align-items:center;gap:4px}
.ptsbadge{font-family:var(--cd);font-size:.55rem;font-weight:700;padding:2px 7px;border-radius:18px;}
.ptsbadge.def{background:rgba(200,244,0,.08);color:var(--lime);border:1px solid rgba(200,244,0,.2)}
.ptsbadge.gld{background:rgba(255,215,0,.1);color:var(--gold);border:1px solid rgba(255,215,0,.28)}
.ptsbadge.rd{background:rgba(230,57,70,.1);color:var(--red);border:1px solid rgba(230,57,70,.25)}
.lbtn{font-family:var(--cd);font-size:.55rem;padding:2px 8px;border-radius:18px;font-weight:700;cursor:pointer;border:1px solid;}
.lbtn.off{background:rgba(255,255,255,.04);border-color:rgba(255,255,255,.1);color:var(--sub)}
.lbtn.off:hover{border-color:var(--lime);color:var(--lime)}
.lbtn.on{background:rgba(200,244,0,.12);border-color:rgba(200,244,0,.42);color:var(--lime)}
.result-lbl{font-family:var(--cd);font-size:.5rem;text-align:center;color:rgba(255,215,0,.6);margin-bottom:3px;}
.awd-row{display:flex;align-items:center;justify-content:space-between;padding:5px 7px;border-radius:7px;margin-bottom:3px;cursor:pointer;background:rgba(0,0,0,.3);border:1px solid transparent;}
.awd-row.picked{background:rgba(200,244,0,.09);border-color:rgba(200,244,0,.35)}

const SeatRowH = ({cols=50,litRate=.42,wave=false}) => {
  const [lit,setLit]=useState(()=>Array(cols).fill(0).map(()=>Math.random()<litRate));
  useEffect(()=>{ if(!wave)return; const t=setInterval(()=>{ const i=Math.floor(Math.random()*cols); setLit(l=>{const n=[...l];n[i]=!n[i];return n;}); },280); return()=>clearInterval(t); },[cols,wave]);
  return <div style={{display:'flex',gap:'1px',justifyContent:'center'}}>{lit.map((on,i)=><div key={i} className={`rseat${on?' on':''}`} style={{width:'clamp(5px,.85vw,8px)',height:'clamp(3.5px,.65vw,6px)',borderRadius:'1px 1px 0 0',background:on?'var(--seat-on)':'var(--seat)',flexShrink:0}}/>)}</div>;
};

// Full-height vertical seat column (entire left/right edges)

const PSlot = ({comp:c,active,onClick,pct}) => {
  const sw=window.innerWidth;
  const sz=sw<400?36:sw<700?50:sw<1000?62:76;
  return (
    <div className={`pslot${active?' act':''}`} onClick={onClick}>
      <div style={{display:'flex',flexDirection:'column',alignItems:'center',gap:0}}>
        <JerseySVG c={c.jc} sc={c.sc} nc={c.nc} num={c.num} em={c.em} w={sz}/>
        <ShortsSVG c={adj(c.jc,-.1)} w={Math.round(sz*.62)}/>
      </div>
      <div className="sbar"><span className="spct">{pct}</span><FlagSVG nation={c.nation} w={Math.round(sz*.2)} h={Math.round(sz*.13)}/></div>
      <div className="slbl">{c.short}</div>
      <div className="stag">{c.pos} #{c.num}</div>
    </div>
  );
};

const Formation = ({ac,onSel,preds,locked,gw}) => {
  const getAcc=id=>{ const c=COMPS[id]; if(!c||!c.teams.length)return'—'; let earn=0,possible=0; c.teams.forEach((_,i)=>{ const k=`${id}_gw${gw}_${i}`,p=preds[k],a=c.teams[i].actual; if(p&&a&&p.h!==''&&p.a!==''){ possible+=20; earn+=calcPts(+p.h,+p.a,a.h,a.a); } }); return possible>0?`${Math.round((earn/possible)*100)}%`:'—'; };
  const rows=[
    [{id:'epl'}],
    [{id:'liga'},{id:'bundes'},{id:'serie'},{id:'ligue'}],
    [{id:'ucl'},{id:'uel'},{id:'wc'}],
    [{id:'champs'},{id:'awards'},{id:'stats'}],
  ];
  return (
    <div className="formation">
      <PitchSVG/>
      {rows.map((row,ri)=>(
        <div key={ri} className="frow">
          {row.map(({id})=>(
            <PSlot key={id} comp={COMPS[id]} active={ac===id} pct={getAcc(id)} onClick={()=>onSel(id)}/>
          ))}
        </div>
      ))}
    </div>
  );
};

// ── MATCH CARD ─────────────────────────────────────────────────────────────────
const MCard = ({match:m,idx,cid,preds,locked,onPred,onLock,gw}) => {
  const k=`${cid}_gw${gw}_${idx}`;
  const p=preds[k]||{h:'',a:''};
  const isl=locked[k];
  const actual=m.actual;
  const pts=actual&&p.h!==''&&p.a!==''?calcPts(+p.h,+p.a,actual.h,actual.a):null;
  return (
    <div className="mcard">
      <div className="mteams">
        <div className="tnm"><span>{m.h}</span></div>
        <div className="sinps">
          <input className="sinp" type="number" min="0" max="20" value={p.h} disabled={isl} onChange={e=>onPred(k,{...p,h:e.target.value})} placeholder="–"/>
          <span className="ssep">:</span>
          <input className="sinp" type="number" min="0" max="20" value={p.a} disabled={isl} onChange={e=>onPred(k,{...p,a:e.target.value})} placeholder="–"/>
        </div>
        <div className="tnm aw"><span>{m.a}</span></div>
      </div>
      {actual&&<div className="result-lbl">Result: {actual.h}–{actual.a}</div>}
      <div className="mfoot">
        <span className={`ptsbadge ${pts!==null?ptsBadgeClass(pts):'def'}`}>{pts!==null?`+${pts} pts`:'20 pts max'}</span>
        {pts!==null&&<span style={{fontFamily:'Barlow Condensed',fontSize:'.48rem',color:'rgba(255,255,255,.35)'}}>{ptsFeedback(pts)}</span>}
        <button className={`lbtn ${isl?'on':'off'}`} onClick={()=>onLock(k,cid)}>{isl?'🔒 Locked':'🔓 Lock'}</button>
      </div>
    </div>
  );
};

const ScrollPopup = ({items,selected,onSelect,onClose,anchorRef}) => {
  const style={};
  if(anchorRef&&anchorRef.current){
    const r=anchorRef.current.getBoundingClientRect();
    style.left=r.left;
    style.width=Math.max(r.width,140);
  }
  return (
    <div>
      <div style={{position:'fixed',inset:0,zIndex:1999}} onClick={onClose}/>
      <div className="scroll-popup" style={style}>
        {items.map(item=>(
          <div key={item.id} className={`scroll-popup-item${selected===item.id?' sel':''}`} onClick={()=>{onSelect(item.id);onClose();}}>
            <span className="spi-icon">{item.icon}</span>
            <div>
              <div style={{fontSize:'.68rem',fontWeight:700,color:selected===item.id?'var(--lime)':'var(--text)'}}>{item.lbl}</div>
              {item.sub&&<div style={{fontSize:'.5rem',color:'rgba(255,255,255,.32)',fontFamily:'Barlow Condensed'}}>{item.sub}</div>}
            </div>
            {selected===item.id&&<span style={{marginLeft:'auto',color:'var(--lime)',fontSize:'.7rem'}}>✓</span>}
          </div>
        ))}
      </div>
    </div>
  );
};

// ── MAIN APP ───────────────────────────────────────────────────────────────────
function App(){
  const [gw,setGw]=useState(32);
  const [ac,setAc]=useState('epl');
  const [preds,setPreds]=useState({});
  const [locked,setLocked]=useState({});
  const [yc,setYc]=useState(0);
  const [pts,setPts]=useState(134);
  const [flags,setFlags]=useState([]);
  const [toasts,setToasts]=useState([]);
  const [champPicks,setChampPicks]=useState({});
  const [tscorer,setTscorer]=useState(null);
  const [tassist,setTassist]=useState(null);
  const [bpick,setBpick]=useState(null);
  const [kpick,setKpick]=useState(null);
  const [gbpick,setGbpick]=useState(null);
  const [roofState,setRoofState]=useState('closed');
  // Nav left side
  const [selSport,setSelSport]=useState('football');
  const [selLeague,setSelLeague]=useState('epl');
  // Nav right side
  const [selMode,setSelMode]=useState('full11');
  const [selMiniLeague,setSelMiniLeague]=useState('pub');
  // Popups
  const [openPopup,setOpenPopup]=useState(null); // 'sport'|'league'|'mode'|'minileague'
  const sportRef=useRef(null);
  const leagueRef=useRef(null);
  const modeRef=useRef(null);
  const miniRef=useRef(null);
  const fid=useRef(0);

  const addToast=(msg,color='var(--lime)')=>{
    const id=Date.now()+Math.random();
    setToasts(t=>[...t,{id,msg,color}]);
    setTimeout(()=>setToasts(t=>t.filter(x=>x.id!==id)),2700);
  };
  const fireFlag=useCallback(()=>{
    const id=++fid.current;
    setFlags(f=>[...f,{id}]);
    setTimeout(()=>setFlags(f=>f.filter(x=>x.id!==id)),1600);
  },[]);

  const toggleRoof=()=>{
    if(roofState==='closed'||roofState==='closing'){
      setRoofState('opening');
      setTimeout(()=>setRoofState('opened'),620);
    } else {
      setRoofState('closing');
      setTimeout(()=>setRoofState('closed'),520);
    }
  };

  const handlePred=(k,v)=>setPreds(p=>({...p,[k]:v}));

  const handleLock=(k,cid)=>{
    if(locked[k]){
      if(yc>=5){ addToast('⛔ Suspended – Cannot unlock!','var(--red)'); return; }
      fireFlag(); setYc(c=>Math.min(5,c+1));
      setLocked(l=>({...l,[k]:false}));
      const ded=Math.min(25,5*Math.max(1,gw-27));
      setPts(p=>Math.max(0,p-ded));
      addToast(`🟨 Yellow card! −${ded} pts`,'var(--gold)');
    } else {
      const p2=preds[k];
      if(!p2||p2.h===''||p2.a===''){ addToast('⚠️ Enter a score first!','#ff6b35'); return; }
      setLocked(l=>({...l,[k]:true}));
      const c=COMPS[cid];
      if(c){ const idx=parseInt(k.split('_').pop()); const m=c.teams[idx]; if(m?.actual) setPts(p=>p+calcPts(+p2.h,+p2.a,m.actual.h,m.actual.a)); }
      addToast('🔒 Prediction locked!');
    }
  };

  const roofOpen=roofState==='opened'||roofState==='opening';
  const leagues=LEAGUES_BY_SPORT[selSport]||[];
  const curSport=SPORTS.find(s=>s.id===selSport)||SPORTS[0];
  const curLeague=leagues.find(l=>l.id===selLeague)||leagues[0];
  const curMode=MODES.find(m=>m.id===selMode)||MODES[4];
  const curMini=MINI_LEAGUES.find(m=>m.id===selMiniLeague)||MINI_LEAGUES[0];
  const seatCols=Math.min(46,Math.floor(window.innerWidth/15));

  // Roof advert ads (inside closed roof, running horizontally)
  const ROOF_ADS=[...ADS_H,...ADS_H];

  return (
    <div className="app">
      {/* HEADER — app name only */}
      <div className="header">
        <div className="pts-chip">
          <span className="pts-val">{pts}</span>
          <span className="pts-lbl">PTS</span>
        </div>
        <div className="brand">⚽ Gaffer's Pick</div>
        <div style={{fontFamily:'Barlow Condensed',fontSize:'.52rem',letterSpacing:4,color:'rgba(200,244,0,.4)',textTransform:'uppercase',position:'absolute',right:10,top:'50%',transform:'translateY(-50%)'}}>S2025/26</div>
      </div>

      {/* STADIUM MAIN */}
      <div className="stadium-main">

        {/* COL 1: Full-height seat column LEFT — covered by roof when closed */}
        <SeatColumnFull cols={3} rows={55} litRate={.42} side="left"/>

        {/* COL 2: Left stand (seats + vertical ads) */}
        <div className="stand-col" style={{display:'flex',flexDirection:'row'}}>
          <div style={{flex:1,display:'flex',flexDirection:'column',overflow:'hidden'}}>
            <AdBoardH ads={ADS_H.slice(0,6)} reverse={false} height="clamp(16px,2vw,24px)"/>
            <StandSeats rows={22} cols={10} litRate={.4}/>
            <AdBoardH ads={ADS_H.slice(4,10)} reverse={true} height="clamp(16px,2vw,24px)"/>
          </div>
          <div style={{width:'clamp(14px,2.2vw,26px)',background:'#000',overflow:'hidden',flexShrink:0}}>
            <AdBoardV ads={ADS_V} reverse={false}/>
          </div>
        </div>

        {/* COL 3: Pitch area */}
        <div className="pitch-col">
          {/* Top H adboard */}
          <AdBoardH ads={ADS_H} reverse={false} height="clamp(18px,2.2vw,28px)"/>
          {/* Top seat rows */}
          <div className="seats-row-wrap">
            <SeatRowH cols={seatCols} litRate={.44} wave={true}/>
            <SeatRowH cols={seatCols} litRate={.38} wave={true}/>
            <SeatRowH cols={seatCols} litRate={.42} wave={false}/>
          </div>
          {/* Pitch field */}
          <div className="pitch-field" style={{flex:1,position:'relative',overflow:'hidden'}}>
            <Formation ac={ac} onSel={id=>{setAc(id); if(!roofOpen) toggleRoof();}} preds={preds} locked={locked} gw={gw}/>
            {/* ROOF — overlays pitch only, seat cols visible behind it */}
            <div className={`roof ${roofState}`}>
              {/* Roof advert strips — inside roof, running horizontally (behind goals) */}
              {(roofState==='closed'||roofState==='closing'||roofState==='opening')&&<>
                <div className="roof-ad-strip top">
                  <div className="roof-ad-strip-inner">
                    {ROOF_ADS.map((a,i)=>(
                      <div key={i} className="roof-ad-seg" style={{background:a.bg,minWidth:'clamp(80px,12vw,160px)'}}>
                        <span className="roof-ad-seg-txt" style={{color:a.col}}>{a.txt}</span>
                      </div>
                    ))}
                  </div>
                </div>
                <div className={`roof-ad-strip bot rev`}>
                  <div className="roof-ad-strip-inner">
                    {[...ROOF_ADS].reverse().map((a,i)=>(
                      <div key={i} className="roof-ad-seg" style={{background:a.bg,minWidth:'clamp(80px,12vw,160px)'}}>
                        <span className="roof-ad-seg-txt" style={{color:a.col}}>{a.txt}</span>
                      </div>
                    ))}
                  </div>
                </div>
              </>}
              {/* Left roof panel */}
              <div className="roof-left">
                {/* Seat strip inside roof — only visible when roof opens (slides with panel) */}
                <div className="roof-seat-strip top">
                  <SeatRowH cols={Math.floor(seatCols/2)} litRate={.4} wave={false}/>
                  <SeatRowH cols={Math.floor(seatCols/2)} litRate={.35} wave={false}/>
                </div>
                <div className="roof-content">
                  <div className="roof-panel-inner" style={{background:'linear-gradient(180deg,rgba(6,11,22,.97),rgba(10,20,35,.95))'}}>
                    <LeftPanel pts={pts} gw={gw} yc={yc} preds={preds} locked={locked}/>
                  </div>
                </div>
                <div className="roof-seat-strip bot">
                  <SeatRowH cols={Math.floor(seatCols/2)} litRate={.35} wave={false}/>
                  <SeatRowH cols={Math.floor(seatCols/2)} litRate={.3} wave={false}/>
                </div>
              </div>
              {/* Right roof panel */}
              <div className="roof-right">
                <div className="roof-seat-strip top">
                  <SeatRowH cols={Math.floor(seatCols/2)} litRate={.4} wave={false}/>
                  <SeatRowH cols={Math.floor(seatCols/2)} litRate={.35} wave={false}/>
                </div>
                <div className="roof-content">
                  <div className="roof-panel-inner" style={{background:'linear-gradient(180deg,rgba(6,11,22,.97),rgba(10,20,35,.95))'}}>
                    <RightPanel ac={ac} preds={preds} locked={locked} onPred={handlePred} onLock={handleLock} gw={gw}
                      champPicks={champPicks} onChamp={(l,t)=>{setChampPicks(p=>({...p,[l]:t}));addToast(`${COMPS[l]?.short}: ${t}`);}}
                      tscorer={tscorer} tassist={tassist}
                      onTop={(type,name)=>{ if(type==='s'){setTscorer(name);addToast(`Top Scorer: ${name}`);}else{setTassist(name);addToast(`Top Assists: ${name}`);} }}
                      bpick={bpick} kpick={kpick} gbpick={gbpick}
                      onAward={(type,name)=>{ if(type==='ballon'){setBpick(name);addToast(`Ballon d'Or: ${name}`);}else if(type==='kopa'){setKpick(name);addToast(`Kopa: ${name}`);}else{setGbpick(name);addToast(`Golden Boy: ${name}`);}}}
                      pts={pts}/>
                  </div>
                </div>
                <div className="roof-seat-strip bot">
                  <SeatRowH cols={Math.floor(seatCols/2)} litRate={.35} wave={false}/>
                  <SeatRowH cols={Math.floor(seatCols/2)} litRate={.3} wave={false}/>
                </div>
              </div>
              {/* Roof toggle button */}
              <button className="roof-toggle" onClick={toggleRoof}>
                <i className={`fas fa-${roofOpen?'chevron-down':'chevron-up'}`}/>
                {roofOpen?'Close · View Pitch':'Open · Stats & Picks'}
              </button>
            </div>
          </div>
          {/* Bottom seat rows */}
          <div className="seats-row-wrap bot">
            <SeatRowH cols={seatCols} litRate={.4} wave={false}/>
            <SeatRowH cols={seatCols} litRate={.38} wave={false}/>
          </div>
          {/* Bottom H adboard */}
          <AdBoardH ads={[...ADS_H].reverse()} reverse={true} height="clamp(18px,2.2vw,28px)"/>
        </div>

        {/* COL 4: Right stand */}
        <div className="stand-col right-stand" style={{display:'flex',flexDirection:'row'}}>
          <div style={{width:'clamp(14px,2.2vw,26px)',background:'#000',overflow:'hidden',flexShrink:0}}>
            <AdBoardV ads={ADS_V} reverse={true}/>
          </div>
          <div style={{flex:1,display:'flex',flexDirection:'column',overflow:'hidden'}}>
            <AdBoardH ads={ADS_H.slice(3,9)} reverse={true} height="clamp(16px,2vw,24px)"/>
            <StandSeats rows={22} cols={10} litRate={.4}/>
            <AdBoardH ads={ADS_H.slice(0,6)} reverse={false} height="clamp(16px,2vw,24px)"/>
          </div>
        </div>

        {/* COL 5: Full-height seat column RIGHT */}
        <SeatColumnFull cols={3} rows={55} litRate={.42} side="right"/>
      </div>

      {/* NAV — 5 buttons */}
      <div className="nav">
        {/* BTN 1: Sport selector (left-left) */}
        <button
          ref={sportRef}
          className={`scroll-nav-btn${openPopup==='sport'?' active':''}`}
          onClick={()=>setOpenPopup(o=>o==='sport'?null:'sport')}
          style={{borderTop:`2px solid ${openPopup==='sport'?'var(--lime)':'transparent'}`}}
        >
          <span className="scroll-btn-icon">{curSport.ball}</span>
          <span className="scroll-btn-lbl">{curSport.lbl}</span>
          <span className="scroll-btn-sub">Sport ▲</span>
        </button>

        {/* BTN 2: League selector (left-right) */}
        <button
          ref={leagueRef}
          className={`scroll-nav-btn${openPopup==='league'?' active':''}`}
          onClick={()=>setOpenPopup(o=>o==='league'?null:'league')}
          style={{borderTop:`2px solid ${openPopup==='league'?'var(--lime)':'transparent'}`}}
        >
          <span className="scroll-btn-icon">{curLeague?.icon||'🏆'}</span>
          <span className="scroll-btn-lbl">{curLeague?.lbl||'League'}</span>
          <span className="scroll-btn-sub">League ▲</span>
        </button>

        {/* BTN 3: CENTER — Sport ball / open roof */}
        <button className="sport-ball-btn" onClick={toggleRoof}>
          <span className="ball-icon">{curSport.ball}</span>
          <span className="ball-lbl">{roofOpen?'▼ Pitch':'▲ Stats'}</span>
        </button>

        {/* BTN 4: Mode selector (right-left) */}
        <button
          ref={modeRef}
          className={`scroll-nav-btn${openPopup==='mode'?' active':''}`}
          onClick={()=>setOpenPopup(o=>o==='mode'?null:'mode')}
          style={{borderTop:`2px solid ${openPopup==='mode'?'var(--lime)':'transparent'}`}}
        >
          <span className="scroll-btn-icon">{curMode.icon}</span>
          <span className="scroll-btn-lbl">{curMode.lbl}</span>
          <span className="scroll-btn-sub">Mode ▲</span>
        </button>

        {/* BTN 5: Mini-league selector (right-right) */}
        <button
          ref={miniRef}
          className={`scroll-nav-btn${openPopup==='minileague'?' active':''}`}
          onClick={()=>setOpenPopup(o=>o==='minileague'?null:'minileague')}
          style={{borderTop:`2px solid ${openPopup==='minileague'?'var(--lime)':'transparent'}`}}
        >
          <span className="scroll-btn-icon">{curMini.icon}</span>
          <span className="scroll-btn-lbl">{curMini.lbl}</span>
          <span className="scroll-btn-sub">League ▲</span>
        </button>
      </div>

      {/* POPUPS */}
      {openPopup==='sport'&&(
        <ScrollPopup
          items={SPORTS}
          selected={selSport}
          onSelect={id=>{ setSelSport(id); const lg=LEAGUES_BY_SPORT[id]; if(lg&&lg.length) setSelLeague(lg[0].id); addToast(`${SPORTS.find(s=>s.id===id)?.lbl||id}`); }}
          onClose={()=>setOpenPopup(null)}
          anchorRef={sportRef}
        />
      )}
      {openPopup==='league'&&(
        <ScrollPopup
          items={leagues}
          selected={selLeague}
          onSelect={id=>{ setSelLeague(id); const l=leagues.find(x=>x.id===id); addToast(`${l?.lbl||id}`); if(COMPS[id]){setAc(id);} }}
          onClose={()=>setOpenPopup(null)}
          anchorRef={leagueRef}
        />
      )}
      {openPopup==='mode'&&(
        <ScrollPopup
          items={MODES.map(m=>({id:m.id,icon:m.icon,lbl:m.lbl}))}
          selected={selMode}
          onSelect={id=>{ setSelMode(id); addToast(`Mode: ${MODES.find(m=>m.id===id)?.lbl||id}`); }}
          onClose={()=>setOpenPopup(null)}
          anchorRef={modeRef}
        />
      )}
      {openPopup==='minileague'&&(
        <ScrollPopup
          items={MINI_LEAGUES.map(m=>({id:m.id,icon:m.icon,lbl:m.lbl,sub:m.sub}))}
          selected={selMiniLeague}
          onSelect={id=>{ setSelMiniLeague(id); addToast(`${MINI_LEAGUES.find(m=>m.id===id)?.lbl||id}`); }}
          onClose={()=>setOpenPopup(null)}
          anchorRef={miniRef}
        />
      )}

      {/* FLAGS */}
      {flags.map(f=><div key={f.id} className="yfl">🚩</div>)}

      {/* TOASTS */}
      {toasts.map(t=>(
        <div key={t.id} className="toast" style={{background:'linear-gradient(90deg,#060e14,#0c1e0e)',border:`1.5px solid ${t.color}`,color:t.color}}>
          <i className="fas fa-info-circle"/> {t.msg}
        </div>
      ))}
    </div>
  );
}

const rootEl=document.getElementById('root');
if(rootEl){
  try{
    ReactDOM.createRoot(rootEl).render(<App/>);
  }catch(e){
    console.error(e);
    rootEl.innerHTML='<div style="color:#c8f400;text-align:center;padding:2rem;">Failed to load. See console.</div>';
  }
}
</script>
</body>
</html>
