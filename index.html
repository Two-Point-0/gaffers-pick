<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>The Gaffer's Pick | Transparent Pitch · Modern GW Arrows</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@400;600;700&family=Barlow:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      background: #2a2a2a;
      font-family: 'Barlow', sans-serif;
      color: white;
      overflow-x: hidden;
    }
    /* loader */
    .loader {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: #1a1a1a;
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 9999;
      transition: opacity 0.5s;
    }
    .loader i { font-size: 4rem; color: #b5f028; animation: spin 1s linear infinite; }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    .loader.hide { opacity: 0; pointer-events: none; }

    /* centered top menu */
    .top-menu {
      position: sticky;
      top: 0;
      background: rgba(0,0,0,0.85);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid #b5f028;
      z-index: 100;
      display: flex;
      justify-content: center;
      padding: 8px 0;
    }
    .menu-container {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: center;
      padding: 0 1rem;
    }
    .menu-btn {
      background: rgba(42,42,42,0.8);
      border: 1px solid #5a9e6a;
      color: #eee;
      font-family: 'Barlow Condensed';
      font-weight: bold;
      padding: 8px 24px;
      border-radius: 40px;
      cursor: pointer;
      transition: 0.2s;
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }
    .menu-btn i { font-size: 0.9rem; }
    .menu-btn.active {
      background: #b5f028;
      color: #0a2a12;
      border-color: #b5f028;
    }

    /* modern GW selector with arrows */
    .gw-indicator {
      position: sticky;
      top: 55px;
      background: rgba(0,0,0,0.8);
      backdrop-filter: blur(8px);
      padding: 8px 16px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      z-index: 99;
      border-bottom: 1px solid #3a5a3a;
    }
    .gw-nav {
      display: flex;
      align-items: center;
      gap: 16px;
      background: rgba(0,0,0,0.5);
      border-radius: 60px;
      padding: 4px 12px;
    }
    .gw-arrow {
      background: #2a2a2a;
      border: 1px solid #b5f028;
      border-radius: 50%;
      width: 36px;
      height: 36px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: 0.2s;
    }
    .gw-arrow:hover { background: #b5f028; color: black; }
    .gw-current {
      font-family: 'Bebas Neue';
      font-size: 1.4rem;
      background: #1a2a1a;
      padding: 4px 20px;
      border-radius: 40px;
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }
    .gw-current i { color: #b5f028; }

    /* awards bar */
    .awards-bar {
      background: rgba(0,0,0,0.5);
      backdrop-filter: blur(12px);
      padding: 12px;
      margin: 12px;
      border-radius: 60px;
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 16px;
      z-index: 98;
    }
    .award-item {
      background: rgba(26,58,40,0.7);
      border-radius: 40px;
      padding: 6px 16px;
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }
    .award-item select {
      background: rgba(10,42,18,0.8);
      border-radius: 30px;
      padding: 4px 8px;
      color: white;
      border: 1px solid #b5f028;
    }
    .lock-award {
      background: none;
      border: 1px solid gold;
      border-radius: 30px;
      padding: 2px 12px;
      cursor: pointer;
      font-size: 0.7rem;
    }

    /* pages */
    .page {
      display: none;
      min-height: calc(100vh - 200px);
      padding: 1rem;
    }
    .page.active-page {
      display: block;
    }

    /* TRANSPARENT PITCH CONTAINER with full white lines */
    .pitch-container {
      position: relative;
      background: rgba(30, 60, 30, 0.25);
      backdrop-filter: blur(2px);
      border-radius: 24px;
      margin-bottom: 1rem;
      min-height: 550px;
      border: 2px solid rgba(255,255,255,0.6);
      overflow: hidden;
    }
    /* white pitch lines */
    .pitch-container .halfway-line {
      position: absolute;
      top: 50%;
      left: 0;
      right: 0;
      height: 2px;
      background: white;
      transform: translateY(-50%);
      z-index: 1;
    }
    .pitch-container .center-circle {
      position: absolute;
      top: 50%;
      left: 50%;
      width: 80px;
      height: 80px;
      border: 2px solid white;
      border-radius: 50%;
      transform: translate(-50%, -50%);
      z-index: 1;
    }
    .penalty-area-left, .penalty-area-right {
      position: absolute;
      top: 50%;
      width: 50px;
      height: 120px;
      border: 2px solid white;
      transform: translateY(-50%);
      z-index: 1;
    }
    .penalty-area-left { left: 0; border-left: none; }
    .penalty-area-right { right: 0; border-right: none; }
    .goal-line-left, .goal-line-right {
      position: absolute;
      top: 50%;
      width: 12px;
      height: 40px;
      background: white;
      transform: translateY(-50%);
      z-index: 1;
    }
    .goal-line-left { left: 0; }
    .goal-line-right { right: 0; }
    .penalty-arc-left, .penalty-arc-right {
      position: absolute;
      top: 50%;
      width: 30px;
      height: 30px;
      border: 1px solid white;
      border-radius: 50%;
      transform: translateY(-50%);
      z-index: 1;
    }
    .penalty-arc-left { left: 25px; border-left: none; border-bottom: none; border-top: none; }
    .penalty-arc-right { right: 25px; border-right: none; border-bottom: none; border-top: none; }

    /* dark green percentage overlay (visible behind content) */
    .accuracy-overlay {
      position: absolute;
      inset: 0;
      background: rgba(10, 40, 10, 0.55);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 2;
      pointer-events: none;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 9rem;
      font-weight: bold;
      color: rgba(0, 0, 0, 0.65);
      text-shadow: 0 0 8px rgba(255,255,255,0.15);
    }

    /* matches grid with team names and transparent inputs */
    .matches-pitch {
      position: relative;
      z-index: 3;
      display: flex;
      flex-direction: column;
      gap: 20px;
      max-width: 800px;
      margin: 60px auto;
      padding: 1rem;
    }
    .match-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 15px;
      background: rgba(0,0,0,0.3);
      backdrop-filter: blur(4px);
      border-radius: 60px;
      padding: 12px 20px;
    }
    .team-home, .team-away {
      font-weight: bold;
      font-size: 1rem;
      white-space: nowrap;
      text-shadow: 0 1px 2px black;
      min-width: 100px;
      text-align: center;
    }
    .team-home { text-align: right; }
    .team-away { text-align: left; }
    .score-group {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .score-input-pitch {
      width: 65px;
      height: 55px;
      background: transparent;
      border: 2px solid white;
      border-radius: 16px;
      text-align: center;
      font-size: 1.6rem;
      color: #b5f028;
      font-weight: bold;
      backdrop-filter: blur(4px);
    }
    .score-input-pitch:focus { outline: none; border-color: #b5f028; }
    .score-input-pitch:disabled {
      border-color: #888;
      color: #ccc;
    }
    .vs-badge {
      font-weight: bold;
      color: #b5f028;
      font-size: 1rem;
    }
    .actual-hint {
      font-size: 0.7rem;
      color: #ddd;
      margin-left: 10px;
    }

    /* champion controls (outside pitch) */
    .champion-control {
      background: rgba(0,0,0,0.5);
      backdrop-filter: blur(12px);
      border-radius: 60px;
      padding: 12px 20px;
      margin-top: 16px;
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 12px;
      justify-content: space-between;
    }
    .champion-select {
      background: rgba(10,42,18,0.8);
      border: 1px solid #b5f028;
      border-radius: 40px;
      padding: 8px 15px;
      color: white;
      flex: 2;
      font-family: 'Barlow Condensed';
    }
    .lock-btn {
      background: rgba(0,0,0,0.6);
      border: 1px solid white;
      border-radius: 40px;
      padding: 6px 18px;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-weight: bold;
    }
    .lock-btn.locked { background: #b5f028; color: black; border-color: #b5f028; }
    .lock-btn i { font-size: 0.9rem; }

    @media (max-width: 700px) {
      .match-row { flex-wrap: wrap; gap: 8px; }
      .team-home, .team-away { min-width: 80px; font-size: 0.8rem; }
      .score-input-pitch { width: 55px; height: 45px; font-size: 1.2rem; }
      .accuracy-overlay { font-size: 4rem; }
    }
  </style>
</head>
<body>
<div class="loader" id="loader"><i class="fas fa-futbol"></i></div>

<!-- centered top menu -->
<div class="top-menu">
  <div class="menu-container" id="menuContainer"></div>
</div>

<!-- modern GW selector with arrows -->
<div class="gw-indicator">
  <span><i class="fas fa-calendar-alt"></i> Gameweek</span>
  <div class="gw-nav">
    <div class="gw-arrow" id="gwPrev"><i class="fas fa-chevron-left"></i></div>
    <div class="gw-current" id="gwCurrentDisplay"><i class="fas fa-futbol"></i> GW 32</div>
    <div class="gw-arrow" id="gwNext"><i class="fas fa-chevron-right"></i></div>
  </div>
</div>

<!-- Awards Bar -->
<div class="awards-bar" id="awardsBar"></div>

<!-- Pages container -->
<div id="pagesContainer"></div>

<script>
  // hide loader
  (function() { const l=document.getElementById('loader'); function h(){ if(l) l.classList.add('hide'); } if(document.readyState==='loading') document.addEventListener('DOMContentLoaded',h); else h(); setTimeout(h,1500); })();

  // ---------- LEAGUE DATA (TOP 5 TEAMS ONLY) ----------
  const leaguesData = {
    epl: { name: "Premier League", fullName: "Premier League", teams: ["Arsenal","Man City","Liverpool","Chelsea","Man Utd"], 
           fixtures: [{ home:"Arsenal", away:"Man City"},{ home:"Liverpool", away:"Chelsea"},{ home:"Man Utd", away:"Tottenham"},{ home:"Newcastle", away:"Aston Villa"},{ home:"Brighton", away:"West Ham"}] },
    liga: { name: "La Liga", fullName: "La Liga", teams: ["Real Madrid","Barcelona","Atletico","Athletic","Real Betis"], 
           fixtures: [{ home:"Real Madrid", away:"Barcelona"},{ home:"Atletico", away:"Sevilla"},{ home:"Athletic", away:"Villarreal"},{ home:"Real Betis", away:"Real Soc."},{ home:"Valencia", away:"Osasuna"}] },
    serie: { name: "Serie A", fullName: "Serie A", teams: ["Inter Milan","Juventus","AC Milan","Napoli","Lazio"], 
           fixtures: [{ home:"Inter Milan", away:"Juventus"},{ home:"AC Milan", away:"Napoli"},{ home:"Lazio", away:"Roma"},{ home:"Atalanta", away:"Fiorentina"},{ home:"Torino", away:"Bologna"}] },
    bundes: { name: "Bundesliga", fullName: "Bundesliga", teams: ["Bayern","Dortmund","Leverkusen","Leipzig","Stuttgart"], 
           fixtures: [{ home:"Bayern", away:"Dortmund"},{ home:"Leverkusen", away:"Leipzig"},{ home:"Stuttgart", away:"Gladbach"},{ home:"Frankfurt", away:"Freiburg"},{ home:"Wolfsburg", away:"Hoffenheim"}] },
    ligue: { name: "Ligue 1", fullName: "Ligue 1", teams: ["PSG","Monaco","Marseille","Lyon","Lens"], 
           fixtures: [{ home:"PSG", away:"Monaco"},{ home:"Marseille", away:"Lyon"},{ home:"Lens", away:"Rennes"},{ home:"Lille", away:"Nice"},{ home:"Nantes", away:"Strasbourg"}] },
    worldcup: { name: "World Cup", fullName: "World Cup", teams: ["Brazil","Argentina","France","Germany","Spain"], 
           fixtures: [{ home:"Brazil", away:"Argentina"},{ home:"France", away:"Spain"},{ home:"Germany", away:"England"},{ home:"Portugal", away:"Netherlands"},{ home:"Belgium", away:"Croatia"}] }
  };

  // generate actual results & user predictions
  let actualResults = {}, userPredictions = {};
  function generateData() {
    for (let league of Object.keys(leaguesData)) {
      actualResults[league] = {};
      userPredictions[league] = {};
      for (let gw = 1; gw <= 38; gw++) {
        actualResults[league][gw] = [];
        userPredictions[league][gw] = [];
        for (let i = 0; i < leaguesData[league].fixtures.length; i++) {
          let homeScore = Math.floor(Math.random() * 4);
          let awayScore = Math.floor(Math.random() * 3);
          if (homeScore === awayScore && homeScore === 0 && Math.random() > 0.3) homeScore = 1;
          actualResults[league][gw].push({ homeScore, awayScore });
          let hPred = homeScore + (Math.random() > 0.6 ? (Math.random() > 0.5 ? 1 : -1) : 0);
          let aPred = awayScore + (Math.random() > 0.6 ? (Math.random() > 0.5 ? 1 : -1) : 0);
          hPred = Math.max(0, Math.min(5, hPred));
          aPred = Math.max(0, Math.min(5, aPred));
          userPredictions[league][gw].push({ hPred, aPred });
        }
      }
    }
  }
  generateData();

  function computeAccuracy(league, currentGW) {
    let total = 0, correct = 0;
    for (let gw = 1; gw < currentGW; gw++) {
      let matches = userPredictions[league][gw];
      let actuals = actualResults[league][gw];
      for (let i = 0; i < matches.length; i++) {
        total++;
        if (matches[i].hPred === actuals[i].homeScore && matches[i].aPred === actuals[i].awayScore) correct++;
      }
    }
    return total === 0 ? 0 : Math.round((correct / total) * 100);
  }

  let currentGW = 32;
  let leagueScores = { epl: 0, liga: 0, serie: 0, bundes: 0, ligue: 0, worldcup: 0 };
  let championPicks = { epl: "", liga: "", serie: "", bundes: "", ligue: "", worldcup: "" };
  let lockState = {};
  let penaltyPoints = { epl: 0, liga: 0, serie: 0, bundes: 0, ligue: 0, worldcup: 0 };
  let leagueAccuracy = {};
  function updateAllAccuracies() { for (let l of Object.keys(leaguesData)) leagueAccuracy[l] = computeAccuracy(l, currentGW); }
  updateAllAccuracies();

  // cards & suspension
  let userCards = { yellows: 0, reds: 0, cardHistory: [] };
  let isSuspended = false;
  function giveYellowCard(reason) { if(isSuspended) return; userCards.yellows++; userCards.cardHistory.push({ gw: currentGW, reason, type:"yellow" }); showToast(`🟡 YELLOW: ${reason}`, "#f5d742"); let recent = userCards.cardHistory.filter(c=>c.type==="yellow" && (currentGW-c.gw)<=3).length; if(recent>=2 && userCards.reds===0) giveRedCard("Two yellows in 3 GWs"); }
  function giveRedCard(reason) { if(userCards.reds>0) return; userCards.reds++; userCards.cardHistory.push({ gw: currentGW, reason, type:"red" }); let deduction = 20; let keys = Object.keys(leagueScores); for(let k of keys) leagueScores[k] = Math.max(0, leagueScores[k] - deduction/keys.length); showToast(`🔴 RED CARD! -20pts, suspended next GW. ${reason}`, "#e34d4d"); isSuspended=true; userCards.yellows=0; }
  function showToast(msg, color="#b5f028") { let t=document.createElement("div"); t.innerText=msg; t.style.position="fixed"; t.style.bottom="80px"; t.style.left="50%"; t.style.transform="translateX(-50%)"; t.style.background=color; t.style.color="#0a2a12"; t.style.padding="8px 20px"; t.style.borderRadius="60px"; t.style.zIndex="999"; t.style.fontWeight="bold"; document.body.appendChild(t); setTimeout(()=>t.remove(),2500); }

  function updateMatchPred(league, idx, type, val) {
    if(isSuspended) { showToast("Suspended!"); return; }
    if (currentGW <= 31) { showToast("Past gameweeks are locked!"); return; }
    let pred = userPredictions[league][currentGW][idx];
    if(type === 'home') pred.hPred = parseInt(val) || 0;
    else pred.aPred = parseInt(val) || 0;
    let margin = Math.abs(pred.hPred - pred.aPred);
    if(margin >= 4) giveYellowCard(`Risky margin ${pred.hPred}-${pred.aPred}`);
    renderCurrentPage();
  }

  function submitPredictions(leagueId) {
    if(isSuspended) { showToast("Suspended!"); return; }
    if (currentGW <= 31) { showToast("Past GW locked."); return; }
    showToast(`✅ GW${currentGW} predictions saved for ${leaguesData[leagueId].name}`, "#b5f028");
  }

  // Awards
  const awardsList = [
    { id: "ballon", name: "Ballon d'Or", options: ["Messi","Haaland","Mbappé","Vinicius","Bellingham"], points: 150, locked: false, pick: "" },
    { id: "ucl", name: "UCL Winner", options: ["Real Madrid","Man City","Bayern","PSG","Arsenal"], points: 120, locked: false, pick: "" },
    { id: "europa", name: "Europa League", options: ["Liverpool","Roma","Sevilla","Leverkusen","Atalanta"], points: 100, locked: false, pick: "" }
  ];
  function renderAwardsBar() {
    const container = document.getElementById("awardsBar");
    container.innerHTML = "";
    awardsList.forEach(award => {
      const div = document.createElement("div");
      div.className = "award-item";
      div.innerHTML = `
        <span><i class="fas fa-trophy"></i> ${award.name}</span>
        <select id="award-${award.id}" ${award.locked ? 'disabled' : ''} onchange="updateAwardPick('${award.id}', this.value)">
          <option value="">— Predict —</option>
          ${award.options.map(opt => `<option ${award.pick===opt ? 'selected' : ''}>${opt}</option>`).join('')}
        </select>
        <button class="lock-award" onclick="toggleAwardLock('${award.id}')">${award.locked ? '🔒 Locked' : '🔓 Unlock'}</button>
      `;
      container.appendChild(div);
    });
  }
  window.updateAwardPick = (id, val) => { let a = awardsList.find(x=>x.id===id); if(a.locked) { showToast("Award locked!"); return; } a.pick = val; renderAwardsBar(); };
  function toggleAwardLock(id) {
    let a = awardsList.find(x=>x.id===id);
    if(!a.locked) { if(!a.pick) { showToast("Pick a winner first!"); return; } a.locked=true; showToast(`🔒 ${a.name} locked`); }
    else { a.locked=false; showToast(`🔓 ${a.name} unlocked`); }
    renderAwardsBar();
  }

  // League champion pick & lock
  window.updateChampionPick = (leagueId, val) => {
    if(lockState[leagueId]?.locked) { showToast("Champion locked! Unlock first."); return; }
    championPicks[leagueId] = val;
    renderCurrentPage();
  };
  function toggleLeagueLock(leagueId) {
    let lock = lockState[leagueId];
    if(!lock) lockState[leagueId] = { locked: false, lockGW: null };
    lock = lockState[leagueId];
    if(!lock.locked) {
      if(!championPicks[leagueId]) { showToast("Select a champion first!"); return; }
      lock.locked = true; lock.lockGW = currentGW;
      showToast(`🔒 ${leaguesData[leagueId].fullName} champion locked at GW${currentGW}`);
    } else {
      let weeks = currentGW - (lock.lockGW || currentGW);
      let penalty = weeks * 2;
      if(penalty>0) {
        penaltyPoints[leagueId] += penalty;
        leagueScores[leagueId] = Math.max(0, leagueScores[leagueId] - penalty);
        giveYellowCard(`Unlocked ${leaguesData[leagueId].fullName} after ${weeks} GWs (-${penalty} pts)`);
      }
      lock.locked = false; lock.lockGW = null;
    }
    renderCurrentPage();
  }

  // Render one league page (pitch with team names + transparent inputs)
  function renderLeaguePage(leagueId) {
    const league = leaguesData[leagueId];
    const lock = lockState[leagueId] || { locked: false };
    const percent = leagueAccuracy[leagueId] || 0;
    const championPick = championPicks[leagueId];
    const isPast = currentGW < 32;
    const userPreds = userPredictions[leagueId][currentGW];
    const actuals = actualResults[leagueId][currentGW];
    let matchesHtml = "";
    league.fixtures.forEach((m, idx) => {
      let userH = userPreds[idx].hPred;
      let userA = userPreds[idx].aPred;
      let actualH = actuals[idx].homeScore;
      let actualA = actuals[idx].awayScore;
      let displayHome = isPast ? actualH : (userH !== undefined ? userH : '');
      let displayAway = isPast ? actualA : (userA !== undefined ? userA : '');
      matchesHtml += `
        <div class="match-row">
          <div class="team-home">${m.home}</div>
          <div class="score-group">
            <input class="score-input-pitch" type="number" id="h_${leagueId}_${idx}" value="${displayHome}" ${isPast ? 'disabled' : ''} placeholder="0" onchange="updateMatchPred('${leagueId}',${idx},'home',this.value)">
            <span class="vs-badge">VS</span>
            <input class="score-input-pitch" type="number" id="a_${leagueId}_${idx}" value="${displayAway}" ${isPast ? 'disabled' : ''} placeholder="0" onchange="updateMatchPred('${leagueId}',${idx},'away',this.value)">
          </div>
          <div class="team-away">${m.away}</div>
          ${isPast ? `<span class="actual-hint">${actualH}–${actualA}</span>` : ''}
        </div>
      `;
    });
    return `
      <div class="page" id="page-${leagueId}" data-league="${leagueId}">
        <div class="pitch-container">
          <div class="halfway-line"></div>
          <div class="center-circle"></div>
          <div class="penalty-area-left"></div>
          <div class="penalty-area-right"></div>
          <div class="goal-line-left"></div>
          <div class="goal-line-right"></div>
          <div class="penalty-arc-left"></div>
          <div class="penalty-arc-right"></div>
          <div class="accuracy-overlay">${percent}%</div>
          ${lock.locked && championPick ? `<div style="position: absolute; bottom: 20px; left: 20px; font-size: 1.4rem; color: rgba(255,255,255,0.3); font-family: 'Bebas Neue'; z-index: 3;"><i class="fas fa-crown"></i> ${championPick}</div>` : ''}
          <div class="matches-pitch">
            ${matchesHtml}
          </div>
          <div class="champion-control">
            <select class="champion-select" id="champSelect-${leagueId}" ${lock.locked ? 'disabled' : ''} onchange="updateChampionPick('${leagueId}', this.value)">
              <option value="">— Pick League Champion —</option>
              ${league.teams.map(t => `<option ${championPicks[leagueId]===t ? 'selected' : ''}>${t}</option>`).join('')}
            </select>
            <button class="lock-btn ${lock.locked ? 'locked' : ''}" onclick="toggleLeagueLock('${leagueId}')">
              <i class="fas ${lock.locked ? 'fa-lock' : 'fa-lock-open'}"></i> ${lock.locked ? 'Locked' : 'Unlock'}
            </button>
            ${penaltyPoints[leagueId] ? `<span style="font-size:0.7rem; color:#ffaa66;"><i class="fas fa-exclamation-triangle"></i> -${penaltyPoints[leagueId]}</span>` : ''}
            ${!isPast ? `<button class="lock-btn" style="background:#b5f028; color:black;" onclick="submitPredictions('${leagueId}')"><i class="fas fa-save"></i> Save GW</button>` : ''}
          </div>
        </div>
      </div>
    `;
  }

  let currentActiveLeague = "epl";
  function renderCurrentPage() {
    const container = document.getElementById("pagesContainer");
    let html = "";
    for (let leagueId of Object.keys(leaguesData)) {
      html += renderLeaguePage(leagueId);
    }
    container.innerHTML = html;
    document.querySelectorAll(".page").forEach(p => p.classList.remove("active-page"));
    const activePage = document.getElementById(`page-${currentActiveLeague}`);
    if (activePage) activePage.classList.add("active-page");
    document.querySelectorAll(".menu-btn").forEach(btn => {
      if (btn.getAttribute("data-league") === currentActiveLeague) btn.classList.add("active");
      else btn.classList.remove("active");
    });
    // update GW display
    document.getElementById("gwCurrentDisplay").innerHTML = `<i class="fas fa-futbol"></i> GW ${currentGW}`;
  }

  // build centered menu
  function buildMenu() {
    const menuContainer = document.getElementById("menuContainer");
    menuContainer.innerHTML = "";
    for (let [id, league] of Object.entries(leaguesData)) {
      const btn = document.createElement("button");
      btn.className = "menu-btn";
      btn.innerHTML = `<i class="fas fa-futbol"></i> ${league.name}`;
      btn.setAttribute("data-league", id);
      btn.onclick = () => {
        currentActiveLeague = id;
        renderCurrentPage();
      };
      menuContainer.appendChild(btn);
    }
  }

  // modern GW arrows
  function setupGWArrows() {
    const prevBtn = document.getElementById("gwPrev");
    const nextBtn = document.getElementById("gwNext");
    prevBtn.onclick = () => {
      if (currentGW > 1) {
        currentGW--;
        updateGW();
      }
    };
    nextBtn.onclick = () => {
      if (currentGW < 38) {
        currentGW++;
        updateGW();
      }
    };
  }
  function updateGW() {
    updateAllAccuracies();
    renderCurrentPage();
    showToast(`Gameweek ${currentGW} — Accuracy updated.`);
  }

  for(let l of Object.keys(leaguesData)) if(!lockState[l]) lockState[l] = { locked: false, lockGW: null };

  buildMenu();
  setupGWArrows();
  renderAwardsBar();
  renderCurrentPage();
</script>
</body>
</html>
