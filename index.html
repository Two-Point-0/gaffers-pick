<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>The Gaffer's Pick | 4-4-2 Formation · Pitch Edition</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@400;600;700&family=Barlow:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #1a5a2a;
      font-family: 'Barlow', sans-serif;
      color: white;
      min-height: 100vh;
      background-image: radial-gradient(circle at 20% 30%, rgba(255,255,255,0.1) 2%, transparent 2.5%);
      background-size: 40px 40px;
    }
    .loader {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: #1a1a1a;
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 9999;
      transition: opacity 0.5s;
    }
    .loader i { font-size: 4rem; color: #b5f028; animation: spin 1s linear infinite; }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    .loader.hide { opacity: 0; pointer-events: none; }

    .app-container {
      max-width: 1300px;
      margin: 0 auto;
      padding: 20px;
    }

    /* PITCH BACKGROUND WITH LINES */
    .pitch-formation {
      position: relative;
      background: rgba(30,70,30,0.5);
      border-radius: 60px;
      padding: 30px 20px 50px;
      margin-bottom: 30px;
      border: 2px solid white;
      backdrop-filter: blur(2px);
    }
    /* white pitch lines */
    .pitch-formation::before {
      content: '';
      position: absolute;
      top: 50%;
      left: 5%;
      right: 5%;
      height: 2px;
      background: white;
      transform: translateY(-50%);
      opacity: 0.6;
    }
    .pitch-formation::after {
      content: '';
      position: absolute;
      top: 15%;
      left: 50%;
      width: 2px;
      height: 70%;
      background: white;
      transform: translateX(-50%);
      opacity: 0.6;
    }
    .center-circle {
      position: absolute;
      top: 50%;
      left: 50%;
      width: 100px;
      height: 100px;
      border: 2px solid white;
      border-radius: 50%;
      transform: translate(-50%, -50%);
      opacity: 0.5;
      pointer-events: none;
    }
    .penalty-spot {
      position: absolute;
      bottom: 20px;
      left: 50%;
      width: 10px;
      height: 10px;
      background: white;
      border-radius: 50%;
      transform: translateX(-50%);
      opacity: 0.7;
    }

    /* formation rows */
    .formation-row {
      display: flex;
      justify-content: center;
      gap: 25px;
      margin: 20px 0;
      flex-wrap: wrap;
      position: relative;
      z-index: 2;
    }
    .player-card {
      width: 130px;
      background: rgba(0,0,0,0.6);
      backdrop-filter: blur(8px);
      border-radius: 20px;
      padding: 12px 8px;
      text-align: center;
      cursor: pointer;
      transition: all 0.2s;
      border: 1px solid rgba(255,255,255,0.4);
    }
    .player-card.active {
      border-color: #b5f028;
      background: rgba(181,240,40,0.25);
      transform: scale(1.05);
      box-shadow: 0 0 15px #b5f028;
    }
    .player-img {
      width: 70px;
      height: 70px;
      margin: 0 auto;
      background-size: contain;
      background-position: center;
      background-repeat: no-repeat;
      background-color: rgba(0,0,0,0.3);
      border-radius: 12px;
    }
    .player-name {
      font-family: 'Barlow Condensed';
      font-weight: bold;
      margin-top: 8px;
      font-size: 0.8rem;
    }
    .player-percent {
      font-size: 0.7rem;
      color: #b5f028;
      margin-top: 4px;
    }

    /* GW bar */
    .gw-bar {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 20px;
      margin: 20px auto;
      background: rgba(0,0,0,0.6);
      backdrop-filter: blur(8px);
      padding: 8px 20px;
      border-radius: 60px;
      width: fit-content;
    }
    .gw-arrow {
      background: #2a2a2a;
      border: 1px solid #b5f028;
      border-radius: 50%;
      width: 36px;
      height: 36px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
    }
    .gw-current {
      font-family: 'Bebas Neue';
      font-size: 1.4rem;
      background: #1a2a1a;
      padding: 4px 24px;
      border-radius: 40px;
    }

    /* WINGER PANEL (split into two columns) */
    .wingers-panel {
      display: flex;
      gap: 20px;
      margin-top: 20px;
    }
    .winger {
      flex: 1;
      background: rgba(0,0,0,0.5);
      backdrop-filter: blur(8px);
      border-radius: 28px;
      padding: 20px;
      border: 1px solid rgba(255,255,255,0.3);
    }
    .winger h3 {
      font-family: 'Bebas Neue';
      font-size: 1.5rem;
      margin-bottom: 15px;
      text-align: center;
    }
    .matches-list {
      display: flex;
      flex-direction: column;
      gap: 15px;
    }
    .match-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: rgba(0,0,0,0.4);
      border-radius: 40px;
      padding: 8px 15px;
      flex-wrap: wrap;
      gap: 10px;
    }
    .team-badge-sm {
      width: 35px;
      height: 35px;
      background-size: contain;
      background-repeat: no-repeat;
      background-position: center;
      border-radius: 8px;
    }
    .score-input-sm {
      width: 50px;
      height: 35px;
      background: transparent;
      border: 2px solid white;
      border-radius: 10px;
      text-align: center;
      font-size: 1.1rem;
      color: #b5f028;
    }
    .champion-select-sm, .award-select-sm {
      background: rgba(10,42,18,0.8);
      border: 1px solid #b5f028;
      border-radius: 40px;
      padding: 6px;
      color: white;
      width: 100%;
      margin-top: 10px;
    }
    .lock-btn-sm {
      background: rgba(0,0,0,0.6);
      border: 1px solid white;
      border-radius: 40px;
      padding: 4px 12px;
      cursor: pointer;
      font-size: 0.7rem;
      margin-top: 8px;
      width: 100%;
    }

    /* MODAL for World Cup */
    .modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.9);
      backdrop-filter: blur(12px);
      z-index: 1000;
      overflow-y: auto;
      padding: 30px;
    }
    .modal-content {
      background: #0f2a1a;
      border-radius: 32px;
      max-width: 1000px;
      margin: 20px auto;
      padding: 25px;
      border: 1px solid #b5f028;
    }
    .modal h2 { font-family: 'Bebas Neue'; margin-bottom: 20px; }
    .close-modal {
      float: right;
      font-size: 28px;
      cursor: pointer;
      color: #b5f028;
    }
    .teams-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin: 20px 0;
    }
    .team-chip {
      background: rgba(0,0,0,0.5);
      border-radius: 40px;
      padding: 5px 12px;
      font-size: 0.8rem;
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }
    .footer {
      text-align: center;
      margin-top: 30px;
      padding: 15px;
      font-size: 0.8rem;
      background: rgba(0,0,0,0.4);
      border-radius: 40px;
    }

    @media (max-width: 800px) {
      .player-card { width: 100px; }
      .player-img { width: 50px; height: 50px; }
      .wingers-panel { flex-direction: column; }
    }
  </style>
</head>
<body>
<div class="loader" id="loader"><i class="fas fa-futbol"></i></div>
<div class="app-container">
  <!-- PITCH WITH FORMATION -->
  <div class="pitch-formation">
    <div class="center-circle"></div>
    <div class="penalty-spot"></div>

    <!-- GK: Premier League -->
    <div class="formation-row">
      <div class="player-card" data-id="epl" id="card-epl">
        <div class="player-img" style="background-image: url('premier-league-footballlogos-org.png');"></div>
        <div class="player-name">Premier League</div>
        <div class="player-percent" id="percent-epl">0%</div>
      </div>
    </div>

    <!-- DEFENDERS (4) -->
    <div class="formation-row">
      <div class="player-card" data-id="liga" id="card-liga">
        <div class="player-img" style="background-image: url('laliga-footballlogos-org.png');"></div>
        <div class="player-name">La Liga</div>
        <div class="player-percent" id="percent-liga">0%</div>
      </div>
      <div class="player-card" data-id="serie" id="card-serie">
        <div class="player-img" style="background-image: url('seria-a-footballlogos-org.png');"></div>
        <div class="player-name">Serie A</div>
        <div class="player-percent" id="percent-serie">0%</div>
      </div>
      <div class="player-card" data-id="bundes" id="card-bundes">
        <div class="player-img" style="background-image: url('bundesliga-footballlogos-org.png');"></div>
        <div class="player-name">Bundesliga</div>
        <div class="player-percent" id="percent-bundes">0%</div>
      </div>
      <div class="player-card" data-id="ligue" id="card-ligue">
        <div class="player-img" style="background-image: url('lique-1-footballlogos-org.png');"></div>
        <div class="player-name">Ligue 1</div>
        <div class="player-percent" id="percent-ligue">0%</div>
      </div>
    </div>

    <!-- MIDFIELDERS (2) -->
    <div class="formation-row">
      <div class="player-card" data-id="ucl" id="card-ucl">
        <div class="player-img" style="background-image: url('ucl.png');"></div>
        <div class="player-name">UCL Winner</div>
        <div class="player-percent" id="percent-ucl">0%</div>
      </div>
      <div class="player-card" data-id="europa" id="card-europa">
        <div class="player-img" style="background-image: url('europa.png');"></div>
        <div class="player-name">Europa League</div>
        <div class="player-percent" id="percent-europa">0%</div>
      </div>
    </div>

    <!-- STRIKERS (2) -->
    <div class="formation-row">
      <div class="player-card" data-id="worldcup" id="card-worldcup">
        <div class="player-img" style="background-image: url('world-cup-2026-footballogos-org.png');"></div>
        <div class="player-name">World Cup 2026</div>
        <div class="player-percent" id="percent-worldcup">0%</div>
      </div>
      <div class="player-card" data-id="ballon" id="card-ballon">
        <div class="player-img" style="background-image: url('ballon.jpg');"></div>
        <div class="player-name">Ballon d'Or</div>
        <div class="player-percent" id="percent-ballon">0%</div>
      </div>
    </div>
  </div>

  <!-- GW SELECTOR -->
  <div class="gw-bar">
    <div class="gw-arrow" id="gwPrev"><i class="fas fa-chevron-left"></i></div>
    <div class="gw-current" id="gwCurrentDisplay"><i class="fas fa-futbol"></i> GW 32</div>
    <div class="gw-arrow" id="gwNext"><i class="fas fa-chevron-right"></i></div>
  </div>

  <!-- WINGER PANEL (split left/right) -->
  <div class="wingers-panel">
    <div class="winger" id="leftWinger">
      <h3 id="leftTitle">Match Predictions</h3>
      <div id="leftContent"></div>
    </div>
    <div class="winger" id="rightWinger">
      <h3 id="rightTitle">Champion / Award</h3>
      <div id="rightContent"></div>
    </div>
  </div>

  <div class="footer">
    Designed by Muhia | <i class="fas fa-phone-alt"></i> 0724726032
  </div>
</div>

<!-- WORLD CUP MODAL -->
<div id="worldcupModal" class="modal">
  <div class="modal-content">
    <span class="close-modal" onclick="closeWorldCupModal()">&times;</span>
    <h2><i class="fas fa-globe-americas"></i> FIFA World Cup 2026 – 48 Teams</h2>
    <div id="modalTeamsList" class="teams-grid"></div>
    <h3>Group Stage Fixtures (Sample)</h3>
    <div id="modalFixtures"></div>
  </div>
</div>

<script>
  // ------------------------------
  // 1. LEAGUE & AWARD DATA
  // ------------------------------
  const formations = {
    epl: { name: "Premier League", type: "league", teams: ["Arsenal","Man City","Liverpool","Chelsea","Man Utd","Tottenham"], fixtures: [{ home:"Arsenal", away:"Man City"},{ home:"Liverpool", away:"Chelsea"},{ home:"Man Utd", away:"Tottenham"}] },
    liga: { name: "La Liga", type: "league", teams: ["Real Madrid","Barcelona","Atletico","Sevilla","Villarreal","Real Betis"], fixtures: [{ home:"Real Madrid", away:"Barcelona"},{ home:"Atletico", away:"Sevilla"},{ home:"Villarreal", away:"Real Betis"}] },
    serie: { name: "Serie A", type: "league", teams: ["Inter Milan","Juventus","AC Milan","Napoli","Roma","Lazio"], fixtures: [{ home:"Inter Milan", away:"Juventus"},{ home:"AC Milan", away:"Napoli"},{ home:"Roma", away:"Lazio"}] },
    bundes: { name: "Bundesliga", type: "league", teams: ["Bayern","Dortmund","Leverkusen","Leipzig","Stuttgart","Frankfurt"], fixtures: [{ home:"Bayern", away:"Dortmund"},{ home:"Leverkusen", away:"Leipzig"},{ home:"Stuttgart", away:"Frankfurt"}] },
    ligue: { name: "Ligue 1", type: "league", teams: ["PSG","Monaco","Marseille","Lyon","Lens","Lille"], fixtures: [{ home:"PSG", away:"Monaco"},{ home:"Marseille", away:"Lyon"},{ home:"Lens", away:"Lille"}] },
    ucl: { name: "UCL Winner", type: "award", options: ["Real Madrid","Man City","Bayern","PSG","Arsenal","Inter"], points: 800 },
    europa: { name: "Europa League", type: "award", options: ["Liverpool","Roma","Sevilla","Leverkusen","Atalanta","Ajax"], points: 600 },
    worldcup: { name: "World Cup 2026", type: "league", teams: getAllWorldCupTeams(), fixtures: getWorldCupFixtures() },
    ballon: { name: "Ballon d'Or", type: "award", options: ["Messi","Haaland","Mbappé","Vinicius","Bellingham","Salah"], points: 1000 }
  };

  function getAllWorldCupTeams() {
    return ["Brazil","Argentina","France","Germany","Spain","England","Portugal","Netherlands","Belgium","Croatia","Uruguay","USA","Mexico","Japan","South Korea","Morocco","Egypt","Senegal","Ghana","Cameroon","Nigeria","Australia","New Zealand","Canada","Colombia","Ecuador","Paraguay","Peru","Chile","Austria","Switzerland","Sweden","Denmark","Poland","Serbia","Ukraine","Scotland","Wales","Hungary","Turkey","Russia","Czech Republic","Slovakia","Romania","Bulgaria","Greece","Norway","Finland","Iceland","Ireland","Algeria","Tunisia","South Africa","Côte d'Ivoire","Mali","Burkina Faso","DR Congo","Zambia","Angola","Cabo Verde","Curacao","Haiti","Jamaica","Panama","Costa Rica","El Salvador","Honduras","Trinidad","Venezuela","Bolivia","Uzbekistan","Qatar","Saudi Arabia","Iran","Iraq","Jordan","Oman","UAE","Lebanon","Syria","Thailand","Vietnam","Indonesia","Malaysia","Philippines","India"];
  }
  function getWorldCupFixtures() {
    let teams = getAllWorldCupTeams();
    let fixtures = [];
    for (let i = 0; i < 12; i++) {
      if (i*2+1 < teams.length) fixtures.push({ home: teams[i*2], away: teams[i*2+1] });
      else fixtures.push({ home: teams[i*2], away: teams[0] });
    }
    return fixtures.slice(0,10);
  }

  // team badge mapping (subset for leagues, plus national teams)
  const teamBadges = {
    "Arsenal": "arsenal-footballlogos-org.png",
    "Man City": "manchester-city-footballlogos-org.png",
    "Liverpool": "liverpool-footballlogos-org.png",
    "Chelsea": "chelsea-footballogos-orq.png",
    "Man Utd": "manchester-united-footballlogos-org.png",
    "Tottenham": "tottenham-hotspur-footballlogos-org.png",
    "Real Madrid": "real-madrid-footballlogos-org.png",
    "Barcelona": "fc-barcelona-footballogos-org.png",
    "Atletico": "atletico-madrid-footballlogos-org.png",
    "Sevilla": "sevilla-fc-footballlogos-org.png",
    "Villarreal": "villarreal-cf-footballlogos-org.png",
    "Real Betis": "real-betis-footballlogos-org.png",
    "Inter Milan": "inter-milan-footballlogos-org.png",
    "Juventus": "juventus-footballogos-org.png",
    "AC Milan": "ac-milan-footballlogos-org.png",
    "Napoli": "napoli-footballlogos-org.png",
    "Roma": "roma-footballlogos-org.png",
    "Lazio": "lazio-footballlogos-org.png",
    "Bayern": "bayern-munich-footballlogos-org.png",
    "Dortmund": "borussia-dortmund-footballlogo5-org.png",
    "Leverkusen": "bayer-leverkusen-footballlogos-org.png",
    "Leipzig": "rb-leipzig-footballlogos-org.png",
    "Stuttgart": "vfb-stuttgart-footballlogos-org.png",
    "Frankfurt": "eintracht-frankfurt-footballlogos-org.png",
    "PSG": "paris-saint-germain-footballlogos-org.png",
    "Monaco": "as-monaco-footballlogos-org.png",
    "Marseille": "olympique-de-marseille-footballlogos-o...",
    "Lyon": "olympique-lyonnais-footballogos-org.png",
    "Lens": "lens-footballlogos-org.png",
    "Lille": "lille-osc-footballlogos-org.png",
    // national teams (simplified)
    "Brazil": "brazil-national-team-footballogos-org.png",
    "Argentina": "argentina-national-team-footballlogos-o...",
    "France": "france-national-team-footballlogos-org.N",
    "Germany": "germany-national-team-footballlogos-o...",
    "Spain": "spain-national-team-footballogos-org.p...",
    "England": "england-national-team-footballlogos-or..",
    "Portugal": "portugal-national-team-footballogos-or..",
    "Netherlands": "netherlands-dutch-national-team-footb.."
  };
  function getBadge(team) { return teamBadges[team] || "https://via.placeholder.com/35?text="+team.charAt(0); }

  // generate actual results and user predictions
  let actualResults = {}, userPredictions = {};
  function generateData() {
    for (let id of ["epl","liga","serie","bundes","ligue","worldcup"]) {
      actualResults[id] = {};
      userPredictions[id] = {};
      for (let gw = 1; gw <= 38; gw++) {
        actualResults[id][gw] = [];
        userPredictions[id][gw] = [];
        let fixtures = formations[id].fixtures;
        for (let i = 0; i < fixtures.length; i++) {
          let homeScore = Math.floor(Math.random() * 4);
          let awayScore = Math.floor(Math.random() * 3);
          if (homeScore === awayScore && homeScore === 0 && Math.random() > 0.3) homeScore = 1;
          actualResults[id][gw].push({ homeScore, awayScore });
          let hPred = homeScore + (Math.random() > 0.6 ? (Math.random() > 0.5 ? 1 : -1) : 0);
          let aPred = awayScore + (Math.random() > 0.6 ? (Math.random() > 0.5 ? 1 : -1) : 0);
          hPred = Math.max(0, Math.min(5, hPred));
          aPred = Math.max(0, Math.min(5, aPred));
          userPredictions[id][gw].push({ hPred, aPred });
        }
      }
    }
  }
  generateData();

  // state
  let currentGW = 32;
  let awardLocked = { ucl: false, europa: false, ballon: false };
  let awardPicks = { ucl: "", europa: "", ballon: "" };
  let championPicks = { epl:"", liga:"", serie:"", bundes:"", ligue:"", worldcup:"" };
  let championLocked = { epl:false, liga:false, serie:false, bundes:false, ligue:false, worldcup:false };

  function computeAccuracy(id, gw) {
    let total = 0, correct = 0;
    for (let g = 1; g < gw; g++) {
      let preds = userPredictions[id]?.[g];
      let actuals = actualResults[id]?.[g];
      if (preds && actuals) {
        for (let i=0; i<preds.length; i++) {
          total++;
          if (preds[i].hPred === actuals[i].homeScore && preds[i].aPred === actuals[i].awayScore) correct++;
        }
      }
    }
    return total === 0 ? 0 : Math.round((correct / total) * 100);
  }

  function updateAllPercentages() {
    for (let id of ["epl","liga","serie","bundes","ligue","worldcup"]) {
      let acc = computeAccuracy(id, currentGW);
      document.getElementById(`percent-${id}`).innerText = `${acc}%`;
    }
    // awards show points as percentage? just show points or 0%
    for (let id of ["ucl","europa","ballon"]) {
      let pts = awardLocked[id] && awardPicks[id] ? formations[id].points : 0;
      let percent = Math.min(100, Math.round(pts / 10));
      document.getElementById(`percent-${id}`).innerHTML = pts ? `${pts} pts` : `${percent}%`;
    }
  }

  // update match prediction
  function updateMatchPred(league, idx, type, val) {
    if (currentGW <= 31) { showToast("Past GW locked!"); return; }
    let pred = userPredictions[league][currentGW][idx];
    if (type === 'home') pred.hPred = parseInt(val) || 0;
    else pred.aPred = parseInt(val) || 0;
    updateAllPercentages();
    renderWingers(activeId);
  }

  function submitPredictions(league) {
    if (currentGW <= 31) { showToast("Past GW locked."); return; }
    showToast(`✅ GW${currentGW} predictions saved for ${formations[league].name}`);
    updateAllPercentages();
  }

  // award handlers
  function updateAwardPick(id, val) {
    if (awardLocked[id]) { showToast("Award locked! Unlock first."); return; }
    awardPicks[id] = val;
    renderWingers(activeId);
  }
  function toggleAwardLock(id) {
    if (!awardLocked[id]) {
      if (!awardPicks[id]) { showToast("Pick a winner first!"); return; }
      awardLocked[id] = true;
      showToast(`🔒 ${formations[id].name} locked! +${formations[id].points} pts`);
    } else {
      awardLocked[id] = false;
      showToast(`🔓 ${formations[id].name} unlocked`);
    }
    updateAllPercentages();
    renderWingers(activeId);
  }

  // champion handlers
  function updateChampionPick(league, val) {
    if (championLocked[league]) { showToast("Champion locked! Unlock first."); return; }
    championPicks[league] = val;
    renderWingers(activeId);
  }
  function toggleChampionLock(league) {
    if (!championLocked[league]) {
      if (!championPicks[league]) { showToast("Pick a champion first!"); return; }
      championLocked[league] = true;
      showToast(`🔒 Champion locked for ${formations[league].name}`);
    } else {
      championLocked[league] = false;
      showToast(`🔓 Champion unlocked`);
    }
    renderWingers(activeId);
  }

  let activeId = "epl";
  function renderWingers(id) {
    const data = formations[id];
    const leftDiv = document.getElementById("leftContent");
    const rightDiv = document.getElementById("rightContent");
    document.getElementById("leftTitle").innerHTML = `${data.name} – Matches`;
    document.getElementById("rightTitle").innerHTML = `${data.name} – ${data.type === "league" ? "Champion Pick" : "Award Prediction"}`;

    if (data.type === "league") {
      const isPast = currentGW < 32;
      const fixtures = data.fixtures;
      const userPreds = userPredictions[id][currentGW] || [];
      const actuals = actualResults[id][currentGW] || [];
      let matchesHtml = `<div class="matches-list">`;
      fixtures.forEach((m, idx) => {
        let userH = userPreds[idx]?.hPred !== undefined ? userPreds[idx].hPred : '';
        let userA = userPreds[idx]?.aPred !== undefined ? userPreds[idx].aPred : '';
        let actualH = actuals[idx]?.homeScore;
        let actualA = actuals[idx]?.awayScore;
        let displayHome = isPast ? actualH : userH;
        let displayAway = isPast ? actualA : userA;
        matchesHtml += `
          <div class="match-item">
            <div style="display:flex; align-items:center; gap:6px;"><div class="team-badge-sm" style="background-image:url('${getBadge(m.home)}');"></div><span>${m.home}</span></div>
            <div>
              <input class="score-input-sm" type="number" value="${displayHome}" ${isPast ? 'disabled' : ''} onchange="updateMatchPred('${id}',${idx},'home',this.value)">
              <span style="margin:0 5px;">VS</span>
              <input class="score-input-sm" type="number" value="${displayAway}" ${isPast ? 'disabled' : ''} onchange="updateMatchPred('${id}',${idx},'away',this.value)">
            </div>
            <div style="display:flex; align-items:center; gap:6px;"><span>${m.away}</span><div class="team-badge-sm" style="background-image:url('${getBadge(m.away)}');"></div></div>
            ${isPast ? `<div class="actual-hint">${actualH}–${actualA}</div>` : ''}
          </div>
        `;
      });
      matchesHtml += `</div>${!isPast ? `<button class="lock-btn-sm" style="background:#b5f028; color:black; margin-top:15px;" onclick="submitPredictions('${id}')"><i class="fas fa-save"></i> Save GW Predictions</button>` : ''}`;
      leftDiv.innerHTML = matchesHtml;

      // right side: champion pick
      let championHtml = `
        <select class="champion-select-sm" ${championLocked[id] ? 'disabled' : ''} onchange="updateChampionPick('${id}', this.value)">
          <option value="">— Pick Champion —</option>
          ${data.teams.map(t => `<option ${championPicks[id]===t ? 'selected' : ''}>${t}</option>`).join('')}
        </select>
        <button class="lock-btn-sm ${championLocked[id] ? 'locked' : ''}" onclick="toggleChampionLock('${id}')">
          <i class="fas ${championLocked[id] ? 'fa-lock' : 'fa-lock-open'}"></i> ${championLocked[id] ? 'Locked' : 'Unlock'}
        </button>
      `;
      rightDiv.innerHTML = championHtml;
    } else {
      // award
      leftDiv.innerHTML = `<div class="matches-list"><div class="match-item">Predict the winner to earn ${data.points} points</div></div>`;
      let awardHtml = `
        <select class="champion-select-sm" ${awardLocked[id] ? 'disabled' : ''} onchange="updateAwardPick('${id}', this.value)">
          <option value="">— Select Winner —</option>
          ${data.options.map(opt => `<option ${awardPicks[id]===opt ? 'selected' : ''}>${opt}</option>`).join('')}
        </select>
        <button class="lock-btn-sm ${awardLocked[id] ? 'locked' : ''}" onclick="toggleAwardLock('${id}')">
          <i class="fas ${awardLocked[id] ? 'fa-lock' : 'fa-lock-open'}"></i> ${awardLocked[id] ? 'Locked' : 'Unlock'}
        </button>
      `;
      rightDiv.innerHTML = awardHtml;
    }
  }

  function setActive(id) {
    activeId = id;
    document.querySelectorAll(".player-card").forEach(card => card.classList.remove("active"));
    document.getElementById(`card-${id}`).classList.add("active");
    renderWingers(id);
  }

  // World Cup Modal
  function openWorldCupModal() {
    const modal = document.getElementById("worldcupModal");
    const teams = getAllWorldCupTeams();
    const teamsHtml = teams.map(team => `<div class="team-chip"><div class="team-badge-sm" style="background-image:url('${getBadge(team)}');"></div> ${team}</div>`).join('');
    document.getElementById("modalTeamsList").innerHTML = teamsHtml;
    const fixtures = getWorldCupFixtures();
    let fixturesHtml = `<div class="matches-list">`;
    fixtures.forEach(f => {
      fixturesHtml += `<div class="match-item"><span>${f.home}</span> <span>VS</span> <span>${f.away}</span></div>`;
    });
    fixturesHtml += `</div>`;
    document.getElementById("modalFixtures").innerHTML = fixturesHtml;
    modal.style.display = "block";
  }
  function closeWorldCupModal() { document.getElementById("worldcupModal").style.display = "none"; }

  // GW controls
  function setupGW() {
    document.getElementById("gwPrev").onclick = () => { if (currentGW > 1) { currentGW--; updateAllPercentages(); renderWingers(activeId); document.getElementById("gwCurrentDisplay").innerHTML = `<i class="fas fa-futbol"></i> GW ${currentGW}`; showToast(`GW ${currentGW}`); } };
    document.getElementById("gwNext").onclick = () => { if (currentGW < 38) { currentGW++; updateAllPercentages(); renderWingers(activeId); document.getElementById("gwCurrentDisplay").innerHTML = `<i class="fas fa-futbol"></i> GW ${currentGW}`; showToast(`GW ${currentGW}`); } };
  }

  function showToast(msg) { let t=document.createElement("div"); t.innerText=msg; t.style.position="fixed"; t.style.bottom="80px"; t.style.left="50%"; t.style.transform="translateX(-50%)"; t.style.background="#b5f028"; t.style.color="black"; t.style.padding="8px 20px"; t.style.borderRadius="60px"; t.style.zIndex="999"; document.body.appendChild(t); setTimeout(()=>t.remove(),2000); }

  // attach event listeners to formation cards
  for (let id of Object.keys(formations)) {
    let card = document.getElementById(`card-${id}`);
    if (card) card.onclick = () => {
      if (id === "worldcup") openWorldCupModal();
      else setActive(id);
    };
  }

  setupGW();
  updateAllPercentages();
  setActive("epl");
  setTimeout(() => document.getElementById("loader").classList.add("hide"), 800);
</script>
</body>
</html>
