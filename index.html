<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0, user-scalable=yes"/>
<title>Gaffer's Pick | Stadium Predictor</title>
<!-- Google Fonts + Font Awesome 6 -->
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@400;600;700&family=Barlow:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<style>
/* All existing CSS remains exactly the same – no changes */
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --lime:#c8f400;--gold:#ffd700;--red:#e63946;
  --pitch-a:#2d8c3f;--pitch-b:#27803a;
  --stand:#0f1923;--stand2:#131e2b;--stand3:#0a1018;
  --glass:rgba(0,0,0,.55);--border:rgba(255,255,255,.09);
  --text:#e8edf2;--sub:rgba(232,237,242,.55);
  --hd:'Bebas Neue',cursive;--bd:'Barlow',sans-serif;--cd:'Barlow Condensed',sans-serif;
}
html,body,#root{width:100%;min-height:100vh;background:#060c10;color:var(--text);font-family:var(--bd);overflow-x:hidden}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:rgba(200,244,0,.3);border-radius:4px}
@keyframes fadeIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
@keyframes pulse{0%,100%{opacity:.6}50%{opacity:1}}
@keyframes bbScroll{from{transform:translateX(0)}to{transform:translateX(-50%)}}
@keyframes bbScrollR{from{transform:translateX(-50%)}to{transform:translateX(0)}}
@keyframes bbScrollV{from{transform:translateY(0)}to{transform:translateY(-50%)}}
@keyframes slotGlow{0%,100%{filter:drop-shadow(0 0 0 transparent)}50%{filter:drop-shadow(0 0 14px rgba(200,244,0,.6))}}
@keyframes flagFly{
  0%{opacity:0;transform:translate(0,0) scale(.4)}
  30%{opacity:1;transform:translate(-90px,-50px) scale(1.15)}
  70%{opacity:.9;transform:translate(-220px,-10px) scale(1)}
  100%{opacity:0;transform:translate(-340px,25px) scale(.7)}
}
@keyframes whistle{0%,100%{transform:rotate(0)}25%{transform:rotate(-16deg)}75%{transform:rotate(12deg)}}
@keyframes scoreFlash{0%,100%{background:rgba(0,0,0,.45)}50%{background:rgba(200,244,0,.16)}}
@keyframes fadeOut{to{opacity:0;transform:translate(-50%,10px)}}
@keyframes seatFlicker{0%,100%{opacity:.7}50%{opacity:.35}}

/* MAIN LAYOUT - CENTERED STADIUM WITH REDUCED PITCH SIZE */
.stadium-wrapper{
  display: flex;
  justify-content: center;
  align-items: center;
  padding: 12px;
}
.stadium{
  max-width: 1400px;
  width: 100%;
  display:grid;
  grid-template-columns: clamp(200px, 22vw, 280px) minmax(0, 1fr) clamp(200px, 22vw, 280px);
  grid-template-rows: auto auto 1fr auto;
  min-height: 90vh;
  background: radial-gradient(circle at 20% 30%, #0a2f1f, #051a0e);
  border-radius: 32px;
  box-shadow: 0 20px 40px rgba(0,0,0,0.5);
  overflow: hidden;
}
/* TOP BAR */
.top-bar{
  grid-column:1/-1;
  background:linear-gradient(180deg,#060c10,var(--stand3));
  border-bottom:1px solid var(--border);
  padding:10px 16px 7px;
  display:flex;flex-direction:column;gap:5px;
  position:sticky;top:0;z-index:200;
  backdrop-filter:blur(12px);
}
.top-row{display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap}
.brand{font-family:var(--hd);font-size:clamp(1.2rem,2.8vw,1.9rem);letter-spacing:3px;
  background:linear-gradient(90deg,#fff 0%,var(--lime) 60%,#fff 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.nav-links{display:flex;gap:5px;flex-wrap:wrap}
.nbtn{padding:5px 13px;border-radius:40px;font-family:var(--cd);font-size:.72rem;
  font-weight:700;letter-spacing:1px;cursor:pointer;border:1px solid;transition:all .2s;text-transform:uppercase}
.nbtn-d{background:rgba(255,255,255,.05);border-color:var(--border);color:var(--sub)}
.nbtn-d:hover{background:rgba(255,255,255,.1);color:#fff}
.nbtn-a{background:rgba(200,244,0,.14);border-color:rgba(200,244,0,.5);color:var(--lime)}
.mode-bar{display:flex;align-items:center;gap:7px;flex-wrap:wrap;padding:2px 0}
.mode-lbl{font-family:var(--cd);font-size:.62rem;letter-spacing:2px;color:var(--sub);text-transform:uppercase}
.mbtn{padding:4px 12px;border-radius:40px;font-family:var(--cd);font-size:.7rem;
  font-weight:700;letter-spacing:1.5px;cursor:pointer;border:1.5px solid;transition:all .22s;text-transform:uppercase}
.mbtn-off{background:rgba(255,255,255,.04);border-color:rgba(255,255,255,.11);color:var(--sub)}
.mbtn-off:hover{border-color:rgba(200,244,0,.38);color:var(--lime)}
.mbtn-on{background:rgba(200,244,0,.18);border-color:var(--lime);color:var(--lime);box-shadow:0 0 11px rgba(200,244,0,.18)}
/* GW ROW */
.gw-row{
  grid-column:1/-1;
  display:flex;align-items:center;justify-content:center;gap:13px;
  padding:7px 16px;background:rgba(0,0,0,.42);backdrop-filter:blur(8px);
  border-bottom:1px solid var(--border);
}
.wbtn{
  width:42px;height:42px;border-radius:50%;
  background:linear-gradient(145deg,#1a2535,#0e161f);
  border:2px solid var(--gold);display:flex;align-items:center;justify-content:center;
  cursor:pointer;transition:all .2s;color:var(--gold);font-size:1.05rem;position:relative;
}
.wbtn:hover{background:var(--gold);color:#000;box-shadow:0 0 18px rgba(255,215,0,.35)}
.wbtn:active{animation:whistle .3s ease}
.wbtn .tip{
  position:absolute;bottom:-22px;left:50%;transform:translateX(-50%);
  background:#000;color:#fff;font-size:.52rem;padding:2px 6px;border-radius:8px;
  white-space:nowrap;opacity:0;transition:opacity .15s;font-family:var(--cd);
}
.wbtn:hover .tip{opacity:1}
.gw-disp{
  font-family:var(--hd);font-size:1.55rem;letter-spacing:2px;
  padding:5px 26px;border-radius:40px;
  background:linear-gradient(135deg,rgba(200,244,0,.11),rgba(200,244,0,.04));
  border:1.5px solid rgba(200,244,0,.38);color:var(--lime);
  display:flex;align-items:center;gap:9px;box-shadow:0 0 16px rgba(200,244,0,.09);
}
.ref-fig{display:flex;flex-direction:column;align-items:center;gap:0;cursor:default;flex-shrink:0}
.rf-head{font-size:1.05rem;line-height:1}
.rf-body{width:14px;height:16px;background:linear-gradient(180deg,#111,#1a1a1a);
  border:1.2px solid var(--gold);border-radius:3px 3px 7px 7px;
  display:flex;align-items:center;justify-content:center;font-size:.4rem}
.rf-str{width:1.2px;height:5px;background:rgba(255,215,0,.3)}
/* SIDE STANDS (now closer to pitch, ad videos inside) */
.ss{
  display:flex;
  flex-direction:column;
  background:linear-gradient(90deg,var(--stand3),var(--stand2));
  border-right:2px solid rgba(255,255,255,.05);
  overflow:hidden;
}
.ss.rs{
  background:linear-gradient(270deg,var(--stand3),var(--stand2));
  border-right:none;
  border-left:2px solid rgba(255,255,255,.05);
}
.ss-inner{
  flex:1;
  display:flex;
  flex-direction:column;
  overflow-y:auto;
  scrollbar-width:thin;
  padding:7px 5px;
  gap:5px;
}
/* PITCH - REDUCED HEIGHT */
.pitch{
  position:relative;
  overflow:hidden;
  background:repeating-linear-gradient(180deg,var(--pitch-a) 0,var(--pitch-a) 56px,var(--pitch-b) 56px,var(--pitch-b) 112px);
  min-height: 460px;
}
.pitch::after{
  content:'';
  position:absolute;
  inset:0;
  background:radial-gradient(ellipse at 50% 50%,rgba(255,255,255,.022) 0%,rgba(0,0,0,.28) 100%);
  pointer-events:none;
}
.pitch-svg-el{
  position:absolute;
  inset:0;
  width:100%;
  height:100%;
  pointer-events:none;
  z-index:1;
  opacity:.42;
}
.fgrid{
  position:relative;
  z-index:10;
  display:flex;
  flex-direction:column;
  align-items:center;
  padding:clamp(4px,1.2vw,12px) clamp(5px,1.2vw,14px);
  gap:clamp(4px,1.2vw,12px);
  min-height: 100%;
}
.frow{
  display:flex;
  justify-content:center;
  gap:clamp(5px,1.3vw,14px);
  width:100%;
  flex-wrap: wrap;
}
/* JERSEY SLOT - enhanced shirt+shorts look */
.pslot{
  display:flex;
  flex-direction:column;
  align-items:center;
  cursor:pointer;
  position:relative;
  transition:transform .2s;
  user-select:none;
  background: rgba(0,0,0,0.3);
  border-radius: 24px;
  padding: 6px 8px 8px 8px;
  backdrop-filter: blur(2px);
}
.pslot:hover{
  transform:scale(1.05) translateY(-3px);
  background: rgba(0,0,0,0.5);
}
.pslot.act{
  transform:scale(1.08) translateY(-4px);
  background: rgba(200,244,0,0.1);
  box-shadow: 0 0 12px rgba(200,244,0,0.3);
}
.jersey-combo{
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 2px;
}
.jsw{
  filter:drop-shadow(0 4px 12px rgba(0,0,0,.7));
  transition:filter .2s;
  width:clamp(55px,8vw,90px);
}
.shorts-slot{
  margin-top: -6px;
  width: clamp(40px,6vw,70px);
}
.sbar{
  width:100%;
  display:flex;
  align-items:center;
  justify-content:center;
  gap:4px;
  margin-top: 2px;
}
.spct{
  font-family:var(--hd);
  font-size:clamp(.5rem,.9vw,.7rem);
  color:var(--lime);
  text-shadow:0 1px 4px rgba(0,0,0,.9);
}
.sflag{
  width:clamp(14px,2vw,20px);
  height:auto;
  border-radius:2px;
  overflow:hidden;
  box-shadow:0 1px 3px rgba(0,0,0,.55);
}
.slbl{
  font-family:var(--cd);
  font-size:clamp(.5rem,.8vw,.65rem);
  font-weight:700;
  color:rgba(255,255,255,.9);
  text-shadow:0 1px 5px rgba(0,0,0,.95);
  text-align:center;
  white-space:nowrap;
  margin-top: 3px;
}
.stag{
  font-family:var(--cd);
  font-size:clamp(.4rem,.7vw,.55rem);
  background:rgba(0,0,0,.55);
  border:1px solid rgba(200,244,0,.28);
  border-radius:9px;
  padding:1px 5px;
  color:var(--lime);
  margin-top:2px;
}
/* LEFT STAND CONTENT */
.prog-sec{padding:6px 3px}
.prog-ttl{font-family:var(--cd);font-size:.68rem;font-weight:700;letter-spacing:2px;
  text-transform:uppercase;color:var(--lime);margin-bottom:5px;display:flex;align-items:center;gap:4px}
.spill{background:rgba(0,0,0,.38);border:1px solid var(--border);border-radius:9px;
  padding:6px 8px;margin-bottom:4px;display:flex;justify-content:space-between;align-items:center}
.sk{font-family:var(--cd);font-size:.6rem;letter-spacing:1px;color:var(--sub)}
.sv{font-family:var(--hd);font-size:1.05rem;color:var(--lime)}
.sv.gold{color:var(--gold)}.sv.red{color:var(--red)}
.ycrow{display:flex;gap:3px;margin-top:3px}
.yc{width:12px;height:16px;border-radius:2px;background:rgba(255,215,0,.12);border:1px solid rgba(255,215,0,.28);transition:all .3s}
.yc.on{background:var(--gold);box-shadow:0 0 5px var(--gold)}
/* RIGHT STAND CONTENT */
.rsi{flex:1;display:flex;flex-direction:column;overflow-y:auto;padding:7px 5px;gap:5px;scrollbar-width:thin}
.ctbar{font-family:var(--cd);font-size:.72rem;font-weight:700;letter-spacing:1.5px;color:var(--lime);
  padding:3px 2px 5px;border-bottom:1px solid rgba(200,244,0,.16);margin-bottom:3px;
  display:flex;align-items:center;gap:4px;text-transform:uppercase}
.mcard{background:rgba(0,0,0,.36);border:1px solid var(--border);border-radius:9px;
  padding:7px 8px;margin-bottom:4px;animation:fadeIn .22s ease both;transition:border-color .2s}
.mcard:hover{border-color:rgba(200,244,0,.28)}
.mteams{display:flex;align-items:center;justify-content:space-between;gap:3px;margin-bottom:5px}
.tnm{font-family:var(--cd);font-size:.7rem;font-weight:600;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis; display:flex; align-items:center; gap:4px;}
.tnm.aw{text-align:right; justify-content:flex-end;}
.sinps{display:flex;align-items:center;gap:3px;flex-shrink:0}
.sinp{width:28px;height:26px;border-radius:5px;background:rgba(0,0,0,.5);border:1.4px solid rgba(255,255,255,.19);
  color:var(--lime);text-align:center;font-family:var(--hd);font-size:.92rem;outline:none;transition:border-color .18s}
.sinp:focus{border-color:var(--lime);animation:scoreFlash .35s ease}
.sinp:disabled{color:#2a2a2a;border-color:#181818}
.ssep{font-family:var(--hd);font-size:.75rem;color:var(--sub)}
.mfoot{display:flex;justify-content:space-between;align-items:center}
.pbadge{font-family:var(--cd);font-size:.57rem;font-weight:700;
  background:rgba(200,244,0,.09);color:var(--lime);border:1px solid rgba(200,244,0,.22);padding:2px 6px;border-radius:18px}
.lbadge{font-size:.57rem;padding:2px 7px;border-radius:18px;font-family:var(--cd);font-weight:700;cursor:pointer;transition:all .18s;letter-spacing:.4px}
.l-off{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.14);color:var(--sub)}
.l-off:hover{border-color:var(--lime);color:var(--lime)}
.l-on{background:rgba(200,244,0,.16);border:1px solid rgba(200,244,0,.48);color:var(--lime)}
.l-on:hover{background:rgba(230,57,70,.15);border-color:var(--red);color:var(--red)}
/* YELLOW FLAG */
.yfl{position:fixed;z-index:9000;pointer-events:none;font-size:2rem;animation:flagFly 1.45s ease-out forwards;top:50%;left:50%}
/* TOAST */
.toast{position:fixed;bottom:clamp(12px,3vw,22px);left:50%;transform:translateX(-50%);z-index:8000;
  background:linear-gradient(90deg,#0a1a0a,#152515);border:1.5px solid var(--lime);color:var(--lime);
  padding:7px 18px;border-radius:40px;font-family:var(--cd);font-size:.8rem;letter-spacing:1px;
  pointer-events:none;white-space:nowrap;animation:fadeIn .3s ease,fadeOut .4s ease 2s forwards}
/* BOTTOM */
.bot-strip{grid-column:1/-1;background:linear-gradient(0deg,#060c10,var(--stand3));
  border-top:1px solid var(--border);padding:4px 16px 7px;
  display:flex;align-items:center;justify-content:center;gap:8px;flex-wrap:wrap}
.ftxt{font-family:var(--cd);font-size:.58rem;letter-spacing:2px;color:var(--sub);text-transform:uppercase}
/* MODAL */
.overlay{position:fixed;inset:0;z-index:500;background:rgba(0,0,0,.82);
  display:flex;align-items:center;justify-content:center;padding:14px;backdrop-filter:blur(4px);animation:fadeIn .2s ease}
.modal{background:linear-gradient(145deg,var(--stand2),var(--stand));border:1px solid rgba(200,244,0,.22);
  border-radius:16px;padding:18px;max-width:460px;width:100%;max-height:88vh;overflow-y:auto;
  box-shadow:0 24px 60px rgba(0,0,0,.7)}
.mhdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.mttl{font-family:var(--hd);font-size:1.45rem;letter-spacing:2px;color:var(--lime)}
.cbtn{width:28px;height:28px;border-radius:50%;background:rgba(255,255,255,.07);border:1px solid var(--border);
  color:var(--sub);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:.85rem;transition:all .18s}
.cbtn:hover{background:rgba(230,57,70,.18);border-color:var(--red);color:var(--red)}
.agrid{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-top:7px}
.acard{background:rgba(0,0,0,.38);border:1px solid var(--border);border-radius:9px;
  padding:9px;cursor:pointer;transition:all .18s}
.acard:hover{border-color:rgba(200,244,0,.38);background:rgba(200,244,0,.06)}
.acard.pk{border-color:var(--lime);background:rgba(200,244,0,.11)}
.aname{font-family:var(--cd);font-size:.8rem;font-weight:700;margin-bottom:2px}
.aclub{font-size:.63rem;color:var(--sub)}
/* AD CONTAINERS - VIDEO ADS NEXT TO PITCH */
.ad-video-h{
  width: 100%;
  height: 100%;
  background: #000;
  overflow: hidden;
  position: relative;
}
.ad-video-v{
  width: 100%;
  height: 100%;
  background: #000;
  overflow: hidden;
  position: relative;
}
.ad-video-h iframe, .ad-video-v iframe{
  width: 100%;
  height: 100%;
  object-fit: cover;
  border: none;
}
.team-icon {
  width: 22px;
  height: 22px;
  object-fit: contain;
  border-radius: 4px;
  background: rgba(0,0,0,0.3);
}
@media(max-width:900px){
  .stadium{
    grid-template-columns: clamp(180px, 28vw, 240px) 1fr clamp(180px, 28vw, 240px);
  }
  .slbl, .stag{font-size: 0.5rem;}
}
@media(max-width:700px){
  .slbl,.stag{display:none}
  .jsw{width:clamp(42px,12vw,65px) !important}
  .shorts-slot{width: clamp(30px,8vw,50px) !important}
  .team-icon { width: 18px; height: 18px; }
}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useEffect,useRef,useCallback,useMemo}=React;

// YouTube video IDs for ads (short, football/sports related, loopable)
const HORIZONTAL_VIDEO_ID = "iDdhqRxyf2M";   // football highlights
const VERTICAL_VIDEO_ID = "KPL7cGpXhGc";     // stadium atmosphere

// Helper to build image paths (adjust base path as needed)
const imgPath = (folder, filename) => `images/${folder}/${filename}`;
const clubIcon = (name) => {
  const map = {
    "Liverpool": "liverpool-fc.png", "Arsenal": "arsenal-fc.png", "Man City": "manchester-city.png",
    "Chelsea": "chelsea-footballogos-orq.png", "Tottenham": "tottenham-hotspur.png", "Man Utd": "manchester-united.png",
    "Real Madrid": "real-madrid-footballlogos-org.png", "Barcelona": "fc-barcelona-footballogos-org.png",
    "Atletico": "atletico-madrid-footballlogos-org.png", "Sevilla": "sevilla-fc-footballlogos-org.png",
    "Villarreal": "villarreal-cf-footballlogos-org.png", "Betis": "real-betis.png", "Athletic": "athletic-bilbao.png",
    "R.Sociedad": "real-sociedad.png", "Inter Milan": "inter-milan-footballlogos-org.png",
    "Juventus": "juventus-footballogos-org.png", "AC Milan": "ac-milan-footballlogos-org.png",
    "Napoli": "napoli-footballlogos-org.png", "Roma": "roma-footballlogos-org.png",
    "Lazio": "ss-lazio.png", "Atalanta": "atalanta.png", "Fiorentina": "fiorentina.png",
    "Bayern": "bayern-munich-footballlogos-org.png", "Dortmund": "borussia-dortmund-footballlogo5-org.png",
    "Leverkusen": "bayer-leverkusen-footballlogos-org.png", "RB Leipzig": "rb-leipzig-footballlogos-org.png",
    "Stuttgart": "vfb-stuttgart.png", "Frankfurt": "eintracht-frankfurt.png",
    "Wolfsburg": "vfl-wolfsburg.png", "Freiburg": "sc-freiburg.png",
    "PSG": "paris-saint-germain-footballlogos-org.png", "Monaco": "as-monaco-footballlogos-org.png",
    "Marseille": "olympique-de-marseille-footballlogos-o.png", "Lyon": "olympique-lyonnais-footballogos-org.png",
    "Rennes": "stade-rennais-footballlogos-org-png", "Lille": "losc-lille.png", "Nice": "ogc-nice.png", "Lens": "rc-lens.png"
  };
  let file = map[name] || "default-club.png";
  return imgPath("clubs", file);
};
const countryIcon = (nation) => {
  const countryMap = {
    "England": "england-national-team-footballlogos-or..", "France": "france-national-team-footballlogos-org.N",
    "Spain": "spain-national-team-footballogos-org.p...", "Germany": "germany-national-team-footballlogos-o...",
    "Italy": "italy-national-team.png", "UEFA": "uefa.png", "World": "world.png",
    "Europe": "europe.png", "Global": "global.png", "Stats": "stats.png"
  };
  let file = countryMap[nation] || "default-country.png";
  return imgPath("countries", file);
};
const leagueLogo = (leagueId) => {
  const map = {
    epl: "premier-league-footballlogos-org.png",
    liga: "laliga-footballlogos-org.png",
    serie: "seria-a-footballlogos-org.png",
    bundes: "bundesliga-footballlogos-org.pg",

function calcPts(ph,pa,ah,aa){
  if(ph===ah&&pa===aa)return 20;
  const pr=Math.sign(ph-pa),ar=Math.sign(ah-aa);
  if(pr===ar){if(Math.abs(ph-ah)<=1&&Math.abs(pa-aa)<=1)return 14;return 10;}
  if(Math.abs((ph-pa)-(ah-aa))<=1)return 5;
  return 0;
}
function adj(h,a){
  let r=parseInt(h.slice(1,3),16),g=parseInt(h.slice(3,5),16),b=parseInt(h.slice(5,7),16);
  return `#${[r,g,b].map(x=>Math.min(255,Math.max(0,Math.round(x+255*a))).toString(16).padStart(2,'0')).join('')}`;
}

const MCard=({match:m,idx,cid,preds,locked,onPred,onLock,gw})=>{
  const k=`${cid}_gw${gw}_${idx}`;
  const p=preds[k]||{h:'',a:''};
  const isl=locked[k];
  const c=m.actual;
  const pts=c&&p.h!==''&&p.a!==''?calcPts(+p.h,+p.a,c.h,c.a):null;
  return(
    <div className="mcard">
      <div className="mteams">
        <div className="tnm"><img className="team-icon" src={clubIcon(m.h)} alt="logo" onError={(e)=>e.target.style.display='none'} /> {m.h}</div>
        <div className="sinps">

          <span className="ssep">:</span>
          <input className="sinp" type="number" min="0" max="20" value={p.a} disabled={isl}
            onChange={e=>onPred(k,{...p,a:e.target.value})} placeholder="–"/>

        <div className="tnm aw">{m.a} <img className="team-icon" src={clubIcon(m.a)} alt="logo" onError={(e)=>e.target.style.display='none'} /></div>

        <span className="pbadge">{pts!==null?`+${pts} pts`:'20 pts max'}</span>
        <button className={`lbadge ${isl?'l-on':'l-off'}`} onClick={()=>onLock(k,cid)}>
          {isl?'🔒 Locked · Unlock':'🔓 Lock'}
        </button>
      </div>
    </div>
  );
};

      {yc>=5&&<div style={{marginTop:5,padding:'4px 7px',borderRadius:7,background:'rgba(230,57,70,.13)',border:'1px solid rgba(230,57,70,.38)',fontFamily:'Barlow Condensed',fontSize:'.62rem',letterSpacing:.8,color:'var(--red)'}}><i class="fas fa-ban"></i> SUSPENDED · Miss next GW</div>}
      <div style={{marginTop:8}}>
        <div style={{fontFamily:'Barlow Condensed',fontSize:'.6rem',letterSpacing:1.5,color:'rgba(200,244,0,.58)',marginBottom:3,textTransform:'uppercase'}}><i class="fas fa-history"></i> GW History</div>
        {gwH.map(h=>(
          <div key={h.g} style={{display:'flex',justifyContent:'space-between',padding:'2px 0',borderBottom:'1px solid rgba(255,255,255,.04)',fontSize:'.6rem'}}>
            <span style={{color:'rgba(255,255,255,.42)',fontFamily:'Barlow Condensed',letterSpacing:.8}}>GW{h.g}</span>
            <span style={{fontFamily:'Bebas Neue',color:h.p>=50?'#c8f400':h.p>=30?'#ffd700':'rgba(255,255,255,.45)'}}>+{h.p}</span>
          </div>
        ))}
      </div>
      <div style={{marginTop:9,padding:'5px 7px',borderRadius:7,background:'rgba(0,0,0,.38)',border:'1px solid rgba(255,255,255,.05)'}}>
        <div style={{fontFamily:'Barlow Condensed',fontSize:'.58rem',letterSpacing:1.5,color:'rgba(200,244,0,.55)',marginBottom:2,textTransform:'uppercase'}}><i class="fas fa-ranking-star"></i> Rank</div>
        <div style={{fontFamily:'Bebas Neue',fontSize:'1rem',color:'#ffd700'}}>
          {pts>200?'⭐ Elite Gaffer':pts>100?'🔥 Senior Gaffer':'🌱 Junior Gaffer'}
        </div>
      </div>
    </div>
  );
};

/* Comp Picker Modal (unchanged) */
const CompPicker=({count,sel,onToggle,onClose})=>(
  <div className="overlay" onClick={onClose}>
    <div className="modal" onClick={e=>e.stopPropagation()}>
      <div className="mhdr">
        <div className="mttl"><i class="fas fa-futbol"></i> PICK {count} COMPETITIONS</div>
        <button className="cbtn" onClick={onClose}>✕</button>
      </div>
      <p style={{fontFamily:'Barlow Condensed',fontSize:'.7rem',color:'rgba(255,255,255,.42)',marginBottom:11,letterSpacing:.4}}>Select {count} competitions ({sel.length}/{count})</p>
      <div className="agrid">
        {ALL_COMPS.map(c=>(
          <div key={c.id} className={`acard${sel.includes(c.id)?' pk':''}`} onClick={()=>onToggle(c.id)}>
            <div style={{marginBottom:4}}><JerseySVG c={c.jc} sc={c.sc} nc={c.nc} num={c.num} em={c.em} w={34}/></div>
            <div className="aname">{c.short}</div><div className="aclub">{c.name}</div>
          </div>
        ))}
      </div>
      {sel.length===count&&<button className="nbtn nbtn-a" style={{width:'100%',marginTop:12,padding:'9px'}} onClick={onClose}><i class="fas fa-check"></i> Confirm</button>}
    </div>
  </div>
);

/* Formation - jersey slots (unchanged) */
const Formation=({ac,onSel,preds,locked,mode,enComps})=>{
  const getAcc=id=>{
    const c=COMPS[id];if(!c||!c.teams.length)return'—';
    let tot=0,earn=0;
    c.teams.forEach((_,i)=>{
      const k=`${id}_gw32_${i}`,p=preds[k],a=c.teams[i].actual;
      if(p&&a){tot+=20;earn+=calcPts(+p.h,+p.a,a.h,a.a);}else tot+=20;
    });
    return tot?`${Math.round((earn/tot)*100)}%`:'0%';
  };
  const vis=id=>mode==='Full 11'||enComps.includes(id);
  const rows=[
    [{id:'epl'}],
    [{id:'liga'},{id:'bundes'},{id:'serie'},{id:'ligue'}],
    [{id:'ucl'},{id:'uel'},{id:'wc'}],
    [{id:'champs'},{id:'awards'},{id:'stats'}],
  ];
  return(
    <div className="fgrid">
      <PitchMarks/>
      {rows.map((row,ri)=>(
        <div key={ri} className="frow">
          {row.map(({id})=>(
            <PSlot key={id} comp={COMPS[id]} active={ac===id} vis={vis(id)}
              pct={getAcc(id)} onClick={()=>vis(id)&&onSel(id)}/>
          ))}
        </div>
      ))}
    </div>
  );
};

/* YouTube Ad Components (unchanged) */
const HorizontalAd = () => {
  return (
    <div className="ad-video-h">
      <iframe 
        src={`https://www.youtube.com/embed/${HORIZONTAL_VIDEO_ID}?autoplay=1&mute=1&loop=1&playlist=${HORIZONTAL_VIDEO_ID}&controls=0&modestbranding=1&rel=0`}
        title="Horizontal Ad"
        allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
        allowFullScreen
      ></iframe>
    </div>
  );
};

const VerticalAd = () => {
  return (
    <div className="ad-video-v">
      <iframe 
        src={`https://www.youtube.com/embed/${VERTICAL_VIDEO_ID}?autoplay=1&mute=1&loop=1&playlist=${VERTICAL_VIDEO_ID}&controls=0&modestbranding=1&rel=0`}
        title="Vertical Ad"
        allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
        allowFullScreen
      ></iframe>
    </div>
  );
};

/* Main App (unchanged structure, only image integration already done) */
function App(){
  const [gw,setGw]=useState(32);
  const [ac,setAc]=useState('epl');
  const [mode,setMode]=useState('Full 11');
  const [preds,setPreds]=useState({});
  const [locked,setLocked]=useState({});
  const [yc,setYc]=useState(0);
  const [pts,setPts]=useState(134);
  const [flags,setFlags]=useState([]);
  const [toasts,setToasts]=useState([]);
  const [champPicks,setChampPicks]=useState({});
  const [tscorer,setTscorer]=useState(null);
  const [tassist,setTassist]=useState(null);
  const [bpick,setBpick]=useState(null);
  const [kpick,setKpick]=useState(null);
  const [gbpick,setGbpick]=useState(null);
  const [enComps,setEnComps]=useState(['epl','ucl']);
  const [showPicker,setShowPicker]=useState(false);
  const fid=useRef(0);

  const addToast=(msg,color='var(--lime)')=>{
    const id=Date.now()+Math.random();
    setToasts(t=>[...t,{id,msg,color}]);
    setTimeout(()=>setToasts(t=>t.filter(x=>x.id!==id)),2700);
  };
  const fireFlag=useCallback(()=>{
    const id=++fid.current;
    setFlags(f=>[...f,{id}]);
    setTimeout(()=>setFlags(f=>f.filter(x=>x.id!==id)),1550);
  },[]);

  const handlePred=(k,v)=>{
    setPreds(p=>({...p,[k]:v}));
    const parts=k.split('_');
    const cid=parts[0];const idx=+parts[2];
    const c=COMPS[cid];
    if(c&&c.teams[idx]?.actual&&v.h!==''&&v.a!==''){
      const a=c.teams[idx].actual;
      setPts(p=>p+calcPts(+v.h,+v.a,a.h,a.a));
    }
  };

  const handleLock=(k,cid)=>{
    if(locked[k]){
      if(yc>=5){addToast('⛔ SUSPENDED – Cannot unlock!','var(--red)');return;}
      fireFlag();
      setYc(c=>Math.min(5,c+1));
      setLocked(l=>({...l,[k]:false}));
      const ded=Math.min(20,5*Math.max(0,gw-28));
      setPts(p=>Math.max(0,p-ded));
      addToast(`🟨 Yellow card issued! −${ded} pts`,'var(--gold)');
    }else{
      setLocked(l=>({...l,[k]:true}));
      addToast('🔒 Prediction locked!');
    }
  };

  const handleGW=(d)=>{
    if(d<0&&gw<=1)return;if(d>0&&gw>=38)return;
    setGw(g=>g+d);
    addToast(d>0?`⏩ GW${gw+1}`:`⏪ GW${gw-1}`);
  };

  const handleMode=(m)=>{
    setMode(m);
    if(m!=='Full 11')setShowPicker(true);
    addToast(`Mode: ${m}`);
  };

  const handlePickerToggle=(id)=>{
    const max=MODE_CNT[mode]||11;
    setEnComps(c=>{
      if(c.includes(id))return c.filter(x=>x!==id);
      if(c.length>=max)return c;
      return [...c,id];
    });
  };

  const handleAward=(type,name)=>{
    if(type==='ballon'){setBpick(name);addToast(`Ballon d'Or: ${name}`);}
    else if(type==='kopa'){setKpick(name);addToast(`Kopa: ${name}`);}
    else{setGbpick(name);addToast(`Golden Boy: ${name}`);}
  };

  const handleTop=(type,name)=>{
    if(type==='s'){setTscorer(name);addToast(`Top Scorer: ${name}`);}
    else{setTassist(name);addToast(`Top Assists: ${name}`);}
  };

  return(
    <div className="stadium-wrapper">
      <div className="stadium">
        {/* TOP BAR */}
        <div className="top-bar">
          <div className="top-row">
            <div className="brand"><i class="fas fa-futbol"></i> Gaffer's Pick</div>
            <div className="nav-links">
              {['Pitch','World Cup','Street','Account'].map(l=>(
                <button key={l} className={`nbtn ${l==='Pitch'?'nbtn-a':'nbtn-d'}`}>
                  {l==='Pitch'?<i class="fas fa-chart-line"></i>:l==='World Cup'?<i class="fas fa-globe"></i>:l==='Street'?<i class="fas fa-city"></i>:<i class="fas fa-user"></i>} {l}
                </button>
              ))}
            </div>
          </div>
          <div className="mode-bar">
            <span className="mode-lbl"><i class="fas fa-gamepad"></i> MODE:</span>
            {MODES.map(m=>(
              <button key={m} className={`mbtn ${mode===m?'mbtn-on':'mbtn-off'}`} onClick={()=>handleMode(m)}>
                {m==='1v1'?'1v1':m==='2v2'?'2v2':m==='5-Aside'?'5⃣':m==='7-Aside'?'7⃣':<><i class="fas fa-users"></i> Full 11</>}
              </button>
            ))}
          </div>
        </div>

        {/* GW ROW */}
        <div className="gw-row">
          <div className="wbtn" onClick={()=>handleGW(-1)}>
            <i class="fas fa-arrow-left"></i>
            <span className="tip">Prev GW</span>
          </div>
          <div className="ref-fig"><div className="rf-head">🧑‍⚖️</div><div className="rf-body">🟨</div><div className="rf-str"/></div>
          <div className="gw-disp">
            <i class="fas fa-calendar-alt"></i> GW {gw}
          </div>
          <div className="ref-fig"><div className="rf-head">🧑‍⚖️</div><div className="rf-body">📋</div><div className="rf-str"/></div>
          <div className="wbtn" onClick={()=>handleGW(1)}>
            <i class="fas fa-arrow-right"></i>
            <span className="tip">Next GW</span>
          </div>
          <div className="wbtn" onClick={()=>handleLock(`test_gw${gw}_0`,'epl')}
            style={{borderColor:'var(--gold)',color:'var(--gold)'}} title="Test Yellow Card">
            🟨
            <span className="tip">Test Card</span>
          </div>
        </div>

        {/* LEFT STAND with Horizontal Video Ad at top and bottom */}
        <div className="ss">
          <div style={{height: '100px', overflow: 'hidden'}}>
            <HorizontalAd />
          </div>
          <div className="ss-inner">
            <LeftContent pts={pts} gw={gw} yc={yc} preds={preds} locked={locked}/>
          </div>
          <div style={{height: '80px', overflow: 'hidden'}}>
            <HorizontalAd />
          </div>
        </div>

        {/* PITCH */}
        <div className="pitch">
          <Formation ac={ac} onSel={setAc} preds={preds} locked={locked} mode={mode} enComps={enComps}/>
        </div>

        {/* RIGHT STAND with Vertical Video Ad */}
        <div className="ss rs">
          <div style={{height: '100px', overflow: 'hidden'}}>
            <HorizontalAd />
          </div>
          <div className="rsi">
            <RightContent ac={ac} preds={preds} locked={locked} onPred={handlePred} onLock={handleLock}
              gw={gw} champPicks={champPicks} onChamp={(l,t)=>{setChampPicks(p=>({...p,[l]:t}));addToast(`${COMPS[l]?.short} champion: ${t}`);}}
              tscorer={tscorer} tassist={tassist} onTop={handleTop}
              bpick={bpick} kpick={kpick} gbpick={gbpick} onAward={handleAward}/>
          </div>
          <div style={{height: '80px', overflow: 'hidden'}}>
            <HorizontalAd />
          </div>
        </div>

        {/* BOTTOM */}
        <div className="bot-strip">
          <span className="ftxt"><i class="far fa-copyright"></i> Gaffer's Pick 2026 · Predict · Lock · Win</span>
          <span style={{color:'rgba(200,244,0,.35)',fontSize:'.57rem',fontFamily:'Barlow Condensed',letterSpacing:.8}}>⚡ Designed by Muhia · 0724726032</span>
        </div>

        {/* FLAGS & TOASTS */}
        {flags.map(f=><div key={f.id} className="yfl">🚩</div>)}
        {toasts.map(t=>(
          <div key={t.id} className="toast" style={{borderColor:t.color,color:t.color}}><i class="fas fa-info-circle"></i> {t.msg}</div>
        ))}

        {/* PICKER */}
        {showPicker&&mode!=='Full 11'&&(
          <CompPicker count={MODE_CNT[mode]} sel={enComps}
            onToggle={handlePickerToggle} onClose={()=>setShowPicker(false)}/>
        )}
      </div>
    </div>
  );
}

const root=ReactDOM.createRoot(document.getElementById('root'));
root.render(<App/>);
</script>
</body>
</html>
