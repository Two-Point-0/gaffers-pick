<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Gaffer's Pick · Stadium Predictor</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@300;400;600;700;800;900&family=Barlow:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --lime:#c8f400;--gold:#ffd700;--red:#e63946;--cyan:#00d4ff;--purple:#9b59b6;
  --bg:#060b10;--border:rgba(255,255,255,.07);
  --text:#e8edf2;--sub:rgba(232,237,242,.48);
  --hd:'Bebas Neue',cursive;--cd:'Barlow Condensed',sans-serif;--bd:'Barlow',sans-serif;
  --seat:#0d2a14;--seat-on:#c8f400;
  --nav-h:68px;--hdr-h:46px;--gw-h:40px;
}
html,body{width:100%;height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:var(--bd)}
#root{width:100%;height:100%}
::-webkit-scrollbar{width:3px;height:3px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:rgba(200,244,0,.2);border-radius:3px}

/* ANIMATIONS */
@keyframes sL{from{transform:translateX(0)}to{transform:translateX(-100%)}}
@keyframes sR{from{transform:translateX(0)}to{transform:translateX(100%)}}
@keyframes cL{from{transform:translateX(-100%)}to{transform:translateX(0)}}
@keyframes cR{from{transform:translateX(100%)}to{transform:translateX(0)}}
@keyframes adH{from{transform:translateX(0)}to{transform:translateX(-50%)}}
@keyframes adHR{from{transform:translateX(-50%)}to{transform:translateX(0)}}
@keyframes adV{from{transform:translateY(0)}to{transform:translateY(-50%)}}
@keyframes adVR{from{transform:translateY(-50%)}to{transform:translateY(0)}}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes pulse{0%,100%{opacity:.5}50%{opacity:1}}
@keyframes glow{0%,100%{box-shadow:0 0 6px rgba(200,244,0,.15)}50%{box-shadow:0 0 18px rgba(200,244,0,.5)}}
@keyframes hPulse{0%,100%{text-shadow:0 0 18px rgba(200,244,0,.1)}50%{text-shadow:0 0 36px rgba(200,244,0,.4)}}
@keyframes pUp{0%{opacity:1;transform:translateY(0)scale(1)}100%{opacity:0;transform:translateY(-32px)scale(1.4)}}
@keyframes toastIn{from{opacity:0;transform:translate(-50%,10px)}to{opacity:1;transform:translate(-50%,0)}}
@keyframes toastOut{to{opacity:0;transform:translate(-50%,-8px)}}
@keyframes chipShine{0%{background-position:200% center}100%{background-position:-200% center}}
@keyframes chipPop{0%{transform:scale(1)}50%{transform:scale(1.12)}100%{transform:scale(1)}}
@keyframes starSpin{from{transform:rotate(0)}to{transform:rotate(360deg)}}
@keyframes seatWave{0%{background:var(--seat)}50%{background:rgba(200,244,0,.5)}100%{background:var(--seat)}}
@keyframes ballMove{0%{left:50%;top:50%}20%{left:30%;top:35%}40%{left:65%;top:28%}60%{left:72%;top:62%}80%{left:38%;top:68%}100%{left:50%;top:50%}}

/* ══ LAYOUT ══ */
.app{display:grid;grid-template-rows:var(--hdr-h) 1fr var(--nav-h);height:100vh;overflow:hidden}

/* ══ HEADER ══ */
.hdr{
  background:linear-gradient(180deg,#030710,#06101e);
  border-bottom:1px solid rgba(200,244,0,.12);
  display:flex;align-items:center;padding:0 12px;gap:8px;position:relative;z-index:300;
}
.brand{font-family:var(--hd);font-size:clamp(1.2rem,2.6vw,1.75rem);letter-spacing:5px;
  background:linear-gradient(90deg,rgba(255,255,255,.6),var(--lime),rgba(255,255,255,.9),var(--lime));
  background-size:200%;-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  animation:hPulse 3s ease infinite;flex:1;text-align:center}
.pts-pill{display:flex;align-items:center;gap:4px;padding:3px 10px;border-radius:40px;
  background:rgba(255,215,0,.08);border:1px solid rgba(255,215,0,.3);flex-shrink:0}
.pts-v{font-family:var(--hd);font-size:.9rem;color:var(--gold)}
.pts-l{font-family:var(--cd);font-size:.44rem;color:rgba(255,215,0,.5);letter-spacing:1px}
.s-tag{font-family:var(--cd);font-size:.45rem;letter-spacing:3px;color:rgba(200,244,0,.32);flex-shrink:0}
.pts-pop{position:absolute;left:60px;top:50%;transform:translateY(-50%);
  font-family:var(--hd);font-size:1.4rem;color:var(--lime);pointer-events:none;z-index:9999;
  animation:pUp 1.1s ease forwards}

/* ══ GW mini-scroll inside account panel ══ */
.gw-mini{display:flex;gap:3px;overflow-x:auto;padding:3px 0 5px;scrollbar-width:none;margin-bottom:4px}
.gw-mini::-webkit-scrollbar{display:none}
.gw-dot{display:flex;flex-direction:column;align-items:center;flex-shrink:0;
  padding:3px 5px;border-radius:5px;cursor:pointer;
  border:1px solid rgba(255,255,255,.06);background:rgba(0,0,0,.38);min-width:34px;transition:all .16s}
.gw-dot:hover{border-color:rgba(200,244,0,.22)}
.gw-dot.cur{border-color:var(--lime);background:rgba(200,244,0,.08)}
.gw-dot-n{font-family:var(--hd);font-size:.62rem;color:var(--sub);line-height:1}
.gw-dot.cur .gw-dot-n{color:var(--lime)}
.gw-dot-p{font-family:var(--cd);font-size:.38rem;font-weight:700;line-height:1;margin-top:1px}
.gw-dot-p.hi{color:var(--gold)}.gw-dot-p.md{color:var(--lime)}.gw-dot-p.lo{color:rgba(255,255,255,.26)}
.gw-dot-bar{width:100%;height:2px;background:rgba(255,255,255,.06);border-radius:2px;overflow:hidden;margin-top:2px}
.gw-dot-fill{height:100%;background:linear-gradient(90deg,var(--lime),#90ff00);border-radius:2px}

/* ══ CHIPS COLUMN — left side of pitch, visible only when roof open ══ */
.chips-col{
  position:absolute;left:0;top:0;bottom:0;z-index:30;
  width:clamp(44px,7vw,70px);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:clamp(3px,.5vw,7px);padding:4px clamp(3px,.5vw,6px);
  background:linear-gradient(180deg,rgba(3,8,16,.96),rgba(6,14,26,.92));
  border-right:1px solid rgba(200,244,0,.08);
  opacity:0;pointer-events:none;transition:opacity .4s;
}
.chips-col.show{opacity:1;pointer-events:all}
.chip-col-btn{
  display:flex;flex-direction:column;align-items:center;gap:2px;
  padding:clamp(4px,.6vw,7px) clamp(3px,.5vw,5px);
  border-radius:8px;cursor:pointer;border:1px solid;
  transition:all .2s;width:100%;position:relative;
}
.chip-col-btn:hover{transform:translateY(-2px);filter:brightness(1.2)}
.chip-col-btn.used{opacity:.35;cursor:default;filter:grayscale(.7)}
.chip-col-icon{font-size:clamp(.9rem,1.6vw,1.3rem);line-height:1}
.chip-col-code{font-family:var(--hd);font-size:clamp(.28rem,.48vw,.42rem);letter-spacing:.5px;text-align:center;line-height:1.1}
.chip-col-pts{font-family:var(--hd);font-size:clamp(.22rem,.36vw,.34rem);opacity:.65;text-align:center}
.chip-col-tip{
  position:fixed;background:rgba(3,8,18,.97);
  border-radius:9px;padding:9px 13px;min-width:165px;max-width:205px;
  z-index:3000;animation:fadeUp .14s ease;pointer-events:none;
}
.chip-col-tip .ct-title{font-family:var(--hd);font-size:.9rem;letter-spacing:1.5px;margin-bottom:3px}
.chip-col-tip .ct-effect{font-family:var(--cd);font-size:.56rem;font-weight:700;margin-bottom:2px}
.chip-col-tip .ct-desc{font-family:var(--cd);font-size:.5rem;color:var(--sub);line-height:1.4}
.chip-col-tip .ct-award{font-family:var(--cd);font-size:.46rem;color:rgba(255,215,0,.58);margin-top:4px;font-style:italic}

/* court offset when chips visible */
.court-inner{position:absolute;inset:0;transition:left .4s;right:0}
.court-inner.chips-on{left:clamp(44px,7vw,70px)}
.gwbar{
  background:linear-gradient(90deg,#030810,#060f1c,#030810);
  border-bottom:1px solid rgba(200,244,0,.08);
  display:flex;align-items:stretch;overflow-x:auto;overflow-y:hidden;
  scrollbar-width:none;z-index:290;position:relative;
}
.gwbar::-webkit-scrollbar{display:none}
.gw-item{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  flex-shrink:0;padding:2px 7px;cursor:pointer;border-bottom:2px solid transparent;
  transition:all .18s;min-width:clamp(44px,7vw,64px);gap:0;opacity:.38;
}
.gw-item:hover{opacity:.7;background:rgba(200,244,0,.03)}
.gw-item.act{border-bottom-color:var(--lime);opacity:1;background:rgba(200,244,0,.05);min-width:clamp(70px,11vw,96px)}
.gw-item.done{opacity:.55}
.gw-num{font-family:var(--hd);font-size:clamp(.62rem,1.1vw,.82rem);color:var(--sub);letter-spacing:1px;line-height:1.1}
.gw-item.act .gw-num{color:var(--lime);font-size:clamp(.8rem,1.5vw,1.05rem)}
.gw-pts{font-family:var(--cd);font-size:clamp(.3rem,.52vw,.44rem);font-weight:700;letter-spacing:.5px;line-height:1}
.gw-pts.hi{color:var(--gold)}.gw-pts.md{color:var(--lime)}.gw-pts.lo{color:rgba(255,255,255,.28)}
.gw-sep{width:1px;height:14px;background:rgba(255,255,255,.06);flex-shrink:0;align-self:center}
.live-dot{width:5px;height:5px;border-radius:50%;background:var(--red);animation:pulse 1s infinite;display:inline-block;margin-right:2px}
.live-tag{font-family:var(--cd);font-size:.4rem;color:var(--red);letter-spacing:.8px;font-weight:700}

/* ══ STADIUM ══ */
.stadium{
  display:grid;
  /* side panels take full width edge-to-edge, stands narrow */
  grid-template-columns: clamp(120px,17vw,210px) clamp(16px,2.5vw,36px) 1fr clamp(16px,2.5vw,36px) clamp(120px,17vw,210px);
  overflow:hidden;
}

/* ══ SIDE PANELS (edge to edge of pitch) ══ */
.sp{
  display:flex;flex-direction:column;overflow:hidden;
  background:linear-gradient(180deg,#030810,#06101a);
  transition:all .4s;
}
.sp.l{border-right:1px solid rgba(200,244,0,.08)}
.sp.r{border-left:1px solid rgba(200,244,0,.08)}

/* Side panels always visible, content switches based on roof state */
.sp.roof-closed{opacity:1;pointer-events:all}
.sp.roof-open{opacity:1;pointer-events:all}

/* The fixed header strip at top of side panel (account / predictions) */
.sp-fixed{
  flex:1;overflow:hidden;
  display:flex;flex-direction:column;
}
/* Stats/results panel underneath — only when roof open */
.sp-stats{
  flex:1;overflow-y:auto;overflow-x:hidden;padding:6px 8px;
  opacity:0;pointer-events:none;transform:translateY(6px);
  transition:opacity .35s,transform .35s;
}
.sp-stats.show{opacity:1;pointer-events:all;transform:translateY(0)}

/* Seat stand strips — fill edge to pitch, only when roof open */
.seat-stand{
  display:flex;flex-direction:column;overflow:hidden;
  background:linear-gradient(180deg,#040912,#07101e);
  opacity:0;pointer-events:none;transition:opacity .4s;
  position:absolute;top:0;bottom:0;
}
.seat-stand.show{opacity:1}
.seat-stand.l{left:0;right:auto;border-right:1px solid rgba(200,244,0,.07)}
.seat-stand.r{right:0;left:auto;border-left:1px solid rgba(200,244,0,.07)}
.ss-inner{flex:1;display:flex;flex-direction:column;justify-content:center;padding:3px 2px;gap:1px;overflow:hidden}
.ss-row{display:flex;gap:1px;justify-content:center}
.sv{width:clamp(3px,.58vw,5.5px);height:clamp(2.5px,.45vw,4.5px);border-radius:1px;
  background:var(--seat);flex-shrink:0;transition:background .3s}
.sv.on{background:var(--seat-on)}

/* ══ STAND COLUMNS ══ */
.stand-col{display:flex;flex-direction:column;overflow:hidden;background:linear-gradient(90deg,#040911,#071020)}
.stand-col.r{background:linear-gradient(270deg,#040911,#071020)}
.sc-seats{flex:1;display:flex;flex-direction:column;justify-content:center;gap:1px;padding:1px;overflow:hidden}
.sc-row{display:flex;gap:1px;justify-content:center}
.scv{width:clamp(3px,.56vw,5px);height:clamp(2px,.42vw,4px);border-radius:1px;
  background:var(--seat);flex-shrink:0;transition:background .3s}
.scv.on{background:var(--seat-on)}
.adv-w{width:clamp(9px,1.5vw,18px);background:#000;overflow:hidden;flex-shrink:0}
.adv-i{display:flex;flex-direction:column;height:200%}
.adv-i.go{animation:adV 15s linear infinite}
.adv-i.rv{animation:adVR 15s linear infinite}
.adv-b{display:flex;align-items:center;justify-content:center;flex-shrink:0;min-height:clamp(20px,3.2vw,44px)}
.adv-t{font-family:var(--cd);font-size:clamp(.26rem,.42vw,.38rem);font-weight:900;
  letter-spacing:2px;text-transform:uppercase;writing-mode:vertical-rl;white-space:nowrap}

/* ══ PITCH COLUMN ══ */
.pitch-col{display:flex;flex-direction:column;position:relative;overflow:hidden}
.adh{flex-shrink:0;background:#000;overflow:hidden;height:clamp(14px,1.8vw,22px);
  opacity:0;transition:opacity .4s;pointer-events:none}
.adh.show{opacity:1;pointer-events:all}
.adh-i{display:flex;height:100%;width:200%}
.adh-i.go{animation:adH 16s linear infinite}
.adh-i.rv{animation:adHR 18s linear infinite}
.adh-b{display:flex;align-items:center;justify-content:center;height:100%;
  padding:0 clamp(6px,1.2vw,14px);flex-shrink:0}
.adh-t{font-family:var(--cd);font-size:clamp(.36rem,.62vw,.52rem);font-weight:900;
  letter-spacing:2px;text-transform:uppercase;white-space:nowrap}

/* ══ COURT ══ */
.court{position:absolute;inset:0}
.court.football{background:repeating-linear-gradient(180deg,#1d7a30 0,#1d7a30 38px,#198228 38px,#198228 76px)}
.court.basketball{background:linear-gradient(180deg,#c4500a,#a84009)}
.court.american{background:repeating-linear-gradient(90deg,#2e7d32 0,#2e7d32 56px,#256726 56px,#256726 112px)}
.court.baseball{background:radial-gradient(ellipse 85% 85% at 50% 100%,#6b8f3c,#4a6b2a 58%,#8b5e3c 58%,#7a4f30)}
.court.tennis{background:linear-gradient(180deg,#2e8b57,#236b43)}
.court.rugby{background:repeating-linear-gradient(180deg,#1d7a30 0,#1d7a30 40px,#198228 40px,#198228 80px)}
.court.cricket{background:radial-gradient(ellipse 100% 80% at 50% 50%,#4a7c2f,#3a6422)}
.court.hockey{background:linear-gradient(180deg,#cce8f4,#b8d4e8)}
.court::after{content:'';position:absolute;inset:0;z-index:2;pointer-events:none;
  background:radial-gradient(ellipse 86% 76% at 50% 50%,transparent 22%,rgba(0,0,0,.5) 100%)}
.court-svg{position:absolute;inset:0;width:100%;height:100%;z-index:3;pointer-events:none}

/* Player dots */
.pdot-w{display:flex;flex-direction:column;align-items:center;gap:1px;cursor:pointer;position:relative}
.pdot{width:clamp(16px,2.8vw,30px);height:clamp(16px,2.8vw,30px);border-radius:50%;
  display:flex;align-items:center;justify-content:center;border:2px solid rgba(255,255,255,.28);
  font-family:var(--cd);font-size:clamp(.34rem,.62vw,.54rem);font-weight:900;transition:transform .16s;cursor:pointer}
.pdot:hover{transform:scale(1.2)}
.pdot.hm{background:linear-gradient(145deg,#3D195B,#2a0f3e);color:#fff}
.pdot.aw{background:linear-gradient(145deg,#c22e1c,#8a1f12);color:#fff}
.pdot.nb-h{background:linear-gradient(145deg,#17408B,#0d2a5c);color:#fff}
.pdot.nb-a{background:linear-gradient(145deg,#C9082A,#8a0520);color:#fff}
.pdot.nf-h{background:linear-gradient(145deg,#013369,#011f40);color:#fff}
.pdot.nf-a{background:linear-gradient(145deg,#D50A0A,#8a0507);color:#fff}
.pdot.y{border-color:var(--gold)!important;box-shadow:0 0 7px rgba(255,215,0,.55)}
.p-nm{font-family:var(--cd);font-size:clamp(.26rem,.46vw,.4rem);font-weight:700;
  color:#fff;text-shadow:0 1px 3px rgba(0,0,0,.95);background:rgba(0,0,0,.68);
  padding:1px 3px;border-radius:2px;text-align:center;white-space:nowrap;max-width:40px;overflow:hidden;text-overflow:ellipsis}
.p-rt{font-family:var(--hd);font-size:clamp(.26rem,.46vw,.4rem);padding:1px 3px;border-radius:2px;margin-top:1px;text-align:center}
.rA{background:rgba(200,244,0,.92);color:#000}.rB{background:rgba(46,204,113,.88);color:#000}
.rC{background:rgba(255,215,0,.88);color:#000}.rD{background:rgba(255,140,0,.85);color:#000}.rF{background:rgba(230,57,70,.85);color:#fff}

/* Ball */
.sim-ball{position:absolute;width:clamp(8px,1.4vw,15px);height:clamp(8px,1.4vw,15px);
  border-radius:50%;background:radial-gradient(circle at 35% 35%,#fff,#ccc);
  border:1.5px solid rgba(0,0,0,.35);z-index:22;transition:left 1.5s ease,top 1.5s ease;
  box-shadow:0 2px 7px rgba(0,0,0,.7);pointer-events:none}

/* Stats HUD */
.hud{position:absolute;top:5px;left:50%;transform:translateX(-50%);
  z-index:25;background:rgba(0,0,0,.88);border:1px solid rgba(200,244,0,.16);
  border-radius:8px;padding:4px 8px;min-width:clamp(120px,18vw,175px);pointer-events:none}
.hud-sc{display:flex;align-items:center;justify-content:center;gap:6px;margin-bottom:2px}
.hud-tn{font-family:var(--cd);font-size:clamp(.46rem,.8vw,.65rem);font-weight:700}
.hud-num{font-family:var(--hd);font-size:clamp(.85rem,1.5vw,1.2rem);color:var(--lime);padding:0 4px}
.hud-t{font-family:var(--cd);font-size:clamp(.34rem,.56vw,.48rem);text-align:center;letter-spacing:1px;margin-bottom:2px}
.sbr{display:flex;align-items:center;gap:2px;margin-bottom:2px}
.sbv{font-family:var(--hd);font-size:clamp(.32rem,.54vw,.46rem);min-width:13px}
.sbv.h{color:var(--lime);text-align:right}.sbv.a{color:#f54029}
.sb-l{font-family:var(--cd);font-size:clamp(.28rem,.46vw,.38rem);color:var(--sub);min-width:28px;text-align:center}
.sb-tk{flex:1;height:2px;background:rgba(255,255,255,.07);border-radius:3px;overflow:hidden}
.sb-f{height:100%;border-radius:3px}
.sb-f.h{background:var(--lime)}.sb-f.a{background:#f54029}

/* Events */
.ev-feed{position:absolute;bottom:5px;left:50%;transform:translateX(-50%);
  z-index:26;display:flex;flex-direction:column;gap:2px;align-items:center;pointer-events:none;width:75%}
.ev-i{font-family:var(--cd);font-size:clamp(.4rem,.65vw,.54rem);font-weight:700;
  padding:2px 8px;border-radius:16px;background:rgba(0,0,0,.92);
  border:1px solid rgba(200,244,0,.28);color:var(--lime);animation:fadeUp .2s ease;
  white-space:nowrap;letter-spacing:.7px}
.ev-i.goal{border-color:var(--gold);color:var(--gold)}
.ev-i.card{border-color:var(--red);color:var(--red)}

/* Player tooltip */
.ptip{position:fixed;z-index:9999;background:rgba(0,0,0,.97);
  border:1px solid rgba(200,244,0,.26);border-radius:7px;padding:7px 11px;
  min-width:115px;pointer-events:none;animation:fadeUp .12s ease}
.ptip-n{font-family:var(--hd);font-size:.82rem;color:var(--lime)}
.ptip-r{font-family:var(--cd);font-size:.48rem;color:var(--sub);margin-bottom:3px}
.ptip-row{display:flex;justify-content:space-between;font-family:var(--cd);
  font-size:.52rem;padding:2px 0;border-bottom:1px solid rgba(255,255,255,.04)}
.ptip-row:last-child{border:none}
.ptip-k{color:var(--sub)}.ptip-v{color:var(--lime);font-weight:700}

/* ══ ROOF ══ */
.roof{position:absolute;inset:0;z-index:50;display:flex;pointer-events:none}
.roof-l,.roof-r{width:50%;height:100%;will-change:transform;display:flex;flex-direction:column;overflow:hidden;pointer-events:all}
.roof-l{background:linear-gradient(160deg,#040b14,#091522);border-right:2px solid rgba(200,244,0,.1)}
.roof-r{background:linear-gradient(200deg,#040b14,#091522);border-left:2px solid rgba(200,244,0,.1)}
.roof.opening .roof-l{animation:sL .6s cubic-bezier(.77,0,.18,1) forwards}
.roof.opening .roof-r{animation:sR .6s cubic-bezier(.77,0,.18,1) forwards}
.roof.closing .roof-l{animation:cL .5s cubic-bezier(.77,0,.18,1) forwards}
.roof.closing .roof-r{animation:cR .5s cubic-bezier(.77,0,.18,1) forwards}
.roof.closed .roof-l,.roof.closed .roof-r{transform:translateX(0)}
.roof.opened .roof-l{transform:translateX(-100%)}
.roof.opened .roof-r{transform:translateX(100%)}

/* Roof panels */

.roof-adh-i.rv{animation:adHR 14s linear infinite}

.rh.on{background:var(--seat-on)}

.roof-tog{

.nb{display:flex;flex-direction:column;align-items:center;justify-content:center;

// pts calc
function calcPts(ph,pa,ah,aa,modeId='full11'){
  ph=+ph;pa=+pa;ah=+ah;aa=+aa;
  if([ph,pa,ah,aa].some(isNaN))return 0;
  const m=MODES.find(x=>x.id===modeId)||MODES[4];
  if(ph===ah&&pa===aa)return m.pts.exact;
  const pr=Math.sign(ph-pa),ar=Math.sign(ah-aa);
  if(pr===ar){if(Math.abs(ph-ah)<=1&&Math.abs(pa-aa)<=1)return m.pts.close;return m.pts.result;}
  if(Math.abs((ph-pa)-(ah-aa))<=1)return m.pts.near;
  return 0;
}
function ptsFB(pts,modeId='full11'){
  if(pts===null)return null;
  const m=MODES.find(x=>x.id===modeId)||MODES[4];
  if(pts===m.pts.exact)return{t:'🎯 EXACT!',c:'g'};
  if(pts===m.pts.close)return{t:'✅ Result+Score',c:'l'};
  if(pts===m.pts.result)return{t:'🟡 Correct Result',c:'l'};
  if(pts===m.pts.near)return{t:'🔶 Near Miss',c:'l'};
  return{t:'❌ Miss',c:'r'};
}

// generate matches from league
function genMatches(lid,sport){
  const all=Object.values(ALL_LEAGUES).flat();
  const league=all.find(l=>l.id===lid);
  if(!league)return[];
  const teams=league.teams;
  const statuses=['live','live','finished','upcoming'];
  return Array.from({length:Math.min(teams.length/2,4)},(_,i)=>{
    const h=teams[i*2],a=teams[i*2+1]||teams[0];
    const st=statuses[i]||'finished';
    const sh=st==='upcoming'?0:Math.floor(Math.random()*4);
    const sa=st==='upcoming'?0:Math.floor(Math.random()*3);
    const mn=st==='live'?22+Math.floor(Math.random()*55):st==='finished'?90:0;
    const poss=45+Math.round(Math.random()*18);
    return{
      id:`${lid}_${i}`,h,a,status:st,min:mn,
      score:{h:sh,a:sa},
      stats:{h:{poss,shots:5+Math.floor(Math.random()*12),corners:2+Math.floor(Math.random()*7)},
             a:{poss:100-poss,shots:3+Math.floor(Math.random()*8),corners:1+Math.floor(Math.random()*5)}},
      events:st!=='upcoming'?[
        {min:15+Math.floor(Math.random()*25),type:'goal',team:'h',text:`⚽ ${h.split(' ').pop()} score!`},
        Math.random()>.4?{min:45+Math.floor(Math.random()*30),type:'goal',team:'a',text:`⚽ ${a.split(' ').pop()} level it!`}:null,
      ].filter(Boolean):[],
    };
  });
}

  const hS=match.h.split(' ').pop(),aS=match.a.split(' ').pop();

  return(
    <div className={`chips-col${visible?' show':''}`}>
      {CHIPS.map(ch=>{
        const used=usedChips.includes(ch.id);
        return(
          <div key={ch.id}
            className={`chip-col-btn${used?' used':''}`}
            style={{background:ch.bg,borderColor:ch.border}}
            onClick={()=>!used&&onUseChip(ch.id)}
            onMouseEnter={e=>{setTip(ch.id);setTipPos({x:e.clientX,y:e.clientY});}}
            onMouseLeave={()=>setTip(null)}>
            <span className="chip-col-icon">{ch.icon}</span>
            <span className="chip-col-code" style={{color:ch.color}}>{ch.code}</span>
            <span className="chip-col-pts" style={{color:ch.color}}>{used?'✓':'play'}</span>
          </div>
        );
      })}
      {tip&&(()=>{
        const ch=CHIPS.find(c=>c.id===tip);
        if(!ch)return null;
        const px=Math.min(tipPos.x+14,window.innerWidth-215);

      })()}
    </div>
  );
};

  const [hov,setHov]=useState(null);

    </div>
  );
  const isLive=match.status==='live',isDone=match.status==='finished';
  const lu=genLineups(match);
  const rCl=r=>{const n=parseFloat(r);if(isNaN(n))return'';if(n>=9)return'rA';if(n>=8)return'rB';if(n>=7)return'rC';if(n>=6)return'rD';return'rF';};
  const dCl=(h)=>{if(sport==='basketball')return h?'nb-h':'nb-a';if(sport==='american')return h?'nf-h':'nf-a';return h?'hm':'aw';};
  const hp=match.stats.h.poss,ap=100-hp;
  return(
    <div style={{position:'absolute',inset:0,zIndex:10}}>
      {COURT_SVG[sport]||<FootballSVG/>}
      <div className="hud">
        <div className="hud-sc"><span className="hud-tn">{match.h.split(' ').pop()}</span><span className="hud-num">{match.score.h}–{match.score.a}</span><span className="hud-tn">{match.a.split(' ').pop()}</span></div>
        <div className="hud-t" style={{color:isLive?'var(--red)':isDone?'rgba(200,244,0,.55)':'rgba(255,255,255,.32)'}}>{isLive?`🔴 ${match.min}'`:isDone?'✅ FULL TIME':'🕐 UPCOMING'}</div>
        {[{l:'Poss',h:hp,a:ap,u:'%'},{l:'Shots',h:match.stats.h.shots,a:match.stats.a.shots,u:''},{l:'Corners',h:match.stats.h.corners,a:match.stats.a.corners,u:''}].map(s=>(
          <div key={s.l} className="sbr">
            <span className="sbv h">{s.h}{s.u}</span>
            <div className="sb-tk"><div className="sb-f h" style={{width:`${s.h/(s.h+s.a)*100}%`}}/></div>
            <span className="sb-l">{s.l}</span>
            <div className="sb-tk"><div className="sb-f a" style={{width:`${s.a/(s.h+s.a)*100}%`}}/></div>
            <span className="sbv a">{s.a}{s.u}</span>
          </div>
        ))}
      </div>
      {/* Home bottom */}
      <div style={{position:'absolute',bottom:'1%',left:0,right:0,zIndex:12,display:'flex',flexDirection:'column',gap:'clamp(2px,.5vw,7px)',alignItems:'center',padding:'0 2%'}}>
        {[...lu.home].reverse().map((row,ri)=>(
          <div key={ri} style={{display:'flex',justifyContent:'center',gap:'clamp(3px,1.2vw,16px)',width:'100%'}}>
            {row.players.map((p,pi)=>(
              <div key={pi} className="pdot-w" onMouseEnter={e=>{setHov(p);setTip({x:e.clientX,y:e.clientY});}} onMouseLeave={()=>setHov(null)}>
                <div className={`pdot ${dCl(true)}${p.goals>0?' y':''}`}>{p.goals>0?'⚽':p.pos.slice(0,2)}</div>
                <div className="p-nm">{p.name.split(' ').pop()}</div>
                {(isDone||isLive)&&<span className={`p-rt ${rCl(p.rat)}`}>{p.rat}</span>}
              </div>
            ))}
          </div>
        ))}
      </div>
      {/* Away top */}
      <div style={{position:'absolute',top:'1%',left:0,right:0,zIndex:12,display:'flex',flexDirection:'column',gap:'clamp(2px,.5vw,7px)',alignItems:'center',padding:'0 2%'}}>
        {lu.away.map((row,ri)=>(
          <div key={ri} style={{display:'flex',justifyContent:'center',gap:'clamp(3px,1.2vw,16px)',width:'100%'}}>
            {row.players.map((p,pi)=>(
              <div key={pi} className="pdot-w" onMouseEnter={e=>{setHov(p);setTip({x:e.clientX,y:e.clientY});}} onMouseLeave={()=>setHov(null)}>
                <div className={`pdot ${dCl(false)}`}>{p.goals>0?'⚽':p.pos.slice(0,2)}</div>
                <div className="p-nm">{p.name.split(' ').pop()}</div>
                {(isDone||isLive)&&<span className={`p-rt ${rCl(p.rat)}`}>{p.rat}</span>}
              </div>
            ))}
          </div>
        ))}
      </div>
      {isLive&&<div className="sim-ball" style={{left:`${ball.x}%`,top:`${ball.y}%`,transform:'translate(-50%,-50%)'}}/>}
      <div className="ev-feed">
        {[...match.events.slice(-2),...evts].slice(0,3).map((ev,i)=>(
          <div key={ev.id||ev.min||i} className={`ev-i${ev.type==='goal'?' goal':ev.type==='card'?' card':''}`}>{ev.text||ev.txt}</div>
        ))}
      </div>
      {hov&&<div className="ptip" style={{left:tip.x+10,top:Math.min(tip.y-55,window.innerHeight-150)}}>
        <div className="ptip-n">{hov.name}</div><div className="ptip-r">{hov.pos}</div>
        <div className="ptip-row"><span className="ptip-k">Rating</span><span className="ptip-v">{hov.rat}</span></div>
        <div className="ptip-row"><span className="ptip-k">Goals</span><span className="ptip-v">{hov.goals}</span></div>
        <div className="ptip-row"><span className="ptip-k">Assists</span><span className="ptip-v">{hov.assists}</span></div>
      </div>}
    </div>
  );
};

function App(){
  const [roof,setRoof]=useState('closed');
  const [selSport,setSport]=useState('football');
  const [selLeague,setLeague]=useState('epl');
  const [selMode,setMode]=useState('full11');
  const [selMini,setMini]=useState('pub');
  const [pop,setPop]=useState(null);
  const [selMatch,setSelMatch]=useState(null);
  const [preds,setPreds]=useState({});
  const [locked,setLocked]=useState({});
  const [pts,setPts]=useState(134);
  const [ptsAnim,setPtsAnim]=useState(null);
  const [toasts,setToasts]=useState([]);
  const [selGW,setSelGW]=useState(32);
  const [matches,setMatches]=useState(()=>genMatches('epl','football'));
  const [usedChips,setUsedChips]=useState([]);
  const gwRef=useRef(null); // kept for compat
  const sRef=useRef(null),lRef=useRef(null),mRef=useRef(null),mlRef=useRef(null);

  // Live ticker
  useEffect(()=>{
    const t=setInterval(()=>{
      setMatches(ms=>ms.map(m=>{
        if(m.status!=='live')return m;
        const nm=Math.min(90,m.min+1);
        let ns={...m.score};
        if(Math.random()<.02){const sd=Math.random()<.55?'h':'a';ns={...ns,[sd]:ns[sd]+1};}
        return{...m,min:nm,score:ns,status:nm>=90?'finished':m.status};
      }));
    },1400);
    return()=>clearInterval(t);
  },[]);

  const roofOpen=roof==='opened'||roof==='opening';
  const toggleRoof=()=>{
    if(roof==='closed'||roof==='closing'){setRoof('opening');setTimeout(()=>setRoof('opened'),620);}
    else{setRoof('closing');setTimeout(()=>setRoof('closed'),520);}
  };
  const toast=(msg,col='var(--lime)')=>{
    const id=Date.now()+Math.random();
    setToasts(t=>[...t,{id,msg,col}]);
    setTimeout(()=>setToasts(t=>t.filter(x=>x.id!==id)),2400);
  };
  const handlePred=(k,v)=>setPreds(p=>({...p,[k]:v}));
  const handleLock=(k,match)=>{
    if(locked[k]){setLocked(l=>({...l,[k]:false}));toast('🔓 Unlocked','var(--gold)');return;}
    const p2=preds[k];
    if(!p2||p2.h===''||p2.a===''){toast('⚠️ Enter a score first!','#ff6b35');return;}
    setLocked(l=>({...l,[k]:true}));
    if(match.status!=='upcoming'){
      const earned=calcPts(+p2.h,+p2.a,match.score.h,match.score.a,selMode);
      if(earned>0){setPts(p=>p+earned);setPtsAnim(earned);setTimeout(()=>setPtsAnim(null),1100);toast(`${ptsFB(earned,selMode)?.t} +${earned} pts`);}
      else toast('🔒 Locked — 0 pts','var(--red)');
    } else toast('🔒 Locked!');
  };
  const handleChip=(id)=>{
    setUsedChips(u=>[...u,id]);
    const chip=CHIPS.find(c=>c.id===id);
    toast(`${chip.icon} ${chip.name} — ${chip.effect}`,'var(--cyan)');
    if(id==='ironwall'){setPts(p=>p+10);setPtsAnim(10);setTimeout(()=>setPtsAnim(null),1100);}
    if(id==='sniper'){toast('🎯 Sniper active — next exact score doubled!','var(--gold)');}
  };
  const handleSport=(id)=>{
    setSport(id);
    const lgs=ALL_LEAGUES[id]||[];
    const fl=lgs[0]?.id||'epl';
    setLeague(fl);setMatches(genMatches(fl,id));setSelMatch(null);setLocked({});setPreds({});
    toast(SPORTS.find(s=>s.id===id)?.lbl||id);
  };
  const handleLeague=(id)=>{
    setLeague(id);setMatches(genMatches(id,selSport));setSelMatch(null);setLocked({});setPreds({});
    toast(Object.values(ALL_LEAGUES).flat().find(l=>l.id===id)?.lbl||id);
  };
  const curSport=SPORTS.find(s=>s.id===selSport)||SPORTS[0];
  const leagues=ALL_LEAGUES[selSport]||[];
  const curLeague=leagues.find(l=>l.id===selLeague)||leagues[0]||{lbl:'League',icon:'🏆'};
  const curMode=MODES.find(m=>m.id===selMode)||MODES[4];
  const curMini=MINI_LEAGUES.find(m=>m.id===selMini)||MINI_LEAGUES[0];
  const selMatchObj=selMatch?matches.find(m=>m.id===selMatch):null;
  const seatCols=Math.min(38,Math.floor(window.innerWidth*.38/8));
  const sideW=Math.round(window.innerWidth*(window.innerWidth>900?.17:window.innerWidth>600?.16:.13));

  return(
    <div className="app">
      {/* HEADER */}
      <div className="hdr">
        <div className="pts-pill"><span className="pts-v">{pts}</span><span className="pts-l">PTS</span></div>
        {ptsAnim&&<div className="pts-pop">+{ptsAnim}</div>}
        <div className="brand">⚽ Gaffer's Pick</div>
        <div className="s-tag">2025/26</div>
      </div>

      {/* STADIUM */}
      <div className="stadium" style={{position:'relative'}}>

        {/* LEFT SIDE PANEL — roof closed: account / roof open: seats + league stats */}
        <div className={`sp l${roofOpen?' roof-open':' roof-closed'}`}>
          <div className="sp-fixed">
            {roofOpen ? (
              <>
                <div style={{height:'32%',flexShrink:0,overflow:'hidden',background:'linear-gradient(180deg,#040912,#06101e)'}}>
                  <StandSeats rows={14} cols={Math.max(3,Math.floor(sideW/8))} lr={.42} cl="sv"/>
                </div>
                <div style={{flex:1,overflowY:'auto',overflowX:'hidden',padding:'6px 8px'}}>
                  <StatsPanel selLeague={selLeague} selSport={selSport} selMode={selMode}/>
                </div>
              </>
            ) : (
              <div style={{flex:1,overflowY:'auto',overflowX:'hidden',padding:'6px 8px'}}>
                <AccountPanel pts={pts} gw={selGW}/>
              </div>
            )}
          </div>
        </div>

        {/* LEFT STAND COL */}
        <div className="stand-col" style={{display:'flex',flexDirection:'row'}}>
          <div style={{flex:1,display:'flex',flexDirection:'column',overflow:'hidden'}}>
            <AdBoardH ads={ADS_H.slice(0,6)}/>
            <StandSeats rows={18} cols={8} lr={.4} cl="scv"/>
            <AdBoardH ads={ADS_H.slice(4,10)} reverse={true}/>
          </div>
          <AdBoardV ads={ADS_V}/>
        </div>

        {/* PITCH / COURT */}
        <div className="pitch-col">
          {/* Ad ring around pitch — only visible when roof open */}
          <div className={`adh${roofOpen?' show':''}`}><div className={`adh-i go`}>{[...ADS_H,...ADS_H].map((a,i)=><div key={i} className="adh-b" style={{background:a.bg,minWidth:'clamp(68px,10.5vw,148px)'}}><span className="adh-t" style={{color:a.col}}>{a.txt}</span></div>)}</div></div>
          {/* Court — chips column sits inside on left */}
          <div style={{flex:1,position:'relative',overflow:'hidden'}}>
            {/* Chips column — left side, only when roof open */}
            <ChipsCol usedChips={usedChips} onUseChip={handleChip} visible={roofOpen}/>
            {/* Court surface */}
            <div className={`court ${curSport.court}`}>
            {/* Court inner content — offset when chips visible */}
            <div className={`court-inner${roofOpen?' chips-on':''}`}>
              <CourtView match={selMatchObj} sport={selSport}/>
            </div>
            {/* ROOF */}
            <div className={`roof ${roof}`}>
              {/* LEFT ROOF — account panel fills full half */}
              <div className="roof-l">
                <div className="roof-ss"><SeatRowH cols={Math.floor(seatCols/2)} lr={.42}/></div>
                <div className="roof-pane">
                  <AccountPanel pts={pts} gw={selGW}/>
                </div>
                <div className="roof-ss bt"><SeatRowH cols={Math.floor(seatCols/2)} lr={.36}/></div>
              </div>
              {/* RIGHT ROOF — predictions panel fills full half */}
              <div className="roof-r">
                <div className="roof-ss"><SeatRowH cols={Math.floor(seatCols/2)} lr={.42}/></div>
                <div className="roof-pane">
                  <PredPanel matches={matches} preds={preds} locked={locked} onPred={handlePred} onLock={handleLock} onSel={id=>setSelMatch(p=>p===id?null:id)} selMatch={selMatch} selMode={selMode}/>
                </div>
                <div className="roof-ss bt"><SeatRowH cols={Math.floor(seatCols/2)} lr={.36}/></div>
              </div>
              <button className="roof-tog" onClick={toggleRoof}>
                <i className={`fas fa-${roofOpen?'chevron-down':'chevron-up'}`}/>
                {roofOpen?'Close Roof':'Open Roof'}
              </button>
            </div>{/* end roof */}
            </div>{/* end court surface */}
          </div>{/* end outer court wrapper */}
          {/* Ad ring bottom — only visible when roof open */}
          <div className={`adh${roofOpen?' show':''}`}><div className={`adh-i rv`}>{[...ADS_H,...ADS_H].reverse().map((a,i)=><div key={i} className="adh-b" style={{background:a.bg,minWidth:'clamp(68px,10.5vw,148px)'}}><span className="adh-t" style={{color:a.col}}>{a.txt}</span></div>)}</div></div>
        </div>{/* end pitch-col */}

        {/* RIGHT STAND COL */}
        <div className="stand-col r" style={{display:'flex',flexDirection:'row'}}>
          <AdBoardV ads={ADS_V} reverse={true}/>
          <div style={{flex:1,display:'flex',flexDirection:'column',overflow:'hidden'}}>
            <AdBoardH ads={ADS_H.slice(3,9)} reverse={true}/>
            <StandSeats rows={18} cols={8} lr={.4} cl="scv"/>
            <AdBoardH ads={ADS_H.slice(0,6)}/>
          </div>
        </div>

        {/* RIGHT SIDE PANEL — roof closed: predictions / roof open: seats + results */}
        <div className={`sp r${roofOpen?' roof-open':' roof-closed'}`}>
          <div className="sp-fixed">
            {roofOpen ? (
              <>
                <div style={{height:'32%',flexShrink:0,overflow:'hidden',background:'linear-gradient(180deg,#040912,#06101e)'}}>
                  <StandSeats rows={14} cols={Math.max(3,Math.floor(sideW/8))} lr={.42} cl="sv"/>
                </div>
                <div style={{flex:1,overflowY:'auto',overflowX:'hidden',padding:'6px 8px'}}>
                  <ResultsPanel matches={matches} preds={preds} selMode={selMode} leagueId={selLeague}/>
                </div>
              </>
            ) : (
              <div style={{flex:1,overflowY:'auto',overflowX:'hidden',padding:'6px 8px'}}>
                <PredPanel matches={matches} preds={preds} locked={locked} onPred={handlePred} onLock={handleLock} onSel={id=>setSelMatch(p=>p===id?null:id)} selMatch={selMatch} selMode={selMode}/>
              </div>
            )}
          </div>
        </div>

      </div>

      {/* NAV */}
      <div className="nav">
        <button ref={sRef} className={`nb${pop==='sport'?' act':''}`} onClick={()=>setPop(o=>o==='sport'?null:'sport')}>
          <span className="ni">{curSport.ball}</span><span className="nl">{curSport.lbl}</span><span className="ns">Sport ▲</span>
        </button>
        <button ref={lRef} className={`nb${pop==='league'?' act':''}`} onClick={()=>setPop(o=>o==='league'?null:'league')}>
          <span className="ni">{curLeague.icon}</span><span className="nl">{curLeague.lbl}</span><span className="ns">League ▲</span>
        </button>
        <button className="ctr-nb" onClick={toggleRoof}>
          <span className="ctr-b">{curSport.ball}</span>
          <span className="ctr-l">{roofOpen?'Close Roof':'Open Roof'}</span>
        </button>
        <button ref={mRef} className={`nb${pop==='mode'?' act':''}`} onClick={()=>setPop(o=>o==='mode'?null:'mode')}>
          <span className="ni">{curMode.icon}</span><span className="nl">{curMode.lbl}</span><span className="ns">Mode ▲</span>
        </button>
        <button ref={mlRef} className={`nb${pop==='mini'?' act':''}`} onClick={()=>setPop(o=>o==='mini'?null:'mini')}>
          <span className="ni">{curMini.icon}</span><span className="nl">{curMini.lbl}</span><span className="ns">Mini-L ▲</span>
        </button>
      </div>

      {/* POPUPS */}
      {pop==='sport'&&<Popup items={SPORTS} sel={selSport} onSel={handleSport} onClose={()=>setPop(null)} ref_={sRef}/>}
      {pop==='league'&&<Popup items={leagues} sel={selLeague} onSel={handleLeague} onClose={()=>setPop(null)} ref_={lRef}/>}
      {pop==='mode'&&<Popup items={MODES.map(m=>({id:m.id,icon:m.icon,lbl:m.lbl,sub:m.desc}))} sel={selMode} onSel={id=>{setMode(id);toast(MODES.find(m=>m.id===id)?.lbl||id);}} onClose={()=>setPop(null)} ref_={mRef}/>}
      {pop==='mini'&&<Popup items={MINI_LEAGUES.map(m=>({id:m.id,icon:m.icon,lbl:m.lbl,sub:m.sub}))} sel={selMini} onSel={id=>{setMini(id);toast(MINI_LEAGUES.find(m=>m.id===id)?.lbl||id);}} onClose={()=>setPop(null)} ref_={mlRef}/>}

      {/* TOASTS */}
      {toasts.map(t=><div key={t.id} className="toast" style={{background:'linear-gradient(90deg,#040d14,#08180e)',border:`1.5px solid ${t.col}`,color:t.col}}>{t.msg}</div>)}
    </div>
  );
}

const el=document.getElementById('root');
if(el){try{ReactDOM.createRoot(el).render(<App/>);}catch(e){console.error(e);el.innerHTML='<div style="color:#c8f400;padding:2rem;text-align:center">Error. See console.</div>';}}
</script>
</body>
</html>
